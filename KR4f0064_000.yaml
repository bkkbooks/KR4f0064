body:
  text: 卷上寫神思銘燕昭王求仙臺賦平均篇乙丙之際箸議第一乙丙之際箸議第六乙丙之際箸議第七乙丙之際箸議第九乙丙之際箸議第十八乙丙之際箸議第十九釋風黃山銘哀忍之華別辛丈人文皇朝碩輔頌序太倉王中堂奏疏書後崑山徐尚書代言集序與徽州府志局纂修諸子書武進莊公神道碑銘送歙吳君序送夏進士序農宗海門先嗇陳君祠堂碑文與人箋一與人箋二與人箋三與人箋四卷中家孰策問陳碩甫所箸書序答人求墓銘書西域置行省議擬進上蒙古圖志表文蒙古象教志序蒙古水地志序蒙古臺卡志序蒙古聲類表序上鎮守吐魯番領隊大臣寶公書上國史館總裁提調總纂書與人箋卷下五經大義終始論宋先生述擬上今方言表知歸子讚定盦七銘與江居士箋戒將歸文發大心文刻定盦文集緣起定盦文集上中下三卷又續集四卷者仁和龔禮部之所作也係禮部手寫定本亂後是書流閩中其友曹竹書從他人轉輾假録得之初甚祕後踵門索觀者衆日不暇給屬余出資付剞劂氏校讐之役皆竹書獨任余意在成人之美但有解囊相助功過所不計也惟是書經數手傳鈔又潦草寫定舛訛知必不免且無善本可校其亦可以已矣然則竹書曷為必鋟諸板乎曰是將以杜塞夫人之求之者竹書為設一例曰不敢妄為增損有明知其不訛而無目人所強爭者固仍之即明知其必訛而有目人所共議者亦姑仍之蓋本穀梁子傳疑傳信之義耳刪去少作四篇亦禮部志也又與江子屏箋書杭大宗逸事二篇係後續得者此外無一字焉禮部之文千秋自有定論余又何庸贅一辭錢唐吳煦謹識定盦文集題辭士君子負嶔崎磊落之才睥睨一世或數十年而一見或年而數數見抑或數百年而僅乃一見要皆因乎氣數之升沈時藝之遷變迭為乘除者也若夫彼蒼鄭重愛惜之人其尤特異者將必故吝其生不使遽降於世遲之又久以俟大聖人出熏沐醲化翊扶景運蓄其經術文章與名儒碩彥和其聲以鳴國家之盛彼亦嘗欣欣然自喜前不見古人後不見來者奮乎百世之上俯乎百世之下幾不知宇宙之如此其寥廓也則將曰天不生我於前之世又不生我於後之世何以至今日倐然而有我豈無意哉我既有此不先不後之身與萬物相見則天之待我也良厚矣我其可自暴棄也歟遂乃沈酣六籍饜飫百家大聲發於天地間而汪洋恣肆浩乎其無涯渺乎其無際而莫知其所終極故處則閉户箸書索解人而不得藏之名山大川傳諸其人其言若金玉日與樵夫牧豎嘯歌於山巔水涯之側祕之弗為外人道出則陳謨納諫貢針獻頌登於明堂其言見諸措施如泰山出雲不崇朝而遍雨乎天下以慰其霖雨蒼生之願山林廊廟兼而有之其人其文卓然大家宜其上下五百年而獨有千古嗚呼天之生才不亦難乎蓋愼之又慎矣姑降格以求在天則雲霞雷電之變幻不測雨露風霜之間代靡窮在地則層巒疊嶂之靑縹時隱時見長江大河之波瀾忽起忽滅於飛鳥則翰雞翬雉之文采於走獸則黃羆赤豹之彪炳於蟲魚則錦鬛文鱗紫貝緑甲之鮮新蠶繭蜂蜜蜣丸蛛絲之工巧草則菖蒲薢茩聰耳而明目茯苓茱茰延年而耐老木則桃李杏某吐華而垂實杞梓松柏應用而呈材此固世間恆有之物未足為奇也求其如甘雪景星醴泉鬯草雲五色而成霱河三日而變淸鳳鳥之舒九苞應六律鯤魚之吸雲霧薄滄溟羊一角狐九尾麟趾裊蹄騠䮷徵籙麥兩歧禾同􅣴靈芝奇木渙磊移符蓂莢應月以成朔望萐莆生風以易炎涼旗飾蛟騰犀照雞駭朱英璱帶紫脫聯赤雀銜丹書元龜負緑字熊熊炎炎斕斕斑斑天文地文人文順賁設夬參離象革太平以瑞應臻百福雖以仁聖之世不屢見然亦未始不一見也今夫挺然不世出之人殊尤而絶類當國家隆盛之時適生其際亦若是而已矣乃求之漢魏求之南北朝求之唐宋元明而卒無有雖有亦僅見蓋數百年來於師友之間得兩人焉一曰仁和龔君定盦一曰邵陽魏君默深定盦天下之奇才也尤卓犖有英氣武林山水靈秀甲寰宇發源於歙之黃勸懲之義是非褒貶之條則取法於詩與春秋驗家國之興亡知人物之臧否則必徵諸三傳考典章之明備審制度之精詳則必徵諸三禮以及遺聞軼事故書雅訓則又雜采於周秦傳記之書其雄辭偉論縱橫而馳驟也則似孟似莊其奧義深文佶屈而聱牙也則似墨似鬻其義理精微辭采豐偉或守正道之純粹或尚權謀之詭譎則又似荀似列似管似晏他如韓非愼到吳起孫臏尹文尸佼屈原呂不韋燕太子丹趙公孫龍尉繚關尹鶡冠鬼谷之倫雖各分門而別戶亦皆殊途而同歸卓哉斯人其諸通天地人而為儒者歟曩者道光甲申之歲余入市閲書邂逅於僻巷不及通姓名瞪目視良久若有心契者執手談文字甚歡始與訂交盡棄余向所學者而好讀定盦文不少衰朝取一編焉通其意莫取一編焉玩其辭明年復因定盦而交默深三人者遂相視為莫逆余慕定盦之為人與其所為文者久欲一見不可得乃求之寤寐而終莫慰余懷之渺渺何圖卒然遇之而令人賦蔓草之詩不置也始余獲見其文如上擲山巖空靑珊瑚陊之施諸采色可備黼黻文章之用如鬱人貢百草之華十葉為貫百廾貫築以煮之為鬱鬯之酒芬芳條達甘旨醑酤如郡國往往於山川得鼎彝古豔古香摩挲不去手如壞孔子宅壁中聞有琴瑟鐘磬之聲移宮刻羽有招我由房之樂如投九重之淵探驪龍之頷下而獲其巨珠縱千金而不易匪一簞之可遺豈徒以妙色和聲美味好臭怡神而蕩魄哉今距定盦之卒且二十餘年余重讀其文猶旦暮耳定盦往矣定盦之文如水火之在天壤間未嘗一日無者也後之人茍有好學深思心知其意如嘗海一滴而知其味之鹹取火一星而知其性之烈若余之朝吟夕詠而不忘夫定盦者其亦海之一滴火之一星也夫同治七年閏四月吉日仁和曹籒謹饌定盦續集目録卷一説京師翠微山説昌平州説天壽山説居庸關説張家口説宗彝説説刻石説碑説衛公虎大敦太史公書副在京師説京師樂籍説説月晷宥情涼燠論私抱小尊史奠命尊任尊隱卷二古史鉤沈論一古史鉤沈論二古史鉤沈論三古史鉤沈論四壬癸之際胎觀第一王癸之際胎觀第二壬癸之際胎觀第三壬癸之際胎觀第四壬癸之際胎觀第五壬癸之際胎觀第六壬癸之際胎觀第七壬癸之際胎觀第八壬癸之際胎觀第九五經大義終始答問一五經大義終始答問二五經大義終始答問三五經大義終始答問四五經大義終始答問五五經大義終始答問六五經大義終始答問七五經大義終始答問八五經大義終始答問九乙丙之際孰議第十六乙丙之際孰議第十七乙丙之際孰議第二十乙丙之際孰議第二十五述思古子議保甲正名地丁正名撰四等十儀祀典雜議答人問關內矦卷三己亥六月重過揚州記病梅館記長短言自序商周彝器文録序升平分類讀史雅詩自序干祿新書自序錢吏部遺集序江左小辨序江子屏所箸書序袁通長短言序上海張靑雕文集序金孺人畫山水序丄海李氏藏書志序江南生橐筆集序阮尚書年譜第一序陸彥若所箸書序張南山國朝詩徵序績溪胡戶部文集序邵子顯校刊婁東雜箸序懷寧王氏族譜序禮部題名記序四先生功令文序送徐鐵孫序識某大令集尾序嘉定七生卷四王仲瞿墓表銘工部尚書高郵王文簡公墓表銘武顯將軍福建海壇鎮總兵官丁公神道碑銘明按察司僉事金君石闕銘贈太子太師兵部尚書兩廣總督諡敏肅涿州盧公神道碑銘代阮中堂刑部主事番禺黃君妻周墓碣銘徐泰母碣孔憲彝母碣朱殤女碣潘阿細碣京師悅生堂刻石代宋經厯鳳山知縣常州湯公父子畫象記金侍御妻誄最録南唐五百字記王隱君吳之癯書果勇侯八覲書番禺許君書葉機書金伶松江兩京官縱難送曹生臣里廬之推捕蜮第一捕熊羆鴟梟豺狼第二捕狗蠅螞蟻蚤蜰蚊虻第三定盦文集仁和龔自珍璱人饌古今體詩上卷破戒草辛巳能令公少年行有序序曰龔子自禱蘄之所言也雖弗能遂酒酣歌之可以怡魂而澤顔焉蹉跎呼公公今言愁愁無終公毋哀吟婭姹聲沈空酌我五石雲母鍾我能令公顔丹鬢緑而與年少爭光風聽我歌此勝絲桐貂毫署年年甫中箸書先成不朽功名驚四海如雲龍攫拿不定光影同徵文考獻陳禮容飮酒結客橫才鋒逃禪一意皈宗風惜哉幽情麗想銷難空拂衣行矣如奔虹太湖西去靑靑峯一樓初上一閣逢玉簫金琯東山東美人十五如花穠湖波如鏡能照容山痕宛宛能助長眉丰一索鈿盒知心同再索班管知才工珠明玉暖春朦朧吳歈楚詞兼國風深吟淺吟態不同千篇背盡燈玲瓏有時言尋縹渺之孤蹤春山不妬春裙紅笛聲叫起春波龍湖波湖雨來空濛桃花亂打蘭舟篷煙新月舊長相從十年不見王與公亦不見九州名流一刺通其南鄰北舍誰歟相過從痀瘻丈人石戶農嶔崎楚客窈窕吳儂𫾣門借書者釣翁探碑學拓者溪僮賣劍買琴鬪瓦輸銅銀針玉薤芝泥封秦漢密齊梁工佉經梵刻著録重千番百軸光態熊奇許相借錯許攻應客有元鶴驚人無白驄相思相訪溪凹與谷中采茶采藥三三兩兩逢高談俊辨皆沈雄公等休矣吾方慵天涼忽報蘆花濃七十二峯峯峯生丹楓紫蟹熟矣胡麻饛門前釣榜催詞筒余方左抽豪右按譜高吟角與官三聲兩聲棹唱終吹入浩浩蘆花風仰視一白雲卷空歸來料理書燈紅茶煙欲散穨鬟濃秋肌出釧涼瓏鬆夢不墮少年煩惱叢東僧西僧一杵鐘披衣起展華嚴筒噫嚱少年萬恨填心胸消災解難疇之功吉羊解脫文殊童著我五十三參中蓮邦縱使緑未通它生且生兜率宫寥落寥落吾徒可奈何靑山靑史兩蹉跎乾隆朝士不相識無故飛揚入夢多暮雨謠三疊暮雨憐幽草曾親擷翠人林塘三百步車去竟無塵雨氣侵羅襪泥痕黦畫裳春陰太蕭瑟歸費夕爐香想見明燈下簾衣一桁單相思無十里同此鳳城寒城北廢園將起屋雜死當楣施斧斤焉與馮舍人啓蓁過而哀之主人諾馮得桃余得海棠作救花偈示舍人門外間停油壁車門中雙玉降臣家因緣指點當如是救得人間薄命花柬陳碩甫奐并約其偕訪歸安姚先生中夜栗然懼沈沈生鬢絲開門故人來驚我容顔羸霜雪滿天地子來寧無飢且坐互相視冰落須與眉切切兩不已喁喁心腑溫自入國西門此意何曾宣飴我客心苦驅我真氣還華冠闖然入公等何所論進退兩無依悲來恐速老愁魂中夜馳不如起為道枯庵有一士長貧顔色好避人偕訪之一覿永相保冬日小病寄家書作黃日半窗暖人聲四面希餳簫咽窮巷沈沈止復吹小時聞此聲心神輒為癡慈母知我病手以棉覆之夜夢猶呻寒投於母中懷行年逮壯盛此病恆相隨飲我慈母恩雖壯同兒時今年遠離別獨坐天之涯神理日不足襌悅詎可期沈沈復悄悄擁衾思投誰子每聞斜日中簫聲則病莫喻其故附記於此夜讀番禺集書其尾靈均出高陽萬古兩苗裔鬱鬱文詞宗芳馨聞上帝奇士不可殺殺之成天神奇文不可讀讀之傷天民又書一首卷中覿幽女悄坐憺妝束豈無紅淚痕掩面面如玉夜直天西涼月下宫門夕拜人來弟一番蠟燭飽看前輩影屋梁高待後賢捫纍朝殊簽及絲綸簿皆庋牀頂須梯而升皆史官底本也沈吟章草聽鐘漏迢遞湖山赴夢魂安得上言依漢制詩成侍史佐評論賦得香我有香一段煎熬刳斫成德堅能不死心苦惜無名大玉煩同薦羣靈感至誠偶留閨閣愛結習愧平生奴史問答朝荈一巵五百學士偷文詞暮酒一杓四七辨士記崖略長眉寫書小史云主人者誰入亦無姝出亦無車一史致詞出無車迷不知東街與西街懷中墮出西海圖入無姝但見瑤琴愔愔紅燭華都主人中夜起彈琴對燭神踟蹰鄰宅大夫私問奴星主人者誰朝誦聖賢文夕誦聖賢文奴言從主人一紀有餘主人朝癯夕腴夕腴朝又癯尚不見主人之眉髮美與醜惟聞喃喃呢呢朝誦貝葉文夕誦貝葉文比來長安出亦無車入亦無姝日籍酒三五六斤苦荈亦三斤長安無客不踏主人門客稱主人人一喙不知主人誰喜誰所瞋歲星在前奴在後又聞昨夜宅神巷鬼言包山老龍饞不得歸談破長安萬張口萬張口奴皆聞之奴能祘天九祘地九能使梭化龍而雷飛石赴波而海走又能使大荒之山麒麟之角移贈狗奴不信主人行藏似誰某辛巳除夕與彭同年藴章同宿道觀中彭出平生詩讀之竟夜遂書其卷尾亦是三生影同聽一杵鐘挑燈人海外拔劍夢魂中雪色憺恩怨詩聲破苦空明朝客盈座誰信去年蹤壬午桐君仙人招隱歌有序吳舍人嵩梁嘗與婦蔣及兩姬人約偕隱桐江之九里梅花村不能果也顔京邸所居曰九里梅花村舍以自慰藉嘗以春日軿車枉存道觀因獻此詩蓋代山靈招此三人也春人晝夢梅花眼醒聞雜佩聲璆然初疑三神山影落窗戶何娟娟又疑三明星灼灼飛下太乙船三人皆隸桐君仙山靈一謫今千年胡不相逢桐江之濱理釣舷又胡不采藥桐山顚乃買黃塵十丈之一鄽殳書大署庭之櫋梅花九里移幽燕毋乃望梅止渴梅所憐過從誰歟客盈千一客對之中悁悁亦有幻境胸纏綿心靈構造難貝宣乃在具區之西莫釐之北大小龍渚相毗連自名春人塢樓臺窈窕春無邊俯臨太湖春水闊仰見縹渺晴空懸中間紅梅七八九輪囷古鐵花如錢兩家息壤殊不遠江東浙東一棹堪洄沿相嘲相慰亦有年今朝筆底東風顚請為莫釐龍女破顔曲換我桐君仙人招隱篇相蘄相禱春陽天開簾送客一惝恍簾外三日生春煙漢朝儒生行漢朝儒生不靑紫二十高名動都市易通田何書歐陽三十方補掌故史門寒地遠性儻蕩出門無階媚天子會當大河決酸棗願入薪楗三萬矢路逢絳灌拜馬首拜則槃辟人不喜歸來仰屋百喟生箸書時時説神鬼生不逢高皇罵儒冠亦不遇灞陵輕少年愛讀武皇傳不遇武皇祠神仙神仙解詞賦大人一奏凌雲天枕中黃金豈無藥更生誤讀淮王篇自言漢家故事網羅盡胸中語祕世莫傳略傳將軍之客數言耳不惜箝我歌當筵一歌使公愳再歌使公悟我歌無罪公無怒漢朝西海如郡縣蒲萄天馬年年見丐奴左臂烏孫王七譯來同藁街宴武昭以還國威壯狗監鷹媒盡邊將出門攘臂攫牛羊三載踐更翻沮喪三十六城一城反都護上言請勤遠期門或怒或陰喜喜者何心怒則憤關西籍甚良家子卅年久綰軍符矣不結椎埋兒不長鳴珂里聲名自震大荒西飲馬昆俞蕩海水不共郅支生願逐樓蘭死上書初到公卿驚共言將軍宜典兵麟生鳳降豈有穜况乃一家中國猶弟兄旌旗五道從天落小印如斗大如斛盡隸將軍一臂呼萬人側目千人諾山西少年感生泣羽林羣兒各努力共知漢主拔孤根坐見孤根壯劉室不知何姓小侯瞋不知何客惎將軍將軍內顧忽疑懼功成定被他人分不如自親求自附飛書請隸嫖姚部上言乞禁兵下言避賢路笑比高皇十八侯自居蟲達曾無羞此身願爵關內老黃金百斤聯呵保嗚呼漢家舊事無人知南軍北軍頗有私北軍似姑南似嫂嫂疏姑戚羣僮窺可憐舊事無人信門戶千秋幾時定門戶原非主上心詄蕩吾知漢皇聖是時書到甘泉夜答詔裴􅏆未輕下密問三公是與非沮者不堅語中罷庾詞本冀公卿諒未議微聞道塗罵拙哉某將軍非火胡自焚非蠶胡自縛非蠆胡自螫有舌胡自嬌有臂胡自掣軍至矣刺史迎肥牛之腱萬鑊烹軍過矣掠童女馬踏燕支賤如土嬴家長城如一環漢家長城衣帶間嬴家正為漢家用坐見入關仍出關入關馬行疾出關馬無力丞華廄裏芝草稀水衡金賤苦之絶卜式羊蹄尚無用相如黃金定何益珠崖可棄例棄之夜過茂陵聞太息漢家廟食果何人未必衛霍無儕倫酬金失侯亦有命人生那用多苦辛噫嚱人生那用長苦辛勿向人間老老閲風霜亦枯稿千尺寒潭白日沈將軍之心如此深後世讀書者毋向蘭臺尋蘭臺能書漢朝事不能盡書漢朝千百必儒林丈人識此吟投宋于庭翔鳳遊山五嶽東道主擁書百城南面王萬人叢中一握手使我衣袖三年香投包眘伯世臣鄭人能知鄧析子黃祖能知禰正平乾隆狂客發此議君復掉罄今公卿柬秦敦夫編修二章有序辛巳秋始辱編修惠訪余居歲餘無三日不相見編修固乾隆朝耆舊也閲人多心光湛然而氣味沈厚溫溫然耐久長適其家有漢物二故遂假譬喻之詞為二詩以獻亦冀讀余詩者想見其為人君家有古鏡曾照漢時妝三日不相見思之心佪偟願身為鏡籢護此千歲光鏡君家有熏爐曾熏漢時香三日不摩挲涽碧生微涼願身為爐煙續續君子旁熏爐餺飥謠父老一靑錢餺飥如月圓兒童兩靑錢餺飥大如錢盤中餺飥貴一錢天上明月瘦一邊噫市中之餕兮天上月吾能料汝二物之盈虛兮二物照我為過客月語餺飥圓者當缺餺飥語月循環無極大如錢當復如月圓呼兒語若後五百歲俾飽而元孫送劉三劉三今義士愧殺讀書人風雪􅔷杯罷關山拭劍行英年須閲厯俠骨豈沈淪亦有恩仇託期君共一身黃犢謠一名佛前謠一名夢為兒謠黃犢躑躅不離毋腹躑躅何求乃不如犢牛一解晝則壯矣夜夢兒時豈不知歸為夢中兒二解無聞於時歸亦汝怡矧有聞於時胡不知歸三解歸實阻我求佛其可念佛夢醒佛前涕零四解佛香漠漠願夢中安樂佛香亭亭願夢中人苦辛苦辛恆同人樂亦無窮五解噫嘻噫嘻歸茍樂矣兒出辱矣夢中人知之佛知之夙矣六解十月草夜大風不寐起而書懷西山風伯驕不仁虓如醉虎馳如輪排關絶塞忽大至一夕炭價高千緡城南有客夜兀兀不風尚且淒心神家書前夕至憶我人海之一鱗此時慈母擁燈坐姑倡婦和雙勞人寒鼓四下夢我至謂我久不同艱辛書中隱約不盡道惚恍懸揣如聞呻我方九流百氏談宴罷酒醒炯炯神明真貴人一夕下飛語絶似風伯驕無垠平生進退兩顚􆂐詰屈內訟知緣因側身天地本孤絶矧乃氣悍心肝淳欹斜謔浪震四坐即此難免羣公瞋名高謗作勿自例願以自訟上慰平生親縱有噫氣自填咽敢學大塊舒輪囷起書此語燈焰死貍奴瑟縮偎幬茵安得眼前可歸竟歸矣風酥雨膩江南春女士有客海上者繡大士像而自繡已像禮之又繡平生詩數十篇綴於屋珠簾翠幕栖嬋娟不聞中有堅牢仙美人十五氣英妙自矜辨慧能通禪遂挾奇心恣縹渺別以沈痼搜纏綿吟詩十九作空語夙生入夢為龍天妝成自寫心所悟宗風窈窕非言詮維摩咋日扶病過落花正繞蒲團前欲罵綺語心未忍自顧結習同無邊散花未盡勿饒舌待汝撒手歸來年李復軒秀才學璜惠序吾文鬱鬱千餘言詩以報之李家夫婦各一集數典唐宋元明希婦才善哀君善怒哀以沈造怒則飛君配歸夫人著詩千餘篇江郎昨日罵金粉謂爾難脫千生鞿其言往往俊傷骨歲宴懷哉共所歸江鐵君嘗勸君夫婦學道看內典慮君之不能從也癸未寄古北口提督楊將軍芳絶塞今無事中原况有人升平間將略明哲保孤身莫以同朝忌慚非貴戚倫九重方破格肺腑待奇臣暮春以事詣圓明園趨公既罷因覽西郊形勝最後過澄懷園和內直友人春晚退直詩六首西郊富山水天子駐靑旗元氣古來積羣靈咸是依九重阿閣外一脈太行飛何必東南美宸居靜紫微一翠撲人冷空濛溯卻遙湖光飛闕外宫月淡林梢春暮煙霞潤天和草木驕桃花零落處上苑亦紅潮恍惚西湖路其如悵望何期門矚威武賤士感蹉跎囿沼輪魚躍峯巒羡鳥過周阹新令在不得覩卷阿雍正二年設入旗官兵處今額倍於初額掌故吾能説雍乾溯以還禪心闢初地小幸集淸班遂進羣藩宴兼怡聖母顔升平六十載乃大啓三山曰靜宜曰靜明曰漪皆乾隆中建淸警蹕聞傳膳樞廷述地方凡車駕有所幸謂之傳地方宸遊兼武備香山有健鋭火器二營大典在官常禁額如雲起仙人隔仗望萬重珊翠裏不數尚書郎此地求沿革當年本合並林嵐陪禁近祠廟仰勳名水榭分還壯雲廊改更淸諸公齊努力誰得似桐城澄懷本張文和公賜園今內直諸公分居之又才澄懷之半耳辨仙行噫嚱癯仙之癯毋乃貧長卿所賦亦失真我夢遊仙辨厥因齋莊精白聽我云仙者乃非松喬倫亦無英魄與烈魂彼但墮落鬼與神太一主宰先一一帝一非五邪説泯唐堯姬旦誠仙人厥光下界呼星辰不然詩書所説陳誰在帝左福下民五行陰騭誰平均享用大樂須韶鈞蓬蓬槱燎高薦禋號曰宗祖冠以神其次官貴貌必文周任史佚來斌斌配食漆吏與楚臣六萟但許莊騷鄰芳香惻悱懷義仁荒唐心苦余所親我才難饋仙官貧側聞肓左位頗尊姬孔而降三不湮大篆古文上帝珍帝命勒之天上珉椎拓萬本賜解人魯史書秋復書春二百四十一瞚陳九皇五伯升且淪大橈以來未浹旬為儒為仙無滓塵萬古只似人間寅使汝形氣長和淳一雙仙犬無狉獉人間儒派方狺狺飢龍悴鳳氣不伸鳳兮欲降上帝瞋鉏商所獲為謫麟愼旃莫往罹采薪公羊家言獲麟薪采之也送端木鶴田出都天人消息問端木著書自署靑田鶴此鶴南飛誓不回有鸞送向城頭哭鸞鶴相逢會有時各悔高名動寥廓君書若成願祕之不扃三山置五嶽柬王徵君萱鈴并約其偕訪歸安姚先生歸安醰醰百怪宗心夷貌惠難可雙徵君力定乃其亞大吕合配黃鐘撞歸安一身四氣有舉世但覩為秋冬亟拉徵君識姚子高山大壑長相逢飄零行戲呈二客一客高談有轉輪一客高談無轉輪不知泰華嵩衡外何限周秦漢晉人臣將請帝之息壤慚愧飄零未有期萬一飄零文字海他生重定定庵詩自癸未七月至乙酉十月以居憂無詩自記乙酉補題李秀才增厚夢遊天姥圖卷尾有序夢遊天姥圖者崑山李秀才以嘉慶丙子應北直省試思親而作也君少孤母夫人鞠之平生未曾一朝夕離以就婚應試往返半年而作是圖圖中為夢魂所經山殊不類鏡湖山之狀其曰天姥者或但斷取字義非太白詩意也越九年乙酉屬余補為詩書於坐尾時母夫人辭世巳年餘而余亦母喪闋才一月勉復弄筆未能成聲李郎斷夢無尋處天姥峯沈落照間一卷臨風開不得兩人紅淚溼靑山咏史金粉東南十五州萬重恩恐屬名流牢盆狎客操全算團扇才人踞上遊避席畏間文字獄箸書都為稻粱謀田橫五百人安在難道歸來盡列侯乙酉臘見紅梅一枝思親而作時小客崑山一十四年事胸中盎盎春南天初返棹東閣正留賓全家南下之歲迄今十有四年芳意驚心極愁容入夢頻嬌兒才竟盡不賦早梅新綘蠟高吟者年年哭海濱明年除夕淚灑作北方春毋在人間百事豫不知也記丙子至戊寅三除夕燒蠟兩枝供紅梅牡丹各一枝讀漢書竟夜天地埋憂畢舟車祖道頻明春復入都矣何如袌冰雪長作墓廬人杭州墓上植梅五十本乙酉除夕夢返故廬見先母及潘氏姑母門內滄桑事三人隱痛深淒迷生我處宛轉夢中尋窗外雙梅樹牀頭一素琴醒猶聞絮語難謝九原心余以乾隆壬子生馬坡巷先大父中憲公戊申年歸田所買宅也今他人有之丙戌乙酉十二月十九日得漢鳳紐白玉印一枚文曰緁妤妾趙既為之説載文集中矣喜極賦詩為寰中倡時丙戌上春也寥落文人命中年萬恨并天教彌缺陷喜欲冠平生掌上飛仙墮懷中夜月明自夸奇福至端不換公卿入手消魂極源流且莫宣姓疑鉤弋是人在麗華先暗寓拚飛勢休尋德象篇定誰通小學或者史遊鐫孝武鉤弋夫人亦姓趙氏而此印末一字為鳥篆鳥之啄三鳥之趾二故知隱寓其號矣德象篇班緁妤所作史遊作急就章中有縌字碑本正作緁史遊與飛燕同時故云爾夏后苕華刻周王重璧臺姒書無拓本姬室有荒苔小説冤誰雪靈蹤閟忽開嘗論西京雜記出六朝手所稱漢人語多六朝語未可信客曰得印所以報也更經千萬壽永不受塵埃玉純白不受土性引我飄颻思他年能不能狂臚詩萬首擬遍徴寰中作者為詩高供閣三層拓以甘泉瓦然之內史燈內史弟五行燈亦豫所藏東南誰望氣照耀玉山稜豫得地十笏於玉山之側擬構寶燕閣它日居之紀遊春小蘭氣淳湖空月華出未可通微波相將踏幽石一亭復一亭亭中乍曛黑千春幾輩來何况嬋媛客離離梅綻蕊皎皎鶴梳翮鶴性忽然馴梅枝未忍折並坐戀湖光雙行避蘇迹低睞有誰窺小語略聞息須臾四無人顔弱未工熱安知此須臾非隸仙靈籍侍兒各尋芳自薦到扶掖光景不少留羣山媚暝色城闉催上燈香輿佇煙陌溫溫懷肯忘曖曖眴靡及祗愁洞房中餘寒在鴛屧後遊破曉霜氣淸明湖斂寒碧三日不能來來覺情瑟瑟疏梅最淡冶今朝似愁絶尋常菭蘚痕步步生悱惻寸寸蚴蟉枝幾枝捫手厯重重燕支蕾幾朵挂叉及花外一池冰曾照低鬟立仿佛衣裳香猶自林端出前度未吹簫今朝好吹笛思之不能言捫心但先熱我聞色界天意癡離言説擕手或相笑此樂最為極天法吾卩受神親形可隔持以語梅花花頷略如石歸途又城闉朱門叩還入袖出三四華敬報春消息夏進士詩我欲輔諡法曰沖暨曰淳持此當諡誰夏璜錢唐人我生有朋友十六識君始我壯之四年君五十一死君熟于左氏隻字誦無遺下及草二史名姓胸纍纍形亦與君忘神亦與君忘䇿左五百事賭史三千場識君則在北哭君在杭州時乙酉既臘西湖寒不流作夏進土詩名姓在吾集如斯而已乎報君何太嗇京師春盡夕大雨書懷曉起柬比鄰李太守威吳舍人嵩粱春風漫漫春浩浩生人死人滿春抱死者周秦漢晉才幾時生者長吟窈窕天之涯閉門三日欲腸斷山桃海棠落皆半東皇灕然下春霰西鄰舍人既有怊悵詞對門太守禪定亦惱亂太守置酒當春空舍人言愁愁轉工三人文章乃各異心靈惻愴將毋同文章之事蔑須有心靈之事益負負蟠天際地能幾時萬恨沈霾向誰咎歸來春霰欲成雨春城萬家化洲渚山妻貽我珊胡枝勸讀騷經二十五不惜珊胡碎長吟未免心肝苦不如復飲求醁醽人飮獲醉我獲醒􅓉然萬載難酩酊一燈幌幌搖春屏四更急雨何曾停恍如波濤臥洞庭嗟哉此燈此雨不可負披衣起注陰符經有所思妙心苦難住住即與之期文字都無著長空有所思茶香砭骨後花影上身時終古天西月亭亭悵望誰美人美人淸妙遺九州獨居雲外之高樓春來不學空房怨但折梨花照暮愁以奇異金石文字拓本十九種寄秦編修恩復揚州而媵以詩異人延年無異方能使寸田生異香食古欲醉醉欲狂娛魂快意宜文章以代參术百倍強秦君耄矣癖弗荒何以明我長母忘我拓古文璆琳琅熏以桂椒襲以緗楮精墨勻周豪芒願君自發君古陽獲燕三喙芝三英中有趙緁妤印拓本一事曩趙君魏以為芝英篆也慈鬟公侍姫字箸録客亦商客其誰歟有鄭堂江君藩同聲念我北斗傍桂樹瓏􅌑白晝長園亭淸夏巵酒黃如作器者言詞良長生長樂樂未央反祈招有序序曰反祈招何為而作也夫瑤池有白雲之鄉赤烏為美人之地舂山珤玉異華之所自出羽陵異書之所藏凡厥數者有一于此老焉可矣何必祗宫為哉穆王自賦詩有之曰居樂甚寡即穆王實録也夷考王自入南鄭以還鬱鬱多故東土山川非淸和人夀至促夭韡韡盛姬返蹕道死左右既無以為娛車馬所費用度不足更制鍰贖以充軍國史臣以耄荒書之恩愛死亡金錢乏絶暮氣迫于餘生醜名垂於靑史貴為天子何異鰥民享國百年何翅朝露蓋西王母早見及此也是以其謠有之曰將子母死尚復能來豈非悼此樂之不重識人命之至短諷之以留八駿之馭決之以舍萬乘之尊窈窕傷骨飄颻動心者呼穆王不悟不以樂生乃以戚死嗚呼慕虛名受實禍此其最古者矣萬乘且然何况下士嘗以暇日讀祈招之詩翩然反之作詩二章以貽後之自桎梏者所以祛羣言果孤往世有碻士必曰夫龔子之志荒矣舂之崖白雲滿家褰其異華何山不可死使我東徂舂之麓白雲盈谷褰其異玉何山不可死使我東復燼餘破簏中獲書數十册皆慈澤也書其尾欲遡百憂始殘書亂一堆靑燈爾何夀卅載影霏微乍讀慈容在長吟故我非收魂天未許噩夢夜仍飛二哀詩有序為謝學士階樹陳修撰沆作也兩君皆以巍科不自賢謂高官上第外有各家師友文字皆樂相親近而許貢其言説辛巳冬迄癸未夏數數枉存余求師友有造述皆示余余僭疏古近學術源流及勸購書皆大喜學士德量尤深莫測所至修撰閉門斐然懷更定之志殊未成而忽然以同逝命也作二哀詩時丙戌夏讀書先望氣謝九癯而溫平生愛太傳匪徒以其孫翰林兩抗疏志欲窺大源春華不自賞壯歲求其根誰謂尋求遲邁越柂與藩造物吝君老一邱埋蘭蓀讀書先審器陳君虛且深榮名知自鄙聞道以自任聞道豈獨難信道千黃金遂使山川外某某盈君襟幸哉有典則惜哉未酣沈手墨浩盈把甄搜難為心祭程大理同文於城西古寺而哭之憶昔先皇已未年家公與公相後先家公肅肅公跌宕斜街老屋長嬴天閨中名德絶天下吳玖夫人鳴琴説詩鏘珮瑱卅年父執朝士盡回首髫丱中悁悁姬劉皆世太史氏公乃崛起孤根中公才什伯古太史曰邦有獻獻有宗英文巨武鬱浩洶天圖地碣森巃嵸賤子不文復不達愧彼後哲稱程龔北斗真人返大荒彭鏗史佚來趨蹌借書不與上天去天上定有千縹緗豫與公辛王間相借書無虛日天上豈無一尊酒為我降假僚友旁掌故雖徂元氣在仰窺七曜森光芒投李觀察宗傳吏治緣經術千秋幾合并淸時數人望依舊在桐城肅穆真儒氣沈雄壯歲名汪汪無盡意對面即滄瀛賦憂患故物人寰少猶蒙憂患俱春深恆作伴宵夢亦先驅不逐年華改難同逝水徂多情誰似汝未忍託禳巫丙戌秋日獨遊法源寺尋丁卯戊辰間舊遊遂經過寺南故宅惘然賦髫年袌秋心秋高屢逃孰宕往不可收聊就寺門讀春聲滿秋空不受秋束縛一叟尋聲來避之入修竹叟乃噴古笑爛漫晉宋謔寺僧兩侮之謂一猿一鶴歸來慈母憐摩我百怪腹言我衣裳涼飼我芋栗熟萬恨未萌芽千詩正珠玉醰醰心肝淳莽莽憂患伏浩浩支干名漫漫人鬼籙依依燈火光去去門巷曲魂魄一惝恍徑欲叩門宿千秋萬歲名何如小年樂叟為金壇段淸摽吾母之叔父也秋心三首秋心如海復如潮但有秋魂不可招漠漠鬱金香在臂亭亭古玉佩當腰氣寒西北何人劍聲滿東南幾處簫斗大明星爛無數長天一月墜林梢忽筮一官來闕下衆中俯仰不材身新知觸眼春雲過老輩填胸夜雨淪天問有靈難置對陰符無效勿虛陳曉來客籍差夸富無數湘南劍外民我所思兮在何處胸中靈氣欲成雲槎通碧漢無多路土蝕寒花又此墳某氷某山迷姓氏一叉一佩斷知聞起看厯厯樓臺外窈窕秋星或是君同年生徐編修寶善齋中夜集觀其六世祖健庵尚書邃園修禊卷子康熙三十年製也卷中凡二十有二人邃園在崑山城北廢趾余嘗至焉編修屬書卷尾崑山翰林召詞客酒如淥波燈如雪八人忽共遊康熙二十二賢照顔色七客沈吟一客言請言君家之邃園一花一石有款識袖中拓本舂煙昏背煙酬起尚書魂二十二賢不可再玉山峩峩自千載東南文獻嗣者誰剔之綜之抑有待布衣結客妄自尊流連卿等多酒痕十載狂名掃除畢一邱倘遂行閉門以屬大人君子孫康熙朝士評三徐曰公肅仁人君子健庵大人君子果亭正人君子墮一齒戲作與我相依卅五年論文説法賴卿宣感卿報我無常信瘞向垂垂花樹邊寒月吟有序寒月吟者龔子與其婦何歲暮共幽憂之所作也相喻以所懷相勗以所尚鬱而能暢者也夜起數山川浩浩共月色不知何山靑不知何川白幽幽東南隅似有偕隱宅東南一以望終戀杭州路城裏雖無家城外卻有墓相期買一邱毋遠故鄉故而我屏見聞而汝餋幽素舟行百里間須見墓門樹南向發此言恍欲雙飛去雙飛去未能月浸衣裳溼愀焉靜念之勞生幾時歇勞者本庸流事事乏定識朴愚傷于家放誕忌於國皇天誤矜寵付汝憂患物再拜何敢當藉以戰道力何期閨闈中亦荷天眷別多難淬心光黽勉共一室憂患吾故物明月吾故人可隱不偕隱有如月一輪心迹如此淸容光如此新我讀先秦書萊子有逸妻閨房以逸傳此名蹈者希勿慕厥名高我知厥心悲定多不傳事子孫無由知豈但無由知知之反漣洏羞登中壘傳恥勒度尚碑一逸處患難所全浩無涯一逸謝萬古冥冥不可追示君讀書法君慧肯三思我生受之天哀樂恆過人我有平生交外氏之懿親自我慈母死誰饋此翁貧江關斷消息生死知無因八十罹飢寒雖生猶僇民昨夢來啞啞心肝何淸真翁自須髮白我如髫丱淳夢中既觴之而復留遮已挽須搔爬之磨墨揄揶之呼燈而燭之論文而譁已阿母在旁坐連連呼叔耶今朝無風雪我淚浩如雪莫怪淚如雪人生思幼日謂金壇段玉立字淸標為外王父段若膺先生之弟侵曉鄰僧來饋我佛前粥其香何淸嚴臘供今年足我因思杭州不僅有三竺東城八九寺寺寺皆修竹何年捨家去慧業改所託掘筍慈風園參茶東父屋鐘魚四圍靜掃地潔如沐白晝為之長倦骸為之肅供黃梅一枝朝朝寫圓覺慈公深於相宗錢居土東父則具教律禪淨四門乃吾師也丁亥元日書懷癸秋以前為一天癸秋以後為一天天亦無母之日月地亦無母之山川孰嬴孰絀孰付豫如奔如雷如流泉從慈若到歲七十是別慈親卅九年癸未失恃三十二歲日者謂豫當七十一歲退朝遇雪車中忽然有懷吟寄江左靑瑣門邊雪還疑海上看花花萬行樹鶴鶴一間官幽想忽飛去無由生彩翰江東謝道韞憶我早朝寒撰羽琌山館金石墨本記成辨端二十字坐耗蒼茫想全憑瑣屑謀羽琌山不見萬軸替人愁自寫寒月吟卷成續書其尾曩者各不死多生業未空天仍磨慧骨佛倘鑒深功意識千秋上光陰八苦中即將良友待落落亦高風婆羅門謠婆羅門來西胡勇不如宗喀巴智不如耶蘇繡衣花帽白若鵠鳬娶妻幸得陰山種玉顔大腳其仙乎女兒十五賣金線歸來洗手禮曼殊禮曼殊膜額角天見膜額角地見斷牛肉地不湧諂藥義天不降佞羅剎曼殊大慈悲大吉祥千年大富萬年樂同年生吳侍御傑疏請唐陸宣公從祀瞽宗得俞旨行侍御屬同朝為詩以張其事內閣中書龔自珍獻侑神之樂歌􅏘在聖淸君師天下提命有位暨於耄士以古為矩孰為臣鑒孰師表汝甄綜祭法於孔之廡唐步方中主瞶臣聾天將聰明之乃生陸公天厚有唐降三代英而左右德宗如仲山甫納言姬邦聖源既遠其流反反坐談性命其語􅚓􅚓􅚓􅚓齗齗其徒百千何施於家邦何禪於孔編小大稽首以攘犧牷御史臣傑職是標舉曰聖之的以有用為主炎炎陸公三代之才求政事在斯求言語在斯求文學之美豈不在斯我有耄士執籩受膰毋過貌儒之門我告耄士暨百有位木無二本川無二厡道無二岐請以一貫之名臣是師自春徂秋偶有所觸拉雜書之漫不詮次得十五首道力戰萬籟微芒課其功不能勝寸心安能勝蒼穹相彼鸞與鳳不栖枯枝松天神倘下來淸明可與通返聽如有聲消息鞭愈聾死我信道篤生我行神空障海使西流揮日還於東黔首本骨肉天地本比鄰一髮不可牽牽之動全身聖者胞與言夫豈夸大陳四海變秋氣一室難為春宗周若蠢蠢婺矛牙緯燒為塵所以慨慷士不得不悲辛看花憶黃河對月思西秦貴官勿三思以我為杞人名理孕異夢秀句鐫春心莊騷兩靈鬼盤踞肝腸深古來不可兼方寸我何任所以志為道淡宕生微吟一簫與一􅐟化作太古琴我有秦時鏡窈窕龍鸞痕我有漢宫玉觸手猶生溫我有墨九行驚鴻若可捫玉皇忽公道奇福三至門欲供三炷香先消萬古魂古春伴憂患詰屈生酸黁且摺三千本贈與人間存朝從屠沽遊夕拉騶卒飮此意不可道有若茹大鯁傳聞智勇人傷心自鞭影蹉跎復蹉跎黃金滿虛牝匣中龍劍光一鳴四壁靜夜夜輒一鳴負汝汝難忍出門何茫茫天心牗其逞既窺豫讓橋復瞰軹深井長跪奠一巵風雲撲人冷造化大癰痔斯言韓柳共我思文人言母乃太驚衆儒家守門戶家法毋徇縱事天如事親誰云小兒弄我身我不有周旋折旋奉不然命何物夏后氏特重亦有衛武公靡樂在矇誦智慧固不工趍避矧無用一日所履厯一夕自甄綜神明甘如飴何處容隱痛沈沈察其幾默默課於夢少年讕語多斯言粹無縫患難汝何物屹者為汝動我生愛前輩匪盡獲我心論交少年場歲月逝駸駸少年太飛揚由哀樂不深礌硠聽高談有諦難為尋風霜欺胞枝金石成苦音前輩即背謬厥謬亦沈沈弱齡羡高隱端居媚幽獨晨誦白駒詩相思在空谷稍長誦楚些招魂招且讀陳為樂之方巫陽語何縟嘉遁苦太淸行樂苦太濁願言移歌鐘來就伊人躅天涯富蘭蕙吾心富邱壑蹉跎復蹉跎芳流兩寂寞忽忽生遐心終朝閟金玉一代功令開一代人材起雖生雲礽朝實增祖宗美曰開國之留其言在靑史何代無先君何時無哲士煌煌祖宗心斯人獨稱旨天姿若麟鳳宏加以切劘稽古有遙源遵王無覂軌在昔與先民三稱口容止少壯心力殫匪但求榮仕有高千載心為本朝瑰瑋人或玷功令功令不任誹屋漏胎此心九廟赫在咫天步其艱哉光嶽鍾難恃肓氣六合來初日照濛汜抱此葵藿孤斯人拙無比一夫起鋤之萬夫孰指使一夫怒用目萬夫怒用耳目怒活猶可耳怒殺我矣去去亦何求買山請歸爾不先百年生難向蒼蒼理箸書落人間高名亦難毁其言明且淸胡由妬神鬼大藥可延年名山可送死死生竟何憾將毋九庿恥蘭臺序九流儒家但居一諸師自有真未肯附儒術後代儒益尊儒者顔益厚洋洋朝野間流亦不止九不知古九流存亡今孰多或言儒先亡此詰又如何夀短苦心長心緒每不竟豈徒庸庸流賫志有賢聖為鬼那能續它生渺茫更所以難放達思得賢子孫繼志與述事大哉孝之源長夜集百端蚤起無一言倘能心親心即是續親夀呼兒將告之衋然先自疚中年何寡歡心緒不縹渺人事日齷齪獨笑時頗少忽憶姚歸安錫我針銘早雅俗同一源盍向源頭討汝自界限之心光眼光小萬事之波瀾文章天然好不見六經語三代俗語多孔一以貫之不一待如何實悟實證後無道亦無魔曉枕心氣淸奇淚忽盈把少年愛惻悱芳意嫭幽雅黃塵澒洞中古袌不可寫萬言摧燒之奇氣又瘖啞心死竟何云結習幸漸寡憂患稍稍平此心即佛者獨有愛根在拔之謈難下夢中慈母來絮絮如何舍危哉昔幾敗萬仞墮無垠不知有憂患文字樊其身豈但戀文字嗜好雜甘辛出入仙俠間奇悍無等倫漸漸疑百家中無要道津縱使精氣留碌碌為星辰聞道幸不遲多難乃緣因空王開覺路網盡傷心民戒詩昔有詩庚辰詩語繁弟一欲言者古來難明言姑將譎言之未言聲又吞不求鬼神諒矧向生人道東雲露一鱗西雲露一爪與其見鱗爪何如鱗爪無况凡所云云又鱗爪之餘懺悔首文字潛心戰空虛今年真戒詩才盡何傷乎棗花寺海棠下感春而作詞流百輩花間盡此是宣南掌故花大隱金門不歸去又來蕭寺問年華西郊落花歌出豐宜門一里海棠大十圍者八九十本花時車馬太盛未嘗過也三月二十六日大風明日風少定則偕金禮部應城汪孝亷潭朱上舍祖轂家弟自穀出城飲而有此作西郊落花天下奇古來但賦傷春詩西郊車馬一朝盡定盦先生沽酒來賞之先生探春人不覺先生送春人又嗤呼朋亦得三四子出城失色神皆癡如錢唐潮夜澎湃如昆易戰晨披靡如八萬四千天女洗臉罷齊向此地傾胭脂奇龍怪鳳愛漂泊琴高之鯉何反欲上天為玉皇宫中空若洗三十六界無一靑蛾眉又如先生平生之憂患恍愡怪誕百出難窮期先生讀書盡三藏最喜維摩卷裏多淸詞又聞淨土落花深四寸冥目觀想尤神馳西方淨國未可到下筆綺語何灕灕安得樹有不盡之花更雨新好者三百六十日長是落花時述懷呈姚侍講元之有序憶在江左之歲喜從人借書人來借者尤盛鈕非石樹玉何夢華元錫助其搜討凡文淵閣未著録者及流傳本之據善本校者必輾轉録副歸辛巳之京師則有程大理同文秦編修恩復兩君皆與子約每得一異書互相借抄無虛旬無何大理使關東編修還揚州而余竟以母憂去先母憂半年吾家火至丙戌復之京師距煨燼已五年書頗少又客籍皆變易好事者希此事圓寂久矣丁亥春姚侍講忽來借乙部諸書以歲月之不居也與學殖之就荒落也感而作詩祭書歲歲溯從壬自壬午災後歲以酒醢祭亡書百種無復搜羅百氏心為道敢云能日損崇朝結習觸何深上方委宛空先讀阮公元撫日進七閣未録書百種睿庿時錫名委宛别藏副墨浙中有之同志徐王仗續尋星伯舍人北堂徴君搜羅精博日下無過之者定有雄文移七閣跋公好事冠儒林哭鄭八丈師愈秀水人醇古淡泊士滔滔辨有餘靑燈同一笑恍到我生初頑福曾無分淸才淸不臞四方帆馬興千幅鳳鸞書為有先生在東南意不孤論交三世久問字兩兒趨余兩幼兒曰橙曰陶丈為啓蒙設臯比焉天命雖秋肅其人春氣膄鄉音譁謇謇破帽惻吾吾儻䓪為文罷欹斜使酒餘心肝纖滓盡孝友闔門俱科第中年淡星壬暮癖殊卜云來日少笑指逝川徂老健偏奇絶神明少壯無刖離剛歲換問訊訝春疏訃至全家詫三思忽牖豫由來炊火絶窮死一黔婁天道古如此知之何晚歟不知段淸標丈與李復軒茂才今夕復何如歌筵有乞書扇者天教偽體領風花一代人材有歲差我論文章恕中晚略工感慨是名家夢中作不是斯文擲筆驕牽連姓氏本寥寥夕陽忽下中原去笑詠風花殿六朝偽鼎行皇帝七載靑龍麗於丁招搖西指爰有偽鼎爆裂而砰􅗟孺子啜泣相告隸妾駭驚龔子走視碎如琉璃一何脆且輕􅏠離疥癩百醜千怪如野干形厥怒虎虎不鳴如有聲然而無有頭目卓午不受日當夜不受月與星徒取雲雷傅汝敗漆朽壤將以盜羶腥內有叨餮之饞腹外假渾沌自晦逃天刑四凶居其二帝世何稱主人之仁不汝埋榛荆俾登華堂函牛羊垂四十載左揖棽鐘右與鑊并主人不厭斁汝汝宜自憎福極而碎碎如琉璃脆且輕東家有飮器昨墮地碎聲嚶嚶西家有屠狗盎今日亦墮地不可以盛千年決無土花蝕萬年弔古之淚無由生吁寶鼎而碎則可惜斯鼎而碎兮於何取榮名請􅓪龔子偽鼎行四言六章有序龔子掃徹悟禪師塔作也在西直門外紅螺寺悠悠生民孰不有覺孰知固然孰知生之靡樂其一孰為大人蟠物之先以闡以引引我生民其二吁嗟小子聞道不遲造作辨聰百車文詞電光暫來一貧無遺不可捉搦倐既逝而其三唏其逝矣不可恃矣恃先覺之言其言明明無言不售無謀不成無堅不摧以蘄西生其四先覺誰豫西山徹公我受之東父以來報功云何報功余左挈東父右隨慈公又挾江子四人心同以旅於西邦浙居士錢東父吳中居士江鐡君慈風和上與豫四人者皆奉徹公書篤信讃歎其五既至於西西人浩浩余慈母在焉迎豫而勞各知其夙而無憶悼遐哉邇哉孰肯不到亦惟徹公是報其六定盦文集古今體詩卷上終定盦餘集仁和龔自珍璱人饌古今體詩下卷破戒草之餘辛巳周信之明經中孚手拓吳興收藏家吳晉宋梁四朝甎文八十七種見貽賦小詩報之人間漢甎有五鳳廣陵尚書色為動阮公元十笏黃金網致回歐陽欲語瘖猶夢歐陽公嘗恨平生見東漢人字多見西漢字少西京氣體誰比鄰下有六代之芳塵我生所恨與歐異但恨金石南天貧嘗箸録吳東晉宋齊梁陳六代金石刻不過十種而北魏北齊北周乃十倍之非金非石非誄諡獸面魚形錯文字淸華想見館壇碑梁上淸真人許君館壇碑顧亭林猶見拓本今人間無片楮矣倔強偏殊國山制赤烏甎字勢絶不與國山碑同君言解饞良不惡通人識小聯為樂君著金石小品録翠墨淋漓繭紙香余亦裝潢媵瘞鶴凡箸録六朝石刻以瘞鶴銘為殿而甎文則又為附見矣就中吉語紛蟬嫣作詩謝君君囅然生兒且覔二千石亦甎文語出地何愁八百年舊蓄王大令保母甎拓本有後八百載君子知之語吳市得舊本制舉之文忽然有感書其端紅日柴門一丈開不須踰濟與踰淮家家飯熟書還熟羡殺承平好秀才耆舊辛勤伏案成當年江左重科名郎君座上談何易此事人間有正聲國家治定功成日文士關門養氣時乍洗蒼蒼莽莽態而無儚儚恛恛詞刻畫精工直萬錢靑燈幾輩細丹鉛南山竹美蘭膏賤纍我神遊百草年以康熙三十年鐫成丹鉛之徒亦必康熙前輩矣蕭縣顧椒坪工詩隱於逆旅恆自銼芻秣伺過客乞留詩欲陰以物色天下士亦留一截句詩人蕭縣顧十五馬後談詩世罕聞如此深心如此法奈何長作故將軍顧嘗仕小遊仙詞十五首厯劫丹砂道未成天風鸞鶴怨三生是誰指與遊仙路抄過蓬萊隔岸行九關虎豹不譏訶香案偏頭院落多賴是小時淸夢到紅牆西去即銀河玉女窗中梳洗成隔紗偷眼大分明侍兒不敢頻頻報露下瑤階溼姓名珠簾揭處佩環搖親荷天人語碧霄別有上淸諸女伴隔窗了了見文簫寒暄上界本來希不怨仙官識面遲僥幸梁淸一私語回頭還恐歲星疑雅謎飛來半夜風鼇山徒侣沸春空頑仙一覺渾瞞過不在魚龍曼羡中丹房不是漫相容百劫修成忍辱功幾輩凡胎無覔處仙姨初豢可憐蟲露重風多不敢停五銖衫子出雲屏朝真袖屨都依例弟一難箋瓔珞經不見蘭旌與桂旄九歌吹入鳳皇簫雲中㩣手誰相送依約湘君舊姓姚仙家雞犬近來肥不向淮王舊宅飛卻踞金狀作人語背人高坐著天衣諦觀真誥久徘徊仙楮同功一繭裁姊妹勸書塵世字莫瞋倉頡不仙才祕籍何人領九流一編鴻寶枕中抽神光照見黃金字笑到仙人太乙舟金屋能容十種仙春嬌簇簇互疑年我來敢恨初桄窄曾有人居大梵天吐火吞刀訣果真雲中不見幻師身上方倘有東黃祝先乞靈符刷雹神雹神姓李見神仙鑑衆女蛾眉自尹邢風寰露鬢覺伶俜捫心半夜淸無寐愧負銀河織女星野雲山人惠高句驪香其氣和淡詩酬之但來箕子國都識畫師名云是王宫物申之異域情和知邦政羡淡卜主心淸為報東華侣何人訟客卿是年東國上書辨官書中紀其世系有誤語特婉至壬午歌哭閲厯名場萬態更原非感慨為蒼生西鄰弔罷東鄰賀歌哭歬賢較有情送南歸者布衣三十上書回揮手東華事可哀且買靑山且鼾臥料無富貴逼人來薦主周編修貽徽屬題尊甫小像獻一詩科名幾輩到兒孫道學宗風畢竟尊我作新詩侑公笑祝公家法似穃門陳文恭公其鄉先輩也癸未午夢初覺悵然詩成不似懷人不似禪夢回淸淚一澘然瓶花帖妥爐香定覔我童心草六年三別好詩有序余於近賢文章有三別好焉雖明知非文章之極而自髫年好之至於冠益好之兹得春三十有一得秋三十有二自揆造述絶不出三君而心未能舍去以三者皆於慈母帳外燈前誦之吳詩出口授故尤纏綿於心吾方壯而獨遊每一吟此宛然幻小依膝下時吾知異者空山有過吾門而聞且高歌且悲啼雜然交作如高宫大角之聲音必是三物也各系以詩莫從文體問高庳生就燈前兒女詩一種春聲忘不得長安放學夜歸時右題吳駿公梅村集狼藉丹黃竊自哀高吟肺腑走風雷不容明月沈天去卻有江濤動地來右題方百川遺文忽作泠然水瑟鳴梅花四壁夢魂淸杭州幾席鄉前輩靈鬼靈山獨此聲右題宋左彝學古集漫感絶域從軍計惘然東南幽恨滿詞箋一簫一劍平生意負盡狂名十五年夜坐舂夜傷心坐畫屏不如放眼入靑冥一山突起邱陵妬萬籟無言帝坐靈塞上似騰奇女氣江東久霣少微星平生不蓄湘纍問喚出姮娥詩與聽沈沈心事北南東一睨人材海內空壯歲始參周史席髫年惜墮晉賢風功高拜將成仙外才盡回腸蕩氣中萬一禪關􅒂然破美人如玉劍如虹人草藳陶師師媧皇摶土戲為人或則頭帖帖或則頭頵頵丹黃粉墨之衣裳百千身因念造物者豈無屬稿辰兹大偽未具媧也知艱卒磅礴匠心半斕斑土花春劇場不見收我固憐其真諡曰人草藁禮之用上賓丙戌夢中述願作湖西一曲墜明璫獵獵紗裙荷葉香乞貌風鬟陪我坐他身來作水仙王第三句一作許借卿卿從祀我釋言四首之一東華環顧愧羣賢悔著新書近十年木有彣彰曾是病蟲多言語不能天略耽掌故非劻濟敢姼心期在簡編守默守雌容努力毋勞上相損宵眠同年生胡戶部培翬集同人祀漢鄭司農於寓齋禮既成繒為卷子同人為歌詩龔自珍作祀議一篇質戶部戶部屬檼括其指為韻語以諧之我稽十三經名目始南宋異哉北海君先期適兼綜詩箋附庸毛易爻辰無用尚書有今文隻義餽貧送四辨餽堯典三江餽禹貢魯論與孝經逸簡不可諷爾雅賸一鱗引家亦托弄排何發墨守此獄不可訟吾亦姑置之説長愳驚衆惟有孟七篇千秋等塵封我疑經籍志著録半虛哄義與歆莽違下筆費彌縫何况東漢年此書未珍重余生惡周禮考工特喜誦封建駁子輿心肝為隱痛五帝而六天誕妄讖所中同時有四君偉識引余共堂堂十七篇姬公發孔夢經文純金玉注義峙麟鳳吾曹持議平功罪勿枉縱鄭功此弟一千秋合崇奉鄭兼治十三經人間完本有詩三禮輯録本有針膏肓起廢疾發墨守易書魯論孝經爾雅注也孟子注見隨經籍志隨志殆未可信壯君綬甲宋君翔鳳劉君逢祿張君瓚昭言封建皆信孟子疑周禮海內四人而巳張説為尤悲也丁亥春日有褱山中桃花因有寄東風淋浪卷海來長安人道靑春回春回不到窮巷裏忽憶山中花定開山中花開白日皓皓明妝子誰溫黁淸妙夕爇熏盧搗蕙塵朝緘淸淚郵遠人粉光入墨墨光膩昨日正得江南鱗葆君靑雲心勿吟招隱吟花開歲歲勿相憶待君十載來重尋我有畣君詩殷勤兼報桃花知勿惜明鏡光為我分光照花枝勿惜頮面水為我浴花傾胭脂但惜芳香珍重之幽意勿使滿園胡蝶窺託君千萬詞詞意不可了長安桃李漸漸明何似春山此時好春縱好山寂寂淸琴玉壺罷消息蠟燭彈棊續何夕安能坐此愁易春不如歸侍妝臺側菩薩墳有序菩薩墳者亦曰公主墳遼聖宗第十女墓也小字菩薩未嫁而死遼史無傳北方海棠少此地始生之自是海棠之盛逾於江國土人因以海棠諡主云墳在西山無相寺菩薩葬龍沙魂歸玉帝家餘春照天地私諡亦高華大腳鸞文靿明妝豹尾車南朝人未識拜殺斷腸花太常仙蝶歌有序太常仙蝶士大夫知之稔矣曷為而歌之蝶數數飛入姚公家吾歌為姚公也姚公者太常少卿仁和姚公祖同也公為大吏厯五省易事難説見排擠不安其位公嶽立不改雖投間人忌之者尚衆異哉蝶能識當代正人不惟故實之流傳而巳吾歌以紀之且招蝶也恭聞故實太常寺蝶夀三百猶有加􅔷玉皇之明詔視臺閣猶煙霞不聞願見不許見矧聞飛入太常家本朝太常五百輩意者公其飛仙之身耶仙人正人事一貫天上豈有仙姦邪所以公立朝人不識仙靈識公非誣夸慰此蹇蹇其來衙衙感德輝而下上助靈思之紛拿我聞此事就公求茶道𦦨十丈不敵童心一車鸞漂鳳泊咄咄發空喟雲情煙想寸寸凌幽遐人生吉祥縹渺罕並有何必中秋兒女覩璧月之流華玉皇使者識我否寓園亦在城之涯幽夏靈氣怒百倍相思遲汝五出紅梨花豫寓齋紅梨一樹京師無其雙也世上光陰好世上光陰好無如繡閣中靜原生智慧愁亦破鴻濛萬緒含淳待三生設想工高情塵不滓小別淚能紅玉茁心苗嫩珠穿耳性聰芳香箋藝譜曲盝數窗櫳遠樹當山看雲行入抱空枕停如願月扇避不情風晝漏長千刻宵缸夢幾通德容師窈窕字體記玲瓏朱戶春暉別蓬門淑晷同百年辛苦始何用嫁英雄投錢學士林晚達高名大隱身對門蹤迹各淸真恍逢月下騎鸞客何處容他啖肉人顧丈千里得唐睿宗書順陵碑遠自吳中見寄余本以南北朝磨崖各一種懸齋中得此而三書於幀尾南書無過瘞鶴銘北書無過文殊經忽然二物相顧啞排闥一丈蛟龍靑文殊經在山東水牛山唐二十帝帝書聖合南北手為唐型會見三物皆卻走召伯虎敦赫在庭召伯虎敦百有三名余所獲器也四月初一日投蝶更名易簡匪慕宋朝蘇易簡翻似漢朝劉更生從此請歌行路易萬緣簡盡罷心兵常州高材篇送丁若士履恆丁君行矣龔子忽有感聽我擲筆歌常州天下名士有部落東南無與常匹儔我生乾隆五十七晚矣不及瞻前修外公門下賓客盛謂金壇段先生始見臧在東顧子述來裒裒奇才我識惲伯子絶學我識孫李逑最後乃識掌故趙味辛獻以十詩趙畢酬三君折節遇我厚我益喜逐常人遊乾嘉輩行能悉數數其派別徵其尤易家人人本虞氏毖緯户户知何休聲音文字各窔奧大抵鐘鼎工冥搜學徒不屑談賈孔文體不甚宗韓歐人人妙擅小樂府爾雅哀怨聲能遒近今祘學乃大盛泰西客到攻如讐常人倘欲問常故異時就我來咨諏勿數耈耋數平輩蔓及洪孟慈管孝逸莊卿山張翰風周伯恬其鼎鼎八九子奇人一董方立先即邱所恨餘不識李夫子申耆南望夜夜穿雙䏬曾因陸子祁生屢通訊神交何異雙綢繆識丁君乃二十載下上角逐忘春秋丁君行矣龔子忽有感一官投老誰能留珠聯璧合有時有一散人海如鳬鷗噫才人學人一散人海如鳬鷗明日獨訪城中劉申受丈秋夜花遊海棠與江蘺同豔異今古我折江蘺花間以海棠嫵狂呼紅燭來照見花雙開恨不稱花意踟蹰淸酒杯酒杯淸復深秋士多春心且遣秋花妬毋令秋魄沈云何學年少四座花齊笑躑躅取鳴琴彈琴置當抱靈雨忽滂沱仙真窗外過雲中君至否不敢問星蛾猛憶狂臚文獻耗中年亦是今生後起緣猛憶兒時心力異一燈紅接混茫前銘座詩精微愡恍少所樂兮躬行且踐壯所學兮曰以事天敢不諾兮事無其耦生靡樂兮人無其朋孤往何索兮借瑣耗奇嗜好託兮浮湛不返徇流俗兮吁瑣以耗奇兮不如躬行以耗奇之約兮回念故我在寥廓兮我詩座右榮我獨兮東陵紀役三首天俔徽音在龍飛故劍亡兩宫儀斐斖七萃淚淋浪鬱律川原勢低佪葆吹長東行三百里何處白雲鄉帝子華年小初弦寶月沈端嫻三肅禮憫動六宫深徒殯飛秋雪迎神下彩禽松楸依在咫慈孝萬年心閣事疏朝請君恩許看山口銜星宿去袖佛鳳皇還望眼將連海詩聲欲過關雲旗風馬隊旬日夢魂間李中丞宗瀚家獲觀古拓隨丁道護書啓法師碑狂書一詩羽琌山館三百墨妬君一紙葵花色何不贈歸羽琌山置已漢玉秦金側九月二十七夜夢中作官梅只作野梅看似是宋句月地雲階一倍寒翻是桃花心不死春山佳處淚闌干夢中作四截句十月十三夜也拋卻湖山一􅐟秋人間無地署無愁忽聞海水茫茫緑自拜南東小子侯黃金華髮兩飄蕭六九童心尚未消叱起海紅簾底月四廂花影怒於潮恩仇恩仇日苦短魯戈如麻天不管賓客漂流半死生此公又築忘憂館一例春潮汙漫聲月明報有大珠生紫皇難慰花遲暮交與鴛鴦訴不平定􅴧餘集古今體詩卷下終定盦別集仁和龔自珍璱人饌無著詞選菩薩鬘文廊匼匝屏風曲輕寒惻惻侵簾箔秋思正沈吟秋陰幾許深無言垂翠袖粉蝶窺人􅍸蝶也不禁秋涼花相對愁夢芙蓉本意背鐙歌鳳枕見一珠秋弄水裙鳳鬢露華無力飛下珊珊影又微芒不定月墜金波孤迥小立空塘怨紅衣半卸消受夜涼緊脈脈鴛鴦瞑正穩乍蓮房粉墜驚初醒香重煙輕愁絶共幽映五更魂魄冷吟斷錦雲休訊捐佩疑寒更凌波恐溼塘外曉風陳卜算子題獨立士女拜起月初三月比眉貌􅛀不遣紅鐙照畫廊縹眇臨風袖庭院似淸湘人是湘靈否誰寫長天秋思圖尉得闌干透點絳脣日落花悄懨懨春倦何時省紗窗又瞑黃月濛濛影沒箇商量除是知愁等羅衣冷香階紅陳燕子歸期定虞美人紗窗瞑色低迷緑猶未傳銀燭春寒瑟瑟晚來添玉釧微聞應是換吳棉金爐香篆愔愔墮新月窺人坐湘簾放下悄含顰生怕梨花和月射啼痕洞仙歌一梳春月淡溶溶欲上鸞尾雲晴碧天掃正文窗四扇縹眇華空晶豔豔玉女明燈一笑幾番擕手處曇誓天邊寒緑深深帳紗悄親手采瓊芝著玉盤中添香水養花還小見説道仙家夢都無便夢也如煙曉涼欺覺醉太平長吟短吟恩深怨深天邊一曲瑤琴是鸞心鳳心香沈漏沈魂尋夢尋玉階良夜愔愔有花陰月陰淸平樂垂楊近遠玉鞚行來緩三里春風韋曲岸目斷那人庭院駐鞭獨自思惟撩人厯亂花飛日暮春心怊悵可能紉佩同歸太常行一身雲影墮人間休認彩鸞看花葉寄應難又何况春痕袖斑似他身世似他心性無恨到眉彎月子下屏山算窺見瑤池夢還端正好數年華間中黯黯記不起誰恩誰怨金爐香裊畫沈沈并疊作間愁片月明花滿天如願也終有酒闌燈散不如被冷更香銷獨自去思千遍霓裳中序第一霓裳羽衣之曲今不傳戲補之當筵問古月誰向其間起宫闕風馬雲車厯厯見桂葆乍迎嬌如雪遙空聞説説衣來天袂涼絶驚鴻起素衣二八舞罷老蟾泣飄忽長風吹急竟天上人間了隔仙聲一半記得漢武秦皇有路難覓開元慶佳節算合樂圖中應識宋苑本有楊太真合樂圖尊前祝千秋萬歲不須有離別長相思仙參差佩參差數罷鸞期又鳳期彩雲西北飛簫一枝笛一枝吹得春空月墮時月中人未歸又住西樓諙西樓好夢如雲不自由喚人餳倦眸憶從頭訴從頭銀漢茫茫入夜流人間無盡愁天仙子自賦所藏葉小鸞眉紋詩硯天仙偶厭住瓊樓乞得人間一度遊被誰傳下小銀鉤煙淡淡月柔柔伴我熏香伴我修瑤華董雙成畫像雲英嫁了弄玉歸來向翠樓瓊戶虛無萬疊試問取金闕西廂何處容華絶代是王母前頭人數看紫衣仙佩非耶漢殿夜涼歸去低鬟小按霓裳唱月底仙聲記否親遇霞宫侍宴渾忘了聽水聽風前度天靑海碧也只合其中小住笑人間兒女聰明倒寫成雙名字浪淘沙寫夢好夢最難留吹過仙洲尋思依樣到心頭去也無蹤尋也慣一桁紅樓中有話綢繆燈火簾鉤是仙是幻是溫柔獨自淒涼還自遣自製離愁如夢令本是花宫么鳳降作人間情種不願住人間分付藥爐煙送誰共誰共三十六天秋夢高陽臺嚼曲含香吹笙聘月華年心緒愔愔十二重簾重重閣住春陰花魂蝶夢飛難度倩何人料理幽襟問春人知否園亭啼遍流鶯生愁一點朝雲散把靑梅細數紅豆間吟尚怯餘寒爭教負了香衾癡鬟不放熏篝穩墜猩紅半幅吳綾啓湘屏多病心情忘繫花鈴喝火令欲賦仙模樣空愁彩筆雕藕絲衫子鬱金翹立到水芝花上羅鞿未香消端正當窗戶停勻嚲步搖斷無幽意上眉梢只恐凝妝只恐背人嬌只恐夢回香淚揩上枕頭綃木蘭花慢問人天何事最飄渺最銷沈算第一難言斷無人覺且自幽尋香蘭一枝恁􅍸問香蘭何苦伴淸吟消受工愁滋味天長地久愔愔蘭襟一丸涼月墮似他心有夢訴依依香傳裊裊眉鎖深深故人碧空有約待歸來天上理天琴豫夢中受詞一卷讀之一人告豫曰此天琴譜也無奈遊仙覺後碧雲垂到而今菩薩鬘行雲欲度簾旌去啼花恨草無重數吟淡口脂痕秋心自覺溫秋懷珠與玉寫上羅箋薄暮暮與朝朝工愁要福銷惜分叉金鋪曉褰幃早嫩寒漠漠欺人覺霑沈香額微黃報道寒梅也學晨妝雙雙明窗掩重簾軟爐香自炙紅絲硯點銀鉤記淸愁待把琴心寄與西洲休休如夢令紫黯紅愁無緒日暮春歸甚處春更不回頭撇下一天濃絮春住春住了人家庭宇金明池按拍填詞拈簫譜字白日銷磨無緒春夢斷拈天香草試悵望美人何處中餘酲才要醒時卻又被豔想迷漫遮住早燕子匆忙楊花零亂好煞年光將去料理相逢今又誤問除卻相思怎生言語箋間恨絲煩絮亂製密意緑愁紅妒甚天工作就慵時有萬種忪惺十分凝佇便拌不懷人從今決絶如此情悰消否一翦梅一丸微月破黃昏卷定簾痕劃定爐痕春歸誰與試溫存春􅍸三分人􅛀三分柳花桃葉鎮紛粉掩了重門閣了芳樽安排怊惆倚羅屏紅字消魂香字招魂靑玉案韶光不怨匆匆去祗怊悵年華誤目斷遊絲情一縷斷橋流水夕陽飛絮可是春歸路樓頭盡日還凝佇欲訴間愁向誰訴蕙渚花飛天又暮醒時如醉醉時如夢夢也何曾作鶯啼序用宋人韻殘香牛銷金獸啓朱簾瑣戶悄凝盼十里蘅臯多少心期傷暮夢回後半霎憑闌春煙閣斷天涯樹仗鶯魂有力喚起一天濃絮昨日間愁今朝暗恨似濛雲惹霧拈彩筆親製紅詞有人憐賞心素正沈沈春深似海低佪煞年華金縷作人間病鳳啼鸞原輸鷗鷺胭脂含怨錦琴生愁悵春似逆旅枉二十四番寒暖次第催完變了漫空撲人花雨叉寒佩􅍸紅欹絳病惺惺胡蝶誰家宿况連天香草崇蘭渡豫懷渺渺靈修尚隔中央只恐棄我如土凌波襪懶繡線裙鬆換吳棉白苧為一種心情無奈斷送韶顔憔悴而今勸君休舞渾都不管愁儂怨汝靈犀不管一寸分明見更何須弄入瑤琴柱紗窗日落無人獨倚黃昏有誰省否菩薩鬘吳棉一幅單鴛被沈沈和霧和香睡花氣溼銀屏紅窗斜月明玉闌干畔路曉夢無尋處夢醒轉沈吟花寒恐不禁臨江仙一角紅窗低嵌月矮屏山蹙羅紋梨花情性怕黃昏淚憐銀蠟淺心比玉爐溫底事雛鬘憨不醒冬冬虯箭宵分起來親手放簾痕春空涼似水西北有嬌雲又酒渴思茶交午夜沈煙間撥叉梁小梅花盒教添香填詞渾已懶何况脫衣裳才把夢兒牢捉住無端又著思量十分情願是回腸欲拋拋不得欹枕數鴛鴦浣溪沙香霧無情作薄寒銀鐙吹處氣如蘭憑肩人愛夜闌珊花語緑窗涼月聽雲欹文枕畫鸞看釧聲微戞夢兒難又鳳脛鐙靑香篆寒尋思脈脈未成眠欹鬟沈生澑犀鈿一幀梅花紅似酒半庭春月暖於煙紅闌干外夜闌珊夢行雲曉幃怯春冷重簾下眠未醒休翻翠被恐教人驚省一枝豔豔文窗外梨花涼弄影唾華襟上啼紅枕上悲歡事留淺印嬌柔無語倩人探心性十分打疊情懷起怕花愁月病洞仙歌輕寒漠漠又杏花天氣卸了吳棉薄紈膩把花魂細綰月夢低敲間譜得十疊新詞堪記番番圓豔約春事迷人絮影風光太消碎小病不勝春嫩想穠愁拚略受情多風味又銀燭傳來勸箋愁看比玉能紅比簫能導引曲無情緒無情緒寂莫掩重門銀蠟心多才有淚寶香字斷更無痕梨花浸黃昏又空相憶空相憶庭院四更天怊悵緑梅花下路半襟斜月不知寒鳳屧過闌千玉聯環影朧月魂傍花陰立紅淚留痕一片花枝溼袖兒寒佩兒寒依舊五更風急夢吹殘南歌子香霧漫空溼珠簾窣地橫雲圍月擁見卿卿受盡輕憐痛惜不分明紅淚彈前恨心香警舊盟瑤華密帳絮三生怊悵五更風急斷魂驚桂殿秋六月九日夜夢至一區雲廊木秀水殿荷香風煙鬱深金碧差麗時也方夜月光吞吐在目步外蕩瀣氣之空濛都為一碧散淸景而離合不如幾重一人告豫此光明殿也醒而憶之為賦兩解明月外淨紅塵蓬萊幽窅四無鄰九霄一派銀河水流過紅牆不見人驚覺後月華濃天風已度五更鐘此生欲問光明殿知隔朱扃幾萬重憶瑤姬唳鶴吟鸞悄千門萬戶夜靜塵寰玉京宮殿杳悵九霄仙佩不下雲軿今生小謫知自何年消盡瓊煉顔料素娥今夕無人問裙袂生寒定萬古長對晶盤斂莊嚴寶相獨坐嬋媛幽褱知有恨恨玉笙吹徹徹骨難眠雙成問訊靑女憑肩瑤華筵宴罷長風起吹墮離愁到世間夢玉人引一簫吹瓊闌月暖錦雲飛十丈銀河挽來注向靈扉月殿霞窗動春空仙籟參差報道雙成乍褰了羅幃陡然聞得靑鳳下西池奏記簾前佩環聽處依稀不是人間話何緣世上知夢回處摘春星滿把纍纍意難忘涼月珊珊伴蘭心玉性試語還難秋花分小影秀句寫冰紈眉意淺佩聲殘有珍重千般略逗伊隱花裙上竹葉斑斑知音何苦輕瞞者溫存隱秀慧思華年明明通爾汝瑟瑟數悲歡攜手際試顰間是意暖神寒玉漏沈芙蓉睡也重靠闌干醜奴兒令鸞箋偷寫伊名字琴語依稀箏語依稀花影無媒忽進幃蘭因絮果從頭問吟也淒迷搯也淒迷夢向樓心鐙火歸鳳棲梧誰邊庭院誰邊宅往事誰邊空際層層疊坐暖一方屏底月背人蠟影幢幢滅萬種溫黁何用覓枕上逃禪遣卻心頭憶禪戰愁心無氣力自家料理回腸直右無著詞一卷始名紅禪詞凡九十二闋壬午春選録四十五首癸未夏付刋定盦別集懷人館詞選臺城路送姚怡雲之江南平生未信江南好輸君者番歸去明月揚州古來英麗端合仙才人住俊遊自許有載酒詞場吹簫仙侣豔想穠愁一齊翻入四紅譜西風吟緒正苦又牽情冶柳離恨千縷􅛀硯𫾣霜古箋啼月真箇銷凝無主相思怨汝教獨自憑樓冷吟誰語一掬夫容送君斷腸句鵲橋仙同袁蘭村汪宜伯小憩僧寺宜伯製金縷曲見示有望南天倚門人老敢云披剃之句余驚其心之多感而又喜其詞之正也倚此慰之飄零也定淸狂也定莫是前生計左才人老去例逃禪問割到慈恩真箇吟詩也要從軍也要何處宗風香火少年三五等間看算誰更驚心似我浪淘沙有寄別夢醒天涯怊悵年華懷人無奈碧雲遮我自低迷思錦瑟誰怨琵琶小字記休差年紀些些蘇州花月是兒家紫杜紅闌間搯遍何處蘋花水調歌頭寄徐二義尊大梁去日一以駛來日故應難故人天末不見使我思華年結客五陵英少脫手黃金一笑霹靂應弓弦意氣渺非昔行役亦云艱湖海事感塵夢變朱顔空留一劍知已夜夜鐵花寒更説風流小宋淒絶白楊荒草誰哭墓門田遊侣半生死想見涕潺湲謂嚴江宋先生又辛未六月二日風雨竟晝檢視敗簏中嚴江宋先生遺墨滿眼淒然賦此解風西颯然至竟日作淸寒我思芳草不見忽忽感華年憶昔追隨日久鎮把心魂相守燈火四更天高唱夜烏起當作古人看一枝榻一爐茗宛當前幾聲草草休送萬古遂茫然仙字蟫飢不食故𥿄蠅鑽不出陳迹太辛酸一掬大招淚灑向暮雲間點絳脣十月二日馬上作一帽紅塵行來韋杜人家北滿城風色漠漠樓臺隔目送飛鴻影入長天滅關山絶亂雲千疊江北江南雪瑤臺第一層某侍衛出所撰王孫傳見示愛其頗有漢晉人小説風味屬豫為之引因填一詞括之戲侑稗家之言無分同生偏共死天長恨較長風災不到月明難曉曇誓天旁偶然淪謫處感俊語小玉聰狂人間世便居然願作長命鴛鴦幽香蘭言半枕歡期抵過八千場今生卩矣玉叉鬟卸翠釧几涼賴紅巾入夢夢裏説別有仙鄉渺何方向瓊樓翠宇萬古攜將某侍衛原序某王孫者家城中珠規玉矩不苟言笑某氏亦貴家也解詞翰以中表相見相慕重杏兒者婢也語其主曰王孫所謂都爾敦風古阿思哈發都都爾敦風古言骨格異也阿思哈發都言聰明絶持也再三云女不應王孫遘家難女家薄之求昏拒不與兩家兒女皆病一夜天大雪杏私召王孫王孫衣雪鼠裘至杏曰寒矣為脫裘徑擁之女帳中而出女方寢篤寤申禮防不從王孫曰來省病耳亦以禮自固也杏但聞絮絮達旦聲旦杏送之出王孫以潁綃巾納女枕中女不知也是不復能相見旬餘夢見女執巾問曰此君物也曰然寤而女訃至知杳見取巾以佐殮矣王孫尋􅓹鬱以卒杏自縊此嘉慶丙寅丁卯間事越辛未豫序之如此又乞浙龔君填詞以傳之行香子道中書懷與汪宜伯跨上征鞅紅豆拋殘有何人來問春寒昨宵夢裏猶在長安在鳳城西垂楊畔落花間紅樓隔霧珠簾卷月負歡場詞筆闌珊別來幾日且勸加餐恐萬言書千金劍一身難初相見蒙填詞見怡有萬言奏賦千金結客二語附送龔璱人出都調水龍吟汪琨宜伯長安舊雨都非新歡奈又搖鞭去城隅一角明箋一束幾番小聚説劍情豪評花思倦前塵夢絮縱間愁鬥蟻羈魂幻蝶尋不到江南路從此齋鐘衙鼓料難忘分襟情緒瓜期漸近萍蹤漸遠合并何處易水盟蘭豐臺贈芍離懷觸忤任紅蕉題就翠筠書遍餞詞人句醉太平道中作鞍停轡停雲行樹行東風昨夜吹魂過靑山萬痕春濃夢沈愁多酒醒一天飛絮愔愔攪離懷碎生唐多令道中書懷二十五長亭垂楊照眼靑付春風短夢零星斜倚雕鞍無氣力渾不似俊遊人春意太憨生春愁喚不醒負華年誰更憐卿惟有填詞情思好無恙也此花身浪淘沙舟中夜起幽夢四更醒欵乃聲停吳天月落半江陰暮地橫吹三孔笛聘取湘靈螺髻鎖娉婷煙霧靑靑看他潮長又潮平香草美人吟未了防有蛟聽菩薩鬟效蕃錦集嬌鬟堆枕叉橫鳳馮延已靑春酒壓楊花夢戎昱翠被夜徒熏庾丹嬌郎癡若雲李商隱波痕空映襪李商隱豔淨如籠月元稹明月上春期無名氏輕紅擘荔支杜甫蝶戀花酒壓春愁春捲絮燕子歸來苦説年華誤半晌懷人搔首佇落梅風急間庭暮辛苦癡懷何用訴曲曲香痕曲到無憑據安頓惜花心事處謝他昨夜風和雨水龍吟題家繡山停琴聽簫圖紅樓一角沈沈那廂鐙火秋娘院露寒花重愁多指澀酒醒人遠驀聽離鸞旋來泣鳳纍人猜遍有相思兩字呼之欲出秋意裂冰紋斷兩下衷情低按者沈吟償他淒怨分明不是山重水疊幾痕紗幔六曲春星二分明月可憐齊轉把芳心整起兜衾傍枕倘能尋見高陽臺南國傷讒西洲怨別淚痕淹透重衾一笛飛來關山何處秋聲秋花繞帳瞢騰臥醒來時芳訴微聞費猜尋乍道蘭奴氣息氛氲多愁公子新來􅛀也何曾狂醉絶不間吟璧月三圓江南消息沈沈魂消心死都無法有何人來慰登臨勸西風將就些些莫便秋深鵲踏枝過人家廢園作漠漠春蕪蕪不住藤刺牽衣礙卻行人路偏是無情偏解舞濛濛撲面皆飛絮繡院深沈誰是一朵孤花牆角明如許莫怨無人來折取花開不合陽春暮鵲橋仙種紅梅一株於竹下賦此文窗一碧蕭蕭相倚靜裊茶煙一炷籜龍昨夜叫秋空似怨道天寒如許安排疏密商量肥􅛀自斸苔痕辛苦從今翠袖不孤淸特著箇紅妝伴汝金縷曲沈虹橋廣文小像題詞老矣東陽沈算平生徵歌説劒十分疏俊太華秋高攀雲上百首淋浪詩興有多少唐愁漢恨忽地須彌藏芥裏取一痕􅍸石摩挲認顚豈敢癖差近沈遊陜詩極工性好石硯圖巾列大硯九小硯十有三深衣兀坐非復躍馬華山時豪態矣伊余頑質君休問小年來光芒萬丈被他磨盡魂煞平原佳公子駿馬名姝投贈只東抹西塗還肯兩載雲萍交誼在更十行斜墨匆匆印他日展寄芳訊摸魚兒乙亥六月留別新安作者𬈑濛江雲嶽雨是誰招我來住空桑三宿猶生戀何况三年吟緒來又去可題遍蓮花六六峯頭路幽懷更苦問官閣梅花誰家公子來詠斷魂句郡齋悔花三十樹皆余手植眠餐好多謝瀕行囑咐吾家有妹工賦相思咫尺江關耳切莫悲歡自訴君信否只我已年來習氣消花絮詞章不作去倘絶業成時年華尚早聽我壯哉語豫有妹嫁新安賣花聲舟過白門有紀帆飽秣陵煙回首依然紅牆西去小長干好箇當爐人十五春滿爐邊如此六朝山消此鴉鬟雨花雲葉太闌珊百里江聲流夢去重到何年百字令蘇州晤歸夫人佩璚索題其集揚帆十日正天風吹緑江南萬樹遙望靈巖山下氣識有仙才人住一代詞淸十年心折閨閣無前古蘭霏玉映風神消我塵土人生才命相妨男兒女士厯厯俱堪數眼底雲萍才合處又道傷心羈旅夫人年客蘇州頗抱身世之感南國評花西洲弔舊東海趨庭去豫小子住段氏枝園將之海上省侍故及之紅妝白也逢人誇説親覩夫人適李有女靑蓮之目附答龔璱人公子即和原韻歸懋儀佩璚萍蹤巧合感知音得見風前瓊樹為語靑靑江上柳好把蘭橈留住奇氣拏雲淸談滚雪懷抱空今古緣深文字靑霞不隔泥土更羡國士無雙名姝絶世謂吉雲夫人仙侣劉樊數一面三生真有幸不枉頻年羇旅繡幕論心玉臺問字料理吾鄉去海東雲起十光五色爭覩時尊甫備兵海上公子以省覲過吳中摸魚兒鈕布衣話東西兩湖洞庭之勝並出示山中探梅卷于因題數東南千巖萬壑君家第一奇秀雪消縹眇峯巒下間鎖春寒十畝春乍漏有樵笛來時報道燕子透花肥雪痰向寂寂靑空潺潺古碧鐵幹夜龍吼幽人喜扶杖欣然而走酒神今日完否山妻妝罷渾無事供佛瓶中空久枝在手好贈蘆簾紙閣歸來守寒圖寫就看畫稿奴偷詞腔婢倚淸夢不僝僽減蘭偶檢叢紙中得花瓣一包紙背細書辛幼安更能消幾番風雨一闋乃是京師憫忠寺海棠花戊辰暮春所戲為也泫然得句人天無據被儂留得香魂住如夢如煙枝上花開又十年十年千里風痕雨點斕斑裏莫怪憐他身世依然是落花長相思海棠絲楊柳絲小别風絲雨也絲春愁亂幾絲早寒時暮寒時江上春潮平岸時謝庭書到時滿江紅代家大人題蘇刑部塞山奉使卷子草白雲黃壁立起塞山靑陡誰貌取書生骨相健兒身手地拱龍興犄角壯時淸鷺斥消烽久仗征人笛裏叫春回歌楊柳飛鴻去泥蹤舊奇文在佳兒守問摩挲三五龍泉存否我亦高秋三扈蹕穹廬落日鞭絲驟對西風挂起北征圖沾雙袖蘇已逝世七年哲嗣索題臺城路女郎有字翠生者酒座中有推抑不得志之色賦此寵之城西一角臨官柳陰陰畫樓低護冶葉倡條年年慣見露裏風中無數誰家怨女有一種工愁天然眉嫵紅燭歡場惺忪斂袖鎮無語相逢縱教遲暮者春潮別館牢記迎汝我亦頻年彈琴説劒憔悴江東風雨煩卿低訴怕女伴回眸曉人心緒歸去啼痕夜鐙瞧見否百字令投袁大琴南深情似海問相逢初度是何年紀依約而今還記取不是前生夙世放學花前題詩石上春水園亭裏逢君一笑人間無此歡喜乃十二歲時情事無奈蒼狗看雲紅羊數劫惘惘休提起客氣漸多真氣少汨投心靈何已千古聲名百年擔負事事違初意心頭閣住兒時那種情味金縷曲贈李生海上雲萍遇笑頻年開樽説劒登樓選賦十萬狂花如夢寐夢裏花還如霧問醒眼看時何許儂巳獨醒醒不慣悔黃金何不教歌舞明月外思淸苦奇才未必天俱妬只君家通眉長爪偶然仙去花月湖山驕冶甚一種三生誰付只片語告君休怒收拾狂名須趁早鬢星星漸近中年路容傍我佛鐙住虞美人陸丈秀農杜絶人事移居城東之一粟庵暇日以緑綃梅花帳額索書因題詞其上江湖聽雨歸來客手翦吳淞碧笛聲叫起倦魂時飛過濛濛香雪一千枝少年多少熏蘭麝金鳳叉梁挂年來我但寫蓮經要伴荒庵一粟夜鐙靑湘月壬申夏泛舟西湖述懷有賦時豫別杭州蓋十年矣天風吹我墮湖山一角果然淸麗曾是東華生小客回首蒼茫無際屠狗功名雕龍文卷豈是平生意鄉親蘇小定應笑我非計才見一抹斜陽半隄香草頓惹淸愁起羅襪音塵何處覓渺渺豫懷孤寄怨去吹簫狂來説劒兩樣消魂味兩般春夢櫓聲蕩入雲水是詞出歙洪子駿題詞序曰龔子璱人近詞有曰怨去吹簫狂來説劒二語是難兼得未曾有也爰填金縷曲贈之其佳句云結客從軍雙絶技不在古人之下更生小會騎飛馬如此燕邯輕俠子豈吳頭楚尾行吟者其下半闋佳句云一棹蘭舟迥細雨中有詞腔姚冶忽頓挫淋漓如話俠骨幽情簫與劒問簫心劒態誰能畫且付與山靈詫餘不録越十年吳山人文徵為作簫心劒態圖牽連記金縷曲癸酉秋出都述懷有賦我又南行矣笑今年鸞飄鳳泊情懷何似縱使文章驚海內紙上蒼生而巳似春水干卿何事暮雨忽來鴻雁杳莽關山一派秋聲裏催客去去如水華年心緒從頭理也何聊看潮走馬廣陵吳市願得黃金三百萬交盡美人名士更結盡燕邯俠子來歲長安春事早勸杏花斷莫相思死木葉怨罷論起店壁上有一騎南飛四字為滿江紅起句成如干首名之曰木葉詞一時和者甚衆故及之湘月甲戌春泛舟西湖賦此湖雲如夢記前年此地垂楊繫馬一抹春山螺子黛對我輕顰姚冶蘇小魂香錢王氣短俊筆連朝寫鄉邦如此幾人名姓傳者平生沈俊如儂前賢倘作有臂和誰把問取靈山渾不語且自徘徊其下幽草黏天緑陰送客冉冉將初夏流光容易暫時著意瀟灑右懷人館詞一卷原集凡九十闋辛巳春日選録三十二首癸未六月付刋定盦別集影事詞選暗香姑蘇小泊作也紅燭尋春烏篷夢雨一時情事是相見之始矣一帆冷雨有吳宫秋柳留客小住笛裏逢人仙樣風神畫中語我是瑤華公子從未識露花風絮但深情一往如潮愁絶不能賦花霧障眉嫵更明燭畫橋催打官鼓瑣窗朱戶一夜烏篷夢飛去何日量珠願了月底共商量簫譜持半臂親也來忍寒對汝摸魚兒二月八日重見於紅茶花下擬之明月入手彩雲滿懷笑銀缸一花宵綻當筵即事如許我儂生小幽并住悔不十年吳語憑聽取未要量珠雙角山頭路生來篷戶只阿母憨憐年華嬌長寒暖仗郎護筝和笛十載教他原誤人生百事辛苦五侯門第非儂宅賸可五湖同去卿信否便千萬商量千萬依分付花間好住倘燕燕歸來紅簾雙捲認我寫詩處浪淘沙書願雲外起朱樓縹眇淸幽笛聲叫破五湖秋整我圖書三萬軸同上蘭舟鏡檻與香篝雅憺溫柔替儂好好上簾鉤湖水湖風涼不管看汝梳頭洞仙歌雲纈鸞巢録別高樓燈火巳四更天氣吳語喁喁也嫌碎者新居頗好舊恨堪銷壺漏盡儂待整帆行矣從今梳洗罷收拾箏簫勻出工夫學書字鴆鳥倘欺鸞第一難防須囑咐鶯媒回避只此際蕭郎放心行向水驛尋燈山程倚轡淸平樂人天辛苦恩怨誰為主幾點枇杷花下雨葬送一春心緒夢中月射啼痕卷中鐙灺詩痕一樣嫦娥瞧見問他誰冷誰溫影事詞出有屬和者齊天樂下半關云人天何限影事待邀他天女同懺同證狂便談禪悲還説夢不是等間淒恨鐘聲梵韻便俢到生天也須重聽底怨西窗佛鐙探夜冷前半不録又萬千名士慰我傷讒意憐我平生無好計劒俠千年巳矣西溪西去煙霞茆庵小有梅花繡佛長齋早早懺渠燕子無家右影事詞一卷原集十九首辛巳春選録六首癸未六月付刋定盦別集小奢摩詞選惜秋華癸酉初秋汪小竹水部齋中見秋花有感一一賦之凡七闋棄稿敗篋中巳十一年矣慈補存其三闋以不沒當年幽緒云瑟瑟輕寒正珠簾曉捲秋心淒緊瘦蝶不來飄零一天宫粉莫令真箇𫾣殘留傍取玉妝臺近窺鏡乍無人一笑平添幽韻芳訊寄應準待穿來弱線似玲瓏情分移鳳褥欹寶枕露乾香潤秋人夢裏相逢記欲墮又還黏鬢醒醒海棠邊慰他涼靚右詠玉簪減蘭闌干斜倚碧琉璃樣輕花綴慘緑糢糊瑟瑟涼痕欲暈初秋期此度秋星淡到無尋處宿露休搓恐是天孫別淚多右詠牽牛露華一痕輕軟愛盡日沈沈禪榻香滿別樣壠鬆小擘露華猶泫斜排玉柱停勻握處兜羅難辨幽佳地龍涎罷燒銀葉微暖空空妙手親按是金粟如來好相曾現祗樹天花一種莊嚴誰見想因特地拈花悟出真如不染維摩室茶甌經卷且伴右詠沸手湘月朱純子留宿釣魚村三日歸後代東兼乞梅花句留幾日把六朝俊語取次聽熟只説西洲淸怨極誰分者般穠福北海琴尊東山絃管小部泠泠曲昨宵夢裏畫屏猶自銀燭別後小有淸吟都無狂醉冷煞間官閣看取蕭蕭鸞尾影翠袖天寒同宿鐵笛吹殘瑤箋譜賸料得憐幽獨一枝贈我安排早有金屋浣溪紗春倦如雲不自持起書花葉畏人知斜陽倭妥繡簾垂鳳約倥傯難解恨鶯期懊惱莫填詞淚痕紅上海棠枝一作紅亂海棠絲以上五闋皆從巳刪稿復録出本在懷人館卷中今亦不復補入遂録於近詞之端璱人自識卜算子江上有高樓可似湖樓迥樓外文波曲曲通不駐驚鴻影蘋葉弄斜暉蘭蕊雕明鏡翦盡秋花漠漠寒人臥江南病洞仙歌平生有恨自酸酸楚楚十五年來夢中緒是紗衣天氣簾捲斜陽相見了有陳疏疏微雨臨風鋮線淨愛惜餘明抹麗鬘低倚當戶庭果熟枇杷親醮糖霜消受徹甘涼心腑索歸去依儂夢兒尋怕不似兒時那般庭宇附同時所作宜興儲徵甲紀堂梅天過了尚蕭蕭殘雨倚與羇人作酸楚憶秋槎聽遍春國寒餘都不似此度淒涼情緒瑤臺應不遠天外朱樓也聽丁冬鐸鈴語欹枕度寒宵入曉行雲可遞到鄉關煙樹怕潤逼衣篝未成熏欲寄與都梁斷鴻無據吾友璱人以近作洞仙歌見示適豫正成此解異怨同曲璱人以為幽曼可吟遂取歸附其詞尾可見吾兩人之論交各在迥腸蕩氣時矣紀堂自識高陽臺宫燭淒煙庭梅妬月揚州曾記元宵幾度相逢雲萍依舊飄蕭謝娘風格淸寒甚捧紅絲勸寫無憀儘孤他明月樓臺夜夜吹簫明知相約非相誤奈鶯期不定鸞鏡終拋萬一重逢墨痕留認鮫綃靑衫不潰淸樽影只模糊紅淚難銷且禁他他今夜江風明夜江潮是詞出有以金縷曲見答者其下闋云相逢縱晚年華末者揚州潮生潮落年年春水不信琵琶絃上語喚汝春魂不起誰憶慣前塵影事刪卻臨歧珍重語怕尋消問息勞公子詞料在且休矣前半不録南浦端陽前一日伯恬填詞題驛壁上淒瑰曼絶余亦繼聲羌笛落花天瓣香韉兩兩愁人歸去連夜夢魂飛飛不到天塹東頭煙樹空郵古戍一鐙敗壁然詩句不信黃塵消不盡摘粉搓脂情緒登車切莫回頭怕回頭還見高城尺五城裏正端陽香車過多少靑紅兒女吟情太苦歸來未算年華誤一劒還君君莫問換了江關詞賦齊天樂同年生馮晉漁海南人曾兩夢至江南之弇山自言兩度神遊豪髮不異出夢遊弇山第五圖乞題豫幼信轉輪長窺大乘執鬼中訊巫陽知其為元美後身矣填此闋奉報蹈綺語戒雖未知後何如要不免流轉文字海也東塗西抹尋常有精靈可憐如許兜率天中修羅海上各是才人無數魂兮記取那半壁靑山我傭曾住花月濛濛魂來魂往定相遇多君今世相訪東南三百載屈指吟侣花葉書成雲萍影合溝水無情流去賓朋詞賦好換了靑鐙戒鐘悲鼓翻遍華嚴懺卿文字苦華嚴蔬抄云夢有六種境界綺寮怨江鐵君近詞有云細慧煎春枯禪蠧夢都付落葉哀吟讀之潸然因填此解用宋人史邦卿韻一榻茶煙午寂落花天易陰何人向花外吹簫惹淸夢飛出幽林江東俊遊今倦被怨曲撥起情怎禁種間愁容易生苗怕紅豆緑蕪春又深人去休操斷琴他生何許此生有約難尋煙鎖登臨門巷晝沈沈天涯美人憔悴雲水外定傷心傷心怕吟要消遺除聽千偈音長相思同年生馮晉漁少具慧根而不信經典與豫異也嘗有買宅洞庭攜鬟吹笛終焉之志與豫同也軟紅十丈中塵福易易恐踐此約大難兩人者亙相揶揄一日同過畫肆見舊册山水絶妙晉漁購之歸乃莫釐石公圖也相對欷㱆豫作此二詞附册尾既為禱祝之詞又以見山川清福亦須從修習而來殆不可妄得也借以朂之山溶溶水溶溶如夢如煙一萬重誰期覺後逢恨應同誓應同同禮心經同聽鐘懺愁休更慵畫樓高畫船搖君領琵琶儂領簫雙鬟互見招茗能澆藥能燒別有今生淸課饒它生要福銷淸平樂以北平石墨數種拓寄顧澗蘋丈附以小詞黃塵撲面寒了􅉀鷗願問我名場誰數見冷抱寒陵一片別來容易經秋吳天淸夢悠悠夢到一灣漁火西山香雪歸舟謂辛巳正月探梅之遊卜算子曾在曲闌干瞥見紗裙傍花影濛鬆細步回月底簾鉤上重到曲闌干記起人模樣萬劫千生再見難小影心頭葬醜奴兒令沈思十五年中事才也縱橫淚也縱橫雙負簫心與劎名春來沒箇關心夢自懺飄零不信飄零請看牀頭金字經摸魚兒題顧樹萱槎葉歸舟卷子時壬午閏春也又漫天飛花飛絮一番春事無據朝朝送客長亭岸身似蘆溝柳樹歸計阻但打疊吟魂飛過黃河去輸君容與者雙髻吹笙雙聲問字雙槳夜呼渡它生約亦在五湖煙雨笛牀歌板何處才人病後風情死負了莫釐龍女還肯否重整頓淸狂也未年華暮幽懷漫訴要瀹茗煩他艤舷待我商略買山句淸平樂題胡魚門山居卷子東南詞賦屈指尊前數雨打風吹潮捲去依舊能狂只汝叩君畫裏禪關憶儂夢裏煙鬟何日兩枝玉笛雙雙吹入春山百字令蔣伯生得顧橫波夫人小像豫曰君家物也為填一詞龍華劫換問何人料理斷金零粉五萬春花如夢過難遣些些春恨京師某家劇樓有楹帖一聯曰大千秋色在眉頭看遍翠暖珠香重遊贍部五萬春華如夢裏記得丁歌甲舞曾睡崑崙相傳尚書作也帳嚲春宵枕欹紅玉中有滄桑影定山堂畔白頭可照明鏡記得腸斷江南花飛兩岸老去才還盡何不綘雲樓下去同禮空王鐘磬尚書與錢尚書同在秦淮日賦詩云楊柳花飛兩岸春行人愁似送行人一時傳誦靑史間看紅妝淺拜回護吾宗肯漳江一傳心頭驀地來省忽憶黃石齋先生在秦淮之事曲終及之齊天樂重晤宋于庭於都門酒半出高樓風雨卷子乞詞見面殊不易易故多為私心禱祝之詞且堅它年鄰約非如圖中荒寒本相矣相逢怕覓間文字替卿療可春病難道才人風風雨雨埋卻半生幽恨維摩消損有如願天花泥人出定一樣中年萬千心緒符重整天涯此樓休問一番枯寂後須畫金粉紅燭填詞靑綾擁被春雨勸伊同聽參禪也肯笑有限狂名懺來易盡兩幅靑山兩家吟料并豫亦有莫釐仙夢卷子乞題右近作小奢摩詞一卷本三十三闋刪存十五首補入舊作合為二十首癸未六月付刋同治甲子七月十六日悲盦校畢記定盦別集仁和龔自珍璱人饌庚子雅詞好事近八月初十日即事蘭槳昨同遊今日下樓無力䁚我凌晨來早道不曾將息歡容慘黛霎時并此景最難得別有神方持贈為淸明寒食末句乃謎語也生查子又即事一首關了緑窗紗鬆了湘裙􅙳言病復言愁絮絮雲屏下我已厭言愁不理傷心話翻願得嬌嗔故惹鶯喉罵鬲溪梅令羽陵春晚畫册矮桃花壓石玲瓏似巫峯花底鞋兒花外月如弓八懷同不同鬱金裙褶晚來鬆倦臨風莫把胭脂先染玉笙紅製愁詞思慵醜奴兒令將返羽琌別墅留別滄浪亭僧赤欄橋外垂楊柳似我秋心一陳秋陰槭槭蕭蕭秋便深佛前容我攤經坐細剔龕鐙多謝詩僧明夜拏舟又羽陵人月圓緑珠不愛珊瑚樹情願故侯家靑門何有幾堆竹素二頃梅花急須料理成都貰酒陽羡栽茶甘心費盡三生慧業萬古才華天仙子古來情語愛迷離惱煞王昌十五詞楚天雲雨到今疑鋪玉􅡘捧紅絲刪盡劉郎本事詩江城子自題羽陵春晚畫册改鬲溪梅令之作假山修竹隱蒙茸忒玲瓏似巫峯竹外樓臺薄暝一重重為數春星貪久立蒼蘚上印鞋弓留仙裙褶晚來鬆落花風去匆匆先把胭脂染得玉笙紅此夜酒邊詞筆健銀燭焰吐如虹阮郎歸代某校書送某書記碧桃花底醉春遊橫波先自秋明朝何况送蘭舟情多易注眸紈扇小紵衣修關山寸寸愁今番嫩約怕沈浮申江不許流臺城路賦祙陵臥鐘在城北雞籠山之麓其重萬鈞不知何代物也山陬法物千年在牧兒叩之聲死誰信當年楗鎚一發吼徹山河大地幽光靈氣肯伺候梳妝景陽宫裏怕閲興亡何如移向草間置漫漫評盡今古便漢家長樂難寄身世也稱人問帝王宫殿也稱斜陽蕭寺鯨魚逝矣竟一臥東南萬牛難起笑煞銅仙淚痕辭灞水鵲橋仙秦淮有訪昨朝相見渾如不見鸚鵡催妝無力香消茶熟等多時才鏡檻回廊一瞥今朝不見勝如重見庭院暮寒時節城闉鐙火促歸舟露簾裏慘紅裙褶鬲溪梅令即景林檎葉葉拂僧窗閃靑缸墨菊如煙淡與影兒雙吠星何處尨夢中詞筆小琤瑽寄吳艭欲翦芙蓉生恐負蘭茳不曾輕涉江好事近行篋中有小像一幅以詞為讚三界最消魂只有辨才天女半世從無一句是平常言語儻然生小在侯家天意轉孤負作了檻花籠鶴怎笑狂如許臺城路同人皆詗知余近事有以詞來贐者且促歸期良友多情增我回腸蕩氣耳吳棉已把桃笙換流光最驚羈旅蠟屐尋山黃泥封酒小有逢迎今雨懷沙輟賦夢不到南州鄧林夸父且逐寒潮金閶一角餞秋去覺來誰與相遇有卷中姚合樓上孫楚催我歸舟鴛鴦牒緊莫戀間鷗野鷺靑溪粥鼓道來歲重尋須攜簫侶多謝詞仙低回吟冶句應天長移寓城北之四松庵溪山幽絶人迹罕至曉起倚高閣賦此山僧許我移茶竈不用當關仙鶴報松杉杪鐘魚杳天際真人相揖笑夢回曾似到記得卷中秋曉曩藏李成溪山秋曉圖意境仿佛似之我吞長虹一嘯吳天落月小點絳脣補記四月之遊典卻珠叉高樓特啓櫻桃宴江風吹棟恰喜鰣魚薦不許偎紅只許深杯勸窗三面推開一扇故使雛鬟見好事近補記仲夏情事名俊出天然字近曹娥碑格何以報他紈扇餽一筐梅實平江暮雨太酸生江上黯行色行過松陵古道得斷腸消息虞美人高樓卜罷芻尼至讀我龍鸞字門前靑翰泊雙雙怕見芙蓉未敢涉秋江今年靑鬢搔逾短那有忘憂館文君儻製白頭吟為報相如客裏乏黃金醜奴兒令答月坡半林訂遊遊蹤草五年前到江也依稀山也依稀少壯沈雄心事違詞人問我重來意吟也凄迷説也凄迷載得齊梁夕照歸定風波燕子磯頭擫笛吹平明沈玉大王祠無數蛾睂深院裏晏起曉霜江上阿誰知山詭潮奔千萬變當面身輕要喚鯉魚騎驀地江婓催我去飛渡樽前説與定何時一痕沙録言東指羽琌山下小有亭樓如畫松月夜窗虛待卿居間卻調箏素手只合替郎溫酒高閣佛鐙靑替鈔經菩薩蠻四月十九日薄暮即事文窗花霧淒然緑侍兒不肯傳銀燭樓外月昏黃口脂聞暗香新來情性皺未敢偎羅袖此度夾衣單蒙他訊晚寒減蘭鮆魚橋下片片桃花春巳謝不怨橋長行近伊家土亦香茶甌香炷多謝小鬟傳好語昨夜羅幃銀燭花明蟢子飛賀新涼僑寓吳下滄浪亭與王子梅諸君談藝一棹滄浪水一行行淡煙疏柳平生秋思多謝江東風景好依舊美人名士有老衲高談奇字使我吳天詩料闊策蝌文螭扁三千事古香馤在肝肺一簫我漫遊吳市傍龕鐙來稱教主與諸君談藝子梅以教主目之琉璃焰起病蝶涼蟬狂不得還許虎邱秋褉看磨墨人低雙髻絶勝山東驢子背慘郵亭麥飯黃沙裏擲筆罷傲吾子好事近録言細語道家常生小不矜珠翠他日郎家消受願靑裙縞袂畫梁燕子巳無家那有五侯第等到歲寒時候折黃梅簪髻小重山令碧玉寒門産麗華誤隨紅葉去到天涯明珠一斛坐陪茶容我見容我飯胡麻倦返七香車重尋吳苑柳石湖花今年愁到莫愁家黃金少典去玉鴉義調笑四首花下花下金碧朝陽亭榭獨遊無味春時恨煞佳人起遲遲起遲起孤負江山淸綺花月花月一片溶溶春闊佳人情味瞢騰翻愛羅幃擁鐙鐙歇鐙歇我向花陰獨立烹茗烹茗間數東南流品美人俊辨風生皮裏陽秋太明皮裏皮裏流品如儂第幾年紀年紀不比十三十四乳名鄭重曾探睂樣蹉跎未諳睂樣睂樣難道峯靑江上定風波二首擬聘雲英藥杵回思量一日萬徘徊畢竟塵中容不得難説風前揮淚謝鸞媒自古畸人多性癖奇逸雲中仙鶴怎籠來須信銀屏金屋裏一例琪花不稱檻前栽除是無愁與莫愁一身孤注擲溫柔倘若有城還有國愁絶不能雄武不風流多謝蘭言千百句難據羽琌詞筆自今收晚歲披猖終未肯割忍他生縹眇此生休賣花聲近世菊花紛紅駭緑無復東籬古意偶客秣陵得墨菊一本甚娟妙小詞賞之我住秣陵西怪鳥秋啼也無墨客對揮犀何處尋秋何處醉小妹靑溪寒菜兩三畦花不成蹊折歸鐙下伴淒迷忽憶靑門人縞袂淡墨曾題前調紫菊有近似墨菊者誰砑九秋光玉女元霜胭脂隊裏鐵為腸聞道豪家開夜宴肯喚秋娘秋味黯然長不要穠香紙屏六幅繪湘江影忒似花花似影小費評量淸平樂朱石梅以紅梅四盎贈行報謝即題其畫册後芙蓉老去沒箇銷魂處今雨不來來舊雨心與亭臺俱古靑溪一曲盤桓粥魚茶板荒寒多謝畫師慰我紅妝打槳同還南歌子自題近詞卷尾靈鵲飛秋夕香車駕暮煙針兒七箇盡情穿略費玲瓏七孔藕心錢牀上宜施寶琴中替辨絃七襄報我定何年且喜南樓好夢七分圓此玉泉潘丈所録定盦詞余借讀將十年昨復擕至武林適曉帆吳方伯刊定盦文成後搜得詩草刊附文集後余因出此詞請附其詩並刊之使定盦箸作各見一斑也同治戊辰十二月古升州何兆瀛志於武林官署之知所止齋同治己巳補刊龔定盦先生遺文及破戒草己亥雜詩承何靑士觀察惠假定公詞鈔本正在付梓適趙益甫孝廉過杭擕有定公詞四卷乃先生手定刻於道光癸未取校何本增多不少惟庚子雅詞一卷則未刻本也遂改依原刻本重刊而以庚子雅詞附後共為別集五種得窺全豹亦一快事也曉帆吳煦記支那古德遺書序觀實相者愾然曰學術有升降人心有誠偽水有淄澠樂有雅鄭豈獨九流之通蔽儒門之口實而巳乎原夫禪者佛説六波羅密門之一門古所謂禪盡事禪也千佛所胎息三乘所劬勞八教所管鑰盡事禪也八之也有門踐之也有塗譬彼登山足無藉則何以為之階手無捫則何以為之援而且導之也有師扶持之也有相尚猶慮夫涉之也有淺深閲之也有久暫則有諸境以為之策有化城以為之止息乃有大事因緣以為之歸墟其言明且淸也故被乎三根其術至朴實平正也故其書三根學焉而各無弊莊論法語尚懼不聰烏有所謂機鋒者乎名身句身尚懼不明烏有所謂參悟者乎是非有檢束烏有所謂一千七百則公案乎通塞視前塗烏有所謂看話頭者乎慈和暖愛烏有所謂棒喝者乎有聞有思有修以言説説其無言説以思議思議其不思議必有悉檀焉烏有一切鑱者乎傾肝吐鬲而豫之烏有設伏以侯敵者乎蓋惟恐人之不好問也烏有來即攔到即䂨者乎無量人問當用無量法門悉檀答之譬如醫門四百四病四百四藥疹脈處方臨時區配烏有以現成語句囫圇籠罩人者乎或宗華嚴經或宗法華經或宗涅槃經荊溪讚天台云依經帖釋理富義順烏有所謂教外別傳者乎或難之曰天台所云云都在法華七卷內邪應之曰書不盡言言不盡意作者無之述者有之九流之通例如此矣智者大師即補結集者之略又正翻譯者之拙又或囊括大意或融合衆文或發撝孤文或不忽旁瀋或搜剔隙罅或舉一例諸微獨禪人而巳支那賢者讀周公孔父之書眥如此矣烏有所謂教外之別傳者乎如靑天白日欲人之無不見也烏有所謂祖師向上事密密不通風者乎幽探冥討旁引殽證尚懼靈文之不富也烏有撥去語言文字者乎其書不幸而霾藏千載無詗者宜也其書幸而流布得道者如麻如菽如竹葦又宜也烏有所謂孤提祖印密付衣鉢者乎以佛為師以佛知見為歸以經綸為導以禪為行舄有所謂不向如來行處行者乎悲夫晚唐以還像法漸謝則有斥經論用曹溪者則有祖曹溪并失夫曹溪之解行者愈降愈濫愈誕愈易昧禪之行冒禪之名儒流文士樂其簡便不識字髠徒習其狂猾語録繁興夥於小説工者用庾拙者用謠下者雜俳優成之異乎聞於文佛之所聞狂師召伶俐市兒用現成言句授之勿失腔節三日禪師其遍市矣佛言吾如師子王不畏百獸畏師子身自生蛆蟲噉師子肉佛法之衰為支那所詆不絶如線則豈非蛆蟲僧之召之也哉豫疚焉又衋焉亟思所以報佛恩者乃寫法華宗魏南嶽思大師書一種四卷隋天台智者大師書若干種若干卷唐荆溪湛然大師書若干種若干卷涅盤宗唐永嘉無相大師書一種一卷華嚴宗唐帝心大師書一種一卷圭峯密大師書一種二卷書其地曰支那尊其人曰古德目其教信其必不離語言文字也故謂之遺書既寫定藏之乎羽琌之山支那緇白容有續九流諟古今審正變者焉以二百本施諸寺重輯六妙門序昔者大師判八教曰藏通別圓頓漸祕密不定前四教之儀後四教之相自初禪四禪四無量心展轉至於師子奮迅三昧漸也摩訶止觀覺意三昧兩部頓也祕密未説六妙門十六特勝門通明觀三部不定也六妙門何以不定曰門門不定因不定果不定一曰數數者三藏教五停心之一停心但契經不云乎阿那波那三世一切佛入道初門此門徹下徹上不局藏教不定者一也二曰隨隨者十六特勝門中之先鋒因隨以知息出入相冷暖澀滑促長相除身相恃隨階神通特勝攝不專取通妙門攝隨之本旨異矣隨以後次第又異不定者二也問數隨二門凡觀不淨大不淨者必先由之故合不淨觀謂之二甘露門要是凡夫禪小乘法若夫圓人四念處總十法界以為處觀非淨非不淨又觀息法觀無常也圓人則觀非常非無常此為淺狹彼為高遠應之曰汝論理非論事理則誠然六祖門徒元策遊河朔遇禪人智隍見其入定而笑之曰定有入出耶理亦誠然我以事論則大不然不跏趺坐則四威儀中取何者為相不停心則雖有無上知見為煩惱風動搖慧燈若存若滅不知風相那知地水火相不知內四大相那獲天眼通見千世界相常行常坐半行半坐古人尅期為之尅期則有出入明矣故有慧行有行行圓悟者側修下學者上達且夫妄心不異於真心者豈指下手處言妄之不揀難用功故聞訶栴檀不得反取糞故十五門禪古德目初禪為根本禪以用阿那波那故摩訶止觀有二十五科為前方便方便中亦有調息一門息如不調心如猿猴難可制故三曰止用制心止也雖云用制心止不及三大止但視乎其人爾未開圓解且用制心止制心一處何事不辦如開佛知見矣於跏趺時用三種大止用體真止即空而假而中焉可矣用隨緣方便止即假而空而中焉可矣用息二邊分別止即中而空而假焉無不可矣神明規矩弘道者人不定者三也四曰觀此部之觀先觀息乃觀身受心法四倒成四念處其觀息也略但四念處之喤引而巳特勝通明由觀息尅取神通故詳此門或取通或不取通故略及其成四念處也是四枯四念處非四榮四念處為未圓人聊説如此圓人三種大觀不縱不橫全體大用正在此時借在此時無不可矣不定者四也五曰還此門還是裂小網開佛知見曰裂大網還者非他覺意三味之觀觀心是也夫亦各還其所還而巳矣不定者五也六曰淨準上此淨但是聲聞淨聲聞析假入空得稱淨緣覺體假入空亦稱淨乃知如來四德亦受淨名不定者六也有至定者存乎曰名目定網格定次第不可紊則定首尾相注則定元藏目録六妙門三卷在謹字函為大師全書二十七種之一明藏南北皆闕惜哉痛哉讀釋禪波羅密次第門十卷其第七卷曰六妙門才二千言非元藏單行本元藏既不可見此亦足以窺全指於什四乎未可知也刻木行以少慰天台裔人求古笈之志微此不定一門熄矣大淸道光十八年仲冬朔日觀實相之者滌筆敘重刊圓覺經略疏後序唐書萟文志曰圓覺經大小疏各一卷釋宗密撰裴休圓覺疏序曰凡大疏三卷大鈔十三卷略疏二卷小鈔六卷今藏本疏與鈔皆合不各自為本大疏鈔合十二卷略疏二卷各分上下略鈔或十二卷或草五卷多寡之數析女省之年皆不可考矣圓覺之為圓覺我佛自言之疏鈔之為疏鈔圭峯師自言之夫賦天地者迂贊日月者妄名字功德吾無贅言若其祖荷澤禰遂洲則傳法之緒可言也胎慈恩息賢首其講經之宗可言也大疏雖繁不可謂多略疏雖簡不可謂少其二而一者同是經之津筏其一而二者各貝疏之體裁兹取略疏栔之使學者先讀是次第燖求也唐志又曰禪源諸詮集一百一卷起信論疏鈔三卷原人論一卷皆宗密撰裴休撰樂石之文舉師所箸有華嚴圓覺涅槃金剛起信唯識盂蘭法界觀行願等經論疏鈔及法義類例及禪藏總九十餘卷以譣今藏佚者半存者尚半今先取圓覺栔之亦使學者先讀是次第燖求也栔之者誰吳縣貝居士墉也助之喜與與其役者誰吳縣江居士沅及仁和龔自珍也道光四年八月朔龔自珍合十説由緒竟定盦文集補總目續録文八首古今體詩破戒草上卷破戒草之餘下卷雜詩三百十五首詞選無著詞懷人館詞影事詞小奢摩詞庚子雅詞定盦文集補目録蒙古字類表序蒙古氏族表及在京氏族表總序蒙古册降表序上淸真人碑書後秦泰山刻石殘字跋尾支那古德遺書序重輯六妙門序重刊圓覺經略疏後序余自庚辰之秋戒為詩於􅌢語言簡思慮之指言之詳然不能堅也辛巳夏決藩杝為之至丁亥十月又得詩二百九丨篇自周以迄近代之體皆用之自雜三四言至雜八九言皆用之不自割棄而又銓次之録百二十八篇為破戒草一卷又依乙亥庚辰兩例存餘集凡五十七篇亦一卷大凡録詩百八十四篇刪勿録者尚百五篇録詩則以掃徹公塔詩終乃矢之曰余以年編詩閲歲名十有八自今以始無詩之年請更倍之惟守戒之故使我夀考汝如勿悛勿自損也俾無能夀考於而身至於歿世汝亦不以詩聞有如徹公道光七年丁亥十月丁亥龔自珍一名易簡伯定父自識翌日付小胥抄越十有三日己亥竣得三十六紙如其戒詩之年定公又識定盦續集仁和龔自珍璱人饌己亥雜詩三百十五首著書何似觀心賢不奈巵言夜湧泉百卷書成南渡歲先生續集再編年我馬元黃盼日曛關河不窘故將軍百年心事歸平淡刪盡蛾睂惜誓文罡風力大簸春魂虎豹沈沈臥九閽終是落花心緒好平生默感玉皇恩此去東山又北山鏡中強半尚紅顔白雲出處從無例獨往人間竟獨還豫不攜眷屬傔從雇兩車以一車自載一車載文集百卷出都浩蕩離愁白日斜吟鞭東指即天涯落紅不是無情物化乍春泥更護花亦曾槖筆侍鑾坡午夜天風伴王珂欲浣春衣仍護惜乾淸門外露痕多亷鍔非關上帝才百年淬厲電光開先生宦後雄談減悄向龍泉祝一回太行一脤走蝹蜿莽莽畿西虎氣蹲送我搖鞭竟東去此山不語看中原別西山翠微山在潭柘側此山有情慘難別薜荔風號誼士魂燕支土蝕佳人骨別翠微山進退雍容史上難忽收古淚出長安百年綦轍低佪遍忍乍空桑三宿看先大父宦京師家大人宦京師至小子三世百年矣以己亥歲四月二十三日出都祖父頭銜舊熲光祠曹我亦試為郎君恩彀向漁樵説篆墓何須百字長唐碑額有近百字者掌故羅胸是國恩小胥脫捥萬言存他年金匱如搜采來叩空山夜雨門出事公卿溯戊寅雲煙萬態馬蹄湮當年筮仕還嫌晚已哭同朝三百人穨波難挽挽穨心壯歲曾為九牧針鐘簴蒼涼行色晚狂言重起草年瘖許身何必定夔皋簡要淸通巳定豪讀到嬴劉傷骨事誤渠畢竟是錐刀棄婦丁寧囑小姑姑恩莫負百年劬米鹽種種家常話淚溼紅裙未絶裾有棄婦泣於路隅因書所見金門縹眇草年身悔向雲中露一鱗終古漢家狂執戟誰疑臣朔是星辰詞家從不瓜見知音纍汝千回帶淚吟惹得而翁褱抱惡小橋獨立慘歸心吾女阿辛書馮延巳詞三闋日日誦之自言能識此詞之恉我竟不知也卿籌爛熟我籌之我有忠言質幻師觀理自難觀勢易彈丸纍到十枚時道旁見鬻戲衛者因贈消息間憑曲藝看考工古字太叢殘五都黍尺無人校搶攘鄽間一飽難過市肆有感滿擬新桑遍冀州重來不見緑雲稠書生挾策成何濟付與維南織女愁曩陳北直種桑之策於畿輔大吏車中三觀夕惕若七藏靈文電熠若懺摩重起耳提若三普貫珠纍纍若豫持陀羅尼巳滿四十九萬卷乃新定課程日誦普賢普門普眼之文荒村有客抱蟲魚萬一談經引到渠終勝秋磷亡姓氏沙渦門外五尚書逆旅夜聞讀書聲戲贈沙渦門即廣渠門門外五里許有地名五尚書墳五尚書不知皆何許人也誰肯栽培木一章黃泥亭子白茆堂新蒲新柳三年大便與兒孫作屋梁道旁風景如此椎埋三輔飽于鷹薛下人家六萬增半與城門充校尉誰將斜谷械陽陵逝矣斑騅罥落花前村茆店即吾家小橋報有人癡立淚潑春簾一餅茶出都日距國門巳七里吳虹生同年立橋上候豫過設茶灑淚而別秀出天南筆一枝為官風骨稱其詩野棠花落城隅晚各記春驑戀馽時別石屏朱丹木同年艧舟木以引裝與豫先後出都見入都為豫治不是逢人苦譽君亦狂亦俠亦溫文照人膽似秦時月送我情如嶺上雲別黃蓉石比部玉階蓉石番禺人觥觥益陽風骨奇壯年自定千首詩勇於自信故英絶勝彼優孟俯仰為別湯海秋戶部鵬事事相同古所難如鶼如鰈在長安自今兩戒河山外各逮而孫盟不寒光州吳虹生葆晉與豫戊寅同年已丑同年同出淸苑王公門殿上試同不及格同官內閣同改外同日還原官本朝閩學自有派文字醰醰多古情新識晉江陳戶部談經頗似李文貞別陳頌南戶部慶鏞何郎才調本孿生不據文家為弟兄嗜好畢同星命異大郎尤貴二郎淸別道州何子貞紹基子毅紹業兄弟據質家為兄弟近世孿生皆少慕顔曾管樂非胸中海嶽夢中飛近來不信長安隘城曲深藏此布衣別會稽少白山人潘咨龍猛當年入海初娑婆曾否有倉佉祗今矌劫重生後尚識人間七體書別鎮國公容齋居士居士睿親王子名裕恩好讀內典遍識額納特珂克西藏西洋蒙古回部及滿漢字又校定全藏凡經有新舊數譯者皆訪得之或校歸一是或兩存之或三存之自釋典入震旦以來未曾有也丱角春明入孰年丈人摩我道嶄然恍從魏晉紛紜後為溯黃農浩渺前別大興周丈之彥多君媕雅數論心文字緣同骨肉深別有樽前揮涕語英雄遲暮感黃金別王秋畹大令繼蘭秋畹濟寧人三十華年四牡騑每談宦轍壯褱飛尊前弟一傾心聽兕甲樓船海外歸別直隸布政使同年托公公名托渾布蒙古人五十一人皆好我八公送別益情親他年臥聽除書罷冉冉修名獨愴神別南豐劉君良駒南海桂君文耀河南丁君彥儔雲南戴君絅孫長白奎君綬閩黃君驤雲江君鴻升棗強步君際桐時己丑同年留京五十一人匆匆難遍別八君及握手一為別者也吳虹生巳見前朝借一經覆以簦暮還一經龕已燈龍華相見再相謝借經功德龍泉僧別龍泉寺僧唯一唯一施南人北方學者君弟一江左所聞君畢聞士厚水深詞氣重煩君他日定吾文別許印林孝亷瀚印林日照人子雲識字似相如記得前年隔巷居忙殺奚僮傳拓本一行翠墨一封書別吳子苾太守式岎子苾海豐人夾袋搜羅海內空人材畢竟恃宗工笥河寂寂覃溪死此席今時定屬公別徐星伯前輩松星伯大興人聯步朝天笑語馨佩聲耳畔尚泠泠遙知下界覘乾象此夕銀潢少客星別共事諸宗室霜豪擲罷倚天寒任乍淋漓淡墨看何敢自矜醫國手藥方只販古時丹已丑殿試大指祖王荆公上仁宗皇帝書眼前二萬里風雷飛出胸中不費才枉破期門佽飛膽至今駭道遇仙回記己丑四月二十八日事彤墀小立綴鵷鸞金碧初陽當畫看一隊佽飛爭識我健兒身手此文官終賈華年氣不平官書許讀興縱橫荷衣便識西華路至竟蟲魚了一生嘉慶壬申歲校晝始武英殿是平生為校讐之學之萬事源頭必正名非同綜核漢公卿時流不沮狂生議側立東華佇佩聲官內閣日上書大學士乞到閣看本東華飛辨少年時伐鼓撞鐘海內知牘尾但書臣向校頭銜不稱閷其詞在國史館日上書總裁論西北塞外部落原流山川形勢訂一統志之疏漏初五千言或曰非所職也乃上二千言千言只作卑之論敢以虛懷測上公若問嘆朝諸配享少牢乞祔叔孫通在禮部上書堂上官論四司政體宜沿宜革者三千言客星爛爛照天潢許署頭銜著乍郎翠墨未乾仙字蝕雲煙半榻掖門旁官宗人府奉旨充玉牒館纂修官豫草創章程未竟其事改官去齒如編貝漢東方不學咿嚘况對揚屋瓦自驚天自笑丹毫圓折露華瀼豫每侍班引見奏履厯同官或代豫悚息丁酉春京察一等引見蒙記名半生中外小迥翔樗醜翻成戀太陽揮手唐朝八司馬頭銜老署退鋒郎選授楚中一司馬矣不就供職祠曹如故科以人重科益重人以科傳人可知本朝七十九科矣搜輯科名意在斯八歲得舊登科録讀之是搜輯二百年科名掌故之始手校斜方百葉圖官書似此古今無祇今絶學真成絶册府蒼涼六幕孤程大理同文修會典其理藩院一門及靑海西藏各圖屬豫校理是為天地東西南北之學之始大理沒豫撰蒙古圖志竟不成孔壁微芒墜緒窮笙歌絳帳啓宗風至今守定東京本兩廡如何闕馬融戊子歲成尚書序大義一卷太誓答問一卷尚書馬氏家法一卷姬周史統太銷沈况復炎劉古學瘖崛起有人扶左氏千秋功罪總劉歆癸巳歲成左氏春秋服杜輔義一卷其劉歆竄益左氏顯然有迹者為左氏決疣一卷張杜西京説外家斯文吾述段金沙導河積石歸東海一字源流奠萬譁年十有二外王父金壇段先生授以許氏部目是平生以經説字以字説經之始端門受命有雲礽一脈微言我敬承宿草敢祧劉禮部東南絶學在毗陵年二十有八始從武進劉申受受公羊春秋近歲成春秋決事比六卷劉先生卒十年矣華年心力九分殫淚漬蟫魚死不乾此事千秋無我席毅然一炬為歸安抱功令文二千篇見歸安姚先生學塽先生初奬借之忽正色曰我文著墨不著筆汝文筆墨兼用乃自燒功令文軒后孤虛縱莫尋漢官戊已兩言深著書不為丹鉛誤中有風雷老將心訂裴駰史記集解之誤為孤虛表一卷古今用兵孤虛圖説一卷古人製字鬼夜泣後人識字百憂集我不畏鬼復不憂靈文夜補秋燈碧嘗恨許叔重見古文少商周彝器祕文説其形義補説文一百四十七字戊戌四月書成經有家法夙所重詩無達詁獨不用我心即是四始心泬寥再發姬公夢為詩非序非毛非鄭各一卷豫説詩以涵泳經文為主於古文毛今文三家無所尊無所廢熙朝仕版快茹征五倍金元十倍明揚扢千秋儒者事漢官儀後一書成年十四始考古今官制近成漢官損益上下二篇百王易從論一篇以竟髫年之志文侯端冕聽高歌少作精嚴故不磨詩漸凡庸人可想側身天地我蹉跎詩編年始嘉慶丙寅終道光戊戌勒成二十七卷西京別火位非高薄有遺聞瑣且勞只算粗諳鏡背字敢陳法物詁球刀為典客道古録奉常道古録各一卷十仞書倉鬱且深為姱目録散黃金吳回一怒知天意無復龍威禹穴心年十六讀四庫提要是平生為目録之學之始壬午歲不戒於火所搜羅七閣未收之書燼者什八九北遊不至獨石口東遊不至盧龍關此記遊耳非著作馬蹄蹀􅞃書生孱東至永平境北至宣化境實未覩東北兩邊形勢也為紀遊合一卷吾祖平生好孟堅丹黃鄭重萬珠圓不材竊比劉公是請肄班香再十年為漢書補注不成讀漢書隨筆得四百事先祖匏伯公批校漢書家藏凡六七通又有手抄本麟經斷爛炎劉始幸有蘭臺聚祕文解道何休遜班固眼前同志只朱雲癸巳歲成西漢君臣稱春秋之義考一卷助子整齊之者同縣朱孝廉以升剔彼高山大川字簿我玉篋金扃中從此九州不光怪羽陵夜色春態熊年十七見石鼓是收石刻之始撰金石通考五十四卷分存佚未見三門書未成成羽琌山金石墨本記五卷郭璞云羽陵即羽琌也少年簿録睨千秋過目雲煙浩不收一任湯湯淪泗水九金萬祀屬成周撰羽琌之山典寶記二卷奇氣一縱不可闔此是借瑣耗奇法奇則耗矣瑣未休眼前臚列成五嶽為鏡苑一卷瓦韻一卷輯官印九十方為漢官拾遺一卷泉文記一卷登乙科則亡姓氏官七品則亡姓氏夜奠三十九布衣秋鐙忽吐蒼虹氣撰布衣傳一卷起康熙迄嘉慶凡三十九人不能古雅不幽靈氣體難躋作者庭悔殺流傳遺下女自障紈扇過旗亭年十九始倚聲填詞壬午歲勒為六卷今頗悔存之文章合有老波瀾莫作鄱陽夾漈看五十年中言定譣蒼茫六合此微官庚辰歲為西域置行省議東南罷番舶議兩篇有謀合琴之者厚重虛襄見古風車裀五度照門東我焚文字公焚疏補紀交情為紀公壬辰夏大旱上求直言大學士蒙古富公俊五度訪之子手陳當世急務入條公讀至汰冗濫一條動色以為難行餘頗欣賞豫不存於集中狂禪闢盡禮天台掉臂琉璃屏上回不是瓶笙花影夕鳩摩枉譯此經來丁酉九月二十三夜不寐聞茶沸聲披衣起菊影在扉忽證法華三昧手捫千軸古琅玕篤信男兒識字難悔向侯王作賓客草篇鴻烈贈劉安某布政欲撰吉金欵識屬子為之豫為聚拓本穿穴羣經極談古籒形義為書十二卷俄布政書來請絶交書藏何子貞家夜思師友淚滂沱光影猶存急網羅言行較詳官閥略報恩如此疚心多近撰平生師友小記百六十一則厯劫如何報佛恩塵塵文字以為門遙知法會靈山在八部天龍禮我言佛書入震旦以後校讐者希乃為龍藏考證七卷又以妙法蓮華經為北涼宫中所亂乃重定目次分本迹二部刪七品存草一品丁酉春勒成龍樹靈根派別三家家榔栗不能擔我書喚作三丫記六祖天台共一龕近日述天台家言為三普銷文記七卷又撰龍樹三丫記只籌一纜十夫多細算千艘渡此河我亦曾糜太倉粟夜聞邪許淚滂沱五月十二日抵淮浦作白面儒冠巳問津生涯只羡五侯賓蕭蕭黃葉空村畔可有攤書閉戶人津梁條約遍南東誰遣藏春深塢逢不枉人呼蓮幕客碧紗㡡護阿芙蓉阿讀如人痾之痾出續本草鬼燈隊隊散秋螢落魄參軍淚眼熒何不專城花縣去春眠寒食未曾醒故人橫海拜將軍側立南天未蕆勛我有陰符三百字蠟丸難寄惜雄文河干勞問又江干恩怨他時邸報看怪道烏臺牙放早幾人怒馬出長安學羿居然有羿風千秋何可議逢蒙絶憐羿道無消息弟一親彎射羿弓過百由旬煙水長釋迦老子怨津梁聲聞閉眼三千劫悔慕人天大法王北俊南孊氣不同少能炙轂老能聰可知銷盡勞生骨即在方言兩卷中凡騶卒謂子燕人也凡舟子謂豫吳人也其有聚而轇轕者則兩為之舌人以通之不容水部賦淸愁新擁牙旗拜列侯我替梅花深頌禱明年何遜守揚州同年何亦民俊時以知府銜駐黃河金鑾並硯走龍蛇無分同探閬苑花十一年來春夢冷南遊且喫玉川茶同年盧心農元良時知甘泉黃金脫手贈椎埋屠狗無悰百計乖僥幸故人仍滿眼猖狂乞食過江淮過江淮間不困厄何亦民盧心農雨君力也大宙南東久􅓦寥甄陀羅出一枝簫簫聲容與渡淮去淮上魂須七日招袁浦席上有限韻賦詩者得簫字敬賦三首少年擊劒更吹簫劒氣簫心一例消誰分蒼涼歸棹後萬千哀樂集今朝天花拂袂著難消始愧聲聞力未超靑史他年煩點染定公四紀遇霛簫人名一言恩重降雲霄塵劫成塵感不銷未免初禪怯花影夢回持偈謝霛簫翌晨報謝一首能令公愠公復喜揚州女兒名小雲初弦相見上弦別不曾題滿杏黃裙坐我三熏三沐之懸崖撒手別卿時不留後約將人誤笑指河陽鏡裏絲美人才調信縱橫我亦當筵拜盛名一笑勸君輪一著非將此骨媚公卿友人訪小雲於揚州三至不得見愠矣針之網羅文獻吾倦矣選色談空結習存江淮狂生知我者緑箋百字銘其言讀某生與友人書即書其後附録某生與友人書某祠部辨若懸河可抵之隟甚多勿為所懾其人新倦仕宦牢落歸恐非復有網羅文獻搜輯人才之盛心也所至通都大邑雜賓滿戶則依然渠二十年前承平公子故態其客導之出遊不為花月冶遊即訪僧耳不訪某輩某亦斷斷不繼見某頓首梨園爨本募誰修亦是風花一代愁我替尊前深惋惜文人珠玉女兒喉元人百種臨川四種悉遭伶師竄改崑曲俚鄙極矣酒座中有徵歌者豫輒撓阻河汾房杜有人疑名位千秋處士卑一事平生無齮齕但開風氣不為師豫生平不蓄門弟子生還重喜酹金焦江上騷魂亦可招隔岸故人如未死淸樽讀曲是明朝西來白浪打旌旗萬舶安危總末知寄語瞿塘灘上賈收帆好趁順風時少年攬㘘澄淸意倦矣應憐縮手時今日不揮間涕淚渡江只怨別蛾眉六月十五刖甘泉是夕丹徒風打船風定月出半江白江上女郎眠未眠四海流傳百軸刊皤皤國老尚神完談經忘卻三公貴只乍先秦伏勝看重見豫告大學士阮公於揚州蜀岡一老抱哀弦閲盡詞場意惘然絶似琵琶天寶後江南重遇李龜年重晤秦敦天編修恩復家公舊治我曾遊只曉梅村與鳳洲收拾遺聞浩無涘東南一部小陽秋太倉邵子顯輯太倉先哲叢書八帙起南宋迄乾隆中使豫序之七里虹橋腐草腥歌鐘詞賦兩漂零不隨天市為消長文字光芒聚德星時上元蘭君太倉邵君為揚州廣文魏默深舍人陳靜葊博士僑揚州又晤秦玉笙謝夢漁劉楚楨劉孟瞻四孝廉楊季子都尉公子有德宜置諸有德公子毋忘諸我方乞糴忽誦此針詺磊落肝脾虛詩人瓶水與謨觴鬱怒淸深兩擅場如此高材勝高第頭銜追贈薄三唐鬱怒橫逸舒鐵雲瓶水齋之詩也淸深淵雅彭甘亭小謨觴館之詩也兩君死皆一紀矣荷衣説藝鬪心兵前輩須睂照坐淸收拾遺聞歸一派百年終恃小門生少時所交多老蒼於乾隆庚戌榜過從最親厚次則嘉慶已未多談萟之士兩科皆大興朱文正為總裁官中年才子耽絲竹儉歲高人厭薜蘿兩種情褱俱可諒陽秋貶筆未宜多姬薑古妝不如市趙女輕盈躡鋭屣侯王宗庿求元妃徽音豈在纖厥趾偶感麟趾裊蹄式可尋何須番舶獻其琛漢家平準書難續且仿齊梁鑄餅金近世行用番錢以為攜挾便也不知中國自有餅金見南史褚彥回傳又見唐韓偓詩乍賦曾聞紙貴夸誰令此𥿄遍京華不行官鈔行私鈔名目何人餉史家促柱危弦太覺孤琴邊倦眼眄平蕪香蘭自判前因誤生不當門也被鋤荒靑無縫種交加月費牛溲定幾車只是場師消遣法不求秋實不看花所僦寓有治圃者戲贈六朝古黛夢中橫無福秦淮放棹行想見鍾山兩才子詞鋒落月互縱橫欲如江寧不果亦不得馬湘帆戶部馮晉漁比部兩同年消息不論鹽鐵不籌河獨倚東南涕淚多國賦三升民一斗屠牛那不勝栽禾殘客津梁握手欷多君鄭重問烏衣故家自怨風流歇肯罵無情燕子飛重晤段君果行沈君錫東於逆旅執手言褱雨君家大人舊賓客也九州生氣恃風雷萬馬齊瘖究可哀我勸天公重抖擻不拘一格降人材過鎮江見賽玉皇及風神雷神者禱祠萬數道士乞撰靑詞不容兒輩妄談兵鎮物何妨一矯情別有狂言􅒜時望東山妓即是蒼生漢代神仙玉乍堂六朝文苑李男香過江子弟傾風采放學歸來祀衛郎黃河女直徙南東金明昌元年我道神功勝禹功安用迂儒談故道犂然天地劃民風渡黃河而南天異色地異氣民異情陶潛詩喜説荆軻想見停雲發浩歌吟到恩仇心事湧江湖俠骨恐無多舟中讀陶詩三首陶潛酷似臥龍豪語意本辛棄疾萬古潯陽松菊高莫信詩人竟平淡二分梁甫一分騷陶潛磊落性情溫冥報因他一飯恩頗覺少陵詩吻薄但言朝叩富兒門江左晨星一炬存魚龍光怪百千吞迢迢望氣中原夜又有湛盧劒倚門江陰見李申耆丈蔣丹稜茂才丹稜申耆之門人也過江藉甚顔光祿又乍山中老樹看賴是元龍樓百尺雄談夜半斗牛寒陳登之別駕坐上重晤盛午洲光祿五十一人忽少三我聞隕涕江之南篋中都有舊墨迹從此襲以玫瑰函聞都中狄廣軒侍御蘇賓嵎吏部夏一卿吏部三同年忽然同逝偶賦凌雲偶倦飛偶然間慕遂初衣偶逢錦瑟佳人問便説尋春為汝歸萬卷書生颯爽來夢中喜極故人回湖山曠劫三吳地何日重生此霸才夢顧干里有乍憶己丑歲與君書訂五年相見君報書云敢不忍死以待豫竟爽約君以甲午春死矣故人有子尚饘粥抱君等身大箸乍劉向而後此大宗豈同陳朝竸目録干里著思適齋筆記校定六籍百家諟其文字且生陳朝後七百載目録方駕陳朝亦足豪矣嗣君守父書京師傳聞誤也今日間愁為洞庭茶花凝想吐芳馨山人生死無消息夢斷查灣一角靑擬尋洞庭山舊遊不果亦不得葉山人昶消息玉立長身宋廣文長洲重到忽思君遙憐屈賈英靈地朴學奇材張一軍奉褱宋于庭丈乍于庭投老得楚南一令奇才朴學二十年前目君語今無以易也太湖七十漊為墟三泖圓斜各有初恥與蛟龍競升斗一編聊獻郟僑書陳吳中水利策于同年裕魯山布政子南宋人父子皆著三吳水利書郟僑郟亶之鐵師講經門徑仄鐵師念佛頗得力似師畢竟勝狂禪師今遲我蓮花國江鐵君沅是豫學佛第一導師先豫歸一年逝矣千劫無以酬德祝其疾生淨土少年哀艷雜雄奇暮氣穨唐不自知哭過支硎山下路重鈔梅冶一奩詩舅氏段右白葬支硎山平生詩晚年自塗乙盡子尚抱其梅冶軒集一卷溫良阿者淚漣漣能説吾家六十年見面恍疑悲母在報恩祝汝後昆賢金媪者嘗保抱豫者也重見于吳中年入十有七阿者出禮記內則今本誤為可者悲母出本生心地觀經天教檮杌降家門骨肉荆榛不可論賴是本支調護力若敖不餒怗深恩到秀水縣重見七叔父乍徑山一吼寰中野燒蒼涼弔達公何處復求龍象力金光明照浙西東明紫柏大師刻大藏板在徑山康熙中由徑山遷嘉興之楞嚴寺今什不存四矣求天台宗各書印本亦無所得有明像法披猖後荷擔如來兩尊宿龍樹馬鳴齊現身我聞大地師子吼拜紫柏藕益兩大師像道場馣馤雨花天長水宗風在目前一任揀機參活句莫將文字換狂禪示楞嚴講主逸雲講主新刻明人楞嚴宗通一書故云一脈靈長四葉貂談經門祚鬱岧嶤儒林幾見傳苗裔此福高郵冠本朝訪嘉興太守王子仁子仁文肅公曾孫石􅋯孫吾師文簡公子祗將愧汗溼萊衣悔極堂堂歲月違世事滄桑心事定此生一跌莫全非於七月初九到杭州家大人時年七十有三倚門望久矣里門風俗尚敦龎年少爭為齒德降桑梓溫恭名教始天涯何處不家江家大人扶杖出遊里少年皆起立小別湖山劫外天生還如證第三禪台宗悟後無來去人道蒼茫十四年浙東雖秀太淸孱北地雄奇或獷頑踏遍中華窺兩戒無雙畢竟是家山親朋歲月各蕭間情話纏綿禮數刪洗盡東華塵土否一秋十日九湖山高秋那得吳虹生乘軺西子湖邊行一􅏀一壑我前導重話京華送我情時巳知浙中兩使者消息非吳虹生也祝其他日使車蒞止耳除卻虹生憶黃子曝衣忽見黃羅衫文章風誼細評度嶺南何減江之南謂蓉石比部家住錢唐四百春匪將門閥傲江濱一州典故間徵遍撰杖觀濤得幾人八月十八日侍家大人觀潮問我淸遊何日最木樨風外等秋潮忽有故人心上過乃是虹生與子瀟吳虹生及固始蔣子瀟孝廉也靈鷲高華夜吐雲山凹指點舊家墳千秋名教吾誰愧愧讀羲之誓墓文表弟吳鷲雲先世丙舍在靈鷲下繪圖乞一詩時豫不至先慈殯宫十四年矣鄉國論文集古歡幽人三五薜蘿看從知閬苑桃花色不及溪松耐歲寒晤曹葛民籒徐問蘧楙王雅臺熊吉陳覺葊春曉諸君眼前石屋著書象三世十方齊現身各搦著書一枝筆各有洞天石屋春葛民以畫象乞題為説假觀偈如何從假入空法君亦莫問我莫答若有自性互不成互不成者誰佛剎為西湖僧講華嚴一品竟又説此偈振綺堂中萬軸書乾嘉九野有誰如季方玉粹元方死握手城東問蠧魚汪小米舍人死矣見其哲弟又村員外與吾同􅳊硯北者先曾祖晚號硯北老人仁願如兄壯歲亡從此與誰談古處馬婆巷外立斜陽弔從兄竹樓醰醰諸老愜瞻依父齒隨行亦未稀各有淸名聞海內春來各自典朝衣時鄉先輩在籍科目年齒與家大人頡頏者五人姚亮甫陳堅木兩侍郎張雲巢鹺使張靜軒胡書農兩學士我言送客非佛事師言不送非佛智雙照送是不送是金光大地喬松寺重見慈風法師于喬松庵叩以台宗疑義聾不答送豫至山門豫辭師正色曰是佛法震旦狂禪沸不支一燈慧命續如絲靈山未歇宗風歇巳過龎家日眚時錢庵居士死矣得其晚年所著宗二卷曩向真州訂古文飛龍滂熹折紛紜經生家法從來異拓本饃糊且餉君在京師阮藝臺師屬為齊侯中􅣂二壺釋文兹吾師覓六舟僧手拓精本分寄徐問蘧屬別釋一通因東問蘧閉門三日了何事題圖祝壽諛人詩雙文單筆記序偈筆秃幸趁酒熟時磨之道義拯之難賞我出處好我書史公副墨問誰氏屈指首寄虬髯吳欲以全集一分寄虹生未寫竟少年哀樂過于人歌泣無端字字真既壯周旋雜癡黠童心來復夢中身猰貐猰貐厲牙齒求覆我祖十世祀我請于帝詛于鬼亞駝巫陽涖雞豕晝夢亞駝告有熹明年三月猰貐死大神羮梟殄梟子焚香敬慰少昊氏碧澗重來薦一毛杉柟喜比往時高故人地下仍相護驅逐狐貍賴爾曹弔朱大發洪士華二人為先祖守塋者也先母殯宫在先祖側地名花園埂也志乘英靈瑣屑求豈其落筆定陽秋百年子姓殷勤意忍説挑鐙為應酬乞留墨數行為異日相思之資者填委牖戶惟撰次先世事行屬為家傳墓表則詳審為之多存稿者瓊林何不積緡泉物自低昂人自便我與徐公籌到此朱提山竭亦無權近日銀貴有司苦之古人粟紅貫朽是公庫不必皆納鏹也豫持論如此徐鐵孫大令榮論與豫合俎膾飛沈竹月喧侍郎十日敞淸尊東南不可無斯樂濡筆親題第四園過嚴小農侍郎富春山館觴咏旬日其地為明金尚書別墅杭人猶稱金衙莊豫品題天下名園金衙莊居第四藏書藏帖兩高人目録流傳四十春師友凋徂心力倦羽琌一記亦荆榛弔趙晉齋魏何夢華元錫兩處士兩君為豫諟正金石墨本記者也兒談梵夾婢談兵消息都防父老驚賴是搖鞭吟好句流傳鄉里只詩名到家之日早有傳誦豫出都留別詩者時有詩先人到之謠吳郎與我不相識我識吳郎拂畫看此外若容添一語舍元殿裏覓長安從妹生與豫昔別時才髫齡今已寡矣妹壻吳郎余固未識面也粵生以其遺像乞題因説此偈科名掌故百年知海島疇人奉大師如此奇材終一令蠧魚零落我歸時弔黎見山同年應南見山順德人官平陽令卒于杭州惠逆同門復同藪謀臧不臧視朋友我兹怦然謀乃心君巳􅒂然脫諸口陳碩甫秀才烉為豫規畫北行事明白犀利足徵良友之愛秋風張翰計蹉跎紅豆年年擲逝波誤我歸期知幾許蟾圓十一度無多以下十有六首杭州有所追悼而乍拊心消息過江淮紅淚淋浪避客揩千古知言漢武帝人難再得始為佳小樓靑對鳳皇山山影低佪黛影間今日當窗一奩鏡空王來證鬢絲斑嬌小溫柔播六親蘭姨瓊姊各霑巾九泉肯受狂生譽藝是針神貌洛神阿娘重見話遺徽病骨前秋盼我歸欲寄無因今補贈汗巾鈔袋枕頭衣雲英未嫁損華年心緒曾憑阿母傳償得三生幽怨否許儂親對玉棺眠杭州風俗鬧蘭盆緑蠟金爐梵唱繁我説天台三字偈勝娘膜拜禮沙門殘絨堆積繡窗間慧婢商量贈指環但乞崔徽遺像去重摹一坐供秋山昔年詩卷駐精魂強續狂遊拭涕痕拉得藕花衫子婢籃輿仍出湧金門蟠夔小印鏤珊瑚小字高華出漢書原是狂生漫題贈六朝碑例合鐫無花神祠與水仙祠欲訂源流愧未知但向西泠添石刻駢交撰出女郎碑小婢口齒蠻復蠻秋衫紅淚澘復澘眉痕約略彎復彎婢如夫人難復難女兒魂魄完復完湖山秀氣還復還爐香瓶卉殘復殘他生重見艱復艱天將何福豫蛾眉生死湖山全盛時冰雪無痕靈氣杳女仙不賦降壇詩一十三度溪花紅一百八下西溪鐘卿家滄桑卿命短渠儂不關關我儂一百八下西溪鐘一十三度溪花紅是恩是怨無性相冥祥記裏魂朦朧草創江東署羽陵異書奇石小崚嶒十年松竹誰留守南渡飛揚是中興復墅墅東修竹欲連天苦費西鄰買筍錢此是商鞅墾土令不同鑿空誤開邊拓墅靈簫合貯此靈山意思精微窈窕間􅏀壑無雙人地稱我無拙筆到眉彎蘄墅此是春秋據亂作舁平太平視松竹何以功成文致之攜簫飛上羽琌問又蘄墅料理空山頗費才文心兼似畫家來矮茶密緻高松獨記取先生親手栽君家先塋鄧尉側佳木生之雜紺碧不看人間頃刻花他年管領風雲色從西鄰徐屏山乞樹栽屏出允至鄧尉求之可惜南天無此花腰身略似海棠斜難忘槐市街南宅小羣芳稿一車憶京師鸞枝花可惜南天無此花麗情還比牡丹奢難忘西掖歸來早贈與妝臺滿鏡霞憶京師芍藥不是南天無此花北肥南瘦二分差願移北地燕支社來問南朝油壁車憶海棠弱冠尋芳數歲華玲瓏萬玉嫭交加難忘細雨紅泥寺溼透春裘倚此花憶丁香女牆百雉亂紅酣遺愛真同召伯甘記得花陰文宴屢十年春夢寺門南憶豐宜門外花之寺董文恭公手植之海棠一首空山徙倚倦遊身夢見城西閬苑春一騎傳箋朱邸晚臨風遞與縞衣人憶宣武門內太平湖之丁香花一首繾綣依人慧有餘長安俊物最推渠故侯門第歌鐘歇猶辦晨餐二寸魚憶北方師子貓萬緑無人嘒一蟬三層閣子俯秋煙安排寫集三千卷料理看山五十年欲寫全集淸本數十分分貯友朋家海西別墅吾息壤羽琌三重拾級上明年俯看千樹梅飄颻亦是天際想此閣宜供天人師檀香三尺博士為阮公施香孰施字徐公字似蕭梁碑造沸像之匠謂之博士擊摩利攴天經豫供天台智者大師檀香像徐問蘧為豫書扁日觀不思議境書楹聯曰智周萬物而無所思言滿天下而未嘗議男兒解讀韓愈詩女兒好讀薑夔詞一家倘許圓鷗夢晝課男兒夜女兒時眷屬尚留滯北方亦仿之近人郭頻畫鷗夢圓圖豫倘容我老半鋤邊不要公卿寄俸錢一事避君君匿笑劉郎才氣亦求田儉歲有鬻田六畝者豫願得之友人來問此事瑰癖消沈結習虛一篇典寶古女無金鐙出土苔花碧又照徐陵讀漢書滬土徐文臺得漢宫雁足鐙以拓本見寄乞一詩是時豫收藏古吉金星散見于羽琌山典寶記者百存一二迥腸蕩氣感精靈座客蒼涼酒半醒自別吳郎高詠減珊瑚擊碎有誰聽曩在虹生坐上酒半詠宋人詞嗚嗚然虹生賞之以為善于頓挫也近日中酒即不能高詠矣隨身百軸字平安身世無如屠釣寬恥學趙家臣宰例歸來香火乞祠官何周妻業並深台宗古轍幸窺尋偷間頗異凡夫法流水池塘一觀心皇初任土乃乍貢卅七畝山可材衆媪神笑豫無貧法丹徒陸生言可用吾友陸君獻著種樹書大指言天下之大利必任土貨殖乃貨植也有土十畝即無貧法昔年曾序之西牆枯樹態縱橫奇古全憑一臂撑烈士暮年宜學道江關詞賦笑蘭成羽琌之西有枯棗一株不忍斧去秋光媚客似春光重九尊前草樹香可記前年寶藏寺西山暮雨怨吳郎丁酉重九與徐星伯前輩吳虹生同年連騎遊西山之寶藏寺歸鞍驟雨重九前三夕乍此詩閣筆而雨似笑山人不到家爭將晚節盡情夸三秋不霣夫容􅝟九月猶開窅窳花弓徐錯音乎感切萊蔔生兒芥有孫借蘇句離披秋霰委黃昏靑松心事成無賴只閲前山野燒痕銀爥秋堂獨聽心隔簾誰報雨沈沈明朝不許沿溪賞巳沒溪橋一尺深空觀假觀弟一觀佛言世諦不可亂人生宛有去來今臥聽簷花落秋半賸水殘山意度深平生幾緉屐難尋栽花鄭重看花約此是劉郎遲暮心復墅拓墅蘄墅了吾將北矣乃圖南無妻怕學林逋獨有子肯為王霸慙料理別墅稍露崖略將自往北方迎眷屬歸以實之從今誓學六朝書不肄山陰肄隱居萬古焦山一痕石飛升有術此權輿涇縣包眘伯贈豫瘞鶴銘九月十一日坐雨于羽琌山館漫題其後二王只合為奴僕何况唐碑八百通欲與此銘分浩逸北朝差許鄭文公再跋舊拓瘞鶴銘昭書謂北魏兖州刺史鄭羲碑鄭道九流觸手緒縱橫極動當筵炳燭情若使魯戈真在手斜陽只乞照書城詩讖吾生信有之預憐夜雨閉門時三更忽軫哀鴻思九月無禱淮水湄出都時有空山夜雨之句今果應今秋自淮以南于里苦雨燕蘭識字尚聰明難遣當筵遲暮情且莫空山聽雨去有人花底祝長生連宵燈火宴秋堂絶色秋花各斷腸又被北山猿鶴笑五更濃挂一帆霜于九月十五日晨發矣美人信有錯刀投不負張衡詠曰愁爇罷心香屢迥顧古時明月照杭州阻風無酒倍消魂况是殘秋岸柳髠賴有阿咸情話好一帆冷雨過婁門從子劒塘送我于蘇州杭州梅舌酸復甜有筍名曰虎爪尖芼以蘇州小㒈欖可敵北方冬菘醃杭人搗梅子雜薑桂摻之名曰梅舌兒擬策孤笻避冶遊上方一塔俯淸秋太湖夜照山靈影頑福甘心讓虎􅏀上方山在太湖南阿咸從我十日遊遇管城子于虎􅏀有筆可槖不可投簪筆致身公與侯劒塘買筆筒乞銘之濯罷鮫綃鏡檻涼無端重試午時妝新詩急記消魂事分與胭脂一掬湯重過揚州有紀少年尊隱有高文猿鶴真堪張一軍難向史家搜比例商量出處到紅裙誰肯心甘薄幸名南􅋈北駕怨三生勞人只有空王諒那向如花辨得明怕聽花間惜別詞偽留片語訂來期秦郵驆近江潮遠是剔銀燈詛我時停帆預卜酒杯深十日無需逆旅金莫怨津梁為客久天涯有弟話秋心從弟景姚以丹陽丞駐南河豫到浦館其廨中豆􅛌芳溫啓瓠犀傷心前度語重題牡丹絶色三春暖豈是梅花處士妻九月二十五日重到袁浦十月六日渡河去留浦十日大抵醉夢時多醒時少也統名之曰寱詞對人才調若飛仙詞令聰華四座傳撑住南東金粉氣未須料理五湖船此二章謝之也鶴背天風墮片言能蘇萬古落花魂征衫不漬尋常淚此是平生未報恩小語精微􅅹耳圓况聆珠玉瀉如泉一番心上溫過明鏡明朝定少年何須宴罷始留髠絳蠟牀前款一尊姊妹隔花催送客尚拈羅帶不開門去時梔子壓犀簪次弟寒花搯到今誰分江湖搖落後小屏紅燭話冬心是夕立冬盤堆霜實擘庭榴紅似相思緑似愁今夕靈飛何甲子上淸齋設記心頭風雲材略巳消磨甘隸妝臺伺眼波為恐劉郎英氣盡卷簾梳洗望黃河玉樹堅牢不病身恥為嬌喘與輕顰天花豈用鈴幡護活色生香五百春眉痕英絶語謖謖指撝小婢帶韜略幸汝生逢淸晏時不然劒底桃花落鳳泊鸞飄別有愁三生花草夢蘇州兒家門巷斜陽改輸與船娘住虎􅏀一自天鍾弟一流年來花草冷蘇州兒家心緒無人見他日埋香要虎􅏀難憑肉眼測天人恐是優曇示現身故遣相逢當五濁不然誰信上仙淪雲英化水景光新略似驂鸞縹渺身一隊畫師齊斂手只容心裏貯穠春釃江作醅亦不醉傾河解渴亦不醒我儂醉醒自有例肯向渠儂側耳聽收抬風花儻􅛅詩凌晨端坐一凝思勉求玉體長生訣留報金閨國士知絶色呼他心未安品題天女本來難梅魂菊影商量遍忍乍人間花草看臣朔家原有細君司香燕姞略知文無須詗我山中事可肯花間領右軍道韞談鋒不落詮耳根何福受淸圓自知語乏煙霞氣枉負才名三十年喜汝文無一筆平墮儂五里霧中行悲歡離合本如此錯怨蛾眉解用兵美人才地太玲瓏我亦陰符滿腹中今日簾旌秋縹渺長天飛去一征鴻靑鳥銜來雙鯉魚自緘紅淚請迥車六朝文體間徵遍那有蕭娘謝罪書電笑何妨再一回忽逢玉女諫書來東王萬八千驍盡為報投壺乏箭材萬一天填恨海平羽琌安穩貯雲英仙山樓閣尋常事兜率甘遲十劫生美人捭闔計頻仍我佩陰符亦可憑綰就同心堅俟汝羽琌山下是西陵身世間商酒半醺美人胸有北山文平交百輩悠悠口揖罷還期將相勳金缸花燼月如煙空損秋閨一夜眠報道妝成來送我避卿先上木蘭船寱詞止于此未濟終焉心縹渺百事翻從闕陷好吟到夕陽山外山古今誰免餘情繞漁溝道中題璧一首欲求縹渺反幽深悔殺前番拂袖心難學冥鴻不回首長天飛過又遺音漁溝道中奉寄一首明知此浦定重過其奈尊前百感何亦是今生未曾有滿襟淸淚渡黃河衆興道中再奉寄一首絶業名山幸早成更何方法遣今生從兹禮佛燒香罷整頓全神注定卿少年雖亦薄湯武不薄秦皇與武皇設想英雄垂暮日溫柔不住住何鄉客心今雨昵舊雨江痕早潮收暮潮新歡且問黃婆渡袁浦地名影事休提白傅橋以上順河道中題壁三首閲厯天花悟後身為誰出定亦前因一燈古店齋心坐不似雲屏夢裏人順河道中再奉寄一首仍敬謝之自此不復為此人有詩矣寄此詩是十月十日也越兩月自北回重到袁浦問訊其人巳歸蘇州閉門謝客矣其出處心迹亦有不可測者附記于此此身巳乍在山泉涓滴無由補大川急報東方兩星使靈山吐澑為糧船時東河總督擊問泉源之可以濟運者吾友汪孟慈戶部董其事銅山縣北五十里日柳泉泉涌出滕縣西南百里曰大泉泉懸出吾所目見也詩寄孟慈并寄徐鏡溪工部昭代恩光日月高蒸彞十器比球刀吉金打本千行在敬拓斯文冠所遭謁歸至聖廟瞻仰純廟領祭器十事得拓本以少年無福過闕里中年著書復求仕仕幸不成書幸成乃敢齋祓告孔子曩至兖州不至曲阜歲癸未五經大義終始論成壬辰羣經寫官答問成癸巳六經正名論成古史鉤沈論又成乃慨然曰可以如曲阜謁孔林矣今年冬乃謁林齋于南沙河又齋于梁家店少為賤士抱弗宣壯為祠曹默益堅議則不敢腰膝在廡下一揖中夷然兩廡從祀儒者有拜有弗拜亦有強豫一揖不可者曩將奄宅證淹中肅肅微言謦咳逢肯拓同文門畔石古心突過漢朝松江左吟壇百輩狂誰知闕里是詞場我從宅壁低佪聽絲竹千秋尚繞梁時曲阜令王君大淮其弟大堉其子鴻皆工詩孔氏則有孔繡山憲彝憲彝弟憲庚孔氏之甥鄭憲銓皆詩人也嘉慶文風在目前記同京兆鹿鳴筵白頭相見山東路誰惜荷衣兩少年酬曲阜令王海門海門吾庚午同年也少年奇氣稱才華登岱還浮八月槎我過東方亦無負淸尊三宿孔融家館于孔經閣憲庚家題經閣觀海圖子雲壯歲雕蟲感擲向洪流付太虛從此不㩣間翰墨男兒當注壁中書經閣投詩江中乍雲水詩瓢圖倘乍家書寄哲兄淮陰重話七年情門前報有關山客來聽西齋夜雨聲時經閣兄繡山方遊京師淮陰鴻爪圖繡山經閣所合乍也家有凌雲百尺條風煙培護漸岧嶤生兒只識秦碑字脆弱芝蘭笑六朝海門種松圖盜詩補詩還祭詩子梅詩史何恢奇鄙人勸君割榮者努力刪詩壯盛時王子梅鴻祭詩圖詩格摹唐字有稜梅花官閣夜鎪冰一門鼎盛親風雅不似蒼芒杜少陵王秋垞大堉蒼芒獨立圖入齡夢到矍相圃今日五君來作主我欲射侯陳禮容可惜行裝無白羽王海門及弟秋垞嗣君子梅孔經閣鄭子斌五君餞之於矍相圃忽向東山感歲華恍如庾嶺對橫斜敢參黃面瞿曇句此是森森闕里花時才十月忽開蠟梅一枝經閣折以伴行前車轍淺後車縮兩車勒馬讓先躍何况東陽絳灌年賈生攘臂定禮樂見兩車子相掉罄有感古人用兵重福將小説家明因果狀不信古書愎用之水厄淋漓黑貂喪或為僕至其相不吉自言事十主皆失官豫不信使庀物物過手輒敗使雇車車覆者四幸豫先辭官矣法苑珠林及明小説皆有此事記之以貽纂類書者天意若曰汝毋北覆車南沙書卷溼汶陽風雨六幕黑申以東平三尺雪蒼生氣類古猶今安用冥鴻物外吟不是九州同急難尼山誰識憮然心北行覆車者四車陷淖中者二皆賴途人以免九邊爛熟等雕蟲遠志真看小草同枉説健兒身手在靑燈夜雪阻山東任􅏀馬首有筝琶偶落吟鞭便駐車北望觚稜南望鴈七行狂草達京華遣一僕入都迎眷屬自駐任􅏀縣待之房山一角露崚嶒十二連橋夜有冰漸近城南天尺五回燈不敢夢􅒀稜兒子書來乞稍稍北乃進次于雄縣又請乃又進次子固安縣艱危門戶要人持孝出貧家諺有之葆汝心光淳悶在皇天竺胙總無私兒子昌匏書來以四詩答之雖然大器晚年成卓犖全憑弱冠爭多識前言畜其德莫拋心力貿才名儉腹高談我用憂肯肩朴學勝封侯五經爛熟家常飯莫似而翁啜九流圖籍移從肺腑家而翁學本段金沙丹黃字字皆珍重為裹靑氊載一車欲從太史窺春秋勿向有字句處求抱徵言者太史氏大義顯顯則豫休兒子昌匏書來問公羊及史記疑義答以一十八字家園黃熟半林柑拋向筠籠載兩三風雪盈裾好持贈預教詩婢識江南從此靑山共鹿車斷無隻夢墮天涯黃梅淡冶山礬靚猶及雙淸好到家眷屬于冬至後五日出都六義親聞鯉對時及身刪定答親慈剗除風雪關山句歸到高堂好背詩今年七月蒙家大人垂詢文集定本命呈近詩論詩論畫復論禪三絶門風海內傳可惜語兒溪畔路白頭無分棹歸舷方鐵珊參軍餞之于保陽鐵珊名廷瑚石門人父薰字蘭士以詩畫名好佛君有父風年七十矣猶宦畿南使君談萟筆通神斗大高陽酒國春消我關山風雪怨天涯握手盡文人陳笠雨明府餞之于高陽笠雨名希敬海昌人以進士為令史甚熟詩古文甚富畫禪有女定淸真合配琳琅萬軸身百里畿南風雪路我來著手竟成春鐵珊有女及笄笠雨喪偶使豫為蹇修焉古愁莽莽不可説化乍飛仙忽奇闊江天如墨我飛還折梅不畏蛟龍奪十二月十九日擕女辛遊焦山歸舟大雪惠山秀氣迎客舟七十里外心先投惠山妝成要妝鏡惠泉那許東北流草二日擕女辛遊惠山丹實瓊花海岸旁羽琌山似峚之陽一家可惜仍煙火未問仙人辟穀方歲不盡五日安頓眷屬于海西羽琌之山戲示阿辛吟罷江山氣不靈萬千種話一燈靑忽然閣筆無言説重禮天台七卷經天下震矜定盦之詩徒以其行間璀璨吐屬瑰麗夫人讀萬卷書供驅使璀璨瑰麗何待言要之有形者也若其聲情沈烈惻悱遒上如萬玉哀鳴世鮮知之抑人抱不世之奇材與不世之奇情及其為詩情赴乎詞而聲自異要亦可言者也至於變化從心倏忽萬匠光景在目欲捉巳逝無所不有所過如掃物之至也無方而與之為無方此其妙明在心世烏從知之鳳知之而卒不能言之嘗聞神全者哀不能感樂不能眩風雨不能蝕晦朔不能移乃至火不能燒水不能溺此道家言似不足以測學佛者之涘抑古今語言所可到之境止於此定公其殆全於神者哉全於神者哉寫已亥雜詩竟聊書簡末庚子穀雨日新安女士程金鳳定盦文集補仁和龔自珍璱人饌蒙古字類表序蒙古文字為國書之祖大海烏巴什未奉詔時國初所用所謂無圈點檔桉者也又為準部託忒之祖託忒十五頭皆略仿蒙古無圈點而末筆直下波方闊者也國書有聯字一體佛典謂之滿字蒙古無之乃皆單行佛家謂之半字準部亦無之也然則蒙古之字曷可不勒成一書以備外史今以波多寡為次序不以天地人物為類欽定三合音淸文鑑之載蒙古字以明聲也西域同文志之附載蒙古書撮舉天地人物相比乃借蒙古字形以明西字形也是表之作乃明以專形也若夫蒙古喇嘛所諷唐古忒諸經有見於今中國大藏本者如大涅槃之字又字隋章安頂師強音之以伊又華嚴經實義難陀本有四畫相如髻形杵形華形等又各經皆有字卍字等居然符合今故標撮一二聊資考證此方僧言聲在空中是無常法未久則變形在實處其變尚遲又言有有聲而無形者此土空圈記是也有有形而無聲者室利靺瑳相之屬是也洵智者之論矣蒙古氏族表及在京氏族表總序浩繁乎欽吉思汗之子孫恭讀高宗皇帝上諭有之日三代而降惟元系至今未絶御製文辨史家稱奇渥溫氏誤也驗以蒙古語定帝姓為博爾吉吉特氏元史各姓氏皆驗以今蒙古語定為瓜爾佳赫舍哩鄂通等如干氏古今聲轉實則一也其未見元史者在蒙古最顯著則有喀喇沁土默待之為烏梁海氏在厄魯特最顯著則有杜爾伯特準噶爾之為綽羅斯氏餘如部氏其四衛拉特三有氏惟土爾扈特無有蓋三姓之先皆以地為氏今鉤索羣書定為恭博必塔氏外至額濟內河土爾扈特亦同氏洪惟太祖太宗統有諸部大小君長先後絡附天聰九年始議定設蒙古固山額真八員如滿洲都統蒙古梅勒章京入員如滿洲副都統順治元年諸部扈駕入關百七十年來按旗界處鬱為功宗其官至一品爵至民公者登進土科者列於表而以某氏原出某部分疏其下八旗各一表蒙古册降表序康熙二年始詔禯官查國朝公主之下嫁外藩者給豫諡號於是追諡太宗文皇帝朝噶爾思所尚主曰端獻長公主追諡世祖章皇帝朝噶爾瑪索諾所尚主曰端順長公主禮臣定例閲十二年凡外藩王妃郡主未册封者理藩院會禮部貝題遣使册封皆以三四五品滿員往夷考前史漢唐有國之年降主遠嫁謂之和昏其外藩遣子入侍則曰盛事此皆孱弱不洽於遠我聖朝以中外為一家四十九旗中匪但開國佐命之勳媲於內臣亦且世世有甥舅之戚宿衛內庭宴賚如諸王其額駙專爵班次在民公下侯伯上而京師府第城中相望或别賜海淀宅內務府掌湯沐禮官考儀品工部司製造出則奉暖轎朱輪車皆金黃雲綺之蓋紅雲綺之幃垂金黃雲綺之幨引之以絳繡曲柄之蓋寶相華之􅓫黑雲綺角之纛孔雀之扇行朱髦七尺香草之仗綴珠龍首之立爪易稱帝妹詩美王姬綦威嚴矣今以國朝公主之適外藩者謹依玉牃詮次其諡號而以外藩福晉郡主之荷册封者貂冠毳襪之倫綴於後為一表曰哈屯者視福晉曰格格者視郡主也上淸真人碑書後余平生不喜道書亦不願見道士以其勦用佛書門面語而歸墟只在長生其術至淺易宜其無瓌文淵義也獨於六朝諸道家若郭景純葛稚川陶隱居一流及北朝之鄭道昭則又心喜之以其有飄颻放曠之樂遠師莊周列禦寇近亦不失王輔嗣一輩遺意也豈得與五斗米弟子並論而並輕之邪至唐而又一變唐之道家最近劉向所録房中家唐世武曌楊玉環皆為女道士而至真公主奉張真人為尊師一代妃主凡為女道士可考於傳記者四十餘人其無考者雜見於詩人風刺之作魚元機李冶輩應之於下韓愈所謂雲囱霧閣事窈窕李商隱又有絳節飄搖空國來一首尤為妖治皆有唐一代道家支流之不可問者也因跋上淸真人碑忽然感此牽連記姑蘇女士阿簫侍附記秦泰山刻石殘字跋尾自珍曰阮公言是也史記實有闕文又有倒文與石刻不符前年於王侍郎紹蘭齋中獲見北宋拓碣石秦刻文與史記絶異呵是文寶只解鈔史記非解造秦刻作偽亦須學問耳洪􅶉存詩曰若將一字比一星二十八宿中添伐豈料未及五十年人間又少十九字邪可為浩歎自珍贅記
