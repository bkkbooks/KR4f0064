front:
  text: 定盦文集仁和龔自珍璱人饌
  hash: sha256:79de64ba89ebb42e9478c9e5db526da370c3d601e4ea398c6279b76f5e179c9b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0064_SBCK_001-1a}
body:
  text: 卷上寫神思銘夫心靈之香較溫於蘭蕙神明之媚絶嫮乎裙裾殊呻窈吟魂舒魄慘殆有離故實絕言語者焉鄙人稟賦實沖孕愁無竭投閒簉乏沉沉不樂抽豪而吟莫宣其緒欹枕內聽莫訟其情謂懷古也曾不朕乎詩書謂感物也豈能役乎鞶帨將謂樂也胡迭至而不和將謂哀也抑婁襲而無疢徒乃漫漫漠漠幽幽奇奇覽鏡忽唏顔色變矣是知仁義坐忘遠慚淵子之聖美意延年近謝郇生之哲不可吿也矧可療也爲銘以寫之銘曰熨而不舎襲予其涼咽而復存􅆺予其長戒神毋夢神乃自動黯黯長空樓萬重樓中有鐙有人亭亭未通一言化爲春星其境不測其神習焉峩峩雲王淸淸水仙我銘代􅃶希聲不􅀓千春萬年燕昭王求僊臺賦燕昭王登虖西郊之臺郭隗侍前劇辛侍後望氣之徒咸在左右淫雨久極黭黭汨汨泥泥沒沒萬民蹙額燥風枯人大川生塵晦晦蠢蠢渴我萬民重以三門六衢上輦􅧚車下不通淸渠百腥塞塡七竅不得以蹔舒萬民􅍠荼於是王乃凭䆠而望之有氣自東南隅來者冉冉兮若靑雲之始翔藹藹兮若初日之未央始凝睇於山隅繼􅅶結乎城岡僾星辰招鸞䍿卽之温温吸之英英外澤淳氣中含幽光胡觸手而盤拏忽値吐其耀􅉭手攬之而􅅶緜乃颺去其無方王使下臺求之三返而無見也於時燕國之徒搢紳大夫西秦南楚韓魏趙之上􅀸客儒感斯氣也盎然而和惚然而靈昡者遇之而明瞀者遇之而精朝不嗛者遇之而飽夕醉者觸之而醒燕王神思屏然穆若有閒以屬大夫上大夫樂毅起對曰斯殆仙者氛歟臣聞有道之國至德之君則是氣從而降之盖山川所以福祥吾君與謀休光玉體之令問者於是乎聞之昭王色喜羣臣上夀起賀上大夫毅乃重曰斯氣也浩蕩兮無極淒迷兮不識胎乎無始之鄕釀乎自然之域巫易招之不能降馮相禳之不能息接晤之而如眞求燖焉而無質善能八城市而變化兮又委隨乎邑國瞥兮若海鳥之轢秋雲宛兮若女手之弄白雪抱之兮若冬雷之不可親思之兮若春女之不􅃘別徒欲求之羣代馬而影迷亂燕蘭而香失願王嬋媛其心令聞孔嘉葅鮓道德藥餌雲霞澹二帝之制作兮思三皇之所華儼王之神王之聰明以引王之眞斯氣必且復見乃擊磬而歌曰王國之福四方是則王國之和四方攸歌使王夜擁燕女不若斯氣左翔􅆺於宇使王晝夢召公不如斯氣之鬱淵於宮王曰善遂率羣臣致齋更其宮曰齋靈之宮名其臺曰求僊之臺平均篇龔子曰有天下者莫高於平之之尙也其邃初乎降是安天下而已又降是與天下安而已又降是食天下而已最上之世君民聚醵然三代之極其猶水君取盂焉臣取勺焉民取巵焉降是則勺者下㑴矣巵者上㑴矣又降則君取一石民亦欲得一石故或涸而踣石而浮則不平甚涸而踣則又不平甚有天下者曰吾欲爲邃初則取其浮者而挹之乎不足者而注之乎則䯂然喙之矣大略計之浮不足之數相去瘉遠則亡瘉速去稍近治亦稍速千萬載治亂興亡之數􅀡以是劵矣人心者世俗之本也世俗者王運之本也人心亡則世俗壞世俗壞則王運中易王者欲自爲計盍爲人心世俗計矣有如貧相軋富相耀貧者阽富者安貧者日瘉傾富者日瘉壅或以羨慕或以憤怨或以驕汰或以嗇吝澆漓詭異之俗百出不可止至極不祥之氣鬱於天地之間鬱之久乃必發爲兵㸂爲疫癘生民噍類靡有孑遺人畜悲痛鬼神思變置其始不過貧富不相齊之爲之爾小不相齊漸至大不相齊大不相齊卽至喪天下嗚呼此貴乎操其本原與隨其時而劑調之上有五氣下有五行民有五醜物有五才消焉息焉渟焉決焉王心而已矣是故古者天子之禮歲終太師執律而告聲月終太史候望而吿氣東無陼水西無陼財南無陼粟北無陼土南無陼民北無陼風王心則平聽平樂百僚受福其詩有之日秉心塞淵騋牝三千王心誠深平畜産且騰躍衆多而况於人乎又有之曰皇之池其馬歕沙皇人威儀其次章曰皇之澤其馬歕玉皇人受穀言物産蕃庶故人得肄威儀茹內衆善有善名也太史告曰東有陼水西有陼財南有陼粟北有陼土南有陼民北有陼風王心則不平聽傾樂乘欹車握偏衡百僚受戒相天下之積重輕者而變易之其詩有之曰相其陰陽觀其流泉又曰度其夕陽言營度也故積財粟之氣滯滯多霧民聲苦苦傷惠積民之氣淫淫多雨民聲囂囂傷禮義積土之氣㘪㘪多曰民聲濁濁傷智積水積風皆以其國瘥昏官所掌也且夫繼喪亡者福祿之主繼福祿者危迫之主語百姓曰爾愳兵燹乎則將起其高曾於九京而問之愳荒饑乎則有農夫在上之繼福祿之盛者難矣哉龔子曰可以慮矣可以慮可以更不可以驟且夫唐虞之君分一官事一事如是其諄也民固未知貿遷未能相有無然君已愳矣曰後世有道吾民於富者道吾民於貧者莫如我自富貧之猶可以收也其詩曰不識不知順帝之則夫堯固甚慮民之識知莫如使民不識知則順我也水土平矣男女生矣三千年以還何底之有彼富貴至不急之物賤貧者猶且筋力以成之歲月以靡之舍是則賤貧且無所託命然而五家之堡必有肆十家之邨必有賈三十家之城必有商若服妖之肆若食妖之肆若翫好妖之肆若男子咿唔求爵祿之肆若盜聖賢市仁誼之肆若女子鬻容之肆肆有魁賈有梟商有賢桀其心皆欲併十家五家之財而有之其智力雖不逮其號旣然矣然而有天下者㪅之則非號令也有四挹四注挹之天挹之地注之民挹之民注之天注之地挹之天注之地挹之地注之天其詩曰挹彼注兹可以餴饎豈弟君子民之父母有三畏畏旬畏月畏歲有四不畏大言不畏細言不畏浮言不畏挾言不畏而乃試之以至難之法齊之以至信之刑統之以至澹之心龔子曰有天下者不十年幾於平矣乙丙之際箸議第一歲辛酉近畿大水越七年戊辰又水甲乙間東南河工婁災客日近年財空虛大吏告民窮而至尊憂帑匱金者水之母母氣衰故子氣旺也一客曰似也子亦知物極將返乎天生物命官理之有所潰有所鬱鬰之也久發之也必暴且吏不能理五行使之和必將反其正性以大自􅂥乃不利今百姓日不足以累聖天子惄然之憂非金乎幣之金與刄之金同不十年其懼或煩兵事賴聖天子維持元氣建本甚厚亦弗瘵也越六年癸酉兖豫役並起四越月平龔子曰其潰者其縱之者咎也其鬱者其鑰之者咎也是以古之大人謹持其原而善導之氣乙丙之際箸議第六自周而上一代之治卽一代之學也一代之學皆一代王者開之也有天下更正朔與天下相見謂之王佐王者謂之宰天下不可以口耳喻也載之文字謂之法卽謂之書謂之禮其事謂之史職以其法載之文字而宣之士民者謂之太史謂之􅀸大夫天下聽從其言語稱爲本朝奉租稅焉者謂之民民之識立法之意者謂之士士能推闡本朝之法意以相誡語者謂之師儒王之子孫大宗繼爲王者謂之後王後王之世之聽言語奉租稅者謂之後王之民王若宰若大夫若民相與以有成者謂之治謂之道若士若師儒法則先王先􅃁宰之書以相講究者謂之學師儒所謂學有載之文者亦謂之書是道也是學也是治也則一而已矣乃若師儒有能兼通前代之法意亦相誡語焉則兼綜之能也博聞之資也上不必陳於其王中不必采於其􅃁宰其太史大夫下不必信於其民陳於王采於宰信於民則必㠯誦本朝之法讀本朝之書爲率師儒之替也源一而流百焉其書又百其流焉其言又百其書焉各守所聞各欲措之當世之君民則政教之末失也雖然亦皆出於其本朝之先王是故司徒之官之後爲儒史官之後爲道家老子氏淸廟之官之後爲墨翟氏行人之官之後爲縱橫鬼谷子氏禮官之後爲名家鄧析子氏公孫龍氏理官之後爲法家申氏韓氏世之盛也登於其朝而習其揖攘聞其鐘鼓行於其野經於其庠序而肄其豆籩栔其文字處則爲佔畢􅃶誦而出則爲條教號令在野則熟其祖宗之遺事在朝則効忠於其子孫夫是以齊民不敢與師儒齒而國家甚賴有士及其衰也在朝者自昧其祖宗之遺法而在庠序者猶得據所肄習以爲言抱殘守闕纂一家之言猶足以保一邦善一國孔子曰郁郁乎文哉吾從周又曰吾不復夢見周公至於夏禮商禮取識遺忘而已以孔子之爲儒而不高語前哲王恐􅌸本朝以干戾也至於周及前漢皆取前代之德功藝術立一官以世之或爲立師自易書大訓雜家言下及造車爲陶醫卜星祝倉庾之屬使各食其姓之業業修其舊此雖盛天子之用心然一代之大訓不在此也後之爲師儒不然重於其君君所以使民者則不知也重於其民民所以事君者則不知也生不荷耰耡長不習吏事故書雅記十窺三四昭代功德瞠目未睹上不與君處下不與民處由是士則別有士之淵藪者儒則別有儒之林囿者昧王霸之殊統文質之異尙其惑也則且援古以刺今囂然有聲氣矣是故道德不一風教不同王治不下究民隱不上達國有養士之貲士無報國之日殆夫殆夫終必有受其患者而非士之謂夫乙丙之際箸議第七夏之旣夷豫假夫商所以興夏不假六百年矣乎商之旣夷豫假夫周所以興商不假八百年矣乎無八百年不夷之天下天下有萬億年不夷之道然而十年而夷五十年而夷則以拘一祖之法憚千夫之議聽其自陊以俟踵興者之改圖爾一祖之法無不敝千夫之議無不靡與其贈來者以勍改革孰若自改革抑思我祖所以興豈非革前代之敗耶前代所以興又非革前代之敗耶何茻然其不一姓也天何必不樂一姓耶鬼何必不享一姓邪奮之奮之將敗則豫師來姓又將敗則豫師來姓易曰窮則變變則通通則久非爲黄帝以來六七姓括言之也爲一姓勸豫也乙丙之際箸議第九吾聞深於春秋者其論史也曰書契以降世有三等三等之世皆觀其才才之差治世爲一等亂世爲一等衰世別爲一等衰世者文􅀋治世名類治世聲音笑貌類治世黑白雜而五色可癈也似治世之太素宮羽淆而五聲可鑠也似治世之希聲道路􅂽而畔岸隳也似治世之蕩蕩便便人心混混而無口過也似治世之不議左無才相右無才史閫無才將庠序無才士隴無才民􅒡無才工衢無才商抑巷無才偷市無才駔藪澤無才盜則非但尟君子也抑小人甚尟當彼其世也而才士與才民出則百不才督之縛之以至於僇之僇之非刀非鋸非水火文亦僇之名亦僇之聲音笑貌亦僇之僇之權不告於君不吿於大夫不宣於司市君大夫亦不任受其法亦不及要領徒僇其心僇其能憂心能憤心能思慮心能作爲心能有廉恥心能無渣滓心又非一日而僇之乃以漸或三歲而僇之十年而僇之百年而僇之才者自度將見僇則蚤夜號以求治求治而不得誖悍者則蚤夜號以求亂夫悖且悍且睊然眮然以思世之一便已才不可問矣曏之倫有辭矣然而起視其世亂亦竟不遠矣是故智者受三千年史氏之書則能以良史之憂憂天下憂不才而庸如其憂才而悖憂不才而衆憐如其憂才而衆畏履霜之屩寒於堅冰未雨之鳥戚於漂搖痺癆之疾殆於癰疽將萎之華慘於槁木三代神聖不忍薄譎士勇夫而厚豢駑羸探世變也聖之至也乙丙之際箸議第十八君不敢於臣父不敢於子死於市者朋友哭之達官畏鬼士以水火盗賊風雨歌笑涕淚女色飾文章有聞如雷曰不祥之大者以鳥獸治大官大官以鳥獸治有司鬼以水火風雨盜賊賊士鳥獸以水火風雨盜賊予人國或以爲祥祥吿於堂不祥諱於牀鬼發其藏祥而不祥衰世諱之不祥之祥聖者以饗帝乙丙之際箸議第十九博矣夫大聖人之知物也自珍壬申春出都近畿小旱車夫以箠柄擊道㫄土幞幞然落形如箠訝之明年入都又旱與山東一老父談言吾土觕不受水受亦卽竭安得南邊鬆泥邪又三年發舊邸抄讀之乾隆初有言東南之土肌理橫故宜水西北之土肌理􅀡故不宜水硃批曰所奏情形是於是積數年之疑豁然矣田夫野老騶卒之所習孰今學士大夫謝之以爲不屑知自珍獲知之而以爲剏聞豈知先進言焉而畢瞭聖天子處九重之上聞焉而畢識敂焉而畢宣則豈非睿知天縱而又宏加之以聖學者耶元虞集明徐孺東汪應蛟董應舉左光斗朱長孺之倫皆言西北水利其言甚美意者西北地大土理類東南者必有多處數公其皆親履而辨之歟智者定議能當鉅疑斯亦甚可疑之一也箸諸簡以問之釋風古人之世儵而爲今之世今人之世儵而爲後之世旋轉簸盪而不已萬狀而无狀萬形而无形風之本義也有然引申焉叚􅑅焉爲起於蘋末之風爲怒於土囊之口之風爲昌闔不周明庶之風非本義矣客曰從虫之義可得聞乎曰不從虫則余無以知之矣且吾與子何物固曰倮蟲文積虫曰蟲天地至頑也得倮蟲而靈天地至凝也得倮蟲而散然而天地至老夀也得倮蟲而死天地猶旋轉簸盪於虫矧虫之自爲旋轉而簸盪者哉微夫可怖夫客曰謂天地之有死疑者半焉謂天地古今之續爲虫之爲平心察之弗奪矣許愼曰風生百虫故從虫莊周曰夔憐蚿蚿憐蛇蛇憐風風憐目二者孰長吿之日許之言則倒寘者也莊之言則橫行者也道家者流又言無形么虫萬億晝夜齧人膚膚覺者億之一耳是故有老死病是說也予亦信之要皆臣僕吾說黃山銘有序予幼有志欲偏覽皇朝輿地銘頌其名山大川甲乙間􅆡淫古歙州乃銘黃山我浮江南乃禮黃嶽秀吞閬風高建杓角沈沈仙靈浩浩巖壑走其一支南東磅礴蒼松髯飛丹砂飯孰海起山中雲乃海族雲聲海聲軒后之樂千詩難窮百記徒作惜哉夏后橇車未經惜哉姬王八駿未登中原隔絕版圖晦冥珪升璧瘞報岱慙衡哀忍之華有植焉在天地間不能以名强名之日􅃘是能華而香不外出氲氲沈沈以返乎其根爲之哀曰雲猗霞猗天女所憐猗而投之人間猗飄搖猗悲風颺猗慘怛猗陰氣􅆷猗淒心魂猗鬱猗坱猗又孔之猗何以寵之棘十重猗春不得抽㽔夏殞妍猗蹇以盤猗毒霾霾猗蛇虺所蟠猗心苦猗不可以傳猗材孔淸猗性孔靈猗怳不可以名猗哀此忍樹猗毋久閟汝香猗行歸而鄕猗雲霞之樂長猗別辛丈人文新安郡齋古桂唐時植也尊之曰辛丈人相依者四年茲將別去爲文使聽之其詞曰我來新安神思窈冥晝夕何見丈人靑靑我歌其文丈人常聽我思孔煩言爲心聲傷時感事懷都戀京歌不可止舞亦不亭別有妙詞一家不名雲煙消眇金玉瓏􅌑文奇華古文逸華馨文幽華邃文怨華零有鸞來窺翔顚自鳴匪其和余丈人之靈山雨春沸城雲暮扃簡而不僵丈人之形辛而不煎丈人之情逝今去兹何年再經華開月滿照吾畱銘皇朝碩輔頌二十一首存序我朝龍飛東海霆讋中夏廟謨睿武先後繼承自尼堪外蘭始征以還薩滸松山凡數大戰未及百年傳檄區宇定鼎以後又百七十年祖恢九有之勳宗紀十全之績聲靈則雷厲風飛景運則天翊神贊其中蕩定三藩親征漠北冉䮾睢盱之國臺灣澔汗之鄕西戎二萬里部落數百支乃洪􅂽所未通洎累朝而大定自帝鴻禦火災共工定水害以來武功之盛未有少及本朝者也自古平地成天之主必有文經武緯之臣指顧中外驅畫山河捧日月之光華䇿風雲而後先天祐聖淸篤生碩輔朝夕降乎崧嶽日月下其列星佐命定中原建䇿揚大伐倚劍崑崙之山飮馬星宿之海八地九天之奇兵秘乎豹略五行十守之正道撻此龍庭亦有保奭揚末命公高亮四世無開疆之績有論道之忠凡若此者豈僅營平龍雒增徹侯之戸橫海樓船建將軍之號蘭臺濡筆頌封闐顔之山博士矢歌美平淮西之績而已矣實乃攷於詩書無此偉者讀其姓氏恍若神人愳山澤之癯有不盡知用敢仰衷國史作贊二十有一若夫璿牒親藩瑤圖上爵同姓大功逾朱虛東牟之至親文子武弟有周公康叔之明德此其地位尊崇祀典不名國史乃敢敬書下士不容僣頌也又有亾殷事周相韓歸漢雖亦從旗鼓著勛勣恭稟特筆列於貳臣兹亦不及之云爾太倉王中堂奏疏書後皇淸故太子太保文淵閣大學士太倉王公掞字藻儒奏疏一卷我聖朝受天大命以聖􅀓聖家法相詒不立皇太子純皇帝嘗申命曰萬世子孫之朝有奏請冊立太子者斬毋赦以數大聖人之用心持識夐然前後千萬歲不但漢唐宋諸朝不足以爲例卽羲炎頊嚳以來統􅍈之正氣運之隆豈有倫比掞區區抱螻蟻之忠逞隟穴之窺於康熙五十六年五十九年六十年奏請冊立皇太子疏前後十餘上聖祖始優容不報掞疏不止自攖震怒然猶擴天地之量垂日月之鑒愍其愚忠憐其髦昏廷議以遠戌上其子奕淸請代父往竟曲從之革職有旨不開缺元旦行大賀章上諭內閣王掞何故不列名諸臣以革職對有旨令列名大學士次中如在任時以世宗卽位之二年薨於京師年已八十有六嗚呼爲人臣子如掞遭遇君父如我聖祖世宗可以觀矣可以觀矣恭讀聖祖諭曰王掞敢將國家最大之事妄行陳奏又曰朕心深爲憤懣又曰王奕淸代父譴戌伊等旣自命爲君爲國之人著卽前往西陲軍前效力是故君父之慈臣子無所不容教誨委曲至夫斯極王氏世世萬子孫宜何如感泣高厚以塞罪過者哉高宗皇帝臨御六十年如堯勌勤乃兢兢付託爲百神擇主爲先聖擇後聖爲兆民擇父母誕以我皇帝册立皇太子明年行授受禮堯坐於上舜聽於下重光曡照者且四年不徒如前史冊太子事則固出於一人之斷而豈待夫奏請之者可見至大至深之計聖明天縱之主又自能運於一心而成之固不必區區儒生抱螻蟻之忠逞隟穴之窺自命忠孝始克贊夫景烈與鴻祚也惟是夷攷掞上疏之年亦恭値仁皇帝勌勤之際與高宗六十年時時埓事均又値廢太子理密親王鎻禁後老臣衰憊其愚忠近似於不得已者意者純皇帝讀實錄之暇俛見掞之私憂過計默思仁皇帝不加罪之故翻然以泰山而取塵以東海而受勺故卒有是至大至深之顯休命邪未可知也信若斯公雖一時觸忤君父而其言且大用於七八十年之後爲神聖師公顧不榮也哉徐尙書代言集序崑山徐家鼐裒其先所箸述曰徐尙書代言集者若干卷其曰文集者又若干卷其總曰三徐文者又若干卷墨者雕泐者新而授浙人龔自珍序其恉自珍爰大書於代言集之首曰上帝息其精英之氣閟之百數十年眷世而生天子眷天子而生大臣有厲劍執槊定一代大難之大臣有開一代文教之大臣生是世也熏然而醲爛然而光芬然而大吉祥豈惟德之滂流與政之肅亦文事也明自中葉以還洎乎孱亾華質凋喪䵷吠廟堂螉及四方纖兒仄􅆆爭相怒頏我世祖章皇帝一統海宇首開甲乙科聖祖仁皇帝昌進科目純用方聞士數十年間雲升露降植效十讀四歎雲三色而爲霱也五色而爲慶也露結采而成文也結味而成甘也自大小牙門百執事以及寰海吏士農民媐媐然如圖畫見於幅上引吾之神化吾之情而游之乎羲炎堯舜之丗嗚虖公之斯文於是不專爲公之文之盛矣自珍又曰本朝博學宏詞科始發自公將以收拾明季遺佚之士集中恭擬諭旨三通是自珍又曰仁皇帝撤三藩之謀公之季預叅贊之公科新而官卑所傳恭擬癸丑科殿試䇿問一道乃宏文作非公也家乘中語恐非是自珍又告家鼐曰王鴻緒之脩明史亦主公王於徐爲婭亦文獻家也今天子諮古姓錄舊典必不遺之矣吾子盍之華亭王氏咨焉自珍又曰康熙中有議政王大臣而無軍機大臣大事關大臣羣事關內閣譔擬諭旨則關南書房南書房之􅃟與雍正以來軍機房等是集公􅀡南書房時筆也與徽州府志局纂修諸子書示條迾十五􅁓謹代達家大人矣氏族表發凡大人最所佩服餘名目皆有法二三君子鈎鈲理解之符動合經術後賢必知之各傳卷帙視采訪局原議已減十之四蒙有未安不識乃繆其恉以發其愚歟敢貢其一耑而睎通人之擇府志非史也尙不得比省志今法國史取大淸一統志一統志取省志省志取府志府志特爲底本以儲它日之史君子卑愻之道􅀡而勿有之義宜繁不宜簡設等而下之作縣志必應㪅繁於是乃中律令何疑也蒙知二三君子必不􅃘重翦除埋没忠淸文學幽貞郁烈之士女以自試其文章而特恐有不學茍夫爲不仁之言以刺侍者之耳徽人亦愳矣明甯陵呂氏嘗曰史在天地間如形之景人皆思其高曾也皆願覩其景至於文儒之士其思書契已降之古人盡若是已矣是故良史毋吝爲博多以貽之以饜足之良史者必仁人也且史家不能逃古今之大勢許叔重解字之文曰字孳也孳生愈多也今字多於古字今事賾於古事是故今史繁於古史等而下之百世可知矣等而上之自結繩以迄周平王姓氏其何幾左􅏀明聚百四十國之書爲春秋二百四十年之間乃七十萬言其事如蟻豈非周末文勝萬事皆開於古而又耳目相接文獻具在不能以已於文遂剏結繩以還未嘗有者乎聖門之徒無譏其繁者設令遇近儒必以唐虞之史法繩之議其縟而不師古矣二三君子他曰掌翰林主國史走猶思朝上狀夕上狀自上國文籍至於九州四荒深海穹峪􅈎臣蠻妾皆代爲搜輯而後已而不􅃘以簡之說進今事無足疑也康熙間崑山徐尙書主修一統志吏上節婦名多至十餘卷門下士請核減公正色曰國朝風敎邁前古宜備載其盛矜後世也嗚呼是公之所見者甚大抑其詞令可謂有文者矣如二三君子病蒙之言爲狂或難以塞􅀖之拘古敢論議者則請置蒙之狂言勿道道尙書語爲雍容可也賓館戒寒伏承不一一附復札汪龍洪飴孫武穆淳胡文水頓首璱人世兄史席來札言者是也不特見識卓越具仰見廣大慈祥之襟抱他曰登史館係文獻之望敢在下風不任佩服之至龍偶與同局言及漢文帝本紀九年止書春大旱一事後三年亦止書二月行幸代一事假令爲唐書則不能矣降而爲明史帝紀益無取矣劉向班固錄書三十八種一萬三千二百六十九卷其中秦漢以降之書倍蓰於三代風運日開言行日出盡爲史家所不能廢何嘗以孔子删詩書自比兹龍等依來字吿同局諸君凡傳目中應補之人及藝文志應補書名茍不悖義迾者皆羼入傳曰善善欲其長亦春秋之志也君子之言信而有徵能通經史之理可與徵斯言矣附問近祺謹希代問尊大人政祉不具十一月某日資政大夫禮部侍郞武進莊公神道碑銘􅀸大夫能以學術開帝者下究乎羣士俾知今古之故其澤五世十世學足以開天下自韜汚受不學之名爲有所權緩亟輕重以求其實之陰濟於天下其澤將不惟十世以學術自任開天下知古今之故百年一人而已矣若乃受不學之名爲有所權以求濟天下其人之難或百年而一有或千載而不一有亦或百年數數有雖有矣史氏不能推其迹門生學徒愚子姓不能宣其道若是謂之史之大隱有史之大隱於是奮起不爲史而能立言者表其灼然之意鉤曰於虞淵而懸之九天之上俾不得終隱焉而已矣大儒莊君諱存與江南武進人也幼誦六經尤長於書奉封公教傳山右閻氏之緒學求二帝三王之微言大指閔秦火之欝伊悼孔澤之不完具悲漢學宮之寡立多癈懲晉代之作僭與僞恥唐儒之不學見紿大笑悼唐以還學者之不審是非雜金玉敗革於一衍而不知賤貴其罪至於褻帝王誣周孔而莫之或禦蓋公自少入塾而昭昭善別擇矣旣壯成進士閻氏所廓淸已信於海內江左束髮子弟皆知助閻氏言官學臣則議上言於朝重寫二十八篇於學官頒賜天下考官命題學僮諷書僞書毋得與將上矣公以翰林學士􅀡上書房爲師傅聞之忽然起逌然思鬱然歎愾然而寤謀方是時國家累葉富厚主上神武大臣皆自審愚賤才智不及主上万一公自顧以儒臣遭世極盛文名滿天下終不能有所補益時務以􅀒庥隆之期自語曰辨古籍眞僞爲術淺且近者也且天下學僮盡明之矣魁碩當弗復言古籍墜湮什之八頗藉僞書存者什之二帝冑天孫不能㫄覽雜氏惟賴幼習五經之簡長以通於治天下昔者大禹謨廢人心道心之旨殺不辜甯失不經之誡亡矣太甲廢儉德永圖之訓墜矣仲虺之誥廢謂人莫已若之誡亡矣說命廢股肱良臣啟沃之誼喪矣旅獒廢不寶異物賤用物之誡亡矣冏命廢左右前後皆正人之美失矣今數言幸而存皆聖人之眞言言尤疴癢關後世宜貶須臾之道以授肄業者公乃計其委曲思自晦其學欲以􅑅援古今之事勢退􅀡上書房日著書曰尙書旣見如干卷數數偁禹謨虺誥伊訓而晉代剟拾百一之罪功罪且互見公是書頗爲承學者詬病而古文竟獲仍學官不廢公中乾隆乙丑科進士以一甲第三名授翰林院編修婁遷至禮部右侍郞誥授資政大夫周時有仕爲漆園吏著書內外篇者其祖也曾祖諱某祖諱某考諱某妣氏某皆封如公官妣封夫人子人某某述祖以文學最有聲孫人某某綬甲最有聲公以乾隆年卒於官年十有以嘉慶年葬某山某原公它所著尙有周官記六卷公性亷鯁典試浙江浙巡撫餽以金不受遺以二品冠受之及塗從者以告曰冠頂眞􅃢瑚也􅀡千金公驚馳使千餘里而返之爲講官日上御文華殿同官者將事上起講儀畢矣公忽奏講章有舛誤臣意不謂尔也因進琅琅盡其指同官皆大驚上竟爲少畱頷之是二事者於公爲節謹附書銘曰大儒莊君旣亡粤嘉慶二十有三年綬甲始爲書測君志以告綬甲友其友􅘴其詞肯銘乃克銘君於武進之阡送吳君序十八九讀古書執筆道天下事有孰子裾而訊者曰世固無人愼勿爲若言則怒喙之曰不奈何無人入世五六年窺當路議論顔色車敝敝周乎國門又有執予裾而訊者曰世尙有人安用若則又怒而喙之曰不奈何有人始之否也不知其無也繼之否也不信其有也東西南北以爲客游海然而心􅃼洋目迷澌乘孤舟洄乎大漩之中􅄓浪訌作魂魄皆渙散怪鳥悲鳴日暮冥冥求所謂奇虬巨鯨大珠空靑卒無有已矣退而歸於垤心已定矣􅊿已合矣槁乎其如息傫乎其不任􅀒載然而有敂吾門貢吾以奇虬巨鯨大珠空靑之異者疑什而信一疑什而信一則是志已忘也志忘則欲其驚也難且勸復往則必色色恐矣求涼而飲冰求熱而熾炭求絶交而寂寞求得明而奮起不亦順乎何居吳子之以炭投我於冰之辰也意者造物使予不平凡所求焉無一而使之平始之否也則繆矣繼之否也又繆矣吳子來是造物者􅄂以冰炭投於余之心也吳子請行其復之於海乎倘見有少年孤舟獨行者郵以眂予予請復往送夏進士序乾隆中大吏有不悅其屬員者上詢之以書生對上曰是胡害朕亦一書生也大吏悚服嗚呼大哉斯言是其炳六籍訓萬禩矣嘉慶二十二年春吾杭夏進士之京師將銓縣令紆道別余海上相與語益進睟然愉謖然淸論三千年史事意見或合或不輒咍然以懽予曰是書生非俗吏海上之人以及鄕之人皆曰非俗吏之京師京師貴人長者識予者皆識進士亦必曰非俗吏也雖然固微窺君君若懼人之訾其書生者又若有所諱夫書者暴於聲音笑貌焉天下事舍書生無可屬眞書生又寡有一於是而懼人之訾已而諱之耶且如君者雖百人訾之萬人訾之囓指而自誓不爲書生以喙自衞嘵嘵然力辯其非書生其終能肖俗吏之所爲也哉爲之而不肖瘉見其拙􅅆護其拙􅀔必書生與俗吏兩無所據而後已噫以書生之聲音笑貌加之以拙濟之以􅅆護終之以失所據果爾則進士之爲政也病矣新婦三日知其所自育新官三日知其所與予識進士十年旣慶其祿之及於吾里有光而又恐其信道之不篤行且一前而一卻也於其行恭述聖訓以附古者朋友贈行之義農宗龔子淵淵夜思思所以撢簡經術通古近定民生而未達其目也曰古者未有后王君公始有之而人不駭者何古者未有禮樂刑法與禮樂刑法之差始有之而人不疑愳者何古者君若父若兄同親者何君若父若兄同尊者何尊親能長久者何古之爲有家與其爲天下一以貫之者何古之爲天下恒視爲有家者何生民之故上哉遠矣天穀没地穀茁始貴智貴力有能以尺土出穀者以爲尺土主有能以倍尺若什尺伯尺出穀者以爲倍尺什尺伯尺主號次主曰伯帝若皇其初盡農也則周之主伯與古之輔相大臣盡農也則周之庸次比耦之亞旅與土廣而穀衆足以芘其子力能有文質祭享報本之事力能致其下之稱名名之曰禮曰樂曰刑法儒者失其情不究其本乃曰天下之大分自上而下吾則曰先有下而漸有上下上以推之而卒神其說於天是故本其所自推也夫何駭本其所自名也夫何疑何懼儒者曰天子有宗􅀸大夫公侯有宗惟庶人不足與有宗吾則曰禮莫初於宗惟農爲初有宗上古不諱私百畝之主必子其子其没也百畝之亞旅必臣其子餘子必尊其兄兄必養其餘子父不私子則不慈子不業父則不孝餘子不尊長子則不弟長子不贍餘子則不義長子與餘子不别則百畝分數分則不長久不能以百畝長久則不智農之始仁孝弟義之極禮之備智之所自岀宗之爲也百畝之農有男子二甲爲大宗乙爲小宗小宗者帝王之上藩實農之餘夫也有小宗之餘夫有羣宗之餘夫小宗有男子二甲爲小宗乙爲羣宗羣宗者帝王之羣藩也餘夫之長子爲餘夫大宗有子三四人若五人丙丁爲羣宗戊閒民小宗餘夫有子三人丙閒民羣宗餘夫有子二人乙閒民閒民使爲佃閒民之爲佃帝王宗室羣臣也古者無文用撢稽而可知也請定後王法百畝之田不能以獨治役佃五餘夫二十五畝亦不能以獨治役佃一大凡大宗一小宗若羣宗四爲田二百畝則養天下無田者九人然而天子有田十萬畝則天下無田亦不饑爲盜者四千有五百人大縣田四十萬則農爲天子養民萬八千人什一之賦尙不與非以德君也以德而族非以德族也以食有力者佃非卬食吾宗也以爲天下出穀然而有天下之主受是宗之福矣百畝之宗以什一爲宅以什一出租稅奉上宅不什一則不足以容魚菽之祭不足以容舂揄稅不什一則不足以爲天子養官屬及􅃟舉之士以什一食族之佃佃不食什一則無以戚期功以什一奉上誼亦薄矣以什一戚期功恩亦閷矣聖者立法以中下齊民不以上齊民大宗有十口實食三十畝桑苧木棉竹桼果蓏十畝糶三十畝以三十畝之糶泊家具家具始於縛帚縛籜以爲帚冶泥以爲釡厥價陶三之機杼四之鐙五之祭豆七之米斗直􅁑布匹絹三之木棉之布視絹皆不得以澹泉貨百家之城有貨百兩十家之市有泉十繩裁取流通而已則衣食之權重則泉貨之權不重則天下之本不濁本淸而法峻誅種藝食妖辣地膏者梟其頭於隴没其三族爲奴宗爲餘夫請田則關大吏佃同姓不足取諸異姓爲變法關羣吏豐凶肥磽寡庶易不易法不盡同關羣吏國有大事以宗徙徙政關大吏餘夫家五口宅五畝實食十畝以二畝半稅以二畝半食佃以二畝半治蔬苧以二畝半糶自實食之外宅稅圃糶佃五者毋或一癈凡農之仕爲品官大夫者則有祿田大官之家父有少疾瘯寒暑濕乾不以使其子山川鬼神則使之子有少疾瘯寒暑濕乾不以愬其父崇有家也田一品者四世二三品三世四品二世五品一世皆勿稅勿予俸六品以下予之俸婢妾之養不備則不世祠祭弗如式不世不辨菽粟亦不世食妖服妖不世同姓訟亦不世督有家也家受田㱕田於天子皆關大吏稽其世數關羣吏本百畝者進而仕謂之貴政之農本仕者退而守百畝謂之釋政之農本不百畝者進而仕謂之亢宗之農本仕者退而不百畝謂之復宗之農仕世絶本大宗者復爲宗本小宗者復爲小宗本羣宗者復爲羣宗本閒民復爲閒民貴不奪宗祭不以朝政亂田政自大宗以至於閒民四等也四等之農與其進扞而國也姑將退保於宗與其進保而宗也姑將退修於宅是故籌一農身身不七尺人倫五品本末原流具矣籌一農家家不十步古今帝王爲天下大綱總目備矣木無二本川無二厡貴賤無二人人無二治治無二法請使農之有一田一宅如天子之有萬國天下姑試之一州州蓬跣之子言必稱祖宗學必世譜諜宗能收族族能敬宗農宗與是州長久泰厲空虛野無天札鬼知戀公上亦百福之主也附圖一大宗圖大宗子甲襲大宗百畝父六十而襲子乙立爲小宗別請田二十五畝卽餘夫也餘夫不見經惟見孟子及何休公羊傳注正可證吾宗法子丙丁皆立爲羣宗皆請田二十五畝皆餘夫也孟子何休皆不言餘夫是何等民故以宗法定其目焉戊爲閒民若依古制毎夫百畝田何以紿故立四等之日以差圖二小宗圖小宗子甲襲小宗之二十五畝父六十而襲父母老必養於宗子之家故大宗以十口率小宗以五口率雖過是亦足食子乙立爲羣宗別請田二十五畝子丙閒民圖三羣宗圖羣宗子甲襲羣宗之二十五畝父六十而襲子乙閒民雖堯舜不能無閒民安得盡男子而百畝哉周之農必有宗法何疑海門先嗇陳君祠堂碑文開國以降奇杰之士達節之民挺瓌怪之姿躬淳古之行生而魁於凡民没而當祭於社者不有文事其無稱乎先嗇陳君厥諱朝玉字曰璞完江南某縣人也幼有異稟膚色黝桼臍窪若臼環要有白文其圜中規相人者言是爲玉帶園當奇異稍長衎然魁頎故其鄕之人嘗已疑其神年十三讓產伯兄鴻鶱鳳逝去之無迹是時皇政熙淸后祗効靈海之君王來獻土壤以福吾黎元通州常孰間東地望洋無極潮退沙見豁然劃然亘二百里君履其側四無居人蒼芒獨覽曰吾當屋於是率妻來遷剏草屋斵木爲耜冶釡爲犂夫任半耦婦任半耦一耦之力旬有五日水鹹者立甘沙疏者立堅沙膚窳者立厚秸苗旣成􅀛魚大上不封不爵樂衎自保於是遠近之民聞之僉曰神哉稚請於長長請於老莫不削薪以爲之耜投刀以爲之犂賣􅐒以求牛懷穜稑儲瓶缶挈大男袵幼女效君而歸君願爲海農洋洋載道於是稚請於長長請於老老謁於正正謁於吏吏白於大吏天子籍其地以爲海門㕔不十年羣姓益衆皆造瓦屋炊烟起如海雲國家歳八地丁漕米累千近萬爲江海大聚君生康熙某年卒乾隆某年年七十四婦劉年九十君之屋於海也幾六十年不蓄墨楮結繩而治歲終夫婦解繩之紒以計事事纎芥無忘失夀考以爲常君卒將百年君之曾孫貢生奐以經明聞於時元孫翰林院編修兆熊餔祿於朝乃召其鄉之人而謀之曰古者伊耆氏始爲蜡饗農先農也先嗇司嗇皆農之配也今法凡城鄣大聚皆得立蜡祠吾祖宜爲先嗇始吾祖刈殺此土以利後之人生有奇異如天之公侯今海門㕔士姓無吾陳氏舊且大宜爲祠祠吾祖皆曰田父老之志也於是旣爲祠奐兆熊以狀謁內閣中書龔自珍請書於其祠之榜又因以爲樂石之文龔自珍則大書之如是狀又稱君不知書乃能作書點畫英碩神明所流匪道匪藝不可得而詳也頌曰生爲功民衆疑以爲神沒爲功神尙其福吾民琴瑟士女以招君兮豆觥明粢以報君兮文此樂石以震耀君兮以大旌於海濱且以勸田與人箋一客言足下始工於文詞近習考訂僕豈願通人受此名哉又云足下旣習考訂亦兼文詞又豈願通人受此名哉足下示吾近勇去口吻之冶俊爲汪洋鬱栗沖夷是文章之祥也而頗憙雜陳枚舉夫一二瑣故以新名其家則累矣累矣古人文學同驅並進於一物一名之中能言其大本大原而究其所終極綜百氏之所譚而知其義例徧入其門徑我從而筦鑰之百物爲我􅈻用茍樹一義若渾渾圜矣則文儒之總也與人箋二少習名家言亦有用居亭主獷獷嗜利論事則好爲狠刻以取勝中實無主野火之發無司燧者百里易滅也某公端端醉後見疎狂殆眞狂者某君借疎狂以行其世故某君效爲騃穉以行其老詐某一席之議前後不相屬能勦說而無線索貫之慮不夀朝士方貴亦作牢騷言政是酬應我曹耳善忌人者術最多品最雜最工者乃借風勸忠厚以濟耡而行伐使受者傷心而外不得􅀡騖名之士如某君孤進宜憫諒也某童子妍􅀧万狀志賣長者奸而不雄死而諡愍悼者哉與人箋三吾子改之夷坦酣嬉於人人以機械至吾子覺大恨婁受侮吾子必改之道無畦者事有閾也中無險者貎有畔也與之爲無滓無擇又不制於外吾子必受侮矣言難則聽者重步難則與遊者重愛憎難則受者重重則不予侮乃全吾愛書曰剛而無虐簡而無傲論語曰君子敬而無失與人恭而有禮四海之內皆兄弟也從吾子之行必且曰恭敬爲僞薄胡不與人坦夷而酣嬉市人之兄弟異乎士大夫之所聞纎夫佻人當吾前而不有忌憚君子深恥之曰我之不足忌彼窺之矣與人箋四手敎至引拙集知歸子贊無不隨也相詰隨之義自與前札無刺謬足下之疎輕而酣嬉婁受侮慎毋以吾隨藉口善交友而無受侮如吾箴中言是亦隨而已矣因其當恭敬而恭敬之是亦隨而已矣吾子何所見之偏側哉引莊子益繆莊子曰吾虗而與之委蛇委蛇耳而與之乎騁馳而與之乎沈溺而與之乎上九天絶九淵眞吾子所謂隨矣必奪其中矣烏能虚定盦續集仁和龔自珍璱人籑卷一說京師翠㣲山翠㣲山者有籍於朝有聞於朝忽然慕小感􅁣慕高隱者之所居也山高可六七里近京之山此爲高矣不絶高不敢絶高以俛臨京師也不居正北居西北爲繖葢不爲枕障也出阜城門三十五里不敢遠京師也僧寺八九架其上構其半臚其趾不使人無攀躋之階無喘息之憇不孤巉近人情也與香山靜宜園相絡相互不觸不背不以不列於三山爲懟也與西山亦離亦合不欲爲主峰又恥坿西山也草木有江東之玉蘭有蘋婆有巨松柏襍華靡靡芬腴石皆黝潤亦有文采也名之曰翠微亦典雅亦諧於俗不以僻儉名其平生也最高處曰寶珠洞山趾曰三山盦三山何有有三巨石離立也山之盩有泉曰龍泉澄澄然渟其間其甃之也中短泉之上有四松焉松之皮白皆百尺松之下泉之上爲僧廬焉名之曰龍泉寺名與京師宣武城南之寺同不避同也寺有藏經一分禮經以禮文佛不則野矣寺外有刻石者其言淸和康熙朝文士之言也寺八九何以特言龍泉龍泉􅲖焉餘皆顯露無龍泉則不得爲隱矣余極不忘龍泉也不忘龍泉尤不忘松昔者余游蘇州之鄧尉山有四松焉形偃神飛白晝若雷雨四松之蔽可千畝平生至是見八松矣鄧尉之松放翠㣲之松肅鄧尉之松古之􅇣翠微之松古之􅀡鄧尉之松殆不知天地爲何物翠微之松天地間不可無是松者也說昌平州昌平州京師之枕也隸北路㕔北路㕔隸分巡覇昌道分巡覊昌道隸京尹州在德勝門北八十里州南門至北門七里州之東有鎭山焉曰天夀山明十二陵之所在又東南有小山焉曰湯山實維溫泉有江東之辛夷樹焉純皇帝置行宮實東巡之所憇州南門之外有泉焉曰龍王泉泉上有龍王祠泉南流西南又有泉焉出大覺寺又西有村焉村有多泉村人自名曰百泉百泉之泉與大覺之泉皆東南流以入於沙河州之北二十有五里曰南口南口者州之蔽也居庸之基也入延慶州界矣州之人才漢有盧植唐有劉蕡今有王䕶齡王蘐齡者好積書寷然長者以孝廉方正徵授牘禮部則奮筆言當世事其言有曰今士習尤譁􅅝憙小慧上宜崇樸學以勵下仁和龔自珍以此言爲然也其穀宜麥亦宜稻其土焉其泉曰湯泉焉山之首尾八十里說居庸關居庸關者古之譚守者之言也龔子曰疑若可守然何以疑若可守然曰出昌平州山東西遠相望俄然而相輳相赴以至相蹙居庸寘其間如因兩山以爲之門故曰疑若可守然關凡四重南口者下關也爲之城城南門至北門一里出北門十五里曰中關又爲之城城南門至北門一里出北門又十五里曰上關又爲之城城南門至北門一里岀北門又十五里曰八達嶺又爲之城城南門至北門一里葢自南口之南門至於八達嶺之北門凡四十八里關之首尾具制如是故曰疑若可守然下關最下中􅀜高倍之八達嶺之俛南口也如窺井形然故曰疑若可守然自入南口城甃有天竺字蒙古字上關之北門大書曰居庸關景泰二年修八達嶺之北門大書曰北門鎻鑰景泰三年建自入南口流水齧吾馬蹏涉之瑽然鳴弄之則忽涌忽洑而盡態迹之則至乎八達嶺而窮八達嶺者古隰餘水之源也自入南口木多文杏蘋婆棠梨皆怒華自入南口或容十騎或容兩騎或容一騎蒙古自北來鞭槖駝與余摩臂行時時槖駝銜余騎顚余亦撾蒙古帽墮於槖駝前蒙古大笑余乃私歎曰若蒙古古者建置居庸關之所以然非以若耶余江左士也使余生趙宋世目尙不得覩燕趙安得與反毳者相撾戲乎萬山間生我聖淸中外一家之世豈不傲古人哉蒙古來者是􅀊克西克騰蘇尼特皆入京詣理藩院交馬云自入南口多霧若小雨過中關見稅亭焉問其吏曰今法网寛大稅有漏乎曰大筐小筐大偷槖駝小偷羊余歎曰信若是是有間道矣自入南口四山之陂陀之隟有䕶邊牆數十處問之民皆言是明時修微稅吏言吾固知有間道出沒於此䕶邊牆之間承平之世漏稅而巳設生昔之世與凡守關以爲險之世有不大駭北兵自天而降者哉降自八達嶺地遂平又五里曰坌道說張家口張家口在宣化府萬全縣北境察哈爾都統駐焉凡効力軍臺贖罪者駐焉効力者効力軍臺也何以駐張家口近今五十年駐張家口也昔之日稱軍臺者何仁皇帝親北征有事蒙古純皇帝命將西征出入蒙古故軍臺始於平噶爾丹時密於追達瓦齊時周帀密布於設定邊左副將軍時今無軍事何以稱軍臺曰猶内廷有軍機處無軍事亦得稱也軍臺起訖如何以口外察哈爾爲起而北而西北而又西以烏里雅蘇臺爲止凡四十八臺無軍有臺何也通檄報也察哈爾都統與定邊左副將軍遙聲援中間哲卜尊丹刺麻喀爾喀諸汗與理藩院往反之檄報臺員率驛丁奉之走驛丁受受此也臺員効力効此也駐張家口何名曰戌張家口也張家口烏用戍日旅焉而巳有財三年估無財三年旅問何所始也始於臺員有老病者畏塞外之寒且勞入貲充公白都統許之以其貲蒙古代之勢也情也非法也亦無臺費之名亦不上聞今臺費上聞臺費行而臺員除矣如有人不能出臺費願充臺員今許之乎反不許又如有人願亦岀臺費亦充臺員則許之乎亦不許何以不許都統但聞五十年事不聞康熙事不聞乾隆初年事王元鳳天下士也爲桂陽州知州下車擒豪蠧大創之又平猺有奇功天子嘉之錫之孔雀翎擢爲陳州府知府元鳳入覲方畱京師而州大猾夜岀境爲飛語達京師竟聞天子天子使使鞫之使者受單詞當元鳳以革職發往軍臺効力贖辠是獄也􅁈元鳳者半天下元鳳獨飛揚而大憙就逮時謂送吏曰元鳳足跡徧中華獨未得至西北塞外一見聖朝中外爲一之盛吾此行甘騎槖駝佩短刀往來風沙中龔自珍屬之曰吾爲蒙古圖志某部落某山尙未有圖子皆爲我圖之龔自珍乞假五日送之居庸關逾八達嶺而反旣聞兵部尙書靑陽王公言近日事例如此旣又聞常熟蔣君言吾嘗以譴行臥三年納貲乃還如尙書言旣又得王元鳳書果如尙書言吁天下事名實不相應什九如是哉元鳳又言吾到戌三日獨騎槖駝懷筆墨至大禁門欲出門者叱之而止大禁門卽張家口北門也說宗􅃔史佚之裔官曰􅃔者常也宗者宗廟也彝者百器之總名也宗􅂜也者宗廟之器然而曁於百器皆以宗名何也事莫始於宗廟地莫嚴於宗廟然則宗􅂜者何古之祭器也君公有國大夫有家造祭器爲先祭器具則爲孝􅀕器不具爲不孝宗􅃔者何古之養器也所以羞耉老受祿祉養器具則爲敬養器不具爲不敬宗􅃔者何古之亯器也古者賓師亞祭祀君公大夫亯器具則爲富亯器不具爲不富宗􅃔者何古之藏器也國而旣世矣家而旣世矣富貴而旣久長矣於是乎有府庫以寘重器所以鳴世守姼祖禰矜閥閱也宗􅂜者何古之陳器也岀之府庫登之房序無事則藏之有事則陳之其義一也宗􅃔者何古之好器也亯之日於是有賓於是有好貨宗􅃔者何古之征器也征器也者亦謂之從器從器也者以别於居器宗􅃔者何古之旌器也君公大夫有功烈則刻之吉金以矜子孫宗􅃔者何古之約劑器也有大訟則書其辭與其曲􅀡而刻之以傳信子孫宗􅃔者何古之分器也三王之盛封支庶以土田必以大器從宗􅃔者何古之賂器也三王之衰割土田以予敵國必以大器從宗􅃔者何古之獻器也小事大卑事尊則有之宗􅂜者何古之媵器也君公以嫁子以鎭撫異姓宗􅃔者何古之服器也大者以御次者以服小者以佩宗􅃔者何古之抱器也國亡則抱之以奔人之國身喪則抱之以奔人之國宗􅃔者何古之殉器也襚之外棺之中棺之外槨之中槨之外冡之中於是乎有之起於中古宗􅃔者何古之樂器也八音金爲尊故銘之衎神人也宗􅃔者何古之儆器也或取之􅁚或刻之銘以自敎戒以敎戒子孫宗􅃔者何古之瑞命也有天下者得古之重器以爲有天下之祥有士者得古之重器以爲有土之祥有爵邑者得古之重器以爲有爵邑之祥凡有徵於先史之籍有此十九說者皆不可以不識也不可以不􅀋識也古者之於器又有二大耑焉又不可以不辨也一曰自造器一曰以古人之器葢於祭於養於享於約劑於旌古者必自造器於分於藏於陳於好於獻於賂則以其古人之器自夏后氏以降莫不尊器者莫不關器者其吉凶常變興滅存亡之際未有不關器者是以君子樂論之焉說羽琌山民曰天下先有雀後有先有之器後有之字雀也者兆者也也者兆古文者也古文也者兆小篆者也謂􅁚雀可乎可謂古文篆文􅁚可乎可謂古文篆文􅁚雀可乎不可曷爲不可中隔一層矣先言之􅁚雀也何如曰前有流咮也甚修頸也後有尾尾也甚銳尾之末也腹腹也甚圓腹之騫也腹㫄有柄可容手翨也甚疏翨之舉也古者旣取諸雀以爲矣而加之以制度是故慮鬯之洩其馝也爲之蓋慮飲之饕也爲之三柱植然嶭然慮二足之不安也爲之減一翨增一足踆踆然慮太素之不可爲禮也刻畫雲雷胡蘇然制若此此聖智之所加於者也於雀何預何以言無預雀二角一翨三足未之聞未之聞夫古文篆文之􅁚也何如曰亦􅁚形而巳矣遑問雀哉小篆上有蓋說文盇下云覆也从皿大下云从大􅁚其蓋也承之以二柱其中爲腹其右􅁚前其左引而下垂也􅁚後於是乎从鬯从又鬯以實之又持之者若夫古文則無鬯也無又也上有覆如屋非蓋而何有二柱有腹腹中有文相背如刻畫彣彰下垂三足非之全形而何曰之有蓋者無二柱有二柱者無蓋而制文字必兼􅁚之何也曰制文字與制器固不同也古文篆文皆􅁚形而巳矣遑問雀哉夫古文篆文易知也遇古器難予􅀗古七有柱無蓋者六有蓋無柱者一旣手榻以諝學徒學徒見榻本識古器矣夙習古文又難不識字而􅀗其器將疑器爲康瓻未見器而讀其字將疑字爲字妖且夫徒􅀗其器而不識字則曰古􅃔器􅞾矣此有蓋非徙識其字而未見器則曰先民所言􅁚形乃􅁚咮腹尾翨趾兩不可也予兩遘天幸􅀼望達者說器徵諸字説字徵諸器又兩俟之大息曰􅃔器文有形許氏書未收與中之一省一不省皆眞古文之傳於今者攷工記梓人凡試梓㱃器鄕衡而實不盡梓師辠之今大人􅀗實賜大息徧㱃之又同時山右閻氏臧十又九大息亦盡取而㱃之鄕衡而實盡者無一焉有蓋無蓋疑皆非眞古也記之說刻石羽山民曰古者刻石之事有九帝王有巡狩則紀因頌功德一也有畋獵游幸則紀因頌功德二也有大討伐則紀主於言勞三也有大憲令則紀主於言禁四也有大約劑大詛則紀主於言信五也所戰所守所輸糧所瞭敵則紀主於言要害六也决大川濬大澤築大防則紀主於形方七也大治城宮室則紀主於考工八也遭經籍潰喪學術岐出則刻石主於攷文九也九者國之大政也史之大支也或紀於金或紀於石石在天地之間夀非金匹也其材巨形豐其徙也難則夀侔於金者有之古人所以舍金而刻石也與若夫文臣學士書體之美魏晉以後始以爲名矣唐以後始以爲學矣南唐北宋始刻於石以爲天子右文儒生好古頗在於是矣名爲帖治帖有專門其事則非刻石倫也祠墓之碑一家之事又非刻石倫也此二者宜更耑以言者也說碑廟有碑繫牲牷也刻文字非古也墓有碑穿厥中而以爲􅉎也刻文字非古也刻文字矣必著族位著族位矣必述功德夫以文字著族位述功德此亦史之别子也仁人孝子於幽宮則刻石而薶之是又碑之别也自漢氏始訖宋之南錄此三􅀋義雖弗古抑其事與其言富觀覽矣豈可以不論哉乃疏原流讅學者以竟刻石之說說衛公虎大㪟道光辛巳龔子在京師過初彭齡尙書之故居始得讀大㪟之打本道光丁亥初尙書之孫抱初氏之重器入於城北閻氏龔子過閻氏始見大㪟魂魄震愳旣九拜言三月恭步三月縮縮息三月不能屬乃退而治其文阮尙書箸錄此器云召虎今諦眂文从韋是衞虎非召虎也王在祊今諦眂文从茻是王在豐非王在祊也云衛有臣名愛今諦眂文从鹿是衛有臣名慶非名愛也龔子之臧器無及百名者衛公虎大㪟百有三名龔子是以求得衛公之大㪟龔子不忘南不敢盡取京師之重器以南龔子是以不得衛公之大㪟龔子望南中幽幽有小羽琌之山他日欲以華其山龔子是以求得衛公之大㪟臥而思之急起箸錄之奚翄其有之龔子是以不得衛公之大㪟龔子有方鼎有龍勺有魚爵有父丁爵有立戈爵有癸㱃觚欲以儷方鼎龍勺癸觚而鎭撫三爵龔子是以求得衛公之大敦南中土淺水深不如北方之陵原懼其齧龔子是以不得衛公之大㪟龔子不知天命不知其身之東西北南龔子是以不得衛公之大㪟龔子德薄不知夀命之短長懼弗敢有龔子是以不得衛公之大㪟龔子之語言肖姬周願得成周之重器以自榮其言龔子是以求得衛公之大㪟龔子不自知其子孫之賢不亡之是我亾古文百又三名矣龔子是以不得衛公之大㪟龔子說㪟太史公書副在京師說太史公爲書百三十篇成褒漢氏盛德赫然躋於周室次及功臣賢大夫靡不畢載自叙云藏之名山傳之其人副在京師問何以副在京師也恩本朝也恩本朝則何以副在京師也曰求唐虞者必於平陽蒲阪求周必於雍岐求成周必於河洛欲求漢者亦必於關中故副在京師太史公之先官京師數世矣太史公生左馮翊而長京師誦古文於京師仕則紬石室金鐀於京師其兩世取師友唐都黃子田何孔安國之倫盡京師耆舊􅀸士太史公家雖無剖符丹書之榮其於京師也根深而原遠而忘京師是不恩王父不恩父以不恩師友是故副在京師京師旣上繫君父又必有磐石之宗知古今之獻羽翼天室世世無極以所著書託焉東西北南望之靉靉踞天半焉昔者仲尼大聖與左邱明南宮敬叔觀寶書於周先是正考叔得名頌於周老􅆅主周藏室仲尼問禮名頌也寶書也禮也其授受不可以盡知要知古之人所以􅃂靈史氏鎭撫王室以增天府之重則可知也曰後之人必有如京師以觀吾書者焉則太史公之志也若夫高騫遠引抱道以逝矢孤往於名山含薄懟於􅀸士身隱矣焉用文之介之推之所笑師瞽適河海者之所蹈淮南賓客所以向山中而招王孫者也則太史公之所不爲京師樂籍說昔者唐宋明之旣宅京也於其京師及其通都大邑必有樂籍論世者多忽而不察是以龔自珍論之曰自非二帝三王之醕備國家不能無私舉動無陰謀霸天下之統其得天下與守天下皆然老子曰法令也者將以愚民非以明民孔子曰民可使由之不可使知之齊民且然士也者又四民之聰明憙論議者也身心閒暇飽煖無爲則留心古今而好論議留心古今而好論議則於祖宗之立法人主之舉動措置一代之所以爲號令者俱大不便凡帝王所居曰京師以其人民衆多非一􅀋一族也是故募召女子千餘戸入樂籍樂籍旣碁布於京師其中必有資質端麗桀􅃛辨慧者出焉目挑心招捭闔以爲術焉則可以箝塞天下之游士烏在其可以箝塞也曰使之耗其資財則謀一身且不暇無謀人國之心矣使之耗其日力則無暇日以談二帝三王之書又不讀史而不知古今矣使之纒緜歌泣於牀第之間耗其壯年之雄材偉略則思亂之志息而議論圖度上指天下畫地之態益息矣使之春䢅秋夜爲籨體詞賦游戲不急之言以耗其才華則論議軍國臧否政事之文章可以毋作矣如此則民聽壹國事便而士􅀋之保全者亦衆曰如是則唐宋明豈無豪桀論國是掣肘國是而自取僇者乎曰有之人主之術或售或不售人主有苦心奇術足以牢籠千百中材而不盡售於三豪傑此亦霸者之恨也吁說月晷徽州人造月晷系以詩髹而書之予讀之弗善也爲之圖三十合朔至晦備矣又爲之子目各十有二時加子至加亥備矣總爲圖三百有六十以楮皮爲之儀我坐北面南左東右西以定月之所在其魄墨之其明粉之加金以肖其曜自以爲賢於徽州市之所爲揚州羅士琳過而大笑之曰子未知里差天下一千三百五縣宜每縣爲三百六十圖當有三十七萬九千八百圖子又未知􅀊差夫日與月合朔時所加不同一千三百五縣之三百六十圖月月不同每月爲三十七萬九千八百圖者十有二每􅀊又十二月之其圖無祘數假子神龜之年不足以役圖與子千里之封以爲宮不足以庋之予乃䀌然於不藝不學忝爲士大夫老與夫市估髹師同爲罔知識之民而已矣乃再拜求羅子敎我以渾天之術兩儀之形求七政之行之所在徽州歌訣云三辰五已八午升初十出未十三申十五酉時十八戌二十亥上見􅊍明二十三日子時出二十六日丑時行二十九日寅時見晦與朔日卯上并坿錄宥情甲乙丙丁戊相與言甲曰有士於此其於哀樂也沈沈然言之而不厭是何若乙曰是媟嫚之民也許慎曰情人之陰氣有欲者也聖人不然淸明而彊毅無畔援無歆羨以其旦陽之氣上達於天陰氣有欲豈美談耶丙請辨之西方之志曰欲有三穜情欲爲上西方聖人不以情爲鄙夷子言非是丁曰乙以情􅘗欲無以處夫哀樂之正而非欲者且人之所以異於鐵牛土狗木寓龍者安在乙非是丙以欲隸情將使萬物有欲畢詭於情而情且爲穢墟爲辠藪丙又非是是以不如析言之也西方之志蓋善乎其析言之矣戊請辨之曰西方之志又有之純想卽飛純情卽墜若是乎其槪而訶之也不得言情或貶或無貶女言皆非是龔子閒居陰氣沈沈而來襲心不知何病以讅江沅江沅曰我嘗閒居陰氣沈沈而來襲心不知何病龔子則自求病於其心心有􅎃􅎃有見童秊見童秊侍母側見母見一鐙熒然見一研一几見一僕嫗見一貓見如是見巳而吾病得矣龔子又嘗取錢枚長短言一卷使江沅讀沅曰異哉其心朗朗乎無滓可以􅇣塵埃而登靑天惜其聲音瀏然如擊秋玉予始魂魄近之而哀遠之而益哀莫或沈之若或墜之龔子又内自鞫也狀何如曰予童時逃塾就母時一鐙熒然一研一几時依一嫗抱一貓時一切境未起時一切哀樂未中時一切語言未造時當彼之時亦嘗陰氣沈沈而來襲心如今閒居時如是鞫巳則不知此方聖人所訶與西方聖人所訶與甲乙丙丁戊五氏者孰黨我與孰詬我與姑自宥也以待夫覆鞠之者作宥情涼燠或問子之言何數涼而數燠也告之曰吾未始欲言也吾言如治疾燠疾至涼之涼疾至燠之亦有不言則其無疾者也無疾者賢乎曰否有疾賢疾淺賢乎疾深賢乎曰疾深者賢大人之言有判有純大人之行有襮有裏行有堂有門有室有閾有突終身與至人居行至人之行見其門而巳矣及堂者寡矣有門之突亦有突之門與居者始而昭昭久而益悶至人於人何吝哉自八之而巳矣惟至人能皆由人之穾有勿由隨其門而門也隨其堂而堂也非弗能由也至人有言曰惟吾爲能勿驚人善驚者弗明也弗平也弗定也言乎至人之側顯晦至畢明焉高下至畢平焉順逆至畢定焉非人之情則容有弗識之矣所言天與人之間之情也則盡識之矣夫何驚之有言之則何疑之有古之至人皆未始欲言也至人之言人情不得巳故雖導原於至人之心不襍以至人之言不原於至心則無本襍以至言則勿用襍以至言則勿尊若其至心則弗欲言巳大言若雨百木一雨而異長大言若規百隅一規而異用至言無吟歎至行無反側大行無畔涯行有盜皃有盜聲有盜魯君之宋呼於垤澤之門門者弗應其應者曰吾君之聲也此聲也巳夫甲氏之聲猶夫乙氏之聲夫乙氏之聲猶夫丙氏之聲一呼而不應則非聲聲之盜巳或問不盜則聲至寡皃至拘色至壹曰聲戚自如聲憙自如聲憙戚半自如至足矣是一而萬也何拘寡之有古人之言之蹟可以信乎曰起於意者心聲之而巳岐也起於心者吻達之而巳譌也起於吻者筆追之而巳遁也矧古人之言之蹟可信者其幾龔子請言网摩氏网摩氏樹木七年而不華或憂之智者曰毋憂華參於天胥摩氏亦樹木三日而中柱其荄也一日而英三日而華七日而華參天或憂其早成至人曰子以桃李柞柘之愛愛吾木也子弟以网摩氏之木愛吾木且猶不可越十旬胥摩氏猶屏營而憂木自憂其不成其成也必弗可識巳龔子請言羣神羣神朝於天帝曰觴之帝之司觴執簡記而簿之三千秋而簿不成帝問焉曰皆有舁之輿者帝曰舁者亦簿之七千秋而簿不成帝又問焉乃反於帝曰舁之輿者又皆有其舁之者帝黙然而息不果觴論私朝大夫有受朋友之請謁翌晨訐其友於朝􅀗􅀡聲者矜其同官曰某甲可謂大公無私也巳龔子聞之退而與龔子之徒縱論私義問曰敢問私者何所始也告之曰天有閏月以處嬴縮之度氣盈朔虚夏有涼風冬有燠日天有私也地有畸零華離爲坿庸閒田地有私也日月不照人牀闥之内日月有私也聖帝哲后明詔大號劬勞於在原咨嗟於在廟史臣書之究其所爲之實亦不過曰庇我子孫保我國家而巳何以不愛他人之國家而愛其國家何以不庇他人之子孫而庇其子孫且夫忠臣憂悲孝子涕淚寡妻守雌扞門戸保家世聖哲之所哀古今之所懿史册之所紀詩歌之所作忠臣何以不忠他人之君而忠其君孝子何以不慈他人之親而慈其親寡妻貞婦何以不公此身於都市乃私自貞私自葆也且夫子噲天下之至公也以八百年之燕欲予子之漢哀帝天下之至公也高皇帝之艱難二百祀之增功累胙帝不愛之欲以予董賢由斯以譚此二主者其視文武成康周公豈不聖哉由斯以譚孟子車氏其言天下之私言也乃曰人人親其親長其長而天下平且夫墨翟天下之至公無私也兼愛無差等孟子以爲無父楊朱天下之至公無私也拔一毛利天下不爲豈復有干以私者豈復舍我而㣘人之謁者孟氏以爲無君且今之大公無私者有楊墨之賢耶楊不爲墨墨不爲楊乃今以墨之理濟楊之行乃宗子噲肖漢哀乃議武王周公斥孟軻乃别闢一天地日月以自處且夫貍交禽媾不避人於白晝無私也若人則必有閨闥之蔽房帷之設枕席之匿赬頩之拒矣禽之相交徑􅀡何私孰疏孰親一視無差尙不知父子何有朋友若人則必有孰薄孰厚之氣誼因有過從讌游相援相引歀曲燕私之事矣今曰大公無私則人耶則禽耶七月之詩人曰言私其豵獻豜于公先私而後公也大田之詩人曰雨我公田遂及我私楚茨之詩人曰備言燕私先公而後私也采蘋之詩人曰被之僮僮夙夜在公被之祁祁薄言還歸公私並舉之也羔羊之詩人曰羔羊之皮素絲五紽退食自公委蛇委蛇公私互舉之也論語記孔子之私覿乃如吾大夫言則魯論以私覿誣孔氏乃如吾大夫言羔羊之大夫可以誅采蘋之夫人可以廢大田楚茨之詩人可以流七月之詩人可以服上刑抱小古之躳仁孝内行完備宜以人師祀者未嘗以聖賢自處也自處學者未嘗以父兄師保自處也自處子弟自處子弟故終身治小學小學者子弟之學學之以侍父兄師保之側以待父兄師保之顧問者也孔子曰入則孝出則弟有餘力以學文學文之事求之也必劬􅀗之也必剏證之也必廣說之也必澀不敢病迂也不敢病瑣也求之不劬則粗􅀗之不剏則勦證之不廣則不信說之不澀則不忠病其迂與􅃈也則不成其爲人也湻古之至故樸拙之至樸拙之至故退讓之至退讓之至故思慮之至思慮之至故完密之至完密之至故無所苟之至無所苟之至故精微之至小學之事與仁愛孝弟之行一以貫之巳矣若夫天命之奥大道之任窮理盡性之謀高明廣大之用不曰不可得聞則曰俟異日否則曰我姑整齊是姑抱是以俟來者自珍謹求之本朝則有金壇段公七十喪親如孺子哀八十祭先未嘗不哭泣八十時讀書未嘗不危坐坐臥有尺寸未嘗失之平生箸書以小學名高郵王尙書六十五喪親如孺子哀平生箸書以小學名是旣然矣自珍又求之古史萬石君以孝謹偁其言曰書馬者四足與尾而五顔之推仁孝好學其言形聲訓詁著在家訓是又然矣而漢臣班固作藝文志尒疋小尒疋古今字􅘗孝經家固先我窺見此者志則然尊史史之尊非其職語言司謗譽之謂尊其心也心何如而尊善入何者善入天下山川形勢人心風氣土所宜姓所貴皆知之國之祖宗之令下逮吏胥之所守皆知之其於言禮言兵言政言獄言掌故言文體言人賢否如其言家事可謂入矣又如何而尊善岀何者善出天下山川形勢人心風氣土所宜姓所貴國之祖宗之令下逮吏胥之所守皆有聯事焉皆非所專官其於言禮言兵言政言獄言掌故言文體言人賢否如優人在堂下號咷舞歌哀樂萬千堂上觀者肅然踞坐眄睞而指􅀧焉可謂岀矣不善入者非實錄垣外之耳烏能治堂中之優也耶則史之言必有餘寱不善岀者必無高情至論優人哀樂萬千手口沸羹彼豈復能自言其哀樂也耶則史之言必有餘喘是故欲爲史若爲史之别子也者毋寱毋喘自尊其心心尊則其官尊矣心尊則其言尊矣官尊言尊則其人亦尊矣尊之之所歸宿如何曰乃又有所大出入焉何者大出入日出乎史入乎道欲知大道必先爲史此非我所聞乃劉向班固之所聞向固有徵乎我徵之曰古有柱下史老􅅨卒爲道家大宗我無徵也歟哉尊命儒家之言以天爲宗以命爲極以事父事君爲踐履君有父之嚴有天之威有可知有弗可知而範圍乎我之生君之言唐虞謂之命周亦謂之命龍所官仲山甫所職君子顧其名紬繹其義焉夫天寒暑風雨露雷必信則天不高矣寒暑風雨露雷必不信則天又不高矣傳曰山川而能語葬師食無所肺腑而能語醫師色如土後之儒者視其君曾不如葬者之尊山川病者之尊其肺腑其於君也有等夷之心有吾欲云云之志曰吾欲吾君之通古今之故實欲以自售其學欲吾君之燭萬物之隱實欲以自通其情欲君之賞罸予奪不爽於毫髪實欲以自償其功其於君也欲昭昭爆爆如貿易者之執劵而適於市䙝君嫚君孰甚夏道尊命孔子罕言天道若臣豈未聞意若曰君之尊不至此極也儒者平日多言安命矣平日尊數過於尊理遠矣何以出而視君如理不如數若臣曰夏暑雨冬祈寒天府怨君不可以受怨應之曰寒暑有怨天之所以多憾天之所以大也汝將使匹婦無憾而爲君大君將日日就國之人而弭其怨君其替哉若臣又曰子之術趙高之術也以未兆爲朕應之曰趙高匿其君以爲尊君吾之術使君無日不與天下相見以尊君天命曰流行君命曰岀内不得詆我以趙高是故若飛若蟄悶悶黙黙應其不可測如魚泳於川惟大氣之所盤旋如木之聽榮枯於四時蠢蠢傀傀安其不可知尊任周禮以九兩繫􅀖國之民八曰友以任得民又曰以六行敎萬民孝友睦婣任䘏杜子春曰任任朋友之事者周爵五等公矦伯子男男任也子以穀璧養人男以蒲璧安人曾子曰士不可以不宏毅任重而道遠任也者俠之先聲也古亦謂之任俠俠起先秦間任則三代有之俠尙意氣恩怨太明儒者或不肯爲任則周公與曾子之道也世之衰患難不相急豪桀罹患難則正言莊色厚貌以益鋤之雖有骨肉之恩夙所卵翼之子飄然絶裾遠引事外雖然豪桀則曰吾罹患難而呼號求援手於庸人豈復爲豪桀哉其言則曰應龍入眢井不瞑目以待鰍鱓之飽龍肉而睫淚以哀井上之居民豈得爲應龍也哉萬一卒不死或者天神憑焉道家者之書有之曰活一大賢者功視活凡夫九十萬億活一聖人功視活凡夫九萬萬億吾友陽城令桂林李公則曰禮曰弔人弗能賻弗問其所費問疾弗能遺弗問其所欲見人弗能館弗問其所舍吾補禮文之闕則亦曰見患難弗能救弗咎其所以致患難其言取風示末世粹然愾然烏乎應龍之譬也肆俠者之氣縱道家之言詭皆非周公曾子法李公儒者也古之任者也言如是言之感􅁣盡如是是亦足矣吾又聞之廣西實天下之高山大川氣蒼蒼莾莾不爲中原蜚滑所中李公行畢如其言山川然也尊隱將與汝枕高林藉豐草去沮洳卽犖确第四時之榮木矚九州之神皋而從我嬉其問則可謂山中之慠民也巳矣仁心爲榦古義爲根九流爲華實百氏爲杝藩枝葉昌洋不可殫論而從我嬉其間則可謂山中之悴民也巳矣聞之古史氏矣君子所大者生也所大乎其生者時也是故歳有三時一曰發時二曰怒時三曰威時日有三時一曰蚤時二曰午時三曰昏時夫日胎於溟涬浴於東海徘徊於華林軒轅於高閎照曜人之新沐濯滄滄涼涼不炎其􅊍吸引淸气宜君宜王丁此也以有國而君子適生之八境而問之天下法宗禮族歸心鬼歸祀大川歸道百寶萬貨人功精英不翼而飛府於京師山林冥冥但有鄙夫皁􅘗所家虎豹食之曾不足悲日之亭午乃炎炎其􅊍五色文明吸飮和气宜君宜王丁此也以有國而君子適生之入境而問之天下法宗禮族修心鬼修祀大川修道百寶萬貨奔命涌塞喘車牛如京師山林冥冥但有窒士天命不猶與艸木􅂮日之將夕悲風驟至人思燈燭慘慘目􅊍吸飮莫气與夢爲鄰未卽於牀丁此也以有國而君子適生之不生王家不生其元妃嬪嬙之家不生所世世豢之家從山川來止于郊而問之曰何哉古先冊書聖智心肝人功精英百工魁桀所成如京師京師弗受也非但不受又裂而礫之醜類呰窳詐僞不材是輦是任是以爲生資則百寶咸怨怨則反其野矣貴人故家蒸嘗之宗不樂守先人之所予重器不樂守先人之所予重器則窶人子篡之則京師之氣􅂥京師之氣􅂥則府于野矣如是則京師貧京師貧則四山實矣古先冊書聖智心肝不留京師蒸嘗之宗之孫見聞媕娿則京師賤賤則山中之民有自公矦者矣如是則豪桀輕量京師輕量京師則山中之勢重矣如是則京師如鼠壤如鼠壤則山中之壁壘堅矣京師之日短山中之日長矣風惡水泉惡塵霾惡山中泊然而和洌然而淸矣人纕臂失度啾啾如蠅虻則山中戒而相與修嫻靡矣朝士寡助失親則山中之民一歗百吟一呻百問疾矣朝士僝焉偷息簡焉偷活側焉徨徨商去留則山中之􅀊月定矣多暴矦者過山中者生鐘簴之思矣童孫􅑧謼過山中者祝夀耉之毋遽􅂮矣其視宗曰我無餘榮焉我以汝爲殿矣其山林之神曰我無餘怒焉我以汝爲殿矣俄焉寂然鐙燭無􅊍不聞餘言但聞鼾聲夜之漫漫鶡旦不鳴則山中之民有大音聲起天地爲之鐘鼓神人爲之波濤矣是故民之醜生一縱一橫旦暮爲縱居處爲橫百世爲縱一世爲橫橫收其實縱收其民之民也壑者歟邱者歟垤者歟避其實者歟能大其生以察三時以寵靈史氏將不謂之横天地之隱歟聞之史氏矣曰百媚夫不如一猖夫也百酣民不如一瘁民也百瘁民不如一之民也則又問曰之民也有待者􅁘無待者耶應之曰有待孰待待後史氏孰爲無待應之曰其聲無聲其行無名大憂無蹊轍大患無畔涯大慠若折大瘁若息居之無形􅊍景煜爚捕之杳冥後史氏欲求之七反而無所睹也悲夫悲夫夫是以又謂之縱之隱
