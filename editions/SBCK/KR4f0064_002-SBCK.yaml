front:
  text: 定盦文集仁和龔自珍璱人􅄿
  hash: sha256:e68358ed4beadf6a8fe0e785f7524f8ff5b2274b80e5d388b9d88ed72d0c3b10
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0064_SBCK_002-1a}
body:
  text: 卷中家塾䇿問一道問周禮保氏掌教國子以六書外史掌達書名於四方瞽史諭書名六書學三代綦重之矣古今異體或􅰶或改自倉頡史􅘴以降至於炎漢書凡幾變可得而陳與漢安帝時許沖上其父南閤祭酒愼說文解字十四篇此古今書名之大宗也法後王以小篆爲質以何體爲坿見例可得而聞與說文形書也顧一字有一字之形與一字之音與義而後一篆完故說者曰爾雅廣雅義書也聲􅀋音書也然則歧而爲三抑治說文而經緯備舉也能發其凡與以字義而論一字有一字之本義有引申之義有叚借之義往往引申叚借之義通行於古今而本義反晦者能約畧舉之與六書之目有體有用孰爲四體孰爲二用能了然胸口與二用中之叚借由古人字少固也但叚借亦必中師法能言其樞紐與周末漢初經師口授不箸竹帛又或用方言是故羣經異師則異字自胡母生之治春秋而已然矣說文偁經與羣書之偁經異好古者又據許以改經未見其可也能言原委曲折與許之言六書與鄭衆之言六書與劉歆班固之言六書次弟小不合形聲與諧聲殊趣能疏別與今音古分十七部秦以前有均之文可覆按也若依聲以臚許之九千字不獨形聲字而以部分􅁵之亦古今之奇作也能說其例與許書所有之字當時俗字固不闌入乃羣經所有之正字亦頗有不收者况本書見於說解則有之篆文則無之所從得聲則有之本聲則無之此自有其故也豈可盡以某字卽某字當之與玉篇以降可羽翼說文者凡幾家或謂呂忱字林及字苑諸作雖不作可也信與唐人說經著者孔賈陸三家其於小學之理謂不及近儒可也曰茫乎未之聞然與不與古均各家疎於十七部者十部十三部也密於十七部者十八部二十一部也枝派義例之不同能臚其入出歟六書爲小學之一門聲又爲六書之一門等均之學又爲聲中之一門然則談古均者胡爲而不屑談等均也抑治經未暇與意者謂古均足禆經讀而等均爲餘事不知古均明而經明其體尊等均明而天下之言語明語言亦文字也其用大能一以貫之與郭忠恕汗簡夏竦古文四聲韻博采古文何其夥也往往爲凡將急就滂熹元尙訓纂所未及俱可信而奉之以補許氏古文之闕抑眞僞雜岀也能一言决之歟周時吉金近世岀土頗夥䀜鼎太盤而外其足證古文者有幾事歟秦漢金石往往非篆非隸意者割二分畱八分之說未盡無稽與夫解經莫如字也解字莫如經也韓氏曰讀書略識字古未有不明乎字而稱經生者也諸生治經之日久矣心知其意者其縱言之陳碩甫所箸書序孔子曰吾道一以貫之故記曰黃帝正名百物以明民共財告仲由曰名不正則言不順言不順則事不成禮樂不興刑罰不中子游曰有始有卒者其惟聖人乎古者八歲入小學教之數與方名與其灑掃進退之節保氏掌國子之教有書有數六書九數皆謂之小學由是十五入大學乃與之言正心誠意以推極於家國天下壯而爲􅀸大夫公侯天下國家名實本末皆治後世小學廢專有大學童子入塾所受卽治天下之道不則窮理盡性幽遠之言六書九數白首未之聞其言曰學當務精者鉅者凡小學家言不足治治之爲細儒於是君子有憂之憂上達之無本憂逃其難者之非正不由其始者終不得究物之命於是黜空談之聰明守鈍樸之迂􅅆物物而名名不使有遁其所陳說艱難算師疇人則積數十年之功始立一術書師則繁稱千言始曉一形一聲之故求之五經三傳子史之文而畢合乃宣於楮帛而且一戸牖必求其異向也一脯􅊽必求其異器與時也一衣裳必求其異尺寸也有高語大言者拱手避謝極言非所當於是二千載將墜之法雖不盡復什存三四愚瘁之士尋之有門徑繹之有端緒蓋整齊而比之之力至苦勞矣陳碩甫曰是苦且勞者有所甚企待於後後孰當之則乃所稱聞性道與治天下者也乃言曰使黃帝正名而不以致上世之理孔子之正名而終不能以興禮而齊刑則六藝爲無用而古之儒之見詬與詬古之儒者齊􅀋彼陟顚而棄本此循本而忘顚庸愈乎且吾不能生整齊之之後旣􅰶吾力而重􅀒企待者於是始以六書九數之術及條禮家曲節碎文如干事推之欲遂以通於治天下大凡某書如干篇如干卷某書如干卷都如干卷如目錄兵部主事姚先生曰今天下得十數陳碩甫分置各行省授行省學弟子天下得百十巨弟子分教小弟子國家進士必於是乎取則至教不躐等且性與天道之要或基之聞矣中書胡先生曰使碩甫自信所推畢無閡請從姚先生之言所推猶有閡則姑舍是言整齊益整齊企待益企待總之必不爲虛待無歧謬是二言者龔自珍皆聞之因􅇰錄書指意皆識之答人求墓銘書藏幽之有文又從而其詞炎漢以來未有改也顧禮何心哉吾遇人求請藏幽之文輒心動不悄戚其容與區別其狀之詞而來者弗許也悄戚而來者亦戚而應之怊悵鋪敘旣成意尙未能和何哉古之始爲是制者何心哉雖巨富貴重以賢聖至於殷湯猶不能以爭天下古今之勢故詩曰高岸爲谷深谷爲陵仁人者姑盡吾愛以附不欲速朽之義謂夫功德文章行誼之蹟與其有令聞之子孫具於辭冀哀而掩之掩之者誰與至於冀夫掩之也而尙忍問與仁人孝子其遂忍逆計至於是抑又􅃘弗計至是與是求請者與爲文者所皆艱言也而乃昌昌愉愉以命之從夫乞爲傳爲誄之義同與甚者辭曰或錫之誄或錫之傳或錫之誌銘詞體如是固若是其易而無擇與君家有世德法宜爲文章又辱吾子諉責不可辭而犆不忍爲誌銘謹􅁧上墓表西域置行省議天下有大物渾員曰海四邊見之曰四海四海之國無算數莫大於我大淸大淸國堯以來所謂中國也其實居地之東東南臨海西北不臨海書契所能言無有言西北海狀者今西極徼至愛烏罕而止北極徼至烏梁海總管治而止􅀂乾路若水路若大山小山大川小川若平地皆非盛京山東閩粤版圖盡處卽是海比西域者釋典以爲地中央而古近謂之爲西域矣我大淸肇祖以來宅長白之山天以東海􅂌大淸最先世祖入關盡有唐堯以來南海東南西北設行省者十有八方計二萬里積二百萬里古之有天下者號稱有天下尙不能以有一海博聞之士言廓恢者擯勿信於北則小隃望見之於西北正西則大隃望而不見今聖朝旣全有東南二海又控制蒙古喀爾喀部落於北不可謂隃高宗皇帝又應天運而生應天運而用武則遂能以承祖宗之兵力兼用東南北之衆開拓西邊遠者距京師一萬七千里西藩屬國尙不預則是天遂將通西海乎未可測矣然而用帑數千萬不可謂費然而積兩朝西顧之焦勞軍書百尺不可謂勞八旗子弟綠旗賤感遇而捐軀不可謂折然而微夫天章聖訓之示不得已淺見愚儒下里鄙生幾幾以耗中事邊疑上之智翦人之國滅人之嗣赤地千里疑上之仁否否有天下之道則貴乎因之而已矣假如鄙儒言勞者不可復息費者不可復收滅者不可復續絶者不可復蘇則亦莫如以因之以爲功况乎斷非如鄙儒言因功而加續之所憑者益厚所藉者益大所加者益密則豈非天之志與高宗之志所必欲遂者哉欲因功而續加之則莫如酌損益之道何謂損益之道曰人則損中益西財則損西益中兩言而已矣今中國生齒日益繁氣象日益隘黃河日益爲患大官非不憂主上非不諮而不外乎開捐例加賦加鹽價之議譬如割臀以肥腦自啖自肉无受代者自乾隆末年以來官吏士民狼艱狽蹷不士不農不工不商之人十將五六又或飱菸草習邪教取誅戮或凍餒以死終不肯治一寸之絲一粒之飯以益人承乾隆六十載太平之盛人心慣於泰侈風俗習於游蕩京師其尤甚者自京師始槩乎四方大􅔰富戸變貧戸貧戸變餓者四民之首奔走下賤各省大局岌岌乎皆不可以支月日奚暇問年歲嘉峪關以外鎭將如此其相望也戍卒如此其夥也燧堡如此其密也地縱數千里部落數十支除沙磧外屯田總計北􅂊二十三萬八千六百三十二畝南纔四萬九千四百七十六畝合計纔二十八萬八千一百零八畝田丁南北合計纔十萬三千九百零五名加遣犯有名無實者二百零四名若云以西域治西域則言之胡易易今內地貴州一省每歲廣東四川皆解餉以給貴州無重兵官糈兵糧入不償岀每歲國家賠岀五六萬兩至八九萬兩不等未嘗食貴州之利內地如此新疆尙何論邪應請大募京師游食非土著之民及􅀡隸山東河南之民陜西甘粛之民令西徙除大江而南筋力柔弱道路險遠易以生怨無庸議雲南貴州兩湖兩廣相距亦遠四川地廣人希不宜再徙山西號稱海內最富土著者不願徙毋庸議雖毋庸議而願往者皆往其餘若江南省鳳潁淮徐之民及山西大同朔平之民亦皆性情强武敢於行路未驕慣於食稻衣蠶地尙不絕遠募之往必願往江西福建兩省種菸草之奸民最多大爲害中國宜盡行之無遺類與其爲內地無產之民孰若爲西邊有產之民以耕以牧得長其子孫哉當行者官給每戸盤費若干每丁盤費若干議聞又各省駐防旗人生齒日繁南漕不給大率買米而食買緞而衣若遣令回旗京師內城不能容若再生育數年本省費又無所底駐防者所以衞天朝也八旗子弟受恩久忠義其所性成茍有利於天朝者必無異心無異議也各將軍議酌每大省行若干丁中下省行若十丁盤費宜視民人加重以示優厚議聞其遷政暫設大臣料理之七年停止議聞先期斬危崖劃仄嶺引淙泉瀉漫壑到西分臿南北兩路後官給蒙古帳房一間牛犁具籽種備先給大戸如千丈中戸如千丈下戸如千丈不得自占旗民同例除沙磧不報墾外每年一奏開墾之數十年再奏總數二十年彚查大數每年粟麪稞蔬皆入其十分之一貯於本地倉以給糧俸其地丁錢賦應暫行免納俟二十年後再如內地交穀外另有丁賦例有丁賦後再定解部額現在交粟麫暫勿折收銀錢亦俟二十年後再如內地折銀錢例設兵部尙書右都御史準回等處地方總督一員兵部待郞右副都御史準回等處地方巡撫一員或如􅀡隸四川例以督兼撫不立撫似亦可布政使一員按察使一員巡道三員提督一員總兵官三員知府十一員知􅀡隸州三員知州二員知縣四十員府州之目十有四曰伊東府曰伊西府伊犁東西路也曰庫州府庫爾喀喇烏蘇也曰迪化府烏魯木齊也原設州曰鎭西府巴爾庫勒也原設曰瓜州府哈密也曰塔州􅀡隸州塔爾巴噶台也以上北路曰闢州府闢展也曰沙州府哈拉沙拉及庫車沙雅爾也曰蘇州府阿克蘇及賽喇木也曰羌州府葉爾羌也曰和州府和闐也曰吐蕃􅀡隸州烏什也曰磚房􅀡隸州喀什噶爾也以上南路伊東府設縣四以府城爲伊東縣以烏哈爾里克爲綏定縣以博羅塔拉爲博縣以幹珠罕爲珠縣四至核議伊西府設縣四以府城爲伊西縣以庫爾圖爲圖縣以古爾班薩里爲絜縣以烘郭爾鄂籠爲鄂縣四至核議庫州府設縣三以府爲庫縣以烏里雅蘇圖爲舊營縣以晶河爲豐潤縣四至核議瓜州府設縣四以府城爲瓜縣以蘇木哈喇垓爲舊堡縣以賽巴什達里雅爲湖縣以塔勒納沁爲土城縣四至核議塔州設縣二以州爲塔縣以雅爾爲肇豐縣四至核議其鎭西迪化兩府現在章程已善毋庸改議南路闢州府設六縣以府城爲闢縣以納呼爲東闢縣以洪城爲洪縣以魯克察克爲柳中縣以哈喇和卓爲高昌縣以吐爾番爲安樂縣四至核議沙州府設州一縣四以府爲沙縣以庫車爲龜兹縣以碩爾楚克爲舊城縣以託和鼐爲鼐縣以沙雅爾爲沙城縣四至核議蘇州府設州一縣五以府爲蘇縣以賽喇木爲毗羅州以帕爾滿爲帕縣以託克三爲四村縣以拜城爲拜縣以庫什塔木爲小城縣四至核議羌州府設五縣以府爲羗縣以巴爾楚克爲新遷縣以呼拉瑪爲瑪平縣以哈喇古哲什爲哲縣以裕勒里雅克爲西夜縣四至核議和州府設四縣以府城爲球縣以皮什雅爲琳縣以玉隴哈什爲琅縣以博羅齊爲玕縣四至核議吐蕃州設縣二以州爲明定縣以森尼木爲森縣磚房州設縣三以州爲磚房縣以塞爾門爲塞門縣以英噶薩爾爲依耐縣四至核議武官副將以下文官同知以下應如千員另議總督駐劄伊東府巡撫駐劄迪化府提督駐劄迪化府分巡安西北兵備道一員分鎭安西北鎭總兵官一員同駐劄鎭西府分巡天山北兵備道一員駐劄伊東府分鎭天山北鎭總兵官一員駐劄墖州分巡天山南兵備道一員駐羗州府分鎭天山南鎭總兵官一員駐吐蕃州非闢州屬之安樂縣督撫必皆駐北路者北可制南南不可制北昔者回部未隸天朝無不甘心爲準夷役者亦國勢然也設采辦紅銅事務監督一員用內務府人員三年更調駐劄吐蕃州其甘肅省嘉峪關設監督一員專司內地往準回販易之税除稻米鹽茶大黃布綢外一切中國奇淫之物不許出關以厚其俗除皮貨西瓜外不許入關以豐其聚銅務關務皆所以劑官俸給兵糈也其哈密闢展兩郡王皆賞給協辦府事官名號朔望祭祀及大禮排班在道府之下同知之上各回城伯克中皆遴􅃟一員賞給協辦縣事名號朔望祭祀及大禮排班在知縣之下縣丞之上甘肅省以安西南路爲盡境準回省以安西北路爲首境立界石新遷人等及旗人回人等未能知書應請於三十年後立學宮設生員舉鄕試現在毋庸議其鎭西迪化現已設立姑仍舊交巡撫考試戈壁無水草處地方官踏看有可簸采金屑之地酌立條規奏聞官缺在北路者及臨戈壁者設風沙邊缺如內地煙瘴邊缺之例速其升調凡近磧之郊處處設立風神祠泉神祠歲時致祭仰祝上帝地出其泉風息於天以宜蔬宜稞頒祝文焉大郭勒之在祀典者應幾處核議大達巴之在祀典者應幾處核議文移官事往來經戈壁皆帶泉水應頒製西洋奇器物小受多利行者又宜頒設高廣護風之具田中可用者詳蕭山民人王錫議令仿造夫然而屯田可盡撤矣屯田者有屯之名不盡田之力三代旣遠欲兵與農之合欲以私力治公田蓋其難也應將見在屯田二十八萬畝零叩給與見在之屯丁十萬餘人作爲世業公田變爲私田客丁變爲編戸戌邊變爲土著其遣犯毋庸釋回亦量予瘠地一體耕種交納旣撤綠旗之屯當撤八旗之戍中國駐防旗人往者別立册籍以別於民戸回戸旣有旗戸名目與回民有田籍者同故撤之而不患無所歸也應請將將軍副都統辦事大臣領隊大臣印房章京等一槪裁撤其駐防之滿洲索倫錫伯蒙古弁丁等戍安西北路者作爲安西北路旗戸在天山北路者作爲天山北路旗戸南路者作爲南路旗戸伊犁將軍所領兵最多伊東伊西地亦最大出之行陳散之原野勢便令順無不給之患應與自內地駐防旗人新移到者一體歸地方官管轄但有事不得受知縣以下杖責交納時應比民戸回戸酌減十分之二以償世僕之勞如是則又慮其單也應請設立辦事大臣一員駐南路極邊􅆧和二州之地統領滿洲兵九百名蒙古索倫兵七百名錫伯兵四十名綠旗兵六百名共計二千二百四十名以控藩部之布魯特哈薩克那木千愛烏罕各國掌各國之朝貢之務鑄總統西邊辦事大臣印一勅文一秩正二品受準回總督節制與提督巡撫互相節制布政使以下具申文總兵官以下帶刀見以昭威重其駐防兵丁於現在議裁徹者遴畱至銳者其軍裝器械月餉應照內地江甯荆州例歲一閱三歲總督一閱十歳請旨泒威重大臣來西一大閱布魯特哈薩克之人咸侍是爲天朝中外大疆界處以上各議現在所費極厚所建極繁所更張極大所收之効在二十年以後利且萬倍夫二十年非朝廷必不肯待之事又非四海臣民望治者不及待之事然則一損一益之道一岀一入之政國運盛益盛國基固益固民生風俗厚益厚官事辦益辦必由是也無其次也其非順天心究祖烈劑大造之力以統利夫東西南北四海之民不在此議謹議擬進上蒙古圖志表文臣伏處下士之列縱觀史册之盛翹首昭代之蹟遊心官書之府仰天章之有爛測地輿之至賾我朝之盛乃自羲炎堯禹以降文儒武臣目所不能殫耳所不能聞帝者號令所不能逮史官文章所不能記有一臣於此遭遇隆代明聰特達能通文學能見官書能考官書能見檔册能考檔册能鉤稽補綴能遠遊能度形勢能通語言文字能訪問能勥記能思慮能屬詞比事信或有之其福甚大求之先士無有倫比者也臣珍檮昧乃非其倫竊見國朝自西域盪平後有欽定西域圖志五十卷專紀準部回部山川種系聲音文字及於國朝所施設政事箸錄文淵閣副墨在杭州鎭江揚州旣富旣鉅永永不朽臣攷前史動稱四海西北兩海並曰蓋闕我朝之有天下聲敎號令由回部以達於葱嶺嶺外屬國之愛烏罕那木干以迄於西海由蒙古喀爾喀四部以達於北方屬國之鄂羅斯以迄於北海回部爲西海內衞喀爾喀爲北海內衞今葱嶺以內古城郭之國旣有成書而蒙古獨靈丹呼圖圖滅爲牧厰其餘五十一旗及喀爾喀四大部縱横萬餘里臣妾二百年其間所施設英文鉅武與其高山異川細大之事未有志遂敢伸管削􅂤䚡理其迹闛鞳其文作爲蒙古圖志爲圖二十有八爲表十有八爲志十有二凡三十篇私家箸述所得漏不敢仰與官脩各件絜短長於萬一顧見欽定四庫書目箸錄文淵者於下士私述間蒙俛采不遺其勤凡若干種竊願是書他日附官書以傳得箸錄四庫之末􅂤則無其才也而福與之並矣述曰聖祖高宗文冠古后制而比之武文咸富述天章志弟一滿洲祭天則有禮書茂彼北裔亦攷厥圖述禮志弟二古舞侏􅍣廟門之下號嘈者何以侑詐馬述樂志弟三人戴北斗中言匪西岀地入地測之用圭述晷度志弟四內四十九如康田功附土默特西旗旣同述旗分志弟五如古康侯盟用刑牛畫社爲六理藩所區述會盟志弟六有哲卜尊北方大師如宗喀巴宏於西陲述象教志弟七摩騰演漢章佳贊聖彼福此宏本師所印述譯經志弟八小東大東􅐯􅐯烏龍亦有北海厥受則同述水地志弟九古兀落素今也卡倫匪愛其獸以阹人民述臺卡志弟十貢用九白始自崇德王會徵之如典屬國述職貢志弟十一教駣攻駒詁儒失􅀓北方大政以牧代佃述馬政志弟十二斨者託忒不資豪毛國書因之落葉龍艘述字􅀋表弟十三民生啞啞後立文字聲在形先我聰厥際述聲􅀋表弟十四天子命輿地則必書曰討曰巡請詹起居述臨莅表弟十五粲粲中原有削有吞浩彼諸藩豈無革沿述沿革表弟十六林丹旣夷㫄支具安如鄂承不雲礽磐磐述氏族表弟十七收其大人扈入居庸固山梅勒轄是功宗述在旗氏族表弟十八愛猷之遜鬲三百年天聰以前系闕弗全述世系表弟十九古偁封建聖不得已因虖自然匪我錫祀述封爵表弟二十碩矣天姬爲之哈屯禮官擇言匪古和婚述􅁵降表弟二十一準有鄂拓蒙古之旗如我京城􅂙佐所治述旗職表弟二十二推河二族今則烏蘭名曰寄牧牛羊宴然述寄爵表弟二十三濟農岱靑其汗其王漠南視之以爲朔方述喀爾喀總表弟二十四帝姒天姬再世降靈匪戚伊勳籩於廟庭述賽因諾顔總表弟二十五民貴見幾智者全生四衞拉特爾安爾榮述新遷之杜爾伯特表弟二十六㫺也五族今也二存督之縣之臣有瑰文述四衞拉特總表弟二十七唐努之山爲北屬國臣請上言置札薩克述烏梁海表弟二十八帝平羅刹嘗用其人海西漠北厥居婁遷述巴爾虎表弟二十九藐吐谷渾五部無統和碩少文台吉之總述靑海蒙古表弟三十曩欽吉思逐蘇勒坦何如今朝玉兹奉版附述哈薩克爲一表抱羊乞錢西東奉藩偕哈薩克拱我天山附述布魯特爲一表以上二表用前編脩徐松所述道光元年十一月朔內閣中書龔自珍􅁧表蒙古像教志序夫染衣出家沙彌之律也肉食不淨大慧之聞也諸肉勿食泥洹之訓也讚歎毁戒波旬之徒也然其生於邊地不生地穀以畜牧爲耕作以血肉爲饔飦宗教旣黃相沿已久有乖壞色之訓聊別白衣之儔戒或遮之教必諒之蒙古五十一旗及喀爾喀四部皆宗黃教黃敎之祖曰宗喀巴若具云者租鳥鞥卡巴羅阿阿鄂補匝阿昻查阿克巴阿也自稱文殊師利之瑚必勒罕生于額納特珂克地而唐古特庫車淖爾四衞拉特之地遍相宗祖其法嗣之派繁衍難備述述兩大支曰在藏坐牀者曰到蒙古住持者在藏坐牀者又分兩支宗喀巴弟一弟子曰根敦珠巴實弟五十四輩之達賴喇嘛是爲舎位岀家之第一輩遞傳至七輩噶爾藏加莫磋當準噶爾擾藏時聖祖救其亂噶爾藏加莫磋避至靑海坐牀聖祖送之俾歸于藏至今傳付不絕皆以其呼必勒罕爲之此一支也弟二弟子號爲班禪額爾德尼名曰刻珠尼曲結若具云者刻珠尼馬曲結嘉勒布格爾也至弟四輩名羅卜藏曲結嘉勒燦者始與蒙古通自蒙古至盛京受我太宗皇帝冊封歸死後其瑚必勒罕遂有喀木之地又九傳矣此一支也兩支外又有兩小支一曰紅帽噶瑪巴一曰黑㡌沙瑪納皆稱呼圖克圖避達賴班禪位號沙瑪納呼圖克圖之後曰就衰滅噶瑪巴之後近世有林沁班珠爾者稱沙布嚨於庫車淖爾爲庫車淖爾察罕諾門之屬僧則並不敢號呼圖克圖矣其來蒙古住持者又分三支最先者曰帕克巴巴喇密特是其道北行之始凡六傳至元順帝時阿難達瑪第喇嘛與帝爭政事怒而歸于唐古忒中絕凡八九十年而索諾木札木蘇重至又十餘傳至邁達哩止爲一支宗喀巴有弟三傳嫡嗣曰蘇爾第其瑚畢勒罕託生喀爾喀地方偁哲卜尊丹巴呼圖克圖又兩傳進丹舒克於世祖朝至今凡十六次瑚必勒罕號位亞於西藏之達賴而幾與班禪埓又一支也康熙間有喇嘛章佳胡圖克圖自藏來朝其人乃是第六輩達賴羅卜藏札木蘇之支嗣聖祖優禮之命其住持于多倫諾爾之彚宗寺其第二次瑚必勒罕世宗優禮之命其住持多倫諾爾之善因寺其第三次瑚必勒罕賜對高宗朝大加奬異命其來京更定大藏經咒應眞名號乃取自後漢至唐各譯主所譯悉以今藏語更校成又以其國首楞嚴已亾借此土本四譯而歸又佐莊親王辦理同文韻統於四十一年趺逝京師今又再瑚必勒罕矣是最盛而最後出又一支也五支之徒其論輪迴因果報應與古德神不滅論合其論劫初形狀天地衆生日月種種成立種種岀生次序與樓炭經合其書與符印明合其念咒與聲明合自漢以來譯經之例例不翻咒疏抄之例亦不妄釋咒是密語咒是秘印佛無秘密義有秘密語旣不譯不疏徒恃音準音若不準妙陀羅尼雖誠求之亦恐迂窵矣今按自修多羅至優波提舎各有神咒小者取用禁制神鬼作諸幻術大乘之咒三世諸佛由此出興不可思議具如首楞嚴說且凡外道六師亦能幻出宮殿天龍女樂大火大氷乃至幻一日演成極長幻長曰促成刹那境界種種靈怪咒聲靈故符佛口故又凡人世所求年命五欲誦咒皆得咒聲靈故符佛口故以上之事天竺神僧生于拉撒視爲固然卽蒙古道高喇嘛尙能近似而此震旦耳根非劣耳識非殊雖有高僧不臻神悟故􅁧象教志專以推尊因明門中聲明一門而非讚歎夫食肉衣黃墮邪師見也蒙古水地志序河􅒾來受者三部曰烏喇忒曰鄂尔多斯曰歸化城土默特羣水南來受者七部曰喀喇沁曰土默特曰敖漢曰奈曼曰翁牛特曰巴林曰喀尔喀左翼水東行入黑龍江未至句經大川四曰潢河曰大遼河曰諾尼江曰混同江水北行入色楞格河未至句經大川三曰愛畢哈河曰土喇河曰鄂尔渾河黑龍江入東海色楞格河徑俄羅斯入北海東以黑龍江爲主其目四又其目曰受某部某某水北以色楞格河爲主其目三又其目日受某部某某水具如志以西塞小水附黃河流入中國者別爲卷蒙古臺卡志序惟皇地祇爲主山川不能自辨自位是故古昔書有八索以政其人民周之諸侯史氏率不能讀其名存者有戎索有周索以侯以公以郡縣以城郭以行國皆將於是乎東於是乎西於是乎南於是乎北我國家君蒙古五十一旗喀爾喀四部地且二百年一吏不妄行一馬不妄芻一兎一鹿不妄趯走是亦有政􅁧臺卡志志郵志新郵志喀爾喀自備郵志鄂博志察哈爾牧厰鄂博志卡倫志圍場卡倫志柳子邊郵句康熙三十一年議自古北口至於烏朱穆秦置臺九又自獨石口至於蒿齊忒置臺六又自張家口至於四子部落置臺五又自張家口至於歸化城置臺六又自殺虎口至於吳喇忒置臺九又自歸化城至於鄂爾多斯置臺八又自喜峯口至於札賴特置臺十有六新郵句乾隆三十四年議喜峯口路札賴特盡處起置郵十有四古北口路烏朱穆秦盡處起置臺六殺虎口路烏喇忒大路外置臺七張家口路自四子部落盡處起置臺十有六穆哈哩喀遜爲起處哈拉尼敦爲住處喀爾喀自備郵句東路首跕曰尼爾得尼拖羅海曰他爾袞柴木達後路首跕曰肯特山西路首跕曰哈拉尼敦三音諾顔首跕曰博羅布爾哈蘇凡冊汗冊王册妃册格格賜賻賜祭天使至皆設之汗王貝勒公等自備夫馬警晨夜伺畜牧過則徹焉鄂博句以山爲鄂博以河爲鄂博以壘爲鄂博二十五部落如其境察哈爾牧厰鄂博句以山爲鄂博以河爲鄂博以壘爲鄂博八旗如其境卡倫句以山爲卡倫以河爲卡倫以樓望爲卡倫二十五部四喀爾喀如其境圍場卡倫句規高以爲之卡倫句於陊於阪於嵞於隟山之隟川之隟東句柳于厓口句西句柳于濟爾哈朗圖句北句柳于塞堪達巴漢色欽又柳于阿魯色呼又柳于阿魯呼魯又柳于英格又柳于拜牲圖乃西柳于庫爾陀羅海又柳于納喇蘇圖和碩又柳于沙勒當又柳于錫喇札巴色欽絶南句柳于木壘喀喇沁又柳于古都古爾又柳于察罕札巴又柳于汗特穆爾又柳于納喇蘇圖乃西枊于噶海圖又柳于卓索又柳于什巴爾臺又柳于麻巴圖又柳于博多克遂西柳于珠爾噶岱又柳于蘇克蘇爾臺又柳于卜克又柳于燕子窩又柳于卓索溝絶西句柳于察罕布爾臺又柳于阿爾散朗又柳于尼圖又柳于齊呼拉臺又柳于布哈渾􅈛又南柳于海拉蘇臺又柳于姜家營又柳于西燕子窩又柳于郭拜又柳于和羅博爾奇東柳于巴倫克得伊又柳于烏喇臺又柳于錫喇諾海又柳于納林又柳于格爾齊老柳在外卡倫在裏故地句周阹之中若爲翁牛特故地若爲喀喇沁故地敖漢故地奈曼故地土默特故地巴林故地喀爾喀左翼故地兹事嚴武旣麗旣博號令散見未有總述於古之世帝朔未或訖也王教未或經也由今之年文符武節所以旌也舜跡禹踵所以步也按籍受成里史之書與蒙古聲􅀋表序自國語以至額訥特珂克土伯特以至天山北路準部南路回部皆有方語則皆有字頭呼韻之學而五十一旗部屬及喀爾喀四大部反無之今蒙古語言文字具在沿流以溯原因子而識母因其自然而不惟師心之尙能之乎日不能則無爲貴聰矣但其義迾觸手鉤棘道出於天籟無不同法成乎人例實不一自國書十二篇外經典白氎同爲世尊之所宣說同是阿難之所結集譯祖東游震旦筆受一經之文先後數譯尙爾乖迕若夫神珙所製司馬光所圖與德幹必特雅星哈所受通密繖布喇所􅀓乾隆初卬承睿指或煩定正而後臚列整齊源流明備各還其一家之言重以準部有託忒體回部有彈舌聲下士譾愚冥搜博采求其貫通不亦勞矣今先舉諸家各不同處然後準的可得而寀義迾可得而擇也諸家不同約有七事按僧伽婆羅譯師利問經舉五十字不空譯文殊問經舉五十字竺曇摩羅察譯光讚般若經舉四十一字無羅义譯放光般若經舉四十二字鳩摩羅什譯摩訶般若經舉四十二字元奘譯大般若經四十三字佛䭾跋陀羅譯華嚴四十二字實义難陀譯華嚴四十二字地婆訶羅譯華嚴四十二字三藏般若譯華嚴四十二字不空譯華嚴四十二字金剛頂經五十字曇無讖譯大般湼槃經如來性品六十二唱實舉五十字六十二字約以十四音有重見之字故止五十也有初短次短次長三種別佛言皆以舌齒㗋而有差別此經未經同文韻統采摭故特詳之凡十三種皆一母一聲欽定天竺五十母西番三十母回部二十九母皆同惟聖朝國書之母則以阿額衣鄂烏諤六字爲第一􅀋餘至十二字不等如八撥逼以下乃十二字準部十五母則亦以阿至互七字爲第一􅀋餘亦七字成􅀋而非以額依等字爲所生之聲此例之異者一也天竺母所生可舉者一千二百一十二字西番舊六字紗婀妻鴉合齊雅合齎雅合凡六所生纔二十四字合新舊三十字所生可舉者共四百三十四字回部所生字單字一百七十四字連字則以一字領二十八字輪流統領又兼本字自領本字如阿阿衣衣烏烏之屬計八百四十一字共計一千零十五字國語則除第一烏珠爲十一部之綱其第二部起自阿衣額衣阿拉額拉以下共生一千二百四十字而準部十五母尙無推衍成圖之作者準部若以國書比較只抵有國書之第一圖耳中華見溪羣疑卅六字舊法有演出十二攝各四聲者又藏經十三穜惟華嚴實义難陀本每卷畢唱演三節毎節十字起至十四五字不等而仍收聲於第一字是亦譜生聲之例而彼十二家無聞此例之異者二也同爲母生子而所以能生又分兩種國書仿照天竺之例定有主輔二􅀋其字之收聲於阿者定納阿至阿二十四字爲輔字也阿至鄂六字主字也第一部之納奴窩起皆收聲於阿皆輔阿而行天竺自阿至阿斯十六字主字也自嘎至嘎刹三十四字輔字也湼槃凡六十二唱而佛言十四音亦具主輔之理餘如西番之三十母卽不能分主輔矣而餘十二經準之託􅑯皆不能分矣且西番舊六字無所配合而生聲實义難陀本無所配合而生聲卽回部加記號之百七十四單字不能不以爲子而以爲二十九頭之輔也蓋單字從字母生連字又從單字生比各家又中鬲一重如算法家之有祖孫位是其特異然亦無所配合而生聲司馬氏以十二攝演神珙近之矣但上爲雙聲下爲㬪韻一言瞭然不必謂之配合而生聲此例之異者三也南北等韻各家或用喉舌脣齒分配陰陽而難有定論惟元人周氏作中原音韻不用分配而陰陽乃確乎不易人之喉舌脣齒皆名兼陰陽豈必分配乎周但以字區之南北人皆同之此例之異者四也恭禀睿指國書以阿字爲元聲實抉古來聖神未發之秘胎八極於一㗋自然之符也大藏十二種皆同天竺同準部同而間有小異者西番之不於發聲也回部之不於字頭而於化單字也湼槃之不於第一而於第四五六七也又複見第二十三字推本以譚西番自阿努之子通密繖布喇至天竺取三十四字歸刪其十一加舊傳紗等六字又加兩國同舊有之阿字爲卅字見徹辰薩囊書則原非以爲殿後字而章佳國師敘次之小倒也回部之單字一轉移而卽成愛里普固卽阿也湼槃之首三噁以義從非必以聲從也皆不岀大聖人指授之範圍矣雖小異不閡大同惟大同可臚小異此例之異者五也中國等韻諸家舊法無文空圈記聲其二合之字獨見佛經瑜伽師地論中字是也實义難陀於所生字毎用圈於母字則始用二合室左是也三合者僅一見曷攞多是也梁時僧祐作梵漢譯經同異記辨之博而見之早矣今準部亦只二合無三合欽定天竺西番皆至三合謂所生字字母則以二合而止無四合國書回部書乃有四合回部竟至五合舌愈捷而法愈䆳矣此例之異者六也天竺西番有紗補住吉固徵卜納囉雙納囉哈蘭答雅答克巴魯達札麻嚕烏巴達麻諸記號回部則有則爾則白爾帕尺都則爾都則白爾都帕尺諸記號因思大海烏巴什等之因蒙古書加圏點爲國書亦卽此例蓋以形命聲而不必本有其聲并不必別剏其形至敏㨗也餘家無之此例之異者七也今欲推見蒙古字母則諸家之法具在其若之何而用所當用棄所當棄立於不可易之地哉按明初陶氏曰元國字以可侯爲母此言巨繆者也則恭援小兒初生之聖訓以斥之至其都數則定以十部每部之數則以三爲例凡三十聲爲第一總圖兼用百五音隸十五􅀋之例天山北路與喀爾喀接壤同祖故也不以第一頭爲九頭之綱不必於巴博卜下收聲於阿不必配有主輔而生聲此則不泥於例也三十字中有兩字書成一作一聲讀者凡五其二十五皆單聲也所生之圖首分陰陽兩大支爲兩圖何爲陽以中國有平聲無上聲之字爲陽何謂陰以中國四聲具足之字爲陰此元人周德淸例也陽凡十七母陰凡十三母也陰陽各舉字七倍於母餘可以推也又使卅頭以一領二十九互相領而㬪書之上書大下書小成一圖得九百聲回部連字例也又於三十頭之下各加一璸都記號各成一聲又於三十頭之下各加一天竺雅答克記號改成一聲又於三十頭之下各加一吉固記號改成一聲共又得九十聲回部單字例也第五第六第七圖猶國書總圖外之十一圖也其書連字樣則亦國語及天竺例也有二合三合四合無五合參用國語天竺西番例而不用回部例也毎頭之下必註明今蒙古語之某句某字以見圖爲蒙古作也蓋爲圖凡七爲聲凡一千四百有十第一母阿字阿實達之阿第二和字和拉哈喇之和第三伊字伊蘇之伊爲一􅀋第四母巴字巴拜岱之巴第五母博字卓齊博哈之博第六卜字實喇卜之卜爲一􅀋第七母圖字約蘇圖圖之第八騰字騰吉思之騰第九坦字哈坦之坦爲一類第十哲字哲卜尊之哲第十一札字札木楚之札第十二春字庫春之春爲一類第十三蘇字舒蘇之蘇第十四蘇圖第十五索圖和卽阿之轉索圖卽蘇圖之轉如笛家之有鬲指聲爲一類第十六喇字喇呼濟之喇第十七拉厄字卽喇轉第十八朗字達朗達賚之朗爲一􅀋第十九穆字圖薩特穆之穆第二十曼字曼濟鼐之曼第二十一穆爾字穆之爲穆爾猶蘇索之加圖此如琴家之有汎聲爲一􅀋第二十二母諾爾字諾穆親之諾第二十三囊字他布囊之囊第二十四鼐字鼐曼之鼐爲一􅀋第二十五丹字羅丹之丹第二十六等字鄂等答之等第二十七特字土黙特之特爲一類第二十八棍字棍楚克之棍第二十九肯字色徹肯之肯第三十克字克哷之克爲一類上鎭守吐魯番領隊大臣寶公書不譽顔色已八年自珍至京師之前一月始聞西命吾師禁近大官出萬里之磧統甲一旅同朝者惜公門下士爭慰公自珍謂內廷少吾師一人天子未闕於侍從漢大臣得罪者或削職歸田里吾師猶冠三品冠以大臣印行且翰林多不更於政部閣又不足以老公之才吾師感激報効飜在今日故於庚午同年之公郵而西也附區區所欲言者以訊於隊下之吏吐魯番故無領隊將也自闢展移駐後遂與四大城踠尾而五自素賚璊襲爵後南路無事遂五十年矣南路之民與準部異性情懦􅀡一異面貌平正似內地兩異其文字聲音易通曉三異故天心之待之亦大與準夷異我高宗皇帝豈樂於窮武以􅋑史乘哉我國家坐食數千城何貪於準夷哉實以準夷迫逐回人北徙而南天愍回人之无􅇳故開高宗皇帝起之鄙邑隸之天廷岀之幽谷暴之白日準夷又積狡爲叛其性惡自祖先而然氣感於天而怒觸於帝高宗一天也是故準噶爾故壤若庫爾喀喇烏蘇若墖爾巴噶台若巴爾庫勒若烏魯木齊若伊犂東路西路無一廬一帳是阿魯台故種者觀天之不慈不佑於準部卽知其不絕佑於回部巨物不兩立亦不兩仆回部多古民叢叢蝨蝨漢世三十六城之孽裔尙有存者天存之高宗存之也高宗一天也自波羅泥都霍集占助逆背德高宗始用兵于回烏什之叛乃再用兵于回然而兩和卓木之罪視準夷之達瓦齊阿睦爾薩納爲閷烏什之酋長罪視兩和卓木爲又閷微大和卓木之殺阿敏道一事地雖大高宗不欲取民雖富高宗不欲臣洎乎臣之取之回國亡而種姓不亡或一姓亡而羣姓不亡阿渾伯克得翎頂以從滿州世臣之後甚至如烏什之滅聖天子且未嘗如搜捕準夷例故曰高宗一天也今之守回城者何如曰天天而已矣天高宗而已矣鄰國者國之鑑也吾師亦知烏什往事乎素誠者旗下役也叨竊重寄爲領隊大臣占回之婦女無算笞殺其男亦無算奪男女之金銀衣服亦無算烏什殺素誠以叛烏什之叛高宗且撻伐且憐哀聖諭以用素誠自引咎御製詩時以激變爲言謂素誠死有餘罪納世通卞塔海之誅也非以失機也以平日擾回也明將軍阿將軍之出也非爲素誠報仇也以警羣回也至聖至明未嘗稍有偏護及好殺之意嗣後各城相顧自疑自怖數十年來上賴朝廷德厚下賴賢將軍賢大臣等明示胸肝吿以天朝雖疆回地斷無喜殺回人意大臣皆奉公法屯說戸演賴以无事今之守回城者何如曰令回人安益安信益信而已矣信生信不信生不信不以駝羊視回男不以禽雀待回女回人皆內地人也皆世僕也回人老於禍福最老久祭天而祈拜佛而誓寫氎而記之刻刀而銘之以烏什爲恐吐魯番爲南路建首地一王巋然有僕三千戸皆以吐魯番爲望恐之言曰莫更爲烏什矣望之言曰安得如吐魯番矣故吐魯番安而四大城皆安四大城安而天山南路舉安天山南路安而非回之天山北路安天山北路安而安西南路北路舉安伊犁將軍無內顧之憂蘭州總督無外顧之憂如此則回部之紅銅常貢於法局回部之大頭羊常充於天廚吾師乃不媿爲高宗皇帝之臣僕夫高宗皇帝之臣僕囘長之所敬也囘民之所愛也郭勒之神達巴之靈亦必福吾師矣且吾師亦知凖噶爾部之所由屠滅無遺種乎珍又有說始噶爾丹入居喀爾喀賽因諾顔部超勇親王未稱賽因諾顔汗時不過北陲一嗜肉之獸不但東南不近札薩克東不近牧厰而且以西論并不有後來凖部全地亡何漸念貪漸念忿入寇赤臣土謝兩汗兩汗亦有邊竟細夫不勝而入控聖祖我聖祖乃奮天威三起而三逐之每一次之入必深於前次聖祖之剏懲之亦嚴於前次卒至噶爾丹棄地西走而死謂可以集矣不幸而其兄子能收舊人又不幸而其族收其西竟地又不幸而輾轉强大不北噬而西嘷也逐回部擾靑海􅀡西藏隣俄羅斯我朝一祖二宗三世西顧龍顔焦勞幸而其國篡弒相繼幸而三策凌來歸幸而阿睦爾薩納來歸謂可以集矣詎知幸者皆不幸之伏不幸者又幸之伏幸不幸凡幾相迸激而遂致我高宗皇帝之大怒帝怒於上將帥怒於下自天而下自地而上大蹂大膊千里一赤睢盱之鬼浴血之魂萬億成羣泰岱不籙天帝不􅀡何爲而至是哉彼囘部者亦有經卷亦談因果試召阿渾而問之因何其細果何其大抑造因之時能豫知果之至如是哉是故今曰守囘之大臣惟當敬謹率屬以導囘王囘民刻刻念念知忠知孝愛惜翎頂愛惜衣食唪誦經典耕者毋岀屯以墾牧者毋越圏而刈上毋虐下下毋藐上防亂於極微積福於无形則可謂仰體上天好生之德乃亦毋􅀒高宗用兵之意者哉若夫議遷議設撤屯編戸盡地力以劑中國之民自珍另有西域置行省議一卷用厚白􅁓寫上塵覽珍受恩最深受恩最早故敢越分而多言惶􅋺上國史館總裁提調總纂書內閣中書本館校對官龔自珍上書各中堂各大人各先生閤下本館現在續修大淸一統志自乾隆三十九年書成後伏遇今日重修欣賀无量續者纂其所未載修者訂其所已成自珍與校對之役職校讐耳書之詳略得失非所聞亦非所職雖然竊觀古今之列言者矣有士言於大夫後進言於先進之言有僚屬言於長官之言僚屬言於長官則自珍職校讐而陳續修事宜言之爲僭爲召毁士言於大夫也後進言於先進也則雖其言之舛先進固猶辱誨之自珍於西北兩塞外部落世系風俗形勢原流合分曾少役心力不敢自秘願以􅉆纂修協修之采納而仍不敢臆決其是否恃中堂以下之必辱誨之也不得以官牘請爲書一通如千條如後方一欽定西域圖志及皇朝文獻通考四裔考皆於西邊新疆外臚屬國一卷西邊有布魯特哈薩克愛烏罕納木干安集延痕都斯坦諸􅀋舊志約畧開載竊謂西有西屬國北有北屬國北屬國之情形與西國尤不同北屬往往錯處喀爾喀伊犂之閒東北則錯蒙古黑龍江之間天朝亦往往用其兵力如烏梁海則聖祖平漠北用之高宗平準噶􅈛用之巴爾虎則聖祖平羅刹用之科布多七旗則以貿市至無虛月皆見忠悃非安集延等孤懸葱􅊐者可比是故欽定蒙古王公表傳則嘗取科布多之扎哈沁一旗攷其世系書其功績以壯盟府之藏而烏梁海一國三支分處自討噶爾丹招降後和羅爾邁遣使貢貂至今年班不絶在唐努山者則有和羅爾邁見檔册在阿勒坦淖爾者則有特勒伯克札爾納克皆見檔册於功不爲尟矣於恩不爲閷矣舊一統志於新舊藩服外一字不及之疑於無此屬部者然今開館續修志似宜行文理藩院徵檔册將三處烏梁海頭目宰桑各部落畍送館以便增補一本館現存貯聖祖聖訓及平定羅刹方畧一書方畧爲文淵閣未箸錄之書內各有巴彥虎事蹟數條各官書於巴彥虎皆不及之但稱巴彥虎現有借牧呼倫貝爾一事按巴爾虎舊牧當在尼布楚雅克薩城之間與內藩之烏珠穆秦地勢正相􅀡宜檄理藩院行文黑龍江將軍將其頭目遷徙年月部落界移送到館本館以聖訓方畧核對之卽可纂補一扎哈沁族􅀋雖細已蒙欽定表傳臚入宜將禡木特一旗現在牧科布多之何所補入北屬國如補烏梁海巴爾虎之例一北之有科布多猶西之有靑海也靑海爲部五而科布多爲部七考現在檔案其不與商民通市者二部曰土爾扈特曰和碩特其與商民交易者五部曰杜爾伯特曰額魯特曰明阿特曰札哈沁曰烏梁海此七者惟札哈沁得上見於表傳六部無聞表傳原爲紀功績而作無功者不書一統志地書也焉得而削之考科布多地界在喀爾喀之西北伊犂東路之東南宜行文叅贊大臣將札哈沁及六旗土界旗分一一移覆本館開載又此處烏梁海之與唐努山三烏梁海同異合分之故遷徙之年月可一并移覆藉畧見焉按此在科布多與哈薩克接壤之處距唐努山三支太遠故疑非同􅀋一北厄魯特者本準噶爾綽囉斯同族阿逆未叛時首先來歸詔隸三音諾顔部據理藩院檔册偁現在附盟於齊齊爾里克地方見旗二爵二貝子二人一偁厄魯特旗一偁厄魯特前旗者是與皇朝文獻通攷合舊會典稱一旗先駐達拉爾河一旗先駐喀爾喀河文獻通考襲是語按欽定王公傳偁阿喇布坦一族先牧喀爾喀河後牧推河後乃徙牧烏蘭烏蘇丹濟蘭一族先牧喀爾喀河後牧西舍穆稜後又牧推河後乃徙牧烏蘭烏蘇年月皆在始皆當偁推河厄魯特也繼皆當稱烏蘭烏蘇厄魯特也何有曾牧達拉爾河之文舊典一歧矣於烏蘭烏蘇外別岀推河厄魯特之號似乎以阿喇布坦族爲烏蘭烏蘇以丹濟蘭爲推河者然兩歧矣細繹王公傳推河始立六旗一旗是輝特一旗是賀蘭山之分支與此無涉此共四旗茂海一旗叛亡亦弗數阿喇布坦之兩旗後并兩札薩克爲一兄終弟及兄無嗣故其一旗則丹濟蘭子也舊會典係乾隆二十六年所修此并旗年月亦難臆斷大約與典不甚相先後典乃偁烏蘭烏蘇爲兩旗而不連所謂推河者數若曰從其朔則朔當是五旗何但二乎三歧矣舊典外余所藏戊戌內版搢紳書與典同又王公傳王公表皆偁丹濟蘭先封貝子其子先封公後封貝子並無先封台吉語舊典及戊戌內板搢紳皆於烏蘭烏蘇則注曰兩旗貝子二人於推河則注曰一旗台吉一人四歧矣官書處處不合再四攷訂惟有敬遵欽定王公表傳爲的餘書盤戾糾紾而舊一統志遂一字弗及之無可考一所貴乎重修者謂將糾舊誤補舊闕亮非抄襲沿承而已舊一統志於兩坿牧地旣不道及矣而於西套賀蘭山厄魯特之下忽注云一旗係阿喇布坦裔一旗係丹濟拉裔賀蘭山在靑海之東烏蘭烏蘇在沙磧之北相去將六千里一係綽囉斯族一係和碩特族今置和羅理名氏於不問以北人之祖先移贈於西亦豈舛之細者矣糾而正之諸公豈有意乎一舊志於靑海下奮書云靑海爲四衞拉特之一於西套下又注云四衞拉特中北厄魯特居其一攷四衞拉特皆在天山北路準噶爾地一綽囉斯二杜爾伯特三和碩特四土爾扈特後土尒扈特逃往俄羅斯乃補入輝特見於高宗皇帝御製文及種種官書種種檔册無弗合靑海是地名非部落名非種族名其地則和碩特族居之後輝特有居者後土爾扈特穜有居者後綽囉斯種有居者後北方之喀爾喀穜有居者又番僧察罕諾們漢之屬僧亦編旗而處之將合此六者而指爲四之一乎北厄魯特乃綽羅斯之一支以北爲四之一將置其全部於何稱今之脩官書者閱至此其謂之何一西套厄魯特兩支一和碩特一土爾扈特皆與靑海近戊戌內板搢紳臚序靑海之後不誤舊會典乃於兩支中夾敘一烏蘭烏蘇失之矣舊一統志僅開載賀蘭山之厄魯特而不載額濟內河之土爾扈特應補一地名半以種族而得名人皆知之至地有以人徙者無城郭之民􅀋然如明時兀良哈三衞福餘衞是嫡酋所居出口卽是泰甯衛岀關即是始則地因人得名繼且挾地名而徙今之烏梁海遂爲皇朝極北竟矣和碩特有借牧科布多者嘗見科布多大臣章奏遂偁其一區爲和碩特矣札哈沁本西域汎卒之稱自安放科布多後北方遂增一部落稱呼矣舊地名新地名􅀋此者極多攷沿革者宜畧知此一修書宜畧知鉤稽法如四衞拉特三有姓獨土爾扈特無姓由後言之雖謂土爾扈特卽是姓可也謂和碩特卽姓和碩特無不可也由前言之固皆以地名爲姓敢據徹辰薩􅇸書偁其出恭博地方定土爾扈特爲恭博姓一衞拉特是五族公共之偁各種官書獨於綽囉斯一族則單稱厄魯特不知始於何例然如西套賀蘭山及靑海之厄魯特廿有一旗者細考實非綽囉斯乃和碩特也與它處又不畫一今宜定一例連姓稱綽囉斯厄魯特而西套靑海皆改書和碩特一靑海四部爲旗二十有九此外實尙有綽囉斯遺民一類於乾隆二十九年前移徙而無編旗明文厯來只數四大部而遺其一舊志因仍宜一面行文貴德循化辦事大臣查覆一面恭檢欽定平定準噶爾方略續編開載一各處里差經緯度數舊典頗多舛如阿霸垓阿霸哈納爾皆左翼有之右翼無之之右翼里差斷乎弗同又如科爾沁六旗只詳一旗鄂爾多斯七旗只詳一旗宜行咨欽天監攷補一引書用舊說宜加排比各具體裁官書中如三通大抵沿舊文少所發撝如撰七音畧取之欽定同文韻統撰六書略取之欽定西域同文志夫西域同文志專爲譯西而作故於國書下先注明西域書乃次各種書而所臚僅西域地名人名山川名若以皇朝全代全輿論西域亦一隅之一隅自宜分􅀋博徵備詳訓詁以淸文鑑爲主以滿漢官名地名舉例不得以西域山川舉例是撰皇朝六書畧而獨以西域爲主矣三通爲本館朝夕編摩取材之書故特發其凡以勸愼重一舊志驛站下云自獨石口至蒿齊忒九百餘里爲一路置驛九考理藩院檔册稱實六百里置郵六又志於古北口喜峯口外載乾隆三十六年之新郵而張家口外亦有新郵自穆哈哩喀遜爲新站起處哈拉尼㪟爲住處凡十六站何以失載又喀爾喀汗自備之郵站亦宜畧志一二俾往來天使知厥隘畧一回部風俗亦佛教之支流其人祖曰阿旦其教祖曰黙赫爾默特其師曰阿渾其同種曰穆哩斯瑪奈其學問曰二令戒邪婬戒殺戒妄語戒酒戒盜其字頭始愛里普其厤元亦不拘至朔同日分杪無餘之法而自成章蔀不置閏大約爲西洋新法厯書之所祖或云頗近授時厯也其教實與西洋耶蘇教大異唐時流行中國之景敎水經注之袄祠自是耶蘇教非默赫爾默特教皆佛典所稱九十六種㫄門之一要之比於準部之黄教食肉衣黃之制不猶未遠佛意哉自珍另有內典㫄師攷一篇呈覽竊按在西洋則爲耶蘇教在蒙古準部則爲宗喀巴教在回部則爲默赫爾默特二令教風俗一門宜區以詳焉以彰兼收並畜之􅞾且盛一西域屬國如布魯特之在南部哈薩克之在北部向於天朝恭謹各官書只記大槪今中書徐松在西域時曾鉤稽兩部世系地界沿革成兩表當代奇作此可以沿用者一西藏亦有屬國猶喀爾喀之附見巴爾虎烏梁海科布多回部之坿見布魯特安集延痕都斯坦準部坿見哈薩克之例曰廓爾喀實􅇰大其次曰作木朗曰布魯克巴曰哲孟雄曰落敏湯皆宜附見廓爾喀本名巴勒布國初巴勒布三罕曰葉楞罕曰布顔罕曰庫庫木罕於雍正九年各奏金葉文遞哈達譯出詞旨甚恭順命以玻瓈磁器賞之後三罕合爲一故巴勒布益强大戊申辛亥兩用兵亦皇朝巨事實也風俗形勢宜備載以上都一十八條皆舉其炳炳顯顯者餘小事頭緒尙多未易鬯宣懼循襲而不改闕略而不補顚舛而不問茍簡而不具弃置而不道囘護而不變有重修之費有重修之名將使後之專門者靡所鏡也中華文獻夥有通人無甲第名位弗敢妄議惟此􅀋語言文字求之親到其地者尙或懵昧答不中問可知從事鉛槧之難珍雖非絕詣自是孤學倘蒙垂擇致爲榮幸而於已非有利焉不勝悚惶待教之至與人箋諉檢各件敬檢上靑海本番地也番子是吐谷渾之裔唐以前實强後少弱亦不失爲大國一見逐於正德間之蒙古阿尔秃斯再見逐於國初衛拉特固實汗三見逐於三傳之羅卜藏丹津羅卜藏丹津者叛世宗朝以覆固實祀故今之靑海和碩特則並非固實嫡種矣今和碩特二十有一旗是不從羅卜藏丹津叛者其餘喀尔喀一旗輝特三旗土尔扈特四旗皆以雍正末乾隆初陸續徙往以地未實故與和碩特分居番子故地天道好還强弱迭代今番子之事必聲言報先世之仇名近正力近强必非各旗所能禦湟中諸旗距番遠尙可自活河北之帳必危自然之勢也聖者貴因天運之自然矧番子未嘗獲罪天朝古未有外夷自相爭掠而中朝代爲之用兵者且蒙古亦何可令之强强卽弗恭順􅀓曰狧糠及米羅卜藏丹津之前事可爲之續邪番人蒙古皆信佛大喇嘛察罕諾門汗一旗最富盛貧番子往往賴其牛羊以活喇嘛位號在西藏達賴之下并在漠北哲卜尊丹巴之下僅與後藏班禪比若朝廷許進其位號許造庿宇必肯出力以佛法兩勸而兩罷之不調一兵不費一粟以外夷和外夷智之魁也今兵力物力皆非開邊釁之會克則殺機動不克則何以收事之局於事前思之惟大喇嘛雖富而弗傳子雖有功而無後患無事則無患有事則可用此列聖尊崇黄教微指也走雖明習何敢妄論邊事承咨采再四故條出大槩以附􅀡而勿有之義其地形道里各件程府丞昔歳開斜方而得之者想明核走處僅一分覽畢當見還也不儩壬午十一月八日定盦續集仁和龔自珍璱人饌卷二古史鉤沈論一龔自珍曰史氏之書有之曰霸天下之孫中葉之主其力弱其志文其聰明下其財少未嘗不周求禮義廉恥之士厚其皃嫗其言則或求之而應則或求之而不應則必視祖之號令以差史氏之書又有之昔者霸天下之氏稱祖之廟其力疆其志武其聰明上其財多未嘗不仇天下之士去人之廉以快號令去人之恥以嵩高其身一人爲剛萬夫爲柔以大便其有力疆武而允孫乃不可長乃誹乃怨乃責問其臣乃辱榮之亢辱之始也辨之亢誹之始也使之便任法之便責問之始也氣者恥之外也恥者氣之内也溫而文王者之言也惕而讓王者之行也言文而行讓王者之所以養人氣也籒其府焉裵􅏆其鐘簴焉大都積百年之力以震盪摧鋤天下之廉恥旣殄旣獮旣夷顧乃席虎視之餘蔭一旦責有氣於臣不亦莫乎古史鉤沈論二龔自珍曰周之世官大者史史之外無有語言焉史之外無有文字焉史之外無人倫品目焉史存而周存史亾而周亾殷紂時其史尹摯抱籍以歸於周周之初始爲是官者佚是也周公召公太公旣勞周室改質家躋於文家置太史史於百官莫不有聯事三宅之事佚貳之謂之四聖蓋微夫上聖叡美其孰任治是官也是故儒者言六經經之名周之東有之夫六經者周史之宗子也易也者卜筮之史也書也者記言之史也春秋也者記動之史也風也者史所采於民而編之竹帛付之司樂者也雅頌也者史所采於士大夫也禮也者一代之律令史職藏之故府而時以詔王者也小學也者外史達之四方瞽史諭之賓客之所爲也今夫宗伯雖掌禮禮不可以口舌存儒者得之史非得之宗伯樂雖司樂掌之樂不可以口耳存儒者得之史非得之司樂故曰五經者周史之大宗也孔子殁七十子不見用衰世著書之徒蠭岀泉流漢氏校錄最爲諸子諸子也者周史之小宗也故夫道家者流言偁辛甲老􅆅墨家者流言偁尹佚辛甲尹佚官皆史􅆅實爲柱下史若道家若農家若襍家若陰陽家若兵若術數若方技其言皆偁神農黃帝神農黃帝之書又周史所職藏所謂三皇五帝之書者是也老於禍福熟於成敗絜萬事之盈虛窺至人之無競名曰任照之史宜爲道家祖綜於天時明於大政攷夏時之等以定民天名曰任天之史宜爲農家祖左執繩墨右執規矩篤信謙守以待彈射不使王枋弛不使諸矦驕上名曰任約劑之史宜爲法家祖博觀羣言旣迹其所終始又迹其所岀入不蒙一物之譏不受諸矦蹈觝使王政不淸庶物奸生名曰任名之史宜爲名家祖臚引羣術愛古聚道謙讓不敢刪定整齊以待能者名曰任文之史宜爲􅇎家祖窺於道之大原識於吉凶之端明王事之貴因一呼一吸因事納諫比物假事不辭矯誣之刑史之任諱惡者於材最爲下也宜爲陰陽家祖近文章眇語言割榮以任簡養怒以積辨名曰任喻之史宜爲縱橫家祖抱大禹之訓矯周文之偏守而不戰儉而不奪人名曰任本之史宜爲墨家祖五廟以觀怪地天以觀通六合之際無所不儲謂之任敎之史宜爲小說家祖劉向云道家及術數家出於史不云餘家出於史此知五緯二十八宿異度而不知其皆繫於天也知江河異味而不知皆麗於地也故曰諸子也者周史之支孽小宗也夏之亾也孔子曰文獻􅂎不足徵傷夏史之亾也殷之亾曰文獻宋不足徵傷殷史之亾也周之東也孔子曰天子失官傷周之史亾也滅人之國必先去其史隳人之枋敗人之綱紀必先去其史絶人之材湮塞人之敎必先去其史夷人之祖宗必先去其史周之東其史官大罪四小罪四其大功三小功三帝魁以前書莫備焉郯之君知之楚之左史知之周史不能存之故傳者不雅馴而雅馴者不傳謂之大罪一正考父得商之名頌十二於周百年之間亾其七太師亾其聲􅃶焉太史又亾其簡編焉謂之大罪二周之雅頌義逸而荒人逸而名亡瞽所獻燕享所歌大氏斷章作者之初指不在瞀儒序詩以斷章爲初指以諷諫爲本義以歌者爲作者史不能宣而明謂之大罪三有黃帝秝有顓頊秝有夏秝有商秝有周秝有魯秝有列國秝七者周天子不能同列國赴告各步其功告朔怠終乃亂而弗從周享國久八百餘祀秝敝不改是以失禮是失官之大者謂之大罪四古之王者存三統國有大疑匪一祖是師于夏于商是參是謀今連山歸藏亡矣三易弗具孔子卒得坤乾於宋亦弗得于周史之小罪一列國小學不明聲音混茫各操其方㣲孔子之雅言古均其亡乎史之小罪二夫史籒作大篆非癈倉頡也周史不肯存古文文少而字乃多矣􅁚形指事十存三四形聲相孳千萬並起古今困之孔壁旣彰蝌斗煌煌匪籒而倉蓋憲章者文武而匪憲章宣王史之小罪三列國展禽觀射父之徒能言先王命祀而周史儋乃坿萇􅀪爲神怪之言不能修明巫覡祝宗不能共鬼神燕昭秦皇淫祀漸興儋􅀪階之妖孽是徵史之小罪四帝魁以降百篇權輿孔子削之十倍是儲雖頗間不具資糧有餘史之大功一孔子與左邱明乘以如周􅀗百二十國之書夫而後春秋作也史之大功二冠昏之殺喪祭之等大夫士之曲儀咸以爲數夫舍數而言義吾未之信也故十七篇之完亦危而完者也史之大功三周之時有推步之方有占譣之學其步疏其占密天官有書先臣是傳唐都甘公爰及談遷是蹟是宣史之小功一史秩下大夫商高大夫官必史也自高以來疇人守之九章九數幸而完史之小功二吾韙彼奠世繫者能奠能守有􅏘諩牒有世本竹帛咸􅃇是故仲尼之徒亦著帝繫姓後干餘􅀊江介之都夸族之甚史之小功三夫功罪之際存亡之會也絶續之交也天生孔子不後周不先周也存亾續絶俾樞紐也史有其官而亾其人有其籍而亾其統史統替夷孔統修也史無孔雖美何待孔無史雖聖曷庸由斯以譚罪大亦可揜功大亦可蒙也孔雖殁七十子雖不見用王者之迹雖息周厤不爲不多數不爲不躋府藏不爲不富沈敏辨異之士不爲不生緒言緒行之迹不爲不竢莊周隱於楚墨翟傲於宋孟軻端於齊梁公孫龍譁於齊趙之間荀況廢於道路屈原淫於波濤可謂有人矣然而聖智不同材典型不同國擇言不同師擇行不同志擇名不同急擇悲不同感天吝材材吝志志吝器器吝情情吝名名吝祖夫周自我史佚辛甲史籒史􅆅史伯而後無聞人焉魯自史克史邱明而後無聞人焉此失其材也七十子之徒不之周而之列國此失其志也不以孔子之所憑藉者憑藉此失其器也三尺童子瞀儒小生偁爲儒者流則憙偁爲羣流則愠此失其情也號爲治經則道尊號爲學史則道詘此失其名也知孔氏之聖而不知周公史佚之聖此失其祖也夢夢我思之如有一介故老纕臂河洛憫周之將亾也與典籍之將失守也􅊧三十王之右史拾不傳之名氏補詩書之隟罅逸於後之剔鐘􅃔以求之者以超辰之法不顯之年月定􅀊名之所在逸於後之布七厤以求之者爲禮家之儒爲小節之師爲攷訂之大宗逸於後之彌縫同異以求之者明􅁚形說指事不比形聲不譚孳生雅本音明本義逸於後之據引申叚借以求之者本立政作周官述周法正封建之里數逸於後之襍眞僞以求之者誦詩三百篇綱於義義綱於人人綱於紀年明著竹帛􅇣於後之據斷章升諫以求之者烏乎周道不可得而見矣階孔子之道求周道得其憲章文武者何事夢周公者何心吾從周者何學逸於後之譚性命以求之者辭七逸而不居負六失而不䘏自珍於大道不敢承抑萬一幸而生其世則願爲其人歟願爲其人歟古史鉤沈論三龔自珍曰予大愳後世益不見易書詩春秋李銳陳奐江藩友朋之賢者也皆語自珍日曷不寫定易書詩春秋方讀百家好襍家之言未暇也内閣先正姚先生語自珍曰曷不寫定易書詩春秋又有事天地東西南北之學未暇也嗚呼姬周之衰七十子之三四傳或口稱易書詩春秋不皆著竹帛故易書詩春秋之文多異漢定天下立羣師置羣弟子利祿之門爭以異文起其家故易書詩春秋之文多異然而文武之文非史籒之孳也史籒之孳孔子之雅言又非漢廷之竹帛也漢之徒􅘗寫官譯形借聲皆起而與聖者並有權然而竹帛廢栔木起斠紬者不作凡栔令工匠胥史學徒又皆起而與聖者並有權聖人所雅言益微悲夫悲夫將欲更定姬周之末之文章不有攷文之聖其孰當之將欲更漢氏也羣師互有短長非深於義訓勇於割聞者不能也無巳則我所欲紏䖍姑在夫引書變爲徒書之際乎以與漢寫官爭姑在夫竹帛變栔木之際乎以與後世之栔令工匠胥史爭所據者皆賤所革者功不大小賢勉而能爲之庶幾其遂爲之勇改三百字鬼不相予乃又㕦言曰是不足爲今夫易詩書春秋之文什五用叚借焉其本字蓋罕矣我將盡求其本字然而所肄者孤漢師之汛見雅記者闕孤則不樂從闕則不具以不樂從之心采不具之儲聚而􅊫之能灼然知孰爲正字孰爲叚借固不能以富矣諸師籍令完具其於七十子之所請益倉頡史籀之故孔子之所雅言又不知果在否焉則足以慰好學臚古者之志終無以慰吾擇於一之志且吾之始猖狂也憾姬周之末多岐憾漢博士師弟子之多岐今也不然憾漢寫官之弗廣憾栔木之初之不廣憾兵燹之不祐憾俗士之疎而弗嗜古無以俟予予所憾日益下恧如何恧如何龔自珍􅀊爲此言且十稔卒不能寫定易書詩春秋生同世又同志寫定者王引之顧廣圻李銳江藩陳奐劉逢祿莊綬甲古史鉤沈論四王者正朔用三代樂備六代禮備四代書體載籍備百代夫是以賓賓賓也者三代共尊之而不遺也夫五行不再當令一姓不再產聖興王聖智矣其開國同姓魁傑夀者易盡也賓也者異姓之聖智魁傑夀耉也其言曰臣之籍外臣也燕私之游不從宮庫之藏不問世及之恩不預同姓之獄不鞫北面事人主而不任叱咄奔走捍難禦侮而不死私讐是故進中禮退中道長子孫中儒學中史王者於是芳香其情以下之玲瓏其誥令以求之虛位以位之書曰今予其敷心優賢揚厯詩曰毋金玉爾音而有遐心用此道也商法盟先異姓周法盟先同姓質家尊賢先異姓文家親親先同姓古者開國之年異姓未附據亂而作故外臣之未可以共天位也在人主則不暇在賓則當避疑忌是故箕子朝授武王書而夕投袂於東海之外易世而升平矣又易世而太平矣賓且進而與人主之骨肉齒然而祖宗之兵謀有不盡欲賓知者矣燕私之祿有不盡欲與賓共者矣宿衛之武勇有不欲受賓之節制者矣一姓之家法有不欲受賓之論議者矣四者三代之異姓所深自審也是故周祚四百其大政之名氏姜嬴任芉姒子之材不與焉征伐之事受顧命之事共和攝王政之事皆姬姓也其異姓之聞人則史材也且夫史􅆅之訓曰知足不辱知止不殆知所以自位則不辱矣知所以不論議則不殆矣不辱不殆則不顦顇悲憂矣孔子曰非天子不議禮不制度不考文吾從周從周賓法也又曰出則事公卿事公卿賓分也孟軻論􅀸貴戚之􅀸異異姓之􅀸夫異姓之􅀸固賓籍也故諫而不行則去史之材識其大掌故主其記載不吝其情上不欺其所委贄下不鄙夷其貴游不自卑所聞不自易所守不自反所學以榮其國家以華其祖宗以敎訓其王公大人下亦以崇高其身真賓之所處矣何也古之世有抱祭器而降者矣有抱樂器而降者矣有抱國之圖籍而降者矣無籍其道以降者道不可以籍也下至百工之藝醫卜之法其姓氏也古其官守也古皆不能以其藝降夫非王者卑其我法又非王者不屑籍古之道也又非王者敢滅前古之人民獨不敢滅其禮樂與道藝也道誠異不可降禮樂誠神靈不可滅也禮樂三而遷文質再而復百工之官不待易世而修明微夫儲而抱之者乎則􅁦何以救廢何以修竆何以革易曰窮則變變則通通則久恃前古之禮樂道藝在也故夫賓也者生乎本朝仕乎本朝上天有不專爲其本朝而生是人者在也是故人主不敢驕夫嬴劉之主驕於三代者何也賓籍闕也漢之賓籍闕不於其季於其初漢初伏生老竇公耄申公胥靡故漢初巳無有賓若夫子與姬之交也姒與子之交也其學或有續絶矣其得姓受氏者或有續絶矣官或有續絶矣禮或有續絶矣則以三代之季或能賓賓而尊顯之或不能賓賓而窮而晦而行遯職此之由􅂎不能徵夏宋不能徵殷孔子於􅂎宋思獻周初武王舉逸民其衰也有柳下惠少連禽也淵雅博物少連躬至行孔子皆謂之降志之民孔子述六經則本之史史也獻也逸民也皆於周爲賓也異名而同實者也若夫其姓賓也其籍外臣也其進非世及也其地非閨闥燕私也而僕妾色以求容而俳優狗馬行以求祿小者喪其儀次者喪其學大者喪其祖徒樂厠於僕妾俳優狗馬之倫孤根之君子必無取焉壬癸之際胎觀弟一天地人所造衆人自造非聖人所造聖人也者與衆人對立與衆人爲無盡衆人之宰非道非極自名曰我我􅊍造日月我力造山川我變造毛羽肖翹我理造文字言語我氣造天地我天地又造人我分别造倫紀衆人也者駢化而羣生無獨始者有倮人巳有毛人有羽人有角人有肖翹人毛人羽人角人肖翹人也者人自所造非聖造非天地造其匹也襍不部居倮人之不與毛􅊁者匹其後政非始政後政也者先小而後大五人主爲政什人主爲政什什人主爲政伯什人主爲政人總至至于萬爲其大政有衆人巳有日月有日月巳有旦晝日月旦晝人所造衆人自造非聖人所造乃造名字名字之始各以其人之聲聲爲天而天名立聲爲地而地名立聲爲人而人名立人之初天下通人上通旦上天夕上天天與人旦有語夕有語萬人之大政欲有語於人則有傳語之民傳語之人後名爲官或以龍紀官􅀠天之龍爲首不鹹之水龍次焉鹹水之龍次焉隸畜之龍次焉或以雲紀官􅈻上天之雲爲首隸天之雲次焉隸名山大川之雲又次焉或以鳥紀官隸天之鳥爲首隸畜之鳥次焉龍鳥雲天所部非人所部後政不道使一人絶天不通民使一人絶民不通天天不降之上天不降之上天所天又不降之諸龍去諸鳥不至諸雲不見則不能以絶比其久也乃有大聖人出天敬降之龍乃以部至鳥以部至雲以部至民昻首見之者天之藉也衆人以爲天大政之主必敬天名日月星爲神名山川爲􅅘名天之人亦曰神天神人也地􅅘人也人鬼人也非人形則非人也民之初夀無紀官不能紀遠夀不能如初傳紀之極言夀卑矣曰三萬􅀊曰八萬千嵗壬癸之際胎觀弟二旣有世巳於是乎有世法民我性不齊是智愚彊弱美醜之始民我性能記立彊記之法是書之始中方左行東方左行南方左行東南方左行東北方右行西南方左行西北方右行北方右行皆曰文文之孳曰字字有三名曰聲曰形曰義民我性能測立測之法是數之始數始於一極於九凡地之上天之下空盡實之必立九以求實謂之算算之大者曰測日月星曰測地日月星地旣可測則立之分限以紀人之居世者名之曰􅀊曰春夏秋冬是厤之始民我性能分辨立分辨之法有四名之曰東西南北以高爲北庳爲南南方日所岀北方日所入以爲東北方日所岀南方日所入以爲西是方位之始民我性善病蓋有蟲焉以宅我身則我身病是病之始於是别草木之性以殺蟲是醫之始倮人食毛羽人不知所始食毛羽人亦病之始民我性能􅀋故以書書其所生又書所生之生是之謂姓是譜牒世繫之始一人生二子則有長幼則宗之始有宗牒巳恐其亂故部男女是禁男女之始佃有公矦伯有土之君始民我性不齊夫以倮人食毛羽人及男女不相部名之爲惡矣其不然者名爲善矣是名善惡之始壬癸之際胎觀弟三有天下有大國寶應出福德聚主天下寳應不出福德不聚主大國有天下者都中有大國者都西北大國之君有古紀有近紀亦以福德爲差夫始變古者顓頊也有帝統有王統有霸統帝統之盛顓頊伊耆姚王統之盛姒子姬霸統之盛共工嬴劉博爾吉吉特氏非帝王之法地萬里位百葉統猶爲霸帝有法王有法霸有法皆異天皆不相師不相訾不相消息王統以儒墨進天下之言霸統以法家進天下之言霸之末失以襍家進天下之言以霸法勸帝王家則誅以帝王法勸霸家則誅能知王霸之異天者曰大人進退王霸之統者曰大人大人之聰明神武而不殺總其文辭者曰聖人聖人者不王不霸而又異天天異以制作以制作自爲統自霸天下之民以及凡民姓必黃炎惟太皡黃炎共工爲有允孫非古之凡民皆有允孫古之世語言岀於一以古語古猶越人越言楚人楚言也後之世語言岀於二以後語古猶楚人以越言名越人以楚言名也雖有大人生於霸世號令弗與共福祿弗與偕觀其語言弗可用號令與共福祿與偕觀其語言卒弗可用於是退而立大人之語言明各家之統慕聖人之文固猶將生越而楚言也壬癸之際胎觀弟四心無力者謂之庸人報大仇醫大病解大難謀大事學大道皆以心之力司命之鬼或哲或惛人鬼之所不平卒平於哲人之心哲人之心孤而足恃故取物之不平者恃之或以妒正性命醜忌姣曲忌􅀡父亦妒子妻亦妒夫或以攻正性命細攻大貌攻物窳攻成側攻中細攻大將以求大名側攻中將以求中名謂之舍天下之樂求天下之不樂君子有心刑大刑容中刑絶細刑校道莫高於能容事莫慘於見容大倨故色卑大傲故辭卑大􅃘故所責於人卑傷生之事異形而同神者二一曰好勝二曰好色何以同其原同也五倫之事天人亙孳人天迭爲始知不􅂮之說者亦不恥欲夀命欲夀命有三術惜神一生物二離怨憎三大兵大札起於肉食大亡大哀起於莞簟大薄蝕大崩竭起於膠固壬癸之際胎觀弟五萬物之數括於三初異中中異終終不異初一匏三變一棗三變一棗核亦三變大人用萬物之數或用其有或用其空或用其有名或用其無名或用其收或用其弃大人收者一而弃者九也不以收易弃也亯弃之積也忌人者謗以所反奪所恃也媚人者譽以所反絶所慮也靜女之動其動失度哀樂愛憎相承人之反也寒暑晝夜相承天之反也萬物一而立再而反三而如初天用順敎聖人用逆敎逆猶往也順猶來也生民順也報本始逆也冬夏順也冬不益之冰爲之裘夏不益之火爲之葛逆也亂順也治亂逆也庖犠氏之易逆數也禮逆而情肅樂逆而聲靈是故敎王者上勤天敎子上勤父敎臣上勤國君壬癸之際胎觀弟六有域外之言有域中之言域外之言有迾域中之言有迾有以天爲極以命爲的有不以天爲極不以命爲的域外之言善不善報於而身厤萬生􅂮而身彌存域中之言􅂮可以休矣善不善報於而允孫是故夫有尺土之氓則立宗爲先及其有天下師彼農夫謂將以傳福祿於後昆嗚呼旣報之後身又祿之身後不亦勸乎旣報之於後身又芟刈其身後不亦傷乎是故大人毋辨毋惑毋􅅭瞀而惟爲善之是堅大人之所難言者三大憂不正言大患不正言大恨不正言憂無故比患無故迾仇無故誅恨無故門言無故家壬癸之際胎觀弟七聖者語而不論智者論而不辨大人曰天下方安小僞小僞不可安不如以大僞明於天下言僞忠禁僞敎德僞情道僞聖禮僞自然域中之言名實其大耑兵爲其幾有名天下兵集之有辭矣無實天下兵集之無患矣有名無實是再受兵有實無名是再卻兵無名僞有名恥無實僞有實敗名實中不敗戰亦不勝有名僞無名霸敗果何喪敗者不能言霸果何􅀗勝者不能言非不能言本無以言故曰萬物不自立有說什之一無說什之九無說什之一始有說卒無說什之九善非固有惡非固有仁義廉恥詐賊很忌非固有或誠恥之萬人恥其名矣或誠爭之萬人爭其委矣或誠嗜之萬人嗜其皃矣或誠守之萬人守其蹊矣女子十五避男子於圊牏恧也女子七􅀊避男子於路非恧也恧之謂之有說非恧而恧之謂之卒無說萬物名相對者埶相待分相職意相注神相耗影相藏埶不相待分不相職意不相注神不相耗影不相藏將相對之名不成萬事皆不立萬事不自立相倚而巳矣相倚也故有埶萬理不自立相譬而巳矣相譬也故有辨相倚相譬也故有煩惑狂亂有煩惑狂亂也故有聖智大人之聽衆人也耳擊之也曰皆然目擊之也曰無所否何謂無所否衆人之名亦與名衆人之守亦與守衆人之爭亦與爭麟鳳能游肖翹之族而與蠛蠓辨或覿爲細也或覿爲巨也或覿爲神怪也同則是異則是同同則是異異則是是則是非則是乖則是合則是渾而大圜其精如不完其皃如不全不名一不守一不爭一衆人之情恒完皃恒全名一守一爭一曰盡之矣有所蔽故有所樂多所蔽故多所樂弗驚也弗疑也弗慕也何樂之有詩曰昊天孔昭我生靡樂盛德有福者憂患避弗及智慧廢弗用名之曰頑頑以完其初􅂮必上躋矣盛德無福者憂患入之智慧出之名之曰勞勞以不完其初􅂮必旁落矣神矣夫父母物之民智慧之所出憂患之所入入亦無算數出亦無算數入亦無比迾岀亦無比迾雖則用智慘然而哀雖則用慧慘然而哀或則抱憂而食患不忍用智慧焉而哀或則介憂而胄患不忍用智慧焉而哀其生也名曰哀民字曰難測其死也名曰最上字曰無上智慧之積無上者之體哀慘之積無上者之用體常靜用常動神矣夫父母物之民壬癸之際胎觀弟八萬物不自名名之而如其自名是故名之於其合離謂之生􅂮名之於其生􅂮謂之人鬼名之於其聚散謂之物變名之於其虛實謂之形神名之於其久暫謂之客主名之於其客主謂之魂魄名之於其湻濁靈蠢夀否樂否謂之升降名之於其升降謂之勸戒名之於其勸戒取舍謂之語言文字有天有上天文王箕子周公仲尼其未生也在上天其􅂮也在上天其生也敎凡民必偁天天故爲羣言極壬癸之際胎觀弟九羣言之名我也無算數非聖人所名聖何名名之以不名羣言之名物也無算數非聖人所名聖何名名之曰我域中之極言曰神乃曰立元神乃曰元神返而巳矣元神得養而巳矣去非元神而巳矣域外之言曰返之去之不如因之不如從而尊之因之無所袪而巳矣尊之無所加而巳矣因之有差尊之有差名之有差名之以不名亦有差域中之所名無能以差蠢也者靈所藉力者也暫也者常所藉力者也逆旅也者主人所藉力者也生亦多矣大人恃者此生身亦多矣大人恃者此身恃焉爾欲其留也留焉爾欲其有爲也有爲焉爾不欲以更多也是之謂大人之志五經大義終始答問一問三世之法誰法也答三世非徒春秋法也洪範八政配三世八政又各有三世願問八政配三世曰食貨者據亂而作祀也司徒司寇司空也治升平之事賓師乃文致太平之事孔子之法箕子之法也五經大義終始答問二問八政事事各有三世願問祀之三世答在禮運始言土鼓蕢桴中言宗廟祝嘏之事卒言太一祀三世不同名矣禮運者孔子本感蜡祭而言故臚祭也詳若夫徵之詩后稷舂揄肇祀據亂者也公劉筵几而立宗升平也周頌有般有我將般主封禪我將言宗祀太平也五經大義終始答問三願問司寇之三世答周法刑新􅀖用輕典據亂故春秋於所見世法爲太平矣世子有進藥於君君􅂮者書曰弑其君蓋施敎也久用心也精責忠孝也密假如在所傳聞世人倫未明刑不若是重在所聞世人倫甫明刑亦不若是重五經大義終始答問四問公劉之詩於三世何屬也答有據亂有升平始國於豳乃積乃倉當洪範之食俾筵俾几當洪範之祀五章六章是司徒司空之事其軍三單是司寇之事司徒司寇司空皆治升平之事古人統兵於刑班固尙知之固也志刑不志兵五經大義終始答問五問洛誥屬何世答有升平有太平曰予齊百工伻從王于周是八政司徒司寇司空之事曰肁偁殷禮咸秩無文是八政之祀事皆言升平也曰我惟無斁其康事當是時周公誕保文武受命成太平之業故求明農去位若僅致升平公豈宐去位之年哉公劉之首章曰匪居匪康據亂故也洛誥曰無斁其康事太平故也五經大義終始答問六問太平必文致何也答善言人者必有譣乎天洛誥之終篇稱萬年焉般時邁之詩臚羣神焉春秋􅀗麟以報端門之命焉禮運曰山岀器車河出馬圖鳳凰在棷孔子述作之通例如是是亦述周公也五經大義終始答問七問太平大一統何謂也答宋明山林偏僻士多言夷夏之防比附春秋不知春秋者也春秋至所見世吳楚進矣伐我不言鄙我無外矣詩曰無此彊爾界陳常于時夏聖無外天亦無外者也然則何以三科之文内外有異答據亂則然升平則然太平則不然五經大義終始答問八問禮運之文以上古爲據亂而作以中古爲升平若春秋之當興王首尾才二百四十年何以具三世答通古今可以爲三世春秋首尾亦爲三世大橈作甲子一日亦用之一􅀊亦用之一章一蔀亦用之五經大義終始答問九問孰爲純太平之書答禮古經之於節文也詳尤詳於賓夫賓師八政之最後者也士禮十七篇純太平之言也乙丙之際塾議弟十六有匹婦之憂有城市之憂有人主之憂匹婦之憂貨重於食城市之憂食貨均人主之憂食重於貨夫貨未或絀也未或毁也以家計患其少以域中計尙患其多何哉孝者以奉親弟者以事長睦者以䘏族任者以急朋友俠者以無名放者以無節雖千萬不鈞其在天地間則鈞埋之土中取之土中投之水火取之水火不岀天地之間人主者會天地之間之大勢居高四呼博貨之原則山川効之嗇貨之流則官司鑰之重貨之權則名與器視之貨在宮中鬼神守之貨在朝野吏民便之其敝也貝專車不得一匹麻有金一斛不糴掬粟又其敝也丐夫手珠玉道殣抱黃金知黃金珠玉之必無救也是故博食之原嗇食之流重食之權總四海而憂之不急一城之急一市之急矧乃急匹婦之急矣食民者土也食於土者民也凡民以有易無使市官平之皆以稻麥百穀竹木􅁰陶鐵筐筥桑柘葛苧蔬韭木實藥草牛驢馬豬羊雞魚蒲葦鹽酒筆楮使相當其名田者賦於官亦用是百家之城有銀百兩十家之市有錢十緡三家五家之堡終身毋畜泉貨可也畜泉貨取其稍省負荷百物者之力便懐衽而巳不挈萬事之柄行此三十年富民所恡惜非貨焉貧民所歆羨怨歎非貨焉桀􅃛心計者退而役南畝而天下復奚擾擾貧與富之名爲請定後王式曰泉式其質靑銅其輪周二寸半具重八銖銀之色理有常其枚無常其價嬴縮有常其品二等乙丙之際塾議弟十七三代之立言也各有世世其言守其法察天文刻章蔀儲厤編年月書日史氏之世言也規天矩地匡皃言防狂僭通蒙蔽順陰陽布時令陳肅聖哲謀敎人主法天公􅀸師保大臣之世言也言􅓇言祥言天道或譣或不羣史之世言也羣史之法頗隸太史氏不見述於孔氏孔氏上承堯典下因魯史修春秋大書日食二十又六事儲萬世之厤不言凶災日食爲凶災孰言之小雅之詩人言之七十子後學者言之漢之羣臣博士言之詩人之指有瞽獻曲之義本羣史之支流又詩者諷刺詼恠連犿􅇎揉㫄寄高吟未可爲敟正七十子以後學者言君后􅁚日月適見於天日月爲食漢臣之所昉也漢臣采雅記古儀官書造周禮又頗增益左氏傳皆有伐鼓救天之文衆儒譁咎時君時君或自責詔求􅀡言免三公三公自免大都君臣借天􅁚傳古義以交相儆也厥意雖美不得闌入孔氏家法曰古之公卿師保大臣太史氏不欲借天􅁚儆人君歟曰立言各有緒立敎各有統立官各有方毋相借矣大臣者探本眞以奉君過言有誅矧旁飾躗言故愼毋借言矣夫恒暘而旱恒雨而潦恒燠恒寒而疵癘妨田功妖人民古無步之之術雖有占譣塗傅之言取虛􅁚無準的無程期箕子推本狂僣孔子􅀡書水旱目爲凶災宜矣人主不學無藝能雖借言以愚其君無所用人主好學多藝能必有能自察天文步厤造儀者矣將詰其臣曰誠可步也非凶災誠凶災也不可以步借言者何以對將大坐誣與謗於是又有恒暘而旱恒雨而潦恒燠恒寒而疵癘當儆人君人君反不忌雖箕子所寒心孔子所危言反坐誣與謗言可以不中法乎哉言可以不中法乎哉其愼毋借言後之擇言者何守載筆治厤守春秋言咎徵守箕子或曰易曰天垂􅁚見吉凶聖人則之說文􅅘字謂日月星爲下垂之􅁚形也是日月星有吉凶非洪範之暘雨寒風應之曰日月星之見吉凶殆爲日抱珥月暈成環玦星移徙彗孛日五色日月無精􅊍日月不交而食謂之薄之類羣史所識有其占譣之書今也亾之古也有之繫辭所稱亦若是而巳矣而豈謂日月食之可推步者哉自記乙丙之際塾議弟二十聖淸田賦薄東南民樂其田請籍田數蘇松太倉一道名田一千七百萬畝有奇常鎭一道名田一千二百萬畝有奇杭嘉湖一道名田一千六百萬畝有奇大凡起江濱盡浙以西東際海千里無曠土闢草萊墾土地似是功臣而孟軻氏以爲民賊漢臣治水必遺地讓水乃後世言烏有弃上腴岀租稅之土以德魚黿者乎今之言水利者譬盜賊大至而始議塞竇闔門也興水利莫如殺水勢殺水勢莫如復水道今問水之故道皆巳爲田問田之爲官爲私則厯任州縣升科以達於戸部矣問徙此田如何則非具疏請不可大吏殫其入告州縣惡其少漕細民益盤踞而不肯見奪夫可以悍然奪之徙之不聽則誅之而民無亂者必私田也今田主爭於官曰我之入賦自高曾而然賦且上上奪而徙之兩不便湖州七十二漊之亡松江長泖斜泖之亡咎坐此等且夫沙可漲也亦可落也水變化爲泥塗泥塗變化亦爲水官不徙之水或徙之自今江之壖海之陬太湖之濱汐潮之所鼓茭葑之所爛鳧雁之所息設有一耦之民圖睂􅊿之利不顧衝要宜勿見勿聞有詗報及議升科者辠之乘無事之秊刪無益之漕徙無漕之衆乙丙之際塾議弟二十五聞之聰古子聰古子聞之思古子思古子聞之諦古子居廊廟而不講揖讓不如臥穹廬衣文繡而不聞德音不如服櫜鍵居民上正顔色而患不尊嚴不如閉宮庭有淸廬閒館而不進元儒不如闢牧藪榮人之生而不錄人之􅂮不如合客兵勞人祖父而不問其子孫不如募客作載籍情之府也宮廟文之府也學士大夫情與文之所鍾也入人國其士大夫多則朝廷之文必備矣其士大夫之家久則朝廷之情必深矣豪傑入山澤責人主之文也勞人怨士之顦顇觖人主之情也故士氣申則朝廷益尊士業世則祖宗益高士詩書則民聽益美其言如是是善覘國哉述思古子議聞之觀古子觀古子聞之聰古子聰古子聞之思古子言也者不得巳而有者也如其胸臆本無所欲言其才武又未能達於言彊之使言􅃼􅃼然不知將爲何等言不得己則又使之姑效他人之言效他人之言穜穜實不知其所以言於是剽掠脫誤摹儗傎到如醉如䆿以言言畢矣不知我爲何等言今天下父兄必使髫丱之子弟執筆學言曰功令也功令實觀天下之言曰功令觀天下說經之言童子但宜諷經安知說經是爲侮經曰功令兼觀天下懷人賦物陶寫性靈之蕐言夫童子未有感􅁣何必彊之爲若言然則天下之子弟心術壞而義理錮者天下之父兄爲之父兄咎功令宜變功令變之如何漢世諷書射策皆善矣諷書射䇿是亦敷奏以言也如漢世九千言足矣則進而與之射䇿射䇿兼䇿本朝事十事中十者甲科中七者乙科中三四者丙科不及三擯之其言不得吚嚘不定唱歎蔓衍以避正的宜酌定每條毋逾若干言以爲式其不能對則莊書未聞二字以爲式如此則功令不縟有司不􅅭心術不欺言語不僞至於說經則老秊敎學之先生爲之成人有德者爲之髫卝姑毋庸私家箸述藏名山者爲之大廷姑毋庸詩賦則私家之又不急之言也及夫唱歎蔓衍之文章大廷試士毋庸保甲正名嘉慶十九年冬奉上諭行保甲法大吏下其條目於所司大略云懸牌於門書長若幼之姓名年齒有習邪敎者準五家首之無則五家連環具甘結地方官一歳兩次編稽核之申報上司龔自珍曰此周禮相保法也相保猶相受相賙相賓也非保甲法保甲法孰爲之宋臣王安石爲之其條目如何曰新法每十家籍二丁授以弓弩敎之戰陳嗚呼周禮固無是矣三代以上兵民不分弓弩戰陳有敎之者而非司徒之事司徒之官則無此文保自保戰自戰不得合爲一傳曰家不藏甲􅀸大夫之家尙不藏甲編戸齊民何有甲之名三代以降兵民分朝廷旣養民以衛民矣事勢畫一民不宜更以武力自衛民當尊君親上問雞犬田器而巳宋臣呂祖謙之箋周禮曰五家相保則奇袤不混迹其中王守仁之與父老約曰孝弟謙和曰謹門戸曰門牌不實不盡者辠家長如此而巳夫射雖六藝之一安得盡天下男子而知射亦猶書數居六藝之二安得盡天下男子而知書數乎哉十家環堵宴然爲地幾何何以爲演武之地十家各有生計􅃈屑鄕飮讀法近世尙以爲煩擾不足行安得講武之暇十家各授弓弩盡東南竹箭不能給弓弩之材十家二丁謂之兵乎謂之民乎謂之民則十家有在官之庶人二不農不賈以習戰必􅅍民也謂之兵乎則不如明增兵額是故安石新法竟不行使不幸真行則明季以來閩粤械鬥之風宋世蚤有之不但閩粤且徧寰中寰中何能一日安故曰王安石之法非古非今古今亦無曾試之者聖世所用實是周禮而用王安石之名大不可也宜改曰五家相保法或問曰王安石信如人口譏議者邪答曰何爲其然安石心三代之心學三代之學欲敎訓天下之人材畢成三代之材者也但其慮疏其目疏故集天下之口地丁正名國朝有實則堯舜而名則漢武帝者一焉地丁是也古者田曰賦以田計也關市曰稅以貨計也口賦亦曰賦以人計矣以田計者上古法以貨計者中古法以人計者董仲舒曰商鞅法貢禹則曰實漢法我仁皇帝永免滋生人口之賦并入地賦有賜蠲賜緩賜賑而無賜復寰海之内無一人不復者也仁莫大焉事莫簡焉詩曰思文后稷克配彼天粒我烝民莫非爾極我仁皇帝革二千年之苛政此配天之實也其實如此其名未改邸鈔搢紳書仍偁地丁是實后稷而名商鞅漢武也名當亟正者此也或問之曰我朝取於民者閷前古遠甚鄕愚無見聞又不讀史則不知朝家百典千式萬官億條例所出視前古豐殺汚隆何如也告之曰國家萬秊毋敢議所以嬴於入者然而不禁議所以嗇於出者僕嘗私憂焉又私議焉兹不宣也􅁧四等十儀凡生民四體之盤蹙高卑遲遫以行禮其别有三一曰坐二曰立三曰跪立然後揖揖之别則有三跪然後拜古亦兼謂揖爲拜拜之别有九凡朝之等有四曰常朝曰大朝曰禮食曰通行凡常朝之儀又有三一曰主坐臣亦坐二曰主立臣亦立三曰主坐臣立一曰主坐臣亦坐於載籍有徵者如干事徵曰攷工記曰坐而論道謂之三公漢官儀曰御史大夫尙書令司􅘗校尉皆專席坐謂之三獨坐他若賈生夜見孝文爲之前席王常有功􅊍武詔其離坐戴憑說經於東京正旦有奪席之榮范志尸位於北宋宰相有徹坐之辱若斯之類蓋繁博矣二曰主􅕮臣亦􅕮於載籍有徵者如干事徵曰曲禮曰主佩倚則臣佩垂主佩垂則臣佩委春秋傳曰孔父正色而􅕮於朝則人莫敢致難於其君周禮天揖同姓土揖異姓時揖庶姓又太僕王眂朝則前正位而退鄭元說之曰王旣􅕮許愼說文解字曰从􅕮三曰主坐臣􅕮於載籍有徵者如干事徵曰書顧命凭玉几康王之誥太保曁芮伯咸進相揖又曰羣公旣皆聽命相揖趨出他若與羣臣决事徵秦皇之本紀倚􅕮求决徵梁武之詔書語其主則非令語其世則去古未遠大朝之儀又有三一曰主􅕮臣􅕮二曰主坐臣坐三曰主坐臣􅕮一曰主􅕮臣大於載籍有徵者如干事徵曰曲禮天子當依而􅕮諸矦北面而見天子曰覲天子當宁而􅕮諸公東面諸矦西面曰朝明堂位天子負斧扆南面而􅕮太史公書叔孫通傳功臣列矦將軍軍吏陳西面東鄕文官丞相以下至六百石陳東面西鄕二曰主坐臣坐於載籍有徵者如干事徴曰叔孫通傳曰諸侍坐殿上皆伏抑首漢官儀曰司徒府中有天子以下大會殿如古外朝以決大事也三曰主坐臣􅕮於載籍有徵者如干事徴曰周禮司士正朝儀之位辨其貴賤之等朝士掌建􅀖外朝之法左九􅁄孤􅀸位焉羣士在其後右九棘公矦伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後其通行於大朝常朝者一事曰主􅕮臣拜主􅕮臣拜載籍繁不可具徵也又通行於大朝常朝者一事曰臣拜起仍就列􅕮臣拜起仍就列􅕮載籍繁不可具徵也至於燕饗皆謂之禮食禮食之儀有二一曰主􅕮臣􅕮二曰主坐臣坐一曰主􅕮臣􅕮於載籍有徵者一事徵曰國語曰禮之􅕮成者爲飫二曰主坐臣坐主坐臣坐載籍繁不可具徵也夫是之謂朝廷之四等十儀古柱下之裔官篡而志之云祀典􅇎儀五首一昔者人倫之始五品之事實大聖之所造一飮一食猶思報本疇非聖之百姓曾是人倫攸始而無報邪今法於古之聖人旣皆報之矣黃帝堯舜禹湯則於厯代帝王廟文王則於傳心殿武王則於帝王廟孔子則於學后稷則於壇皋陶伯益伊尹周公則於帝王廟之東西廡獨契無祀議者爲之說曰契當祀矣無祀之之處稷契之孫皆有天下商周之王坐於堂反令其祖配食於廡不便是故祀稷於壇則不復於廡契則闕之應之曰稷契之在廡配堯舜非配商周也子孫身爲王坐於堂祖不身爲王坐於廡奚不可者契宜增祀稷亦無嫌複祀又一議曰今法各學有崇聖祠褒孔子五世而契爲孔子之太祖宜升契於崇聖祠正坐南向肇聖王以下五位配亯東西向斯言也猶賢於闕之之說一今法自京師及外州縣皆有文昌帝君祠曰是司科名之得失者科名果有神宜夫求科名者自祠之不必官爲立祠祠之之徒曰斗魁戴匡六星在周禮祀是第四弟五星吾曹仿周禮遺意而變通之祀其第六星無不可者嗚呼志科名者志祿而巳邪言甚鄙不可以爲訓又曰帝君卽張星也又曰梓潼神姓張名亞子者也謹求之經傳天官書文昌六星非張星張星非文昌六星張爲二十八宿之一不當有特祀梓潼張亞子見於小說家詞賦家或曰人也或曰非人也不足深論不宜在命祀三說者屢變屢遁而卒不相合要之三言皆不中律令帝君之偁岀於符醮靑詞家益悖律令官給太牢春秋跪拜惟謹恐後世大姍笑宜罷之一案會典厯代帝王廟見在配亯名臣若干謹條其應增入者十八人如左唐增四岳虞增稷契夏增靡商增伊陟甘盤周增共伯和伯共和是二人非一人予别有攷漢增霍􅊍趙充國東漢增杜喬李固宋增王旦遼增耶律隆運蕭翰明增劉健王守仁熊廷弼此十八人者或佐創或佐守或佐中興或仕末造不宜闕至於厯代之臣有盡瘁末造者雖於厤數無補其人可重應否增祀宜付禮臣更核議一今法自太學至府州縣學祀孔子爲先師孔子弟子配亯在位皆曰法備矣禮其殫矣厯千有餘載而莫之或思也􅀼嘗攷之三代之遺文在文王世子曰凡學春官釋奠於其先師秋冬亦如之又曰凡始􅕮學者必釋奠於先聖先師及行事必以幣在祭義曰祀先賢於西學以敎諸矦之德周官大司樂曰凡有道者有德者􅂮則以爲樂祖祭於瞽宗是皆周禮然則孔子以前固嘗有先聖先賢先師矣創物前民曰聖躬行孝弟曰賢守文抱道曰師皆蔑之是曠神祀而違經典也難者曰宰我曰以予觀於夫子賢於堯舜遠矣是故孔子旣生而孔子以前先師賢人可以廢􅀿之曰非是孔子述而不作信而好古子貢以爲焉不學孔子雖大聖大聖亦尊古者也正考父定詩以傳恭偁曰自古古曰在昔昔曰先民禮曰有其舉之莫敢廢也又曰三代之祭也先河而後海或源也或委也此之謂知本皆孔子之志也聖者雖有天下功德爲百世祖猶且考三王存三統奉二王之後與巳而三毋是傲弃以章文質循環之大本孔子以布衣修百王之業總羣言之歸承羣聖之後尙不自是則問禮於老􅆅問官於郯子問樂於師襄同時之人折節相師不有前事聖將安託夫以孔子爲海而先賢先師則河也以孔子當興王而先賢先師則二王也若之何蔑之也孔子弟子通六藝之文者皆􅕮主於孔子之堂於東於西亯用少牢小大稽首而孔子以前之聖賢孔子奪其祀夫非孔子之所安也􅀼謂宜别立先賢祠自京師始逮各行省每府一祠用少牢攷孔子以前之有道者有德者以孔子同時之賢人君子非門弟子者坿焉方今休隆時正宜差等百王攷鏡羣籍召萬靈之祐錫九流之福傳曰吉祥善事其斯之謂矣難者曰德有代興運有代去厲山氏之有天下也其子曰農能殖百穀夏之衰周弃繼之故祀以爲稷祀稷而廢農古也有徵應之曰古也旱乾水溢則變置社稷日食則以朱絲係社而伐鼓王者有黜陟百神之義故曰神主說祭法之文者曰湯七䄵旱時所爲也湯受天命以改人鬼之祀古也有徵今先聖先賢先師未嘗降虐於下民帝王安得而變置之乎一祭法之變廟制之變自有唐始也昔者殷有三宗周有文武世室漢有高祖有文帝爲太宗武帝爲世宗宣帝爲中宗東漢有世祖有明帝爲顯宗章帝爲肅宗此所謂有德有功百世不祧者也隋以前祭法皆不改三代之􅃇諸帝有謚而無廟號六世卽壇墠者也有唐一代諸帝盡有廟號盡爲宗天子崇古來未有之孝亦應創古來未有之禮旣皆在不祧之列矣自唐以來大抵宜合爲一廟有一帝則增一主四時之祭宜皆曰大袷韓愈以下諸家議祭禮援引禮記曰迭毁曰壇曰墠曰三昭三穆曰夾室曰祫曰時祭曰袷祭之年皆不中當代法令此千古禮法一大變禮家所宜知也答人問關内矦漢有大善之制一爲萬世法關内矦是矣漢旣用秦之郡縣又兼慕周之封建矦王之國與守令之郡縣相錯處乎禹之九州是以大亂繁興封建似文家法郡縣似質家法天不兩􅕮天不兩􅕮何廢何􅕮天必有所趨天之廢封建而趨一統也昭昭矣然且相持相氏卬徘徊二千餘年而後毅然定何所定至我朝而後大定關内矦者漢之虛爵也虛爵如何其人揖讓乎漢天子之朝其湯沐邑之入稍稍厚乎漢相公卿無社稷之祭無兵權無自辟官屬雖有百主父偃賈誼􅏯錯之謀無所用漢待功臣盡如此無韓彭矣待宗室盡如此無吳楚七國矣後世待將帥如此無唐方鎭矣待宗室如此無明燕王及宸濠矣莫善乎唐宋之待宰輔文臣也位之以王公矦伯開國子冠之以姬周大國名號食邑數千戸而不生殺其戸留其人於京師而無尺土以嬗其子孫有怨者乎無有子孫且無怨者及身之受保全大矣龔自珍曰唐宋待宰輔法漢􅀜内矦法也惜乎其猶多魯衛萊莒荆申之名之擾擾也我聖祖仁皇帝旣平吳耿大逆雖元功親王畢留京師大制大勢皆定宗室自親王以下至於奉恩將軍凡九等皆撥予之以􅀡􅘗及關東之田以抵古人之湯沐邑以漢制準之則關内矦也功臣自一等公以下至於恩􅀐尉凡二十六等二十六等之人皆予俸無官受世職單俸有官受雙俸其世數一等公襲二十六次以是爲差以漢制準之亦皆關内矦也且夫自我朝以前三千年未有定制自周巳然周之制文武成康之支子母弟封昭穆以降之支子母弟不封然則宣王之世鄭伯何以又岀封夫支孽盡封則國祚愈長久愈窒礙難行寰海不能容支孽支孽不盡封則守府之支子母弟怨故支孽盡封必速亡不盡封則子頽子帶之倫伺肘腋以怨非上冊也如皆􅀗虛爵如漢關内矦則皆受恩皆受制我朝之制除開國功王襲王爵罔替外世世嗣服之主皆封子弟爲王爲貝勒則皆降等以襲以世次爲差以世次爲差至四品閒散而止則不受田矣是恩與制皆善國家萬年京師數數營造王府貝勒府耳無所窒礙超越二千載最平允易行者也問功臣一等公以下之俸足以抵古之食邑戸者乎答不如也如有肯上言於朝増二十六等之俸此易施行者也問王以下之田與其大制曰皆善矣自珍官宗人府知之親王藍甲六十副外白甲一百七十副護軍領催三十分共錢糧二百分郡王藍甲五十副外白甲百二十副䕶軍領催三十分共錢糧百五十分貝勒藍甲四十副外白甲八十副護軍領催二十分共錢糧百分貝子藍甲三十副外白甲六十四副䕶軍領催十六分共錢糧八十分親王無故岀京師六十里罪與百官同親王以下貝子以上其戸下五旂包衣之人見王如家奴見家長之禮包衣之女許親王等捒選爲媵妾雍正元年議準包衣人應試入仕得以籍自通於朝
