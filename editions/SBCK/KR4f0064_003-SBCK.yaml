front:
  text: 定盦文集仁和龔自珍璱人饌
  hash: sha256:79de64ba89ebb42e9478c9e5db526da370c3d601e4ea398c6279b76f5e179c9b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0064_SBCK_003-1a}
body:
  text: 卷下五經大義終始論昔者仲尼有言吾道一以貫之又曰文不在兹乎文學言游之徒其語門人曰有始有卒者其惟聖人乎誠知聖人之文貴乎知始與卒之間也聖人之道本天人之際臚幽明之序始乎飮食中乎制作終乎聞性與天道民事終天事始鬼神假福禔應聖蹟備若庖犧堯舜禹稷契臯陶公劉箕子文王周公是也謹求之書曰天聰明自我民聰明言民之耳目本乎天也民之耳目不能皆肖天肖者聰明之大者也帝者之始也聰明孰爲大能始飲食民者也其在序卦之文曰物穉不可不養也屯蒙而受以需飮食之道也其在雅詩歌神靈之德曰民之質矣日用飮食是故飮食繼天地又求諸禮曰夫禮之初始諸飮食禮者祭禮也民飮食則生其情矣情則生其文矣情始積隆隆然始盈也莫莫然求之空虛望望然始相與謀曰使我有飮食者父歟母歟父母非能生之也殆其天歟乃率其醜取其仂以報於天蓋仰而欲天之降之也再相與謀曰父與母與曷爲不與我共飮食與則弗之見矣乃號其醜取其仂以報於淵泉蓋俛而欲父母之假之也三相與謀曰非天也非父母也孰使我以能飮食與則弗之見矣於是號其醜取其仂以報聖之人蓋每食四望而欲其降之也若其敎之降首屈股下上手與其下上手之數以差由中古作故曰觀百禮之聚觀人情之始也故祭繼飮食夫禮據亂而作故有據亂之祭有治升平之祭有太平之祭聖人曰我主天而衆之祭始息聖人曰我不敢僭天而衆之祭不敢先一人聖人自爲謀曰孰使予大川盈大陸平大物腯成而小物毛烹於是乎食人鬼之始播種以配上天食人鬼之始平道塗以配於下地食人鬼之聰明仁聖者於宮後王曰社稷瞽宗以恩父爲閷矣故恩及王父王父以上統曰祖其所居曰庿其在禮曰祝以孝吿嘏以慈告此禮之大成也此言有異乎土鼓之祭其實升平也其在公劉之四章曰蹡蹡濟濟俾筵俾几旣登乃依乃造其曹執豕於牢酌之用匏是時餱糧完具始立國而祭也又曰君之宗之惟祭乃立宗非祭則宗不顯明是故公劉教民祭而豳國之民無不尊其宗者後其支者大宗無不收羣宗者謹求之春秋必稱元年年者禾也無禾則不年一年之事視乎禾􅇝範稱祀者何天孰而當祀祀四時而徧則一年矣元年者從食以爲紀元祀者從祭以爲紀其在周公報成王曰祀於新邑咸秩無文周所以始立國也微子數商王辛之罪曰今殷民乃攘竊神祇之犧牲牲用以容將食無災上世方亂猶祀矧商階升平之資乎言辛所以災也度名山川升崇岡察百泉度明以爲向度幽以爲蔽搏土而爲陶鑿山而爲磏以立城郭倉禀宮室高者名曰堂下者名曰室以衛鬼神屏男女伐山之木以爲之羣材其百器以寓句股以求九數其在於詩旣景乃岡以測知北極之高下又曰夾其皇澗遡其過澗以順水性則司空之始也此其與百姓慮安者也若其與百姓慮不安者所以安安也曰飮食之多寡祭之數少不後長支不後宗筋力者暴羸於是乎折雚析木而撻之則司寇之始也而聲問乎東西而聲問乎北南飮食之多寡祭之數少後長歟支後宗歟筋力者毋暴羸歟皆必赴司寇而理焉理之而無不威故曰鞭蠻夷撻六合也謹求之書臯陶爲士其職也後王謂之兵兵也者刑之細也士也者理也有虞氏之兵也其在洪範八政有司寇後王有司馬司馬司寇之細也聖者曰吾視聽天地過高山大川朝天下之衆詧其耳目心思辨佞之雄長而戸徵其辭使我不得獨爲神聖必自此語言始矣爰是命士也命師也命儒也聖者至高嚴曷爲習揖攘之容虛賓師之館北面淸酒推天之福祿與偕使吾世世雄子孫必變化恭敬温文以大寵之豈懼其武勇之足以敚吾祭哉誠欲以一天下之語言也儒者出而語民曰非恃珪璧也其積者齋栗也而人莫不歡心以助吾祭矣不然邊鄙之祭夫豈無私玉儒者又出而語民曰非恃干戈也其積者和也而人莫不出私力以扞其圉不然南畝之勇夫夫豈無私兵謹求之禮古者明天子之在位也必徧知天下良士之數旣知其數又知其名旣知其名又知其所在葢士之任師儒者令聞之樞也令聞饗帝之具也其在記曰三代之王也必先其令聞夫名士去國而王名微王名微而王道薄故曰殺胎破卵則鳳皇不翔揜麛取犢則麒麟不至其在記曰土敝則草木不長水煩則魚鼈不大良士國之金玉異物也草木厭之而况金玉乎魚鼈槁之而况蛟龍乎誠苦之也名士之有文章望國氣者見其爛然而光於天求之雅詩曰倬彼雲漢爲章於天周王夀考遐不作人其推天人之際曰相彼鳥矣猶求友聲矧伊人矣不求友生神之聽之終和且平是野有相慕用之朋友而可薦於神明也其衰也賢人散於外而公侯貴人之家猶爭賓客於酒食其大衰也豪杰岀陰聘天下之名士而王運去矣謹又求之洪範八政七曰賓八曰師賓師得而彝倫敘也何以曰敘也古之賓師必有山川之容有其容矣又有其潤有其潤矣又有其材王者之與賓師處聞牛馬之音猶聽金玉也親塵土之􅆨猶茹椒蘭也其在記曰君子曰德德成而教尊教尊而官正官正而國治矣其在詩曰有馮有翼有孝有德夫食貨具則有馮矣官師備則有翼矣祭祀受福則有孝矣賓師親則有德矣誠約彝倫之極完神人之慶也聖者曰吾非多制以好勞也多文以爲辯也無政之曰闕政不中之曰不敘闕且不敘中國必有不安者矣夫如是是枕嵩華而身袵曠土之原也觀其制作曰成矣求之春秋則是存三統內夷狄譏二名之世與三統已存四夷已進譏僅二名大瑞將致則和樂可興而太平之祭作也是故有禘推五行得感生之天主天帝而以人鬼配之有宗祀祠天帝於宮而以父配力練而齋齋而盥盥而祭其在易觀盥而不薦有孚容若禘之盛也其在詩璱彼玉瓚黃流在中宗祀之盛也文祖明堂以嬗之名郊宗石室以建之主兼禮備樂以存之統升珪瘞璧以崇之文九州四海以象之宮重犆祀也有封祀求之詩於皇時周陟其高山墮山喬嶽其在禮升中於天而鳳皇降􅀛龍假封禪之盛也合此三者在春秋說曰以美陽芬香告於天猶吿盛也有宮中祠昔在黄帝集萬靈於明庭萬靈者配太一者也在天官曰太一在禮亦曰太一在易曰太極昔在成王襲祖考之勤勞有周公以代制作法宜得爲太平世謹求之書有曰予沖子夙夜毖祀毖祀宮中祠之盛也其在後王服玉而延年宵中而禋馮几而候神則動過其物也然亦罔有咎於天使天下之老者自視如壯者使天下之壯者自視如幼者雖有積瘁之士沉思之民春如三春秋如三秋晝如九夏夕如九冬故國暇而能修民民暇而性命治聖人之以能有名號者有四象焉曰暇曰順曰雍曰嘉其在詩將欲以美公劉之功而總其意曰旣順乃宣而無永歎其在禮曰明於順然後能守危也又曰達於順又曰順之實禮之終猶詩之始也求之書曰高宗三年不言言乃雍其在詩曰有來雍雍言雍在下也雍雍在宮言雍在上也灑掃嘉宮庭之道也朝日嘉旦晝之道也夕月嘉莫夜之道也玉色而絲聲嘉后妃之道也無夢也有夢則太人以占嘉寢寐之道也其在禮曰以嘉魂魄是爲合莫方祭而有嘉也謹求之詩曰予懷明德不大聲以色不長夏以革遂終言之曰不識不知順帝之則謹又求之禮曰聖人耐以天下爲一家中國爲一人必知其情何謂人情喜怒哀懼愛惡欲聖人治人情必反攻其情以已治之聖者有情與曰微矣至淸以有神至和以有精至靜以有形至澹以應羣靈至沖虛以應兆人故遂終言之曰心無爲也以守至正無爲本太一而已矣天下雖有積瘁之士沉思之民其心疾可得而已也上帝萬靈可得而晝夜通也是故有善可得而薦也有命可得而受也有作可得而合也然則絶地天通非歟胡爲其非也聲以色猶不欲而糅神人其爲聲色也大矣先王惡其驚民也非太一之謂也夫如之何而可以極言聖人也曰盍游乎淵然不瞬之中置乎肅然淸靜之上端端乎遇聖人焉謹求之易曰聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明䜭知神武而不殺者夫極之矣極之矣天如是則謂之能天天也者福之所自出也書有五福焉詩稱百福焉稱萬福焉皆能天之義也宋先生述君姓宋氏諱璠字魯珍浙江嚴州府建德縣人曾祖載祖紀勳父圻安􅃟拔貢生自祖以上仕否及妣氏族俱未詳弗可述君㓜以孝聞力於學其治經也總羣書並進天旦而起漏四下而寢不接賓客瘁志纂述大書如棋子小書如蚊腳墨書或濃或澹朱書如桃華日罄五七十􅁓如是者不計年當可得百餘萬言扄一敝箱中不知果成書與否又不知欲成何等書身後無可問者嘉慶七年以􅃟拔貢生來京師主刑部員外郞戴公家以戴公薦來主吾家訓自珍以敬順父母舉嘉慶九年順天鄕試十五年歳康午卒年三十三無子浙中傳君晚年信疑龍家書遷家兆手一卷書督畚鍤有白􅌌起地中觸君身而死其誣與其有之與吾家自賓客羣從逮老僕婢至今皆稱之日宋先生嘉慶丙子春武英殿校錄副榜貢生弟子龔自珍謹述擬上今方言表臣自珍言臣在京師造今方言書徂江之南歳而成首滿洲尊王也臚十八行省大一統也終流求高麗蒙古喀爾喀示王者無外也民之所異於禽獸也則聲而已矣人性智愚出於天聲淸濁侈弇鴻閷出於地每省各述總論述山川氣也氣之轉無際際虖氣者有際寸合而尺徙尺合而咫徙故府州縣以漸而變不敢紊也董之以事部之以物俾可易攷也天道十年而小變百年而大變人亦小天古今朝市城邑禮俗之變以有形變者也聲之變以無形變者也撢擇傳記博及小說凡古言之存者於下方知今之不自今始也及今成書以今爲臬也音有自南而北東西者有自北而南而東西者孫曾播遷混混以成苟有端緒可以尋究雖謝神瞽不敢不聰也旁采字母翻切之旨欲撮舉一言可以一行省音貫十八省音可以納十八省音於一省也臣又言曰三皇之世未有文字但有人聲五帝三王之世以人聲爲文字故傳曰聲之精者爲言言之精者爲文聲與言文字之祖也文字有形有義聲爲其魂形與義爲體魄魄魂具而文字始具矣夫乃外史達之太史登之學僮諷之皆後興者也是故造作禮樂經略宇宙天地以是靈日月以是明江河以是淸百王以是興百聖以是有名審聲音之教也知歸子讚懷歸子曰震旦之學於佛者未有全於我知歸子者也佛之徒吾能言之大都夙生所造糾􅅶至煩重其生也必抱民生絕幽苦之一境所苦不同要皆今古无比例語言文字所窮以爲其根本於以束其靈異智慧之心而不得試於外則尙不知有佛也乃遁而之于惝怳曲屈淒異幽靈孤譎之一境語言文字所窮以爲其徑竇久久而自知其不得以試於世乃姑蓄之而佯與世謀於是食萬斤之牛建摩天之旂以號於天下曰吾當卽世謀自羲炎以來文字无不受也日星河海之行帝王妃后臣宰農工徒隸之法无不􅘴也當世人民鳥獸龍魚䖵蟲之情狀无不隨也身命色力畢耗於是久久而自思其何所返且求諸外且索諸內皆不厭吾意於斯時也猝焉而與其向者靈異智慧之心遇遇而不逝乃決定其心葢三累三折之勢知有佛矣之人也設震旦之人從而尸祝之則徒能見其中央而已矣其學於佛也又以其十之四習密部以祈其災而澹其憂其爲第一大事謀十之六耳惟知歸子不然初亦不然中亦不然終乃盂之銘曰惜於水渟於盂不渟汝智孰惜汝智之枯坐之銘曰天九萬淵九萬尼汝於一􅧪一切處之銘曰不送汝矧逆汝煩惱身亦委蛇而畢汝與江居士箋別離以來各自苦辛榜其居曰積思之門顔其寢曰寡懽之府銘其凭曰多憤之木所可喜者中夜皎然於本來此心知無損已爾自珍之學自見足下而堅進人小貧窮周以財帛亦感檀施况足下教我求無上法寶乎人小疾痛醫以方藥亦感恩力况足下教我求無上醫王乎人小迷跌引以道路亦感指示况足下教我求萬劫息壤乎別離已深違足下督䇿掉舉轉多昏沈不尟至於手教慮信根退想戯弄之言自珍久不見有信根信是何根根何云信本來如是而已何况有退失邪重到京師又三年還山之志非不温縈寤寐間然不願汩没此中政未易有山便去去而復出則爲天下笑矣顧弢語言簡文字省中年之心力外境迭至如風吹水萬態皆有皆成彣彰水何容拒之哉萬一竟可還還且不出是亦時節因緣至爾至於與人共爲道夙所願也寖􅀒至今雖遇聰明貴人祇宜用一切世法而隨順之陳餓夫之晨呻於九賓鼎食之席則叱矣愬寡女之夜哭於房中琴好之家則誶矣况陳且愬者之本有難言也乎行願品久收到圓覺聞蘇州刻成前約所云不忘也當自致貝居士伏惟吉祥不宣癸未六月二日自珍和南戒將歸文予幼遘厥心疾兮背吉祥而誓馳下上無所泊於天淵兮結靈光而內囘民奠予于衆所食兮予窈􅆌以吟呻殺􅀋草於旁秋斥吟華於上春予幽幽以自嫮兮非衆磨之能穴耻列炬之平然兮非孤光之所逼塞萬歧之恆由兮乃谽然而怒出精炯炯其獨寤兮物温温其燭楹拂淸輝而不御兮嫌太陰之尙墮乎形忽皇皇其悲無依兮客迭索而無贈媕衆心以爲才兮亦聊棲而强定久浮浮而變化兮羗卽事而成逕入屏處而自探兮乃大哀而亡命嗟微塵之不九竅兮驅匠灝而宅之造亭亭之高宮兮接玉女於雲涯蘇予息之奄奄兮未成象而目眙諒空蒙之不我搆兮陳文言以遨嬉舍芳香而誰御夐澄照以長辭恣毁桀以譽堯兮冀萬福之登來駭制作於三皇兮予又勇乎瑕疵矗孤義之俯天兮無譬喻以詞之散餘愎而之形骸兮乃瞵睨而側頸絕千載而蘇一笑兮亦斛淚之所孕萬常不得安居兮再元黄之紜紜諒鬼雄之弊濁兮終結愬而徒勤嗇靈怨之沉沉兮倐予到乎名言之外轉圜常而大觀兮曾不立乎一義玉女乃召予高雲兮音琅琅其詔予汝奚隆于狂慧兮非出離之所塗館汝以寒春之宮兮從無愁之攸居汝東游見毒龍兮龍族曾不醉汝乎酒西見宛宛之弱妃兮又嬌獰而誶汝義何孤而非繁兮情何孑之非儔予東見童蒙兮顧威孔神䁝百淬之美心兮祭以媚天西見夆雙兮曰禍福在予貢繚戾之淒淸兮亦伺人而闇投其佐戉律兮分神化軀棲人􅊿兮據人􅑠尸神笑逆兮肝靈怒悅神明之一霧夜秋秋而亂語何智可摧兮何思能降龍䕫䕫以怒心電偟偟以收風玉氷氷兮无愁愁思不可以久淫汗淫淫兮旣雨戕思林兮伐智樹放聰輪兮黜明御歸來乎歸來乎泊兮吾以寤重曰心疾之搆光景聚兮屏營寂忽无適主兮百愁往來召羣苦兮匪智匪道逢玉女兮久游不歸慈所牽兮空首稽首禮則眞兮而今而往得所門兮而將誰與游而何歸之休而甯汎汎以湛浮􅷚爾靡有言兮發大心文震旦苦惱衆生某稽首盡十方三世諸佛前伏以人身難得佛法難聞我今得少善力得生人中正像云遐末法現在欲報大恩須發大願依經論說行是車船願是馬檝有船無檝難可到也我自諸劫以來佛加被我佛教誨我佛憶念我我有眼根不見耳根不聞意根不覺流轉生死旋出旋没至於今生今生更遲何生可待父母生我善友教我一切有情咸加被我况自諸劫來若父若母若眷屬或生天中或生人中或生畜生中地獄中我若不以今生坐大願船自鼓願檝盡諸後身終成蹉忽􅀒恩無極是謂枉得人身虛聞佛法是故欲修檀者發心爲先欲修羼提發心爲先欲修尸羅發心爲先欲修毘黎耶發心爲先欲修禪那發心爲先欲修般若發心爲先我今先願斷種種心何謂種種心瞋心差別有三曰嫉惡心曰怨懣心曰難忍辱心貪心差別有三曰樂世法心曰羨慕心曰憶世法心癡心差別有五曰善感心曰􅅶綿心曰疑法心曰疑因果心曰惛沈心有境相應行心有非境不相應行心若廣分別言則有八萬四千塵勞皆起一心我今誓發大心凡生人倫受種種惱大心菩薩深知因果各各有故略可設說脫令我今世適發善念欲入正受卽有魔事不得成就便當知前生善根微淺嬈善友故脫令我今世出誠實言而以愬人人反譏笑便當知我前世信根微淺不聽它言故脫令我今生多受浮言無情淺夫或用見成言說而成謗論便須知我前世處境亨泰但能坐議不察人世一切眞實煩惱故脫令我今世於人有禮人見凌侮便須知我前生忍辱根淺或加報復或喜我慢今迥報故脫令我今生如孩如提純取眞初而以待人人相機詐受種種惱便須知我前生閱厯太深厚貎深中今受報故脫令我今世旣招謗議復値嫌疑難可解說便須知我前生坐於堂上身爲理官伹據形迹故脫令我今世自細及巨萬事萬狀不得擇術􅀡行如頭欲前而足欲後便當知我前生􅀡截如意平生處置數言可了不知它苦故脫令我今世進身坎軻橫見貶抑便須知我前生僥取榮利貪賂罔法不畏人王不耻姗笑故脫令我今世種種處置雖竭仁智終無善局便須知我前生害他眷屬累其一生故脫令我今生於世間愛樂百求無遂凡所施作垂成忽敗便須知我前生於它若有仇若無仇一切破壞故脫令我今生遇有惡緣未可明言便須知我前生誤作媒翳害它人故脫令我今世受無量􅁈讒無量憂泣不可明言便須知我前生順遂享福過故脫令今生遇兇人暴辱如豺虎行便須知我前生無禮以淩人故復次諸佛我若後身仍生人倫或生此世界或生餘世界依雜華普賢說東南西北世界東西南北四角世界上方下方世界乃至盡毘盧遮那海世界皆當發心而正思惟如遇它橫逆應正思惟生安受心遇它機械應正思惟生憐他心遇他作惡應正思惟生度他心遇他冥頑不忠不孝不存皿性於家於國漠然無情應正思惟生感動他心遇他遏抑我噬􅀒我皆正思惟而生憐他心遇他頑癡應正思惟生敬他心遇它妬忌生讓它心遇它醜惡應正思惟生愛它心乃至見他十惡五逆亦將我心置他胸臆而替他想生種種憐他心宥他心度他心乃至一切施不如願於我我皆如是思惟此我夙業今生幸已受報已償已訖生自慶幸心復次諸佛我若後身仍生天倫若日天子若月天子若星辰天子或生忉利天或生須燄摩天或生四天王天或生它化自在天乃至生諸梵天乃至生五不還天生色究竟天皆當發心憶見衆生照見衆生我生天上入於內院値補處佛佛已降時最先請佛說法佛湼槃時受我最後法􅉆如純陀事佛祐弟一當念世人不値佛世或又遭遇滅法人王我皆衍佛法緒而以度之我生天上身有千頭頭有千舌舌有千義氣足音宏辯才弟一當念衆生􅁈枉蹇涊若忠臣若孝子若賢婦孝女奴僕種種屈曲繚戾千幽萬隱我皆化身替他分說而以度之我生天上威德自在尊嚴弟一當念衆生賤苦而以度之我生天上寂然安隱得諸三昧陀羅尼門定慧弟一當念衆生或困色陰或困想陰種種傎倒我施安隱而以度之我生天上夀命弟一當念衆生朝有夕無哭泣相續我施壽命而以度之我生天上安居弟一當念衆生或涉大水而因濤波或從高山跌落不得至地心怖神飛我當化身空中爲其接住而以度之我生天上調適弟一當念衆生生惡毒瘡種種苦病或遇刀刃或落半頭時或斷手腳時或刳腸胃及兩眼時求死未死時我皆分身而以度之我生天上潔淨弟一當念衆生在於地獄旣受無量痛苦仍在沸屎受無量穢我皆不憚親往而以度之我生天上慧照天人多聞弟一當念衆生少見寡聞於一切處自疑自駭我當令其到心皆平而以度之我生天上久遠超出因明內外五明神明弟一當念衆生小聰小辨世法多聞或困名身或困句身或困文身傎倒日夜我先化身令其成就然後解脫而以度之我生天上春吐栴檀氣夏吐芬陀利氣秋吐蘭氣冬吐須曼那氣身長由延端正弟一當念衆生現富單那形鳩槃茶形夜迦形或人生中粗弊如畜福力輕微或生疣贅五官不全同倫譏厭已亦厭苦我當巧術而以度之我生天上八萬四千微妙侍女來相親娛著微妙衣岀微妙聲或以擕手爲極樂或以相笑爲極樂當念衆生困於麤重媱欲不知厭苦復有慧根男女想陰熾盛生諸疾病種種麤細境界我皆化作色身爲其成就如願然後解脫而以度之我生天上􅉆養弟一當念貧窮衆生我以法力取龍宮寶貝或美衣食而以度之復次諸佛我若度人當發大願心先度此生父身母身眷屬身再度曠劫以來不可說不可說父身母身眷屬身又當度此世一切知識我之身又當度曠劫以來不可說不可說識知我之身又當度曠劫以來至於此世與我有仇有怨之身乃至遍度曠劫以來至於今世若因緣若增上緣若等無間緣若所緣緣若有情而作緣若無情而作緣人所不見天眼乃見之身依首楞說十二類生各各入其􅀋中而說法要而化導之雖有化導化身勞苦我實寂然不出於定安坐本所不離三昧身心如故凡此所願我實誓發無虛誑心所願佛加被我佛証知我佛提撕我佛成就我使我盡此一形乃至千形萬形無量形盡諸後有無凡夫障無小乘障無中乘障無外道障無魔民障無魔王障正念相續正願相續正知相續正見相續正行相續我盡諸身若毛髮若肝腦若頭目而以作供不作爲報我雖化身橫盡虛空竪盡來劫作其塵沙一一沙中有一一舌一一舌中岀一一音而以讚佛不能盡也又以化身􅆆盡來劫橫盡虛空作其塵沙沙中一一舌舌中一一音而以勸人讚佛不能盡也世界無盡佛力無盡衆生無盡一切法無盡我願亦無盡定盦續集仁和龔自珍璱人籑卷三已亥六月重過揚州記居禮曹客有過者曰􅀸知今日之揚州乎讀鮑昭蕪城賦則遇之矣余悲其言明年乞假南游抵揚州屬有告糶謀􅃕舟而館旣宿循館之東牆歩游得小橋俛溪溪聲謹過橋遇女牆齧可登者登之揚州三十里首尾屈折高下見曉雨沐屋瓦鱗鱗然無零甃斷甓心己疑禮曹過客言不實矣入市求熟肉市聲讙得肉館人以酒一缾蝦一筐餽醉而歌歌宋元長短言樂府俛窗嗚嗚驚對岸女夜起乃止客有請弔蜀岡者舟甚捷簾幕皆文繡疑舟窗蠡也審視玻瓈五色具舟人時時指両岸曰某園故址也某家酒肆故址也約八九處其實獨倚虹園圯無存曩所信宿之西園門在題榜在尙可識其可登臨者尙八九處阜有桂水有芙渠菱芡是居揚州城外西北隅最高秀南覽江北覧淮江淮數十州縣治無如此治華也憶京師言知有極不然者歸館郡之士皆知余至則大讙有以經義請質難者有發史事見問者有就詢京師近事者有呈所業若文若詩若筆若長短言若雜著若叢書乞爲敘爲題辭者有狀其先世事行乞爲銘者有求書册子書扇者塡委塞戸牖居然嘉慶中故態誰得曰今非承平時邪惟窗外船過夜無笙琶聲卽有之聲不能徹旦然而女子有以梔子華髪爲贄求書者爰以書畫環瑱互通問凡三人淒馨哀􅃩之气繚繞於橋亭艦舫間雖澹定是夕魂遙遙不自持余旣信信拏流風捕餘韻烏覩所謂風噑雨嘯鼯狖悲鬼神泣者嘉慶末嘗於此和友人宋翔鳳側􅃩詩聞宋君病存亡弗可知又問其所謂賦詩者不可見引爲恨臥而思之余齒垂五十矣今昔之􅁣自然之運古之美人名士富貴壽考者幾人哉此豈􅀜揚州之盛衰而獨置感􅁣於江介也哉抑予賦側􅃩則老矣甄綜人物蒐輯文獻仍以自任固未老也天地有四時莫病於酷暑而莫善於初秋澄汰其繁縟淫蒸而與之爲蕭疏澹蕩泠然瑟然而不遽使人有蒼莽寥泬之悲者初秋也今揚州其初秋也歟予之身世雖乞糴自信不遽死其尙猶丁初秋也歟作已亥六月重過揚州記病槑館記江甯之龍蟠蘇州之鄧尉杭州之西谿皆產槑或曰槑以曲爲美􅀡則無姿以欹爲美正則無景槑以疏爲美密則無態固也此文人畫士心知其意未可明詔大號以繩天下之槑也又不可以使天下之民斫􅀡刪密鋤正以殀槑病槑爲業以求錢也槑之欹之疏之曲又非蠢蠢求錢之民能以其智力爲也有以文人畫士孤癖之隱明告鬻槑者斫其正養其㫄條刪其密夭其稺枝鋤其􅀡遏其生气以求重價而江浙之槑皆病文人畫士之禍之烈至此哉予購三百瓫皆病者無一完者旣泣之三日乃誓療之縱之順之毁其瓫悉埋於地解其㯶縛以五年爲期必復之全之予本非文人畫士甘受詬厲闢病槑之館以貯之烏乎安得使予多暇日又多閒田以廣貯江甯杭州蘇州之病槑窮予生之光陰以療梅也哉長短言自敘情之爲物也亦嘗有意乎鋤之矣鋤之不能而反宥之宥之不已而反尊之龔子之爲長短言何爲者邪其殆尊情者邪情孰爲尊無住爲尊無寄爲尊無境而有境爲尊無指而有指爲尊無哀樂而有哀樂爲尊情孰爲暢暢於聲音聲音如何消瞀以終之如之何其消瞀以終之曰先小咽之乃小飛之又大挫之乃大飛之始孤盤之悶悶以柔之空闊以縱游之而極於哀哀而極於瞀則散矣畢矣人之閒居也怕然以和頑然以無恩仇聞是聲也忽然而起非樂非怨上九天下九􅘢將使巫求之而卒不自喻其所以然疇昔之年凡予求爲聲音之􅆌蓋如是是非欲尊情者邪且惟其尊之是以爲宥情之書一通且惟其宥之是以十五年鋤之而卒不克請問之是聲音之所引如何則曰悲哉予豈不自知凡聲音之性引而上者爲道引而下者非道引而之於旦陽者爲道引而之於莫夜者非道道則有岀離之樂非道則有沈淪陷溺之患雖曰無住予之住也大矣雖曰無􅀉予之寄也將不出矣然則昔之年爲此長短言也何爲今之年敘之又何爲日爰書而已矣商周彝器文錄敘羽琌山民曰商器文但象形指事而己周器文乃備六書乃有屬辭周公訖孔氏之間佚與籀之問其有通六書屬文辭載鍾鼎者皆雅材也又皆貴而有祿者也制器能銘居九能之一其人皆中大夫之材者也凡古文可以􅀘今許慎書之闕其韻可以補雅頌之隟其事可以􅀘春秋之隟其禮可以補逸禮其官位氏族可以補世本之隟其言可以􅀘七十子大義之隟三代以上無文章之士而有羣史之官羣史之官之職以文字刻之宗彝大氐爲有土之孝孫使祝嘏告孝慈之言文章亦莫大乎是是又宜爲文章家祖其及五百名者有曶鼎六百名者有西宮襄父盤則與周書七十一篇相出入矣摹其篆文以今字錄之如孔安國治尙書以今文讀之古文也昇平分類讀史雅詩自敘語云人日戴天而不知天之高其今之士民耶蓋相與世之游乎廓然大順若寒暑晝夜而不知厯聖實生我也鞠我也等百世之王難比仁也意士不談史之過邪史之百王仁不仁之差大耑有三視其賦視其刑視其役而已矣本朝自聖祖之年屢問所以損上益下者世宗初遂用怡賢親王言減蘇松一道地丁銀四十五萬兩南昌一道地丁銀十七萬兩乾隆二年又減江浙兩省地丁銀二十萬兩减明賦十之四東南天下華然而所食於東南者止此矣獨粟米漕東南乾隆朝凡蠲七省漕米者三普蠲天下地丁銀者亦三史所未有且地丁者丁統於地非計丁而出賦也有漕省并地丁計爲什一無漕省只計地丁尙未及三十分之一雖曰玉食萬方而所食於一千四百五十一州縣者又止此矣此本朝之賦本朝死刑別二等曰情實曰緩決又有情實而不予勾者勾囚之日皇帝賜漢大學士一人坐一一商榷之講官科道皆侍先期由有司詳部臣核定又有九􅀸會議簽商有刑部簽商蓋自有司初定讞以至於予勾中間更心目十數更手百數仕者罪至死子孫應試八仕如故此本朝之刑中外一家無漢唐戍邊塞之民而一切城工河防以及內廷營造行在所幸治䟆道皆雇民給􅀡國家雖費帑巨萬民不知知受雇而已至於南河國家痔漏所費者國之帑金也所救者民之田廬也似宜藉民力乃役夫歲數百萬無空役者是故本朝絶無力役之事史之百王其酷虐無道生人丁其阸者不必徵也平世中主亦不屑與度也請徵三王三王且什一况其降乎酒誥之殺濫甫刑之條繁漢文雖除肉刑矣而夷人之三族何足數也况其降乎三王於農隟使民用民力歲三日况其降乎至其鼎鑊碪質夷三族之刑士大夫妻女發樂籍之刑言官受廷杖下鎮撫司獄之刑計口出錢髫齔皆算算及車船牛馬之賦治宮室築城戌邊盡閭左以發之之力役二百年之民或惎以古事駭然不信曰史豈有是邪而古者日日習之若寒暑晝夜彼非圓頂方趾父母所生之民邪非今之士民之先祖邪何其慘也昇平分􅀋讀史雅詩一卷十有五篇內閣中書仁和龔自珍之所造也自珍自言曰今之世有窮陬荒濱貊鄕鼠攘悍頑扇􅅍而自外於天地父母者閒歲上聞爲肢末憂謂宜有文臣坿先知􅁴後知之義作爲歌詩而使相與􅁌歌其間詩之義貴易知也犯上作亂之民必有自搏顙泣者必有投械而起仰祝聖淸千萬年俛祝雲礽之游其世者擇言而興不避在位干祿新書自敘敘曰凡貢士中禮部試乃殿試殿試皇帝親䇿之簡八重臣讀其言皇帝制日無隱􅀡言朕將采擇又曰朕將親覽焉八人者則朝服北面三跪九叩頭率貢士亦三跪九叩頭就位有䖍旣試八人者則恭遴其頌揚平仄如式楷法尤光緻者十卷呈皇帝覽皇帝宣十人見翼日鑾儀衞陳法駕和聲署設樂皇帝升太和殿貢士畢見前三人賜進士及第冠服由午門中道出乃出自端門天安門皆當馳道賜晏禮部如故事先殿試旬日爲覆試遴楷法如之殿試後五日或六日七日爲朝考遴楷法如之三試皆高列乃授翰林院官本朝宰輔必由翰林院官􅀸貳及封圻大臣由翰林者大半其非翰林官以値軍機處爲榮􅃟軍機處之職有軍事則佐上運籌决勝無事則備顧問祖宗掌故以出内命者也保送軍機處有考試其遴楷法如之京朝官由進士者例得考差考差入􅃟則乘軺車衡天下之文章考差有閱卷大臣遴楷法亦如之部院官例許保送御史御史主言朝廷是非百姓疾苦及天下所不便事者也保送後有考試考試有閱卷大臣其遴楷法亦如之龔自珍中禮部試殿上三試三不及格不入翰林考軍機處不入􅀡考差未嘗乘軺車乃退自訟著書自糾凡論􅃟頴之法十有二論磨墨膏筆之法五論器具五論點畫波磔之病百有二十論架冓之病二十有二論行間之病二十有四論神勢三論氣稟七旣成命之日干祿新書以私子孫時道光十有四年内閣中書龔自珍謹敘錢吏部遺集敘錢吏部枚卒且八年遺詩始寫定是爲辛未歲越丁丑錢廷烺走訪龔自珍海上屬之日先人詩出又七年未有最錄之言將惟天下善言文章之情者是屬自珍悄然不能辭乃滌筆而偁曰今天子始親政之歲與已未科會試主者大興朱文正公榜出省貢士之􅃉於經雄於辭者雅治一藝者畢在可八九十人而吾浙二十一人其以文采妙當世者譁譁以十數嫭矣哉先若後未之聞也君實以是科成進士氣文而身頎黝然黑謖然淸仿彿如有思諸君先後躋九萬里之上君意善感􅁣又淸貧甚浮湛卒文正惋歎杭州以爲失方聞士詩十卷無囂濁俚窳俶詭之言如坐杭州山水閒重山二湖孔翠鸞之屬往來鳴歎天淸日沈風起卉木泠泠乎琴筑語而竽笙鳴是其可狀者也小樂府一卷幽窅而情深言古今所難言疑澀於口而聲音益飛殆不可狀前哲有言古今情之至者樂器不能傳文士不能狀意者然乎嗟嗟感前修之易淪睠華士而踵起名滿天下才嗇於命情又嗇於才是集也宜吾微吟焉寂聽焉低徊獨抱焉弗可已矣江左小辨敘江左小辨二卷失􅁧者姓氏有明中葉嘉靖及萬厯之世朝政不綱而江左承平斗米七錢士大夫多暇日以科名歸養望者風氣淵雅其故家巨族諩系多聞人或剞一書或刻一帖其小小異同小小源流動成掌故使倥偬拮据朝野騷然之世聞其逸事而慕之攬其片楮而芳香惻悱俗士耳食徒見明中葉氣運不振以爲衰世無足畱意其實爾時優伶之見聞商賈之氣習有後世士大夫所必不能攀躋者不賢識其小者明史氏之㫄支也夫爲此辨者其江左之俊辨也夫吁江子屏所箸書敘嘉慶中揚州有雄駿君子曰江先生以布衣爲掌故宗且二十年使仁和龔自珍條其􅁧述大旨以詔來世自珍徑求之縱橫側求之又求其有所不言者而皆中律令其殺也爲易也其詳也則中春秋恩父恩王父之誼海陬小生瞪目哆頤敢問九流最目之言夥矣子胡張江先生之書且子所謂律令誰之爲之也作而吿之曰聖人之所爲也傳不云乎三王之道若循環聖者因其所生據之世而有作是故易廢連山歸藏誦詩三百而周詩什九春秋質文異家禮從周皆是誼也孔子沒儒者之宗孔氏治六經術其術亦如循環孔門之道尊德性道問學二大耑而已矣二耑之初不相非而相用蘄同所歸識其初又總其歸代不數人或數代一人其餘則規世運爲法入我朝儒術博矣然其運實爲道問學自乾隆初元來儒術而不道問學所服習非問學所討論非問學比之生文家而爲質家之言非律令小生改容爲閒敢問問學優於尊德性乎曰否否是有文無質也是因迭起而欲偏絶也聖人之道有制度名物以爲之表有窮理盡性以爲之裏有詁訓實事以爲之跡有知來藏往以爲之神謂學盡於是是聖人有博無約有文章而無性與天道也端木子之言謂之何曰然則胡爲其特張問學得無子之徇於運歟曰否否始卒具舉聖者之事也餘則問學以爲之階夫性道可以驟聞歟抑可以空枵懸揣而謂之有聞歟欲聞性道自文章始有後哲大人起建萬石之鍾擊之以大椎必兩進之兩退之南面而撝之禠之子之不以文家廢質家不用質家廢文家長弟其序臚以聽命謂之存三統之律令江先生布衣非其任矣曰江先生之爲書與其甄綜之才何如曰能進之能退之如南面而撝之如禠之于之曰請言江先生平生曰生於典籍之區少爲方聞士乾隆朝佐當道治四庫七閣之事於乾隆名公􅀸老師宿儒畢下上齮齕萬聞千睹旣老勒成是書窺氣運之大原孤神明以突往義顯故可以縱橫而側求詞高故可以無文字而求今夫海不有萬怪不能以一波今夫岳不有萬恠不能以一石飮海之一蠡涉㠏之一石如見全海岳焉甎瓦之所積墍茨之所飾風雨乍至尺靑寸紅紛然流離才破碎也江先生異是曰敬聞教矣古之學聖人者著書中律令吾子所謂代不數人數代一人敢問誰氏也曰漢司馬子長氏劉子政氏江先生書曰國朝經學師承記者如干卷遷之例其曰國朝經師經義目錄如干卷向之例小生降階曰有是夫雖癯也猶得搴裳中原於我乎親命之袁通長短言敘錢唐袁通長短言六卷今夫閨房之思裠裾之言以陰氣爲倪以怨爲軌以恨爲斾以無如何爲歸墟吾方知之矣若其聲音之道體裁之本短言之欲其烈長言之欲其淫裔莊言之欲其思譎言之欲其不信謬言之欲其來無所從去又無所至也怪哉使我曼聲吟歔壽命訖而不知厭招我魂於上九天下九􅘢旬日而不可返怕然止寂寥兮無䜋於先王而豈徒調䕫牙之一韻割騷之一乘也哉卒無如何命筆爲之敘上海張靑琱文集敘嘉慶二十一年治河方畧館移内閣借順治朝及康熙初紅本備攷核館不戒於火紅本􅛚嗣是内閣求順治典故難二十五年龔自珍筮仕得内閣中書求順治前輩文章於江南上海縣李家得張宸所爲文集三十卷中書述一篇其所述與今大異其高論今日益難施行内閣應官文章三十餘篇其哀冊文一􅀋甚哀異雜事記五篇述所見當日儀官未定之事可以廣異聞其他文章出於陳子龍吳偉業之間同時三吳以東跨婁越泖至海濱而止甚多文士君之爲未大異乎諸君之爲之也自珍喜而寫其副以如京師職方述一篇代大臣馬思哈北征日記一篇則兵部郞中程同文就自珍舍寫副以歸京師遂有兩本道光壬午正月內閣後進仁和龔自珍序於城南圓通觀金孺人畫山水敘嘗以後世一切之言皆出於經獨至窮山川之幽靈嗟歎草木之華實文人思女或名其家或以寄其不齊乎凡民之心至一往而不可止是不知其所岀嘗以叩吾客客曰是出於老莊耳老莊以逍遙虛無爲宗以養神氣爲用故一變而爲山水草木家言昔者劉勰論魏晉宋三朝之文亦幾幾見及是或者神理然耶吾友王曇仲瞿有婦曰金字曰五雲能屬文又能爲畫其文皆言好山水也其所畫有曰山居圖極命物態仲瞿實未甘卽隱逸以從魚鳥之游五雲饗筆研而祝之曰必得山水如斯畫之美而偕隱焉曇曰諾吁曩者同時之士固嘗擬仲瞿似晉宋閒民不聞其有奇婦余窺其能事與其用心雖未知所慕學何等要眞不􅀋乎凡之民矣抑又聞老莊之言或岐而爲神仙或岐而爲此􅀋將母此􅀋之能事與其用心其亦去去有仙者思歟大夫學宗尙其思之􅞈嬪百媛尙其慕之歎息不足從而緣之辭上海李氏藏書志敘龔自珍曰目錄之學始劉子政氏嗣是而降有三支一曰朝廷官簿荀朂中經簿宋崇文總目館閣書目明國史經籍志是也一曰私家著錄晁公武郡齋讀書志陳振孫書錄解題以下是也一曰史家著錄則漢藝文志隋經籍志以下皆是也三者其例不同頗相資爲用不能以偏廢三者之中其例又二或惟載卷數或兼條最書旨近世好事者則又臚注某鈔本某槧本某家藏本兹事殊細抑專門之業必至於是而始可謂備則亦未易言矣純皇帝開四庫建七閣海内之士畢睹官簿大江以南士大夫風氣淵雅則因官簿而踵爲之往往瑰特與中朝之藏有出入者而上海李氏乃藏書至四千七百種論議臚注至三十九萬言承平之風烈與鄞范氏歙汪氏杭州吳氏鮑氏相煇映於八九十年之間李君猶且恨生晚不獲遇純皇帝朝親獻書顧異日數本朝目錄必不遺李氏吾生平話江左俊游賓從之美則極不忘李氏東南顧翛翛踞天半矣哉李君名筠嘉議敘光祿屬官銜不仕道光六年丙戌六月龔自珍在京師寄此敘江南生橐筆集敘江南生有奏議十九卷國朝法度大臣不敢以奏議入私集况士乎生佐督撫爲政居幕下厯七省客十九主此代十九主之所爲有儗藁未用者有一事前後數易奏稿並存之者不得曰奏議以惑來者予正其名曰江南生橐筆集集中言天下財賦大指不當豐於入而當嗇於出有百餘事言天下刑名大指謂本朝刑太寛民太不畏又有殺人不死傷人盜皆不抵罪者又本朝糾䖍士大夫甚密糾民甚疏視前代矯枉而過其正此其平生蓄於中心時時露於文采者也龔自珍曰江南生之言當否後世有折衷之者予不深論竊聞其爲人取於所主甚介談笑精悍指示曲折文辭甚辨麗於屬辭輕重繁簡往往因一言爭軋往復必欲達其意而後已當此時朝廷詔令琅琅動數千言督撫奏議亦皆虎虎有生氣朝野不病君狂也阮尙書年譜第一敘今皇帝御極之三年天暒地塽日穆月燿美陽之氣譣於耆臣是歲太子少保兵部尙書都察院右都御史兩廣總督儀徵阮公年六十矣海内之士襄觚握槧之倫介景者鏘羊祝延者漎萃其門下士大理少􅀸程同文等就内閣中書龔自珍而謀曰自古重熙累洽之朝則有康疆竺鞏之佐贊醲迪薰黼蔀黻紀相一人而夀世爲百族之福宗蓋殊尤絶迹有震於金石炳若神人者今吾座主阮公亦其人也汴宋而降多祝史之夀言晩唐子弟訂父兄之年譜二者孰華孰質孰古孰今孰可傳信龔自珍曰年譜哉大理因探褱裏出書二十四卷請曰是公子長生之所爲也子其敘之自珍旣卒業乃撮其括要而言曰聞之道隘者所任少名謏者所成寡德褔者所積薄位庳者所覆狹史册之事一優一絀將相之美或初或終今阮公任道多積德厚履位高成名衆如大理言如大理言公毓性儒風勵精樸學兼萬人之姿宣六藝之奥嘗謂黃帝名物宣尼正名篇者句所艁句者字所積古者有聲音而有語言有語言而有文字自分隸之迭變而本形晦矣自通假之法繁而本義晦矣公識字之法以經爲譣解經之法以字爲程是公訓故之學中壘而降校讐事興元朗釋文憙臚同異孟蜀􅀥本始省寫官公遠識駕乎隨唐雜技通乎任尹一形一聲厯參伍而始定舊鈔舊槧斯厓略之必存是公校勘之學國朝四庫之纂百代所系七閣之藏九流斯萃公名山剔寶番舶求奇馳副墨乎京師錫佳名以宛委蓋自子政而下鄱陽以前公武郡齋之志振孫解題之作莫不討其存佚之年寀其完􅆙之數焦書揚目斯瑣瑣焉是公目錄之學公精研七經覃思五禮以爲道載乎器禮徵乎數今尺古尺求累黍而易誣大車小車程攷工而易舛故大而冡士明堂辨禮之行於某地小而衣冠鼎俎知禮之􅌛乎某物莫遁空虛咸就繩墨實事求是天下宗之是公典章制度之學公又謂讀史之要水墜實難宦轍所過圖經在手以地勢遷者班志李圖不相襲以目驗獲者桑經酈注不盡從是以咽喉控制閉門可以談兵脈絡毘聯陸地可使則壤坐見千里衽接遠古是公之史學在昔叔重董文識郡國之彞鼎道元作注紀川原之碑碣金石明白其學古矣歐趙而降特爲緒餘洪陳以還閒多好事公謂吉金可以證經樂石可以劻史翫好之侈臨摹之工有不預焉是以儲彝器至百穜蓄墨本至萬穜椎拓徧山川􅁓墨照睂髪孤本必重鉤偉論在箸錄十事彪炳冠在當時是公金石之學公又謂六書九數先王竝重㫄差互乘商高所傳自儒生薄夫藝事泰西之客擣其虛古籍霾於中秘智計之土屏弗見於是測步之器中西同實而異名巧捷之用西人攘中以成法公卬能窺天步俛能測海鏡藝能善輥彈聰能審律呂爲劉秦之嫡髓非薩利之別傳是公九數之學文章之別論者夥矣公獨謂一經一緯䢒逪而成者綺組之飾也大宮小商相得而龤者韶濩之均也散行單詞中唐變古六詩三筆見南士之論文杜詩韓筆亦唐人之標目上紀范史牋記奏議不入集聿攷班書賦頌箴誄乃稱文公日奏萬言自裒四集以沈思翰藻爲本事別說經作史爲殊科是公文章之學聖源旣遠宗緒益分公在史館條其派別謂師儒分繫肁自周禮儒林一傳公所手剏談性命者疏也恃記聞者陋也道之本末畢賅乎經籍言之然否但視其躬行言經學而理學可包矣覘躬行而喙爭可息矣且夫不道問學焉知德性劉子以威儀定命康成以人偶爲仁門戸之見一以貫之是公性道之學公􅆒厯淸華洊升􅀸士熟於載筆之禮法嫺於内延之故實三朝文物觸之則緒若懸河九􅀸行列諮之則動中律令是公掌故之學凡若此者固已􅚈漢宋之全拓天人之韜冺華實之辨總才學之歸彼區區文儒之異傳齗齗經人之異師皆所謂得支亡幹守隅昧方偉哉絶業莫之與京已嘗觀道之豐也命必嗇之德之亨也遇必窒之兩漢以降爲世儒宗者伏生沈淪賈生放黜子政子雲所遭良阸康成邵公皆在黨錮叔重終於庳官仲翔覊於遠士或藉階經術致身􅀸相非其名德之無偶則必世主之非聖唐宋之世韓蘇之倫衡厥所遭什九同􅁣求其出秉斧鉞入總圖師朝宁倚焉師儒宗焉豈可遘與公宧轍半天下門生見四世七科之後輩尙長齒髪三朝之巨政半在文翰幽潛之下士拂拭而照九衢蓬蓽之遺編揚扢而登國史斗南人望一而無兩殿中天語字而不名吁富貴不足爲公榮名譽不足爲公顯九川行地溯學海而波澄三台燭天指文星而度正其在漢也譬以伏孔居邴魏其在唐也譬以韓李兼房杜然而矜遭際之隆不如稽勛閥之舊也姼福德之符不如陳黎民之感也睿廟親政公受殊知謂先皇將任汝樞臣今女其作朕疆吏公辭不獲爰始受命亦越於今先後廿年撫浙撫豫者皆再撫閩撫江右各一先督全漕繼督兩湖繼而督兩廣復六年於兹矣公知人若水鏡受善若鍼芥㸑材牛鐸入聰耳而咸調文梓朽木經大匠而無棄器萃衆有功收羣䇿公文武兼資聰明異稟胸中四庫妙運用於無形目下十行識姓名於一過凡在僚友畏其敏服其大此公之功在察吏者也仁心爲質施於有政每問風俗先及桑麻昔餫浙人之饉遠汛舟於蜀江今徠番舶之粟平居賈於粤市其通有無也兼惠商民其化疆界也并泯中外此公之功在撫字者也文翁治郡禮容蔚於石室樂浪著縣栔令代夫寫官公先視浙學成經籍纂詁二百六卷及乎持節乃設精舍顔曰詁經背山面湖左圖右史於政餘親課之及􅊩江右栞宋本十三經若干卷今兹來粤暇日無多又復捜其文獻勒成巨編栞廣東通志若干卷斠士之堂榜曰學海想見俊髦之翕集與其波瀾之壯闊焉此公之功在訓迪者也嘉慶之初海氛方熾大爲逋逃之淵藪實恃糧兵之藉賫公以淸野之法爲出海之禁推轂武臣訓練舟旅時則安南爲帥潛結内盜倚剽掠以贍孱􅀖傾醜􅀋以弄巨艇久肆寇攘漸圖窺伺公傳檄諸鎭勒兵松門指撝方定􅄓風大作海若効靈順逆異勢是役也獲其王印及銅礮重二千觔者甚夥海寇殱焉厥後蔡牽往來閩浙公首薦壯烈伯李公俾爲統帥壯烈成名牽亦尋滅鯨浪遂息鼉更不驚餘干姦民蠢焉煽亂勾結黨徒簿造名號妖鳥已翼而未飛長蛇流沫而思噬公則斬彭蠡之菰蘆禱匡廬之煙雨發之也不旬日破之也不崇朝是曲突徙薪之善謀有勁弩激箭之捷手夷大難如一反掌其於閩也特於海渚大築礮臺時岀新意水法陸法之圖天雷地雷之譜厥後各吏則而仿之粤東互市有大西洋近惟英夷實乃巨詐拒之則敂􅀜狎之則蠧國備戒不虞綢繆未雨深憂祕計世不盡聞葢公身本將門夙嫺韜祕謝公雅量草木識其威名叔子高褱裘帶寓其將略此公之功在武事者也承平日久海宇蕃庶物盈而枵吏猾而蠧是以彌補之詔三十年於兹矣金粟之藏按簿則有其名關市之榷摭實盡無其物公在浙之日議謂其事當信而勿欺其期宜緩而勿迫久之竟獲全効卒如初議他行省勿及也此公之功在治賦京師轉漕東南歲七百萬積以升斗極於京垓盤倉古法今也失傳其數至􅞾而不可稽其欺至隱而不可詰公準之斛法定爲尺長布算則有目皆知執度則布指成寸旣有定式遂爲捷法又以比歲淮弱黃强重遲空晩發議盈廷圖改運道公乃攷有元之成規得海運之故道計舟檣豐儉之用較時日往反之程度其險夷權其常變中流一壺成書具在此公之功在治漕凡此者妕盤雖麗難􅒢彤矢之勳䀜鼎良珍莫罄赤環之績自非張華腹中千門萬戸孫武􅇸底八地九天而枚舉焉汎測焉竊以爲輕塵難語於崧嶽之高爝火奚禆於陽烏之炤者也右廿四卷宜置册府宜藏京師宜付寫官宜詔僚友古之不朽有三而公實兼之古之上夀百有二十而公甫半之古說經之辭君主日臣主月詩曰如月之恆言初􅁌也五岳視三公詩日崧高維嶽言大而高也由斯以談其諸光明之日進生物之方無窮也乎敬語程公爲我報公子俟公七秩之年更增十卷之書當更敘之此其弟一敘云爾癸未正月陸彥若所箸書敘陸彥若曰天下之大富必任土東西南北苟有六尺土若什尺土土之毛皆識其華實辨其材節其性伺其時其生其死勿以還土可以小富矧夫若伯尺千尺萬尺有伯尺之士役於圃一人役於市一人爲天下養二人千尺者役於圃三人役於市三人爲天下養六人以是爲差天下之富人亦必以是爲差富殖德故曰德產焉傳其術以德後生富又殖夀龔自珍曰五經財之源也德與夀之溟渤也成周書眞僞半勿具論論堯時堯典言百穀矣其後但言五穀六穀九穀五六九以外蔬蓏可材盡堯典之所謂穀也漢儒馬融說咎繇暮之文曰庶艱食猶庶根食也謂凡草木有根者根可食或實可食或華葉可食皆曰根食然則庶根食者其猶百穀與彥若知經術矣自珍又曰古農書四篇呂不韋采之矣氾勝之書闕不具魏高陽太守賈思勰書二十篇箸錄家皆錄之文淵閣又錄之矣漢大儒司馬氏爲貨殖傳所以記禹貢續周禮與天官書同功不學小夫乃僅指爲詼嘲游戲憤怒之文章傎夫今彥若所箸書祖古農書禰司馬氏而伯仲於氾勝之賈思勰之閒宜急寫副德後世曰種樹方者三卷曰種菜方者一卷曰種藥方者一卷都五卷著錄之如此又規之曰往往錯舉古今名古今語未可同又不分析東西南北之所宜試者或不得種得其種或效或不效宜小字細目以江河界限之彥若亟岀都未暇治也丙申九月九日張南山國朝詩徵敘周公何人哉尹吉甫譚大夫何人哉逐臣放子棄妾怨婦舉何人哉周雖文其殆無有詩人之名也後之爲詩業之別有籍焉成之別有名焉二者轍孰舊䋞取所無恩恩殺至所恩之人而臚之高下之名曰作史䋞取其人之詩而臚之或畱或削名曰􅃟詩皆天下文獻之宗之所有事也二者名孰高作史者曰我古史氏家法於史爲大宗􅃟詩者則曰孔子嘗刪詩矣我七十子家法於經爲別子二者指孰優其名與實孰合分龔自珍年三十四箸古史鉤沈論七千言於周以前家法有意宣究之矣旣具槀七年未寫定夫自珍之世非周之世天下久矣有詩人之名也天下久有詩人之名天下獻宗􅃟詩固宜􅃟詩矣受而視其目其眞以詩名者未嘗漏焉而不可名爲詩人者什八九是何人哉自天聰崇德迄於今入朝其姓名爲專家詩人所熟聞者無幾詩人聞而咸異焉曰舉何人哉自珍受而疑俛而得其故曰若人殆樂䋞取其人而臚之而高下之與殆非徒樂䋞取其詩也與然則若人號稱􅃟詩也何故曰是職不得作史隱之乎􅃟詩又兼通乎􅃟詩者也其門庭也遠其意思也譎其體裁也賅吁詩與史合有說焉分有說焉合之分分之合又有說焉畢觸吾心而赴吾志吾所箸書益寫定偉夫若人懐史佚之􅀡中孔門之律令虎虎畝血龔氏之庭者哉張維屏字南山番禺人官黄梅令績溪胡戸部文集敘古之民莫或强之言也忽然而自言或言情焉或言事焉言之質弗同旣皆畢所欲言而去矣後有文章家强尊爲文章祖彼民也生之年意計豈有是哉且天地不知所由然而孕人語言人心不知所繇然語言變爲文章其業之有籍焉其成之有名焉殽爲若干家􅁵爲總集若干別集若干又劇論其業之苦與甘也爲書一通又就已然之迹而畫其朝代條其義法也爲書若干通舁人輿者又必有舁之者曾曾雲礽又必有祖禰之者日月自西江河自東聖知復生莫之奈何也已龔自珍不弢於言言滿北南績谿胡子則詣自珍舍就求文章術自珍正告曰不幸不弢於言言滿北南口絶論文瘖於苦甘言之不戢以爲口實獨不論文得失未嘗爲書一通高扃笥中效韓嫓柳以筆代口以論文名覆按無有子胡決其藩而鈲其例且自珍嘗聞胡子之言之質矣粹然胡子之言也非如自珍之言之㫄出氾涌而更端以言是謂七十子苗裔之言是謂禮家大宗之言其言式古訓力威儀焉大之言禮經焉中之言禮節焉小之言禮牘簡䇿焉譚山水問掌故求建置辨沿革又胡子所言不一言者也自珍作而言曰將强名此以爲文章豈可哉然名此爲文章又豈不可哉設又從而區論之甲幅近文章乙幅不近文章又豈可哉其率是以言繼是以言勤勤懇懇以畢所欲言其胸肊滌除餘事之甘苦與其名而專壹以言如其不然而强龔自珍論文章則胡子瘁矣邵子顯校栞婁東雜箸敘國家以蘇州松江太倉州爲一道睿皇帝朝命家大人分巡之自珍實侍任凡關甄綜人物􅊧輯掌故之役大人未嘗不以使自珍焉大人去治十五年矣自珍仕京師賓客且盡遺聞墜懽無可語者悽黯而已歲已亥乞糴南下信信揚州揚州教諭邵子顯太倉人也方校栞婁東雜箸成自宋始迄於當代凡五十六部大氏四庫所未錄藏弆家所未見邵君有心哉蘇若松未之聞也若徽州若吾浙西三府若揚州若常州愛其鄕先輩而樂以其言餉天下者豈乏其人何居乎不效子顯之所爲尙書陶澍嘗語李兆洛曰願輯本朝江左人書萃四庫已收未收者李辭兹事體大不敢承噫江左百數州縣耳使一州有一邵子顯各纂其州予限七年此事何患不成春秋時周室有百四十國之書固出自百四十國者也仲尼賴之此事成可以傲嬴劉嫓柱下儲以俟後聖邵君爲予渡河所見第一士邵君餉書爲渡河第一樂曩予營別墅於崑山縣距太倉一舍天如予我以蕭閒箸述於其中當效邵君之所爲且拏舟商榷之懷甯王氏族譜敘民之生盡黃帝炎帝之後也盡聖者之後也蔀而有國殽而有家各私其子孫夫使私其子孫乃各欲其子若孫之賢也起中古家天下之聖人而問之不易此心矣又使天下有子孫者皆如此心天下後世庶幾少不肖之人矣乎起黃帝炎帝而問之不易此心矣欲子孫之必賢有道乎曰聖者弗能無已姑稱祖父之心而明惠之以言則有二術焉曰家法曰家訓家法有形者也家訓無形者也家法如王者之有條教號令家訓如王者之有條教號令之意家訓以訓子孫之賢而智者家法以齊子孫之愚不肖者由是臚而爲家譜則史表之遺也廣而爲家乘則史傳之遺也二術立譜乘舉矣譜何起起江左濫於唐誕於明賢矣有祿於朝則引史書貴官聞人以爲祖江左諸帝倡之又品差之明之文士述家譜誕者至八十世婚婣必書漢郡李必隴西陳必潁川周必汝南王必太原是也儒者實事求是又思夫大本大原皆黃炎漢郡何足書我則笑之懷甯主事王璪示我家譜十卷有法有訓有譜法甚法訓甚良譜起明中葉以字某甫諱某者之始遷於懷甯也謂之始遷祖謂之懷甯王氏譜不濫不誕甚善我讀而善之則避席擇言曰古者祭禮嘏傳皇尸之命命主人曰皇考某甫以女曾孫能帥從皇考之言降福于曾孫享女㱃食宜稼于田女曾孫若我夀考戸部祭自珍願爲王氏嘏禮部題名記敘道光十七年春三月仁和龔自珍由宗人府主事改禮部主事祠祭司行走夏四月補主客司仍兼祠祭司行走諸老前輩爲國朝禮部題名記成呼吏補自珍名諸老前輩則吿自珍曰昔之日仕祖宗朝手定大典細例役心目焉今日奉行之不失尺寸則無忝禮臣矣風氣小者視時遷移或視乎其人大端大禮不卑不亢百年來無以禮曹爲口實者皆先臣之賜受其賜霾没其姓氏於簿領塵積可乎此記之所由作又曰百年以外什二三缺勿具瘉近瘉詳自珍受而讀焉以爲春秋恩曾祖殺恩王父加詳恩父加詳頗中春秋例也乃對曰如前輩言如律令按記乾隆已丑進士以庚子歲由吏部改禮部字匏伯者自珍大父也嘉慶丙辰進士除禮部字賜泉者自珍父也掌精膳司印吾大父之任也􅀘儀制司改祠祭司兼儀制司又兼精膳司吾父之累任也自珍入司門顧瞻楹題下上階思履綦步弗敢邁越諸老前輩目自珍舊事往往詢自珍皆以自珍爲嘗聞之也四先生功令文敘其爲人也惇博而瘉夷其文從容而清明使枯􅋯之士習之而知體裁望之而有不敢易視先達之志盛世之盛唐之開元元和宋之慶厯元祐明之成化宏治尙近似之哉尙近似之哉其人多深沈惻悱其文呌歗自恣芳逸以爲宗則陵遲之徵已夫莊周屈平宋玉之文別爲初祖而要其羨周任史佚尹吉甫之生而願游其世居可知也自珍嘗之五都之廛市諸物見有内外完好不㫮窳者必五十歲前物曷嘗不想見時運之康阜民生之閒暇雖形下之器與夫專道藝者等又况學士大夫生賜書之家而澤躬於爾雅之林者與四先生其倫也四先生皆生世家皆起家甲科其仕也始終全盛之朝意氣雍容可觀其在官也皆肻徵賓客買圖史其未第也所與游鄕黨間亦必無穢流不悅學之士如甘露惠風夕􅊄其條而晨泠其柯欲梧桐柟梓之不扶疏而榮華不可得已宜兹文之進於雅與頌之堂也我朝山川發詡自康熙初元以來如日炎炎乾隆之文一康熙之文視開元慶厯成化善氣之長數倍過之然生其間仕其間而能爲四先生之文者良亦不衆今付合寫一通而敘之如此􅃗雅奇笙時發其聲欲隃契乎千鐘萬鏞鏘喤闛鞈之奏者也非甘呌歗者也武進管世銘歙承寵仁和陳登泰桐鄕諸汝􅀸送徐鐵孫敘龔自珍曰平原曠野無詩也沮洳無詩也磽确陿隘無詩也適市者其聲囂適鼠壤者其聲嘶適女閭者其聲不誠天下之山川莫尊於遼東遼俛中原逶迤萬餘里蛇行象奔而稍稍瀉之乃卒恣意橫溢以達乎嶺外大澥際南斗䜿亥不可復步氣脈所屆怒若未畢要之山川首尾可言者則盡此矣詩有肖是者乎哉詩人之所產有稟是者乎哉自珍又曰有之詩必有原焉易書詩春秋之肅若泬若周秦間數子之縝若峍若而莽蕩而噌吰若斂之惟恐其坻揫之惟恐其隘孕之惟恐其昌洋而敷腴則夫遼之長白興安大嶺也有然審是則詩人將母拱手欲谻肅拜植立撟乎其不敢議愿乎其不敢㕦言乎哉於是乃放之乎三千年靑史氏之言放之乎八儒三墨兵刑星氣五行以及古人不欲明言不忍卒言而姑猖狂恢詭以言之之言乃亦摭證之以並世見聞當代故實官牘地志計簿客籍之言合而以昌其詩而詩之境乃極則如嶺之表海之滸磅礴浩洶以受天下之瑰麗而洩天下之拗怒也亦有然徐鐵孫者家遼東先世扈王師入關爲正黃旂漢軍人康熙中徙廣東隸廣東將軍爲廣州駐防人金戈鐵馬其世胄也而徐君用經術起家登甲科爲劇邑令以詩聛睨東南友其人者淳悶如適遼雄奇如適嶺海本末具如吾言東南知徐君者本末畢如吾言乃書是言以弁君之詩之耑抑又有異者自珍生北方一窺臨榆未得溯山川所原本年四紀居江介不樂愁思益思游以振奮之忽然丐徐君磨墨爲薦士書貨厞屨將粤行且曰自粤歸則閉戸不復游徐君諾姼矣哉天下山川首尾徐君旣扼之怒未已其又將扼予之游事之首尾乎哉識某大令集尾某大令我不暇與之言佛儒之異同矣言大令大令爲儒非能躬行實踐平易質􅀡也以文章議論籠􅇁從游士士懾然聰明㫄溢姑讀佛書以􅋑博覽於是假三藏之汪洋恣肆以沛其文章文章益自憙此其弟一重心然而漸聞佛氏之精微似不盡乎此恧焉怯焉退焉阻焉悔焉此其弟二重心名漸成齒漸高從游之士之貌而言儒與貌而言佛者益附之矣則益傲慢告人曰佛未可厚非若以佛氏蒙其鑒賞者然若以其讚佛爲佛教增重者然此其弟三重心有聊竊其㫄文賸義以詁儒書頗有合者於是謗儒之平易質􅀡躬行實踐者曰聰明莫我及又深沒其語言文字諱其所自岀以求他年孔廡之特豚此其弟四重心如之何而可以諱之也莫如反攻之乃猖狂而謗佛其謗佛也無以自解其讀佛也於是效宋明諸儒之言曰不入虎穴焉得虎子我昔者讀佛正爲今者之闢佛於是并其少年之初心而自誣自謗此其弟五重心見儒之魁碩而尊嚴者則憚而謝之曰我之始大不正不敢卒諱與前說又岐異所遇强弱異故卑亢異然而又謗儒書所謗何等也孔子孟子之言窮理盡性以至於命之事易詩書中庸之精微凡與佛似則謗之曰儒之言絶不近佛儒自儒佛自佛如此立言庶幾深沒其迹矣此其弟六重心儒之平易者受謗儒之精微者又受謗讀儒謗儒讀佛謗佛兩不見收覆載無可容其軍敗其居失其口吚嚘其神沮喪其名不立其踝㫄皇如嬰兒之號於路丐夫之僵於野老矣理故業仍以文章家自遁遁之何如東雲一鱗焉西雲一爪焉使後世求之而皆在或皆不在此其弟七重心或告之曰文章雖小道達可矣立其誠可矣又告之曰孔子之聽訟無情者不得盡其辭今子之情何如又不應乃言曰我優也言無郵竟效優施之言以迄於今死敘嘉定七生嘉定七生龔自珍獲交其一焉曰恬生恬生言某之鄕有六生與某相引以爲重其執業均也笙詩鼓簧而鎛人應於堂也其相侈以名聲也如草木之感風露而芳香也圖形以傳之又願長言以宣之自珍曰美矣臧矣麗矣堂矣毋相忘矣願有以獻江以南與西北異水土淺醨囂外窳中蠅聚而蜹散士之相爲友年齒若則以爲友家世若則以爲友科第若則以爲友匪性情之是友匪氣誼之是友始則叚借牽引眞相㥫厚聲名岀已右憎不相左死呶呶詬不止吾願之七生者之七而一也自珍又曰年齒若則以爲友科第若則以爲友家世若則以爲友謔浪詭隨媚膚脆骨㨗如鼯猱一夫搖脣百夫褰涶記偁勦說雷同晏子以告齊君而商書謂之惡德又有中年所業垂成就見它人所嗜好偁說必强同之華山旋其面目東向太室厭其中處以求同於岱宗而止是造物者混混失面目也吾又願之七生之一而七也自珍少游燕并之市之南方求科名北南賓客之辱者十於七乎百於七乎他日復之燕并求科名賓客之辱者十於七乎百於七乎不飛不鳴人猶以爲傾不鼓不考人猶以爲媚黕黕吾顔了了吾行抱秋樹之晨華指太陰以宵盟葢知夫時之不我與又知夫區區之未可以驟明也故恆潛於幽而塊於處恬生曰子之言文願傳語六生而納交焉書之遂書之六生者某某恬生名瑑姓陳氏
