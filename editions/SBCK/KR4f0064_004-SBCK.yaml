front:
  text: 定盦續集仁和龔自珍璱人籑
  hash: sha256:ca274f3d348f65d3504ef8fc6dbb7fd6fa33409d0088b08b51bd340619a0448a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0064_SBCK_004-1a}
body:
  text: 卷四王仲瞿墓表銘乾隆末左都御史某公與大學士和珅有連然非闇於機者窺和珅且敗不能决然舎去不得已乃托於騃傎川楚匪起疏軍事則薦其門生王曇能作掌中雷落萬夫膽自珅之誅也新政肅然比珅者皆詔獄緣坐某公旣先以言事騃避官保躬林泉而王君從此不齒於士列掌中雷者神寶君說洞神下乘法所謂役令之事卽以道家書論亦其支流之不足詰者王君少從大刺麻章佳胡圖克圖者游習其游戲法時時演之不意卒以此敗君旣以此􅀗不白名中朝士大夫頗致毒君禮部試同考官揣某卷似浙王某必不薦考官揣某卷似浙王某必不中式大挑雖二等不􅀗上君亦自問巳矣乃益放縱每會談大聲呌呼如百千鬼神奇禽怪獸挾風雨水火雷電而下上座客逡巡引去其一二留者僞隱几君猶手足舞不止以故大江之南大河之北南至閩粤北至山海關􅀬河販夫騶卒皆知王舉人言王舉人或齒相擊如譚龍蛇說虎豹矮道人者居京師之李鐵拐斜街或曰秊三百有餘歳矣色如孩臂能掉干鈞王君走訪之道人無言君不敢坐跽良久再請道人乃言曰京師有奇師非汝所謂奇也夜有􅊍如六等星靑霞繞之靑霞之下當爲奇士廬盍求之王君知非眞笑曰如師言哉已巳春見龔自珍於門樓胡同西首寓齋是日也大風漠漠多塵沙時自珍年十有八矣君忽嘆息起自語曰師乎師乎殆以我託若人乎遂與自珍訂􅁯年交初君以稚秊往來諸老軰間狂名猶未起老軰皆禮之至是老者盡􅂮同列者盡絶君無憀甚故頻頻與少秊往來微道人亦得君也越八秊走訪龔自珍東海上留海上一月明秊遂􅂮則爲丁丑􅀊自珍於是助其葬又爲之掇其大要而志其墓曰君姓王氏名曇又名良士字仲瞿浙之秀水人乾隆五十九年舉人也其爲人也中身沈沈芳逸懷思惻悱其爲文也一往三復情繁而聲長其爲學也溺於史人所不經意纍纍心口閒其爲文也喜臚史其爲人也幽如閉如寒夜屏人語絮絮如老嫗匪但平易近人而已其一切奇怪不可邇之狀皆貧病怨恨不得已詐而遁焉者也卒年五十有八有集如干卷祖某父某妻金能畫與詩先卒子一善才墓在蘇州虎邱山南銘曰生曇者天也宥曇者帝也仇曇者海内士識曇者四百􅀊之道人十八齡之童子曇來曇來魂芳魄香思幽名長山靑而土黄􅄟汝於是噫工部尙書高郵王文簡公墓表銘公諱引之姓王氏江南高郵人祖安國禮部尙書諡文肅祖妣車氏徐氏考念孫四品卿銜前分守永定河兵備道妣氏公乾隆六十年舉人嘉慶四秊進士由翰林院編修累官禮部尙書改工部尙書卒於位賜諡文􅂤生乾隆三十一年卒道光十四秊明年十有二月日葬於州治之賜塋公典鄕試事四典會試事二龔自珍則其典浙江鄕試所得士公之學及其著書大凡嘗不以自珍爲不可裁而請之矣其行誼始末自珍又窺其數大耑矣將葬公第四子壽同則使自珍表諸墓自珍爰述平日所聞於公者曰吾之學於百家未暇治獨治經吾治經於大道不敢承獨好小學夫三代之語言與今之語言如燕越之相語也吾治小學吾爲之舌人焉其大歸曰用小學說經用小學校經而巳矣又聞之公曰吾用小學校經有所改有所不改周以降書體六七變寫官主之寫官誤吾則勇改孟蜀以降槧工主之槧工誤吾則勇改唐朱明之士或不知聲音文字而改經以不誤爲誤是妄改也吾則勇改其所改若夫周之沒漢之初經師無竹帛異字博矣吾不能擇一以定吾不改叚借之法由來舊矣其本字什八可求什二不可求必求本字以改叚借字則考文之聖之任也吾不改寫官槧工誤矣吾疑之且思而得之矣但羣書無佐證吾懼來者之滋口也吾又不改又聞之公曰吾之學未嘗外求師本於吾父之訓先是兵備公校定晚周諸子太史公書一時言小學者宗之公所著書卷謂之經義述聞述聞者乃述所聞於兵備公也通說四十餘事又說經之大者在述聞之末又聞之公曰吾箸書不憙放其辭自珍受而讀之每一事就本事說之栗然止不溢一言如公言公之色孺子色與人言未嘗有所高論㕦譚年近七十爲禮部尙書兵備公猶在比下憂服闋再補工部尙書而公旋卒矣公終身皆其爲子之年門下士私相謂曰以王公名位齒髪而辭色如子弟所學殊與所養殊與其諸人論歸之師海内歸之福也與公以事親爲讀書以讀書爲事親門内之士勉勉顓顓人知之立朝循典常俟乾斷無所表暴天下頗無由測公嘉慶十八秊巨逆林淸以七十七人入禁門旣殄定有議加築圓明園宮墻高厚者有議增圓明園兵額者公皆不謂然具摺上睿皇帝大動容召對良久乃罷上諭軍機大臣王引之言人所不敢言其事卒見施行與否海内弗知其奏牘何辭海内迄今弗知也由此例之公之風旨其視徒表暴於道路者何如哉公配沈繼配范子四夀昌彥和夀朋壽同范出孫七銘曰璞之瑟瑟外有文也鏐之沈沈中有堅也君子肖之以事其親也於乎欲事親者考斯欲事君者考斯斯人而不敢承孰爲大道武顯將軍福建海壇鎭總兵官丁公神道碑銘乾隆中國家修大刑於閩島之外福康安公海蘭察公先後成大功以去􅊍於祀典凡百戎臣或有賞及後裔名附史官之牒其有官不過隅鎭名不挂勲籍身厯百戰於狂濤巨鯨間幾爲忌者擠致之以無名之􅂮而危以功名終則有通州丁公按狀丁氏岀自齊太公之孫丁公世霸營邱末冑播遷入本朝家於江南之通州曾祖某祖應舉江南狼山營守備父國升蘇松鎭遊擊皆封如公官妣張生妣陳皆封夫人公父官松江遂家焉公諱朝雄字伯宜以松籍起家由右科厯數官屢遷至福建副將四十八秊島賊黄在莊叛公佐黃仕簡討平之列軍功一等閩事之荄也公詗知林爽文有謀必屯兵東港以與鳳山爲犄角勢及鳳山警公方赴引見北上半途馳還白總督常靑賊不足慮請假某兵勦東港且斷其糧道卽鳳山潰矣因進指畫緩急狀常靑不聽惟專意鳯山檄公偕總兵郝壯猷趨鹿子港擒賊目楊朝派克鳳山非公意也人以爲公功賊果大熾益蔓延檄公守鯤身又檄公守郡城公於鯤身則招土番千人敵賊萬衆矢石俱盡而賊目潘猛撝烏龍旂不下公命守備邱嵤拔之猛走鯤身平公於郡城則戰少守多未至先破賊中途路始通遂徧閱城樓屯柵池隍不治者整之時總兵柴大紀守諸羅公守郡城三閱月皆食豆餅髪觸冠數寸賊不得逞諸將恃以成戰功於外之數者亦非公意也人又以爲公功至是而討東港之命下矣常靑非公無可使而以八百人與公請益則曰戰不利則守舟中舟不可守退而益兵公曰爲國􅂮命也大人卽不發一兵某亦往拂衣上馬行至東港賊衆且數萬先時海中有淤淺雖潮至舟不通賊以是不設備僞軍師吳豹僞將軍洪賀縱飮酒天大雷雨水暴長丈所公坐艅艎指揮縛羣酋遂登其礟臺賊大驚急近戰公曰我幸踞礟臺天也遂發大礟諸火器繼之􅊍塵蔽天賊尸抛滿崖澨􅀗僞將軍李老合逐北三十餘里乃倚山爲營夜半忽有數百人大噪過溪公戒衆勿岀少選又有數百人􅀡撲大營公益不動天明盡掩之軍中不知其誰何迹其屍皆赤髪而裸蓋番人乘間爲聲援者公踞地勢故無恐林爽文遣其黨來援公築壘圍之賊隤圍出公料其必奔茄藤先令守備鄭其仁以步卒三百伏於路而親自中道追之賊遇伏卒敗餘賊遁將渡溪公擠而溺之遂􅀗豹賀東港平時乾隆五十一年某月也計大小七十三戰八百人扶傷痍以完智勇無岀公右而常靑蔽不以上聞第令公攝海壇鎭總兵官福康安公至始奏卽眞公仍留臺灣防禦比林爽文就擒始􅊩任海壇固雄鎭環海大盜時岀偵問斥候稍疎卽大爲民害公督率舟師爲游兵迎捕盜林􆅀舵林明灼者海之酋魁也公得􆅀舵於浙江洋而明灼適以戕參將張殿魁事聞高宗純皇帝震怒嚴責總督伍拉納伍懼以責公公請身任一日晨出􅄓霿四塞公喜謂諸將曰今日得報張公矣遂令衆船齊進果遇明灼於大麥洋俟其近力踞上游縱大礟連斃賊頭目明灼知不免躍入海葉把總鈎得之功狀始上聞有旨召見未行而總督又調公臺灣鎭總兵官渡臺後復還公於海壇攝水師提督五十八年以捕會匪功奉旨加四級五十九年循例入覲途次病甚乞兩江總督蘇靈阿代奏乞骸骨上方向用公特旨令回籍調理俟病痊卽行奏請陛見冬十有二月某日甫入上海縣境卒於舟中年六十有七公輕財愛士官閩時有廣東舉人曾中􅕮欠穀數千石有司以軍需不給將置之法公奇其才代償之後曾爲義民長以戰功賞巴圖魯仕至理番同知公配陳封夫人後公卒公有丈夫子二人廷􅃢國學生攀龍武生蘇松鎭左營守備孫四鍾傑武生浙江千總鍾琪國學生以嘉慶二十一年十月初二日奉公曁陳太夫人合葬於松江細林山祖塋之側越九年神道之文未具鍾傑等以公捍大患而世莫聞願文章之士發其􅊍則與載於官書者異日出入必互見故來乞書於碑銘曰告下車者曰是百戰百勝者丁將軍之墓再吿下車者曰是百戰百克而無炳炳於時者三告下車者曰是將軍之孫鍾傑鍾琪泣述功烈有盡於其心是爲史之别子龔氏之言用卒告闡烈之君子今年實道光五年明按察司僉事金君石闕銘嘉慶二十一年八月甲辰朔越一日之巳文林郞錢唐金應麟始使石工某爲明按察司僉事造此石闕用錢若干緡役工七十有君姓金氏諱應奎字曰封風錢唐人也明嘉靖二十三年進士官吏部文選司主事稟性剛毅不媚柄臣浮湛十年始循常遷改河南道御史出爲山東按察僉事河决東郡宣防有功再遷四川按察使中貴馮保私僮百指爲暴鄕里以人疾首君杖遣之􅀡聲聞於朝小人道長義不勝邪遂坐劾君君受劾歸不問世事恬愉冲夷淪隱以沒年十有實明隆慶八年葬錢唐之仁夀原越二百載高岸就坁樵蘇是侵一坯眇焉應麟䀌然心傷爰紏其族旣封旣樹立此高闕峩峩翼翼以旌遺聞以播於后昆銘曰於惟金君明允塞淵江介之􅊍升於朝右官亦不遂曰德之剛乃吏於東天險勿翕是君宣防東人謳矣西人求矣巖巖厥疆有貙有豻氣使大僚以役封狼君暴創之吏咋而觳遂褫公章西人嗁呼朝亦弗諟以老公於鄕重曰瞻仁夀之佳原宅江湖而兆正考耉德于鄕􅀖剝元石而失姓惟世澤之必鍾感文孫之哀敬攬刻辭而無爽隘兮總英靈於家乘君配邢子君弟陜西西安府同知西安之九世孫應麟嘉慶十五年舉人以文學聲於時同郡後學龔自珍爲文刻石贈太子太師兵部尙書兩廣總督謚敏肅􅃰州盧公神道碑銘代阮中堂道光十五秊秋九月兵部尙書兩廣總督一等輕車都尉􅃰州盧公卒於位旣聞皇帝震悼贈太子太師易名敏肅䘏如禮明年夏公子戸部員外郞端黼以公喪至自廣州某月日葬於州之賜阡如禮體仁閣大學士阮元作而歎曰若盧公可謂勞臣也已公通籍􅐶皇帝朝今皇帝御極一紀有餘寰海内外若西若東若北若南小大之事苟異日宜書者公罔不在公所在事西東北南上罔不委任上任之矣公罔不得衆力得於上又得於衆功罔不成功成矣厥後罔不善上以實任公以實應微獨上信公若京朝官若外吏若僚佐若游士賓客若伍若民莫不曰今皇帝御極一紀有餘小大之事未有厯試歷效始卒偁恩禮如盧大人者也卒之日訃至之日遠近失色嗚呼可謂勞臣也巳曾祖振裔祖某考士夔妣氏某本生考某妣氏某公諱坤字靜之卒年六十有四配氏某先公卒阮元乃銘公之神道銘曰􅃰郡之盧熠自東漢時惟范陽代有偉者允文允武大熾於唐汴宋以降盧少替夷俟公而􅊍五歲瀕棄神嫗活之憑䜟告祥卒如神言轍滿天下名德浩滂起家文辭觀政於曹翠翎英英岀治南服又厯試旃以知宣房龍飛自天浹旬三遷電發雲驤初撫關中師彼周雅乃積乃倉乃興水田以實雍州西陲用兵西陲用兵將相雲會公職轉饟轉饟如何十萬西師勳命一方犎牛三萬役夫又萬執祘庚庚祘定檄飛自送大軍夜岀燉煌帝甄西功公不搏賊公乃綱綱旣甄旣藏休公于晉羽毛迴翔西事再訌公請復西帝還其畺帝命作督於江漢滸江漢湯湯沱潛爲田龍魚失居乃怒而張奪此波黎予彼龍魚以奠荆襄有覡有􅍹負峒阻碉不賦而禳公曰火攻扈扈虎虎緋旂赤常帝曰趣之炎靈速之旣犁旣康使者汗矣帝問南矣公偃在牀迤邐而南移節遷旂嶺海洋洋獮􅍹所蔓小沖大排弭首如牂乃問鹽鐵鹽官告贏鐵官告良嶺雲白矣海氛墨矣嶺􅈀夜狂吁嗟嶺海大竇大痔海人來商不曰驅之揖而嫗之追咎有明瑰麗婬葩巧工所都誘我篚筐遂瘠南東喪金萬萬食妖大行經海之南有越南國翳古越裳維海之西有英吉利隆鼻高眶環伺㠗門以窺禺服什伍其檣鼉鳴地中長鯨和之擘波浪浪澎湃百秊自互市始大原我詳公姑仍之又姑持之亦持亦創仍之如何以㠗居夷勿汝磔攘持之如何自誅食妖以肅津梁創之如何樓船礟臺虎門中央窺公之心信公之意公實茹蔵罷關絶市粤乃大治異日其颺天不俟公不蘇東南公也暴亾凡公所莅聖淸所覆禹蹟芒芒我書公勞什不六七塞滿九閶後有式者天祿辟邪鬐鬛飛揚刑部主事番禺黄君妻周墓碣銘嶺南有女子焉哭其母又哭其父又哭其兄又哭其殤遂先所天卒女有女弟二相愛以哭其女兄相繼卒竺矣乎一門之内嗇於秊豐於思鬱於性薄於祜天鍾之天皆疢之有如是乎所天旣貴告其友仁和龔自珍云吾婦卒之日吾方北游莫視􅅤兹窆有日願書其表隧之石自珍乃次之曰山陰周德瑞客嶺南占番禺籍生聚榮聚榮生女子子適同縣黄玉階中道光丙申進士官刑部主事贈妻安人晉宜人以不及刑部君之貴食貧茹艱婉惠愻順自姑章及三族無間言生嘉慶乙丑也卒道光癸巳也春秋二十有九宜銘銘曰人生兩間哀樂固無極也賢智過情不肖不及也矧后媪之積痗兮非女子之善戚仙吾不可期佛吾不可思爲鬼果如爲人之聚首兮又惝怳而弗敢知女子之征亦寥廓也匪骨匪肉翔所谷也黃子無聊之言則曰夜臺樂也徐泰母碣侯官林氏女爲上海徐兆洙妻期而寡遺腹子曰泰泰從林受孝經旣長好文章篤於朋友龔自珍友之吿自珍曰吾母平生再刲股一療吾外王母疾再療吾王母疾皆瘉親族無知者寡十四歲而卒卒􅀊餘吾祖母病􅅭瞀家人恐病者忽自語愈矣適四孃􅕮吾側飮吾茶果瘉侍病者皆泣四孃者吾父于諸同產季也道光十九秊詔旌上海縣徐兆洙妻林氏泰立石墓側使自珍銘銘曰生以肉療母􅂮以魂翼母宜有德有文之子熾爾後孔憲􅃔母碣闕里孔憲􅃔其氣儒者手狀乞銘其母之阡按狀孫氏浙產歸孔昭生三子憲􅃔仲也逮事威姑先所天卒春秋三十能刻繆篆施金石組紃之事絲竹筆牘之蓻靡不通眇焉銘曰璇珠輝輝氣質溫必有圓折鍾厥源吾郡葩華莫若孫車來闕里高閈門東魯喪矣西湖媛此有式者魯後昆朱殤女碣朱山人游東海望姜女祠海中孤墳雲水環壅天色垂縹俯之幽然心動而識焉役反其女殤家人葬之東􅀡門某村翼日自往哭之地多野潦曠浪無垠目窮魄動觸其前境神思無形乃成讖兆告其友龔自珍言如此乞書于碣道光元年冬也潘阿細碣女阿細黔潘氏嫁瑯琊夫甚貴事夫良頗識字夫遠戌岀居庸居庸關莾萬重行倉皇不可挈託弱小友朋職我婦何割屋宅細有􅁫􅀡十金何貸之糴米鹽久不償慙以怵細甚俠無德色望夫臺細裵􅏆涼風厲夫不來細悲吟淚霪霪子先肂辰以奄莫之莫禭之報鈫德銘􅄟之居庸關天之西夫不歸冡萋萋槥無漆媿􅁫德樹之棗心甚赤京師悅生堂刻石代宋經厯或問曰三代之極盛養民之法備矣其民猶有飢寒莫告者乎應之曰有三代之貴游士大夫有施舍振貨以爲德以爲名者乎應之曰有何以知之曰古之農有大宗有小宗必有羨也羨爲閒民閒民俟轉移執事以生者也執事不及之則飢寒矣其在周禮有六行六行始於孝而終於䘏四行爲親親之事二行爲仁民之事以正三代貴游士大夫之行其在禮運篇曰鰥寡孤獨廢絶有養也養之之法古無專官無條目無專官無條目是費不出於公上也費不岀於公上設􅀸大夫義又引嫌以避民之歸巳則鰥寡將誰養然則富貴有祿入之家必佐主上以養民不始於宋之罕氏齊之陳氏也明矣難之曰閒民贍於其大宗非其宗也卿大夫弗預聞應之曰古之有姓氏有譜系者必公􅀸大夫之族盡黃炎之裔姬姜子姒嬴芉之人也若夫草莾市井之人叢叢而蝨蝨不岀於黄炎其先未嘗有得姓受氏之榮也收族之大宗各收其族何以處草莾市井之無告者故知必不然矣我聖淸之休養民同符乎三代民固悅其生然而飢寒之民未嘗一日絶於天地之間天爲之非人爲之也是故京師有悅生堂以佐聖天子養民剏之者誰河南吳侍郞烜也董成者誰錢唐陳參議鴻戚檢討人鏡也出貲者誰碑陰所立諸公是也有其貲必有其地有其地必有其出入會計有其出入會計必有章程子目風雨寒暑也孰親之扃鑰也孰啟閉之木石甎瓦孰庀之輿儓侵漏也孰問之必有司事司事者誰都察院經厯汾陽宋銘堯始末皆在焉爾宋銘堯記道光戊戌五月鳳山知縣常州湯公父子畫像記乾隆五十一年臺灣民林爽文叛鳳山知縣武進湯大紳死之大紳子荀業實從大紳創荀業左右翼父􅂮常州人謀曰父􅂮忠子􅂮孝宜建忠孝祠以祀純皇帝諭祭之文在麗牲之石海内士大夫爲歌詩甚多甚信甚備荀業有子曰貽汾以蔭授雲騎尉官浙江副將軍旣致仕居江􅇞府城北之紗㡌巷仁和龔自珍訪之拜鳳山君像儒者也又拜太學生贈振威將軍崇祀忠孝祠贈公像益悛悛有子弟之容曰與竹居詩者僅半卷贈公所爲也其言冲平夷易副將軍詔自珍曰昔之日狂濤怒鯨間家􅛚巢隕蕩乎何所遺畫像以不似而先弃詩以不自愜而先弃凡今所存皆以弃而存於乎至人之於忠孝名節炳天地而襮史冊者大氏遭遇時勢卒然而成之必非先有規模於其胸肊者洎其然也庸距有迹平亦若是而巳矣距鳳山事五十有五年仁和後學龔自珍再拜記金侍御妻誄金侍御妻曰韓宜于姑而􅂮􅂮之夕姑于三千里外夢之如訣者初夫婦上書母母報問侍御取繼娶有獻於姑不報或問之曰思故人也侍御遷一階馳書賀母亦不報曰吾傷故人不及見侍御具狀乞文鳥名姑惡誰當雪之䔩名慈姑又誰植之遇人不齊民生萬千孰天其恩孰疢其年􅂮生之際亦孔不昧魂踰湖江以訣縛愛有泣在膺有聚在房舍圖其新我箴不忘最錄南唐五百字南唐保大四年韓熙載奉敕集王羲之獻之書􅁧并書一卷凡爲句百二十有四爲字四百九十有六以較梁周散騎千文無復字江南宮中藏王氏筆蹟數十軸取材易給故也韓書紆徐頗似之其言如謠如讖如頌如諷如繇如廀雖􅃈屑有足憙者梁千文學僮皆習之此作恐遂無詗者乙未三月付寫定懿鑠祖考蒼昊配崇盪氛埽㓂討莠除凶旌旂藏怒祝禬牖衷蒐苗獮狩三鼜十攻飲至妥侑延連瞽矇泰元后媪槱燎熏穹瓊琚瑤珮紀烈采風狄鞮滇僰閟燧消烽館豳㴑澗壤确冰冲韭稻葵菽艱沃劬豐兕觥介夀旨畜禦窮􅊧山掘穴軫癏抱痌茯苓枸􅂎昌歜鹿茸朱砂鍾乳參术芷芎徵材數藥博晰牢籠竺佛誕降僧刹棟隆宏誓脫度浩刼乍逢楗槌䨓吼梵唄潮雄琉璃現界菡蓞呈峰拯蘇焚溺警喝逖聾閨闈稟哲笄翟祁僮鶴鸞嵌餙鳷鵲鐶銅漣紋濯影鉛粉浣紅鏡籨屑桂閬鷁搴蓉啼妝歛妒冶㝱憐忪頺鬟䁥枕搦管汗彤娉婷綷縩婭姹玲瓏葳蕤芳澤雪艷嬌融梅蜷竹亞窈窕䆳穠愁眉睞靨姞邁姬襛春臺霽敞行閣鬐虹禨祥褫祉禔應龎鴻巫芭選隊干戟倀童儺禳疫􅸳祈􅂌蝗螽咸秩郊祗鬯圭臚旅磔攘婆娑􅆄蠁脯湑巳袚辛祈禖弓雩舞禡禱􅃖尤蜡餞貓虎札瘥天昏砭衺瘉蠱漕粟牽船征商榷監緍泉貸逋關津弛􅅈幼押櫜鞬耄肄豆俎饋鈴寢􅋶颺笏笥黼讖律衆錄匱冊襲弆一夔膺寄六籍司祜􅂜斚鼎卣珩璜琮瑀䪥篆蝌籒刓摹拓補玫瑰伴圅􅃢瑚裝柱癖尙浸滛馣馤肺腑簺揜鬥智馮陵醜虜謀祕算殫財贏勇賈鬼閱呼吸電激吐茹乾元坤喪翩反奪汝隼擊鴥逝鼯技危許皈䡮牟尼蹈轍鄒魯殱殄謗讟勰輯肱膂揮波灑瀾贈申慰甫鴛鴦戢梁鳬鷖媐渚陔􅏀懲佚萇固饌譜原隰駰騏蘋蘩筐筥麟趾褭蹏牣庫溢陼眷錫曼羨耉耋純嘏記王隱君於外王父段先生廢簏中見一詩不能忘於西湖僧經箱中見書心經蠧且半如遇簏中詩也益不能忘春日出螺師門與轎夫戚貓語貓指荒塜外曰此中有人家段翁來杭州必岀城訪髴姓王也西湖僧之徒取心經來言是王老者寫參互求之姓王何疑焉惜不得耡地能書者姓橋外大小兩樹依倚立一杏一烏桕吳之癯癯不知何輩流其籍吳中大略生乾隆時卒嘉慶時讀其言百憂之所窟衆香之所宅其行無有畔涯其平生甚口其言盡口過也過其里之子弟曰若爲子弟而淸湻之質亡矣過其父老曰負所見聞之都市益過其父老曰上古飼狗之盆萬年猶不以薦器之其州之大聚曰州將潰或問之曰貧者詐升斗乎富者膳飛走乎事令長不父母乎皆曰不然則州何爲潰曰父老􅂮矣子弟不得爲他日父老問何爲曰無積不以讀大聚之條約則哦禮經之文曰土敝故草木不長水煩故魚鱉不大之京師過其郞曹曰古也剛愎今也柔而愎過王公大人之淸正而儉者曰神不旺不如昔之言行多瑕疵者嘗怒人而弗絶也曰容之甚於絶之過愿者誦巧言之五章當此時天下聞此癯言如此矣顧癯少年受人片譽越五十秊遇其曾孫於市脫百金之裘贈之親爲駕載之歸舍龔自珍曰予不識癯識其弟子數數偁慕其師予曰從子之師之道逐道也客於門窬逐於巷市客於巷市逐於州都客於州都逐於朝凡七見逐而終不怨其師書果勇侯入覲本朝旣百八十有六載漢人籍而身膺世爵者公則有黃芳度岳鍾琪侯則有張勇施琅伯則有文臣張廷玉武臣孫思克王進寶趙良棟皆有功德皆以爵終於其位而今太子太傅固原提督楊君芳封爲二等果勇侯位在二十六等之第六等赫然與靖逆靖海齊名增漢人重凡宿衛之臣滿洲輒除乾淸門侍衛其有異材重以貴戚乃擢御前侍衛漢籍輒除大門上侍衛日􅀡不過閾領侍衛内大臣轄之如外弁之見將帥其有材勇擢爲乾淸門而班之崇極矣今楊侯特授國什哈轄漢國什哈轄内臣驚爲未聞漢人襲父爵者岀爲弁士入爲侍衞父祖功最高入拜散秩大臣而蔭庇之榮極矣侯有子曰承注自以生員起家賜文舉人他日當補文臣内可致九􅀸外可致督撫漢人襲爵者施琅孫士毅皆詔入旂籍漢軍都統治之而楊侯官籍以貴州行伍達於兵部不改承注以貴州舉人達於禮部不改父子迴翔立外廷奉外事昔周中興威重大臣無如尹吉甫吉甫歸鎬客有張仲今大臣數楊侯楊侯朝客有徐松張琦魏源源也雅材龔自珍友之噫嘻美譚並世之士躋追周雅後或繼也前聞也侯之入覲何自自喀什噶爾也其年道光九秊其月四月廿八日乙丑自珍旣與侯相揖於西淀軍機處􅀡房明日書是以姼侯書番禺許君粤之東維帝南服而天下之雄也其山怪其土阻其水大壑其物產英詭其人沈雄多大略其大政三曰榷鹽曰舟師曰互市三者恒有聯事相倚也番禺許君家受鹽董全粤鹽能靖民之悍然與士爭利者旣起家顧不屑自封殖曰粤天下雄也紓朝廷南顧而下爲里􅝵憂其海氛乎吾當身任之治海之道有二日得卒曰得船鄕勇之老於海者視官兵其生熟相萬也私船之法式視戰船之造於官者其狙鈍相萬也尙書百文敏公方銳茹羣言君進指畫緩急狀文敏曰具如君言則退而自具舟神機鬼式百十其舸疾於􅄓風曰紅單船龍首魚身燕尾首尾自衛曰燕尾船又立募潮少年萬人爲鄕軍軍於珠􅊍里而自將之日散千金自爲守其年敗賊於大洋明年盜魁自縛獻百數文敏爵輕車都尉粤遂平實嘉慶十五年某月也粤大祲君愾然曰夫互市之耗中國久矣獨徠洋米可以償所失今法洋米至則稅以拒之又空反以窘之米益少客益多主客皆饑是與外夷市勇於招徠淫巧而怯於籌食也宜蠲其稅之入而許其貨之出夷商大悅則反害而爲利大吏僉曰如君言由是粤雖惡􅀊米􅀡平許君之冊也厥後浙江飢大吏召臺灣米由海入浙境免其鈔約略祖君冊云子曰祥光仕爲戸部郞以讅龔自珍於京師自珍南向偁曰君有功於大計者三非惟照矅其鄕固世魁傑宜乘安車應淸問使公卿識奇士又知君之不可招也如祥􅊍言書一通以姹升五嶺而望者焉書葉機鄞人葉機者可謂異材者也嘉慶六年舉行辛酉科鄕試機以廪貢生治試具凡竹籃泥爐油紙之屬悉備忽得巡撫檄曰貢生某毋與試機大詫初蔡牽朱濆兩盜爲海巨癰所至劫掠戸口以百數􅀊必再三至海濱諸將怵息俟其去或揚帆施槍礟空中送之寇反追衂不以聞故爲患且十年巡撫者儀徵阮公也素聞機名知沿海人信官不如信機又知海寇畏鄕勇勝畏官兵又知鄕勇非機不能將八月寇定海將犯鄞機得檄號於衆曰我一貧貢生吮墨執三寸管將試於有司售則試京師不售歸耳今中丞過聽檄我將鄕里與海宼戰毋乃咍乎雖然不可巳願諸君助我衆曰盍請銀於文官不可盍假礟於武官不可事亟矣何以助君葉君則揎臂大呼且誓曰用官庫中一枚錢借官營中一秤火藥而成功者非男子也飛書募健足至行省假所知豪士萬金假縣中豪士萬金遂濃墨署一紙曰少秊失鄕曲歡致凍餓者有拳力絶人者漁於海者父子兄弟有曾戕於宼者與無此數端而願從我者皆晝諾夜半賫紙者反城中村中畫諾者幾三千人天明簿旗幟若干火器若干糧若干機曰烏用衆以九舟出餘聽命是日也潮大至神風發於海上一槍之發抵巨礟一櫓之勢抵艅艎殺賊四百餘人九月又敗之於岸十月又逐之於海中明年正月又逐之於島浙半壁平出軍時檣中有紅心藍邊旂機之旂也自署曰代山其村名也朱濆艦中或爭軋詛神必曰遇代山旂阮公聞於朝奉旨以知縣用今爲江南知縣爲龔自珍道其事書金伶金伶德輝以字行逸其名矣吳人乾隆中吳中葉先生以善爲聲老海内海内多新聲葉刌而律之納於吭大凡江左歌者有二一曰淸曲一曰劇曲淸曲爲雅讌劇爲狎游至嚴不相犯葉之藝能知雅樂俗樂之關鍵分别銖忽而通於本自稱宋後一人而巳葉之􅂮吾友洞庭鈕非石傳其祕爲第一弟子德輝故劇弟子也隸某部部最無名顧解書以書質鈕而不以歌一夕歌鈕刌而律之納於吭則大不服鈕曰毋曰吾不知劇若吾所知殆非汝所知也卽欲論劇則歌某聲當中腰支某尺寸手容當中某寸足容當中某步金始駭就求其術鈕曰若不爲劇寒餓必我從三年藝成矣曰諾江左言歌自葉先生之􅂮必曰鈕生而德煇以伶工厠其間奮志孤進不三年名幾與鈕亢乾隆甲辰上六旬江南尙衣鹺使爭聘名班班之某色人藝絶矣而某色人頗絀或某某色皆藝矣而􅅇師鼓員琶瑟員不具或皆具而有聲無容不合駕且至頗窘客薦金德煇德煇上䇿曰小人請以重金號召各部而總進退其所短長合蘇杭揚三郡數百部必得一部矣鹺使喜以屬金金部署定其目錄琶瑟員曰蘇州某笛師曰崑山某鼓員曰江都某各色曰杭州某曰江都某而德煇自署則曰正旦色吳縣某隊旣成比樂作天顔大喜内府傳溫旨燈火中下珍饈醖玉器宮囊不絶又有旨詢班名鹺使奏江南本無此班此集腋成裘也駕旣行部不復析而寵其名曰集成班後更曰集秀班德煇旣以偁旨重江左遂傲睨不業鈕生屏人戒之曰汝名成矣藝未也當授汝哀秘之聲明日來授以某曲每度一字德煇以爲神曲終滿座燭盡滅德輝􅀼譜其聲而不能肖其年秋大商延客召集秀乾隆時貴僚賢公子喜結歡名布衣當佳晨冶夕笙簫四座被服靚燿姚冶跌逿時則必有一人敝衣冠面目不可憙而淸醜入圖畫者視之如古銅古玉娑娑然懽奇襍厠於其間以爲常其人未必天下奇士也要之能上識貴人長者大官走聲譽下能􅓊名僧羽士名倡怪優劔俠奇巧善工之倫以故非非石不能致德煇而德煇試技之日主人以德煇所自薦也非石爲上座旣就夕主客譁惟恐金之不先奏聲旣引吭則觸感其往夕所得於鈕者試之忽肖脫吭而哀坐客茫然不省始猶俗者省雅者喜稍稍引去俄而德煇如醉如寱如倦如倚如􅅭瞀聲細而譎如天空之晴絲􅅶綿慘闇一字作數十拆愈孤引不自巳忽放吭作雲際老鸛呌聲曲遂破而座客散巳盡矣明日鈕視之而病鈕悔曰技之上者不可習也吾誤子子幸韜之而習其中德煇亦悔徐扶起燒其譜故其譜竟不傳而德煇􅀗以富且美譽終德煇卒時年約八十餘無子有弟子曰􅀟鸞非高弟也能約略傳其聲貧甚走南東至北子嘉慶已卯冬非石在子座上字謂之曰􅀟鸞早岀世十年走公􅀸矣龔自珍曰非石今傫然在酒間爲予道蘇揚此􅀋事甚夥金德煇事自甲辰起大約迄癸丑甲寅間噫江東才墨之藪樓池船檝之觀燈酒之娛春晨秋夕之游美人公子憐才好色姚冶跌逷之樂當我生之初頗有存焉者矣松江兩京官御史某與侍郎某相㥫也御史公得大學士和珅陰事欲劾之謀於侍郞侍郞曰大善比日上不懌事不成徒沾􅀡名誠恤國體者遲十日可乎御史諾緩急待子而行上幸木蘭􅀬河留京王大臣晨入􅀡有急報自行在至發之和珅答侍郎書大略云和珅頓首謝種種有變置矣月餘報至亦和珅與侍郞書辭甚嘽謂君紿我侍郞慙急詣御史曰可矣御史方飮酒劾竟上是月以􅁦典罷官亦無禍浙後進曰御史頺放人也安慮天下有穽巳者哉欲明不欺成其獄雖易地以計烏可巳烏可巳顧負忼􅀡之意偵主喜愠乃一發聲留隟俟處置以敗信道可不篤耶設少年悍者擊之中矣縱難送曹生天下笵金摶垸削楮揉革造木几必有伍至於士也求三代之語言文章而欲知其法適野無黨入城無相津無導朝無詔弗爲之其無督責也矣爲之且左右顧視踆踆而獨往其愀然悲也夫其頽然退飛也夫智者聞之則曰此豪傑也胡以言之古未曾有笵金者亦無摶垸者亦無削楮揉革造木几者其始有之其天下豪傑也或古有其法中絶數千歲忽然有之其天下豪傑也今夫士適野無黨入城無相津無導朝無詔而讀三代之語言文章而求其法弗爲之其無督責也矣而爲之其志力之橫以孤也有以異於曩之縱以孤者乎雖然夫上也聞之憙憙奈何曰吾之志力可以有金而淬之笵金者弗吾逮也吾且大賢吾有垸而方員之有楮而繢之有革而髹之有木几而雕鏤削治之瘉密瘉華瘉賢吾又大賢智者聞之則大聲暴訶之曰止夫橫者孤矣縱孤實難縱者益孤夫汝從而續之不難其止於乎龔子未得爲智者徒也然固習聞智者之言也里人曹生籒士也其所學其所處難與易之間適􅀋乎是閔其孤識其豪傑不願其爲天下笵金摶垸削楮揉革造木几者姍笑作縱難臣里臣與臣里相詬也臣里自寀其語言其言曰夫畀之而榮喪之而辱升之九天而喜沈之九􅘢而愠吾圈行卑賤而以權予上亦貌委蛇而已矣吾中豈有是哉臣窺之食不忘瞽宗之牲坐不忘栗主之祝口飴而手勤不忘殊衣冠者之頌說已坐是得心疾臣詬之曰請徵子之客籍夫子之客籍有一世之名者有三世之名矣有三世之名者有十世之名矣夫喜而不春怒而不夏愁苦而不秋晦盲儇輕少而苟壯而脆老而獷黃帝之所謂痺民也者盡子之客也汝師保此名也矣三世耳相續三世目相續三世心知相續社鬼護之其爽十世水不溺火不燒雷霆不求其爽百世麟鳳狗不並續不知動􅀋大也芝朮灌木不並續不知植􅀋衆也珠玉黃鐘虎子威窬不並夀不知古器之賾痺民之言不與聖智之言並夀不知古名姓之博且吾聞周以前上結繩年多事少隸令栞令之箸錄不百家矣史佚仲尼司馬遷劉向之威靈竟弗庇之矣古之宲語言之鬼其哭於􅘢訴於天憑神於寫官栔令崇誰氏之孫哉臣里乃詬臣曰汝之言孤汝不祥人也臣應之曰百世爲縱一世爲橫臣孤於縱不孤於橫臣媚於去馬來驢臣目盱睢臣不媚蠹魚且吾聞之宲身莫如定信道莫如篤觀古今莫如通篤以定通臣且受大福乃又詬臣曰汝之術善紿者也汝兒紿言紿岀處紿浮湛而不任其勞彼司福之主其卒爲汝紿於是臣無以應臣姑起其疾畀焉勿榮喪焉勿辱升之九天勿喜沈之九􅘢勿愠汝之術博矣何但取以待富貴之權藉者哉廬之推今有一人縗絰一人絃歌一人和之以如喪者之側無恤無忌發於其心而無僞雖無僞喪者􅇞無恨此人耶又有一人縗絰一人助之號一人敎之喪禮不盡發於其心而僞雖僞喪者􅇞無感此人耶士之父母􅂮志其未成之志竟其所有事之事疾病寒暖飢餓必以告我孺子也人紿我必以告吾心中之親未嘗一夕􅂮者也天下之人曰不聞吾親之聲矣不見吾親之容矣始􅂮人來唁或助之號或敎之喪禮或稱述德而慕思或聞而震駭比其祥比其墓曾不能以一瞚而言者弗震駭曰是􅂮久矣天之行莫速於是固然巳矣宜然巳矣人之變莫蹙於是是故人􅂮吾親也而哀人久吾親之􅂮也而益哀夫何爲其哀也哀莫推也廬之禮必睦其隣富貴也多財以分之必偁􅂮者之賜賤貧也薪􅀒之筋力同之必偁吾親之力􅀊時日月上飮食多樹之襍華墓廬一動舉悉本其故於􅂮者不使三月無聞吾親之名則一方之民羣然奉吾親之冡棺槨如方之小神如方之小神則言說於是心志於是耳目於是矣士偁述親之賜則必與鄰之幼稚子言之父老神吾親者􅂮則幼稚續且重先入之言如是則必沒吾躬及吾子孫矣是故士之父母􅂮春亦其春夏亦其夏秋冬亦其秋冬士之德盛者能知聖人聖人者合萬國之歡心以祀其先王大命必於廟其始升歌曰濟濟多士秉文之德而卒偁無斁於人以如將萬秊焉由此其推也捕蜮第一龔自珍旣廬墓堲居於彼郊野魂飛飛以朝征魄悽悽而夕處百蟲謀之曰予可攻侮厥族有大有小布滿人宇予告訴無所發書占之曰可以術捕禁制百蟲非网非􅅈予嘗韙夫獵者之彈亦起於古之行孝者魑魅山林則職畏禹予禁制汝蟲皆法則上古敂山川邱墳而天神來下山川之祇問曰今者有蜮蜮一名射工是性善忌人衣裳畧有文采者輒忌不忌縗絰能含沙射人影人不能見必反書之名字而後噬之捕之如何法用蔽景艸七莖自障蔽則蜮不見人景又用方諸取月中水洗眼著純墨衣則人反見蜮可趨入蜮羣趨入域羣則蜮􅅭瞀乃祝曰射工射工汝反吾名以害吾躬吾名甚正汝不得反攻射工射工速入吾胃中如是四徧蜮􅂮烹其肝大吉述捕蜮第一捕熊羆鴟鴞豺狼弟二邱墳之祇問曰今者有熊羆鴟鴞豺狼是性善愎必噬有恩者及仁柔者捕之如何法用敗絮牛皮僞爲人形手執飼具以示人恩中實以熾鐵咆哮來吞絮韋吞巳熾鐵火起麋灼其心肝祝曰豺狼豺狼予恩汝不祥亦勿戰汝以剛色柔内剛誅汝肝腸汝卒咆哮以亡如是四徧則其穜􅀋皆殄絶吉述捕熊羆鴟鴞豺狼弟二捕狗蠅螞蟻蚤蜰蚊虻弟三沮洳垤之祇問曰今有狗蠅螞蟻蚤蜰蚊虻是皆無性聚散皆適然也而朋噆人使人憒耗治之如何法不得殄滅但用冰一柈置高屋上則蠅去又煉猛火自燒田則亂草不生亂草不生則無所依無所依則一切蟲去祝曰蚊虻蚊虻汝非欲來而朋來汝非欲往而朋往吾悲汝無肺膓速去吾終不汝殄傷如是四徧則不復至述捕狗蠅螞蟻蚤蜰蚊虻弟三
